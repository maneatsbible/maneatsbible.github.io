<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Better Dispute v14</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.home, .back {
  cursor: pointer;
  font-size: 16px;
  margin-right: 10px;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

/* USER */
.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button.active {
  background: #3a6df0;
}

/* HOME */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.compose {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  padding: 10px;
  background: #1a1a1c;
  color: #fff;
}

/* CARDS */
.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

/* DISPUTE */
.turn {
  background: #141416;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 6px;
}

.q { background: #2c2c2f; }
.a { background: #1f3a2c; }

/* NESTED ATTACHMENT */
.nestedBlock {
  margin-left: 14px;
  border-left: 2px solid #333;
  padding-left: 10px;
  margin-top: 6px;
}

.nestedCard {
  background: #101012;
  border-radius: 8px;
  padding: 8px;
  margin-top: 6px;
  cursor: pointer;
  font-size: 12px;
}

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  border-top: 1px solid #222;
  padding: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="back hidden" id="backBtn" onclick="goBack()">←</div>
    <div><b>Better Dispute</b></div>
  </div>
  <div class="right">v14</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="home"></div>
<div class="container" id="focus"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

/* STACK MODEL (FIXED) */
let focusStack = [];

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] }
];

/* SAMPLE */
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    {
      type: "question",
      user: "bob",
      text: "Where is that stated?",
      nested: [
        {
          id: 201,
          a: "bob",
          b: "alice",
          turns: [
            { type: "question", user: "bob", text: "Define 'faith'." }
          ],
          nested: []
        }
      ]
    }
  ],
  active_user: "bob",
  turn_state: "question"
});

/* HELPERS */
function currentChain() {
  return focusStack.length ? focusStack[focusStack.length - 1] : null;
}

/* HOME */
function goHome() {
  focusStack = [];
  render();
  updateInput();
}

/* BACK */
function goBack() {
  focusStack.pop();
  render();
  updateInput();
}

/* SWITCH */
function switchUser(u) {
  currentUser = u;
  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));
  document.getElementById("u-" + u).classList.add("active");
  render();
}

/* ENTER CHAIN */
function openChain(chain) {
  focusStack.push(chain);
  render();
  updateInput();
}

/* NESTED CHALLENGE */
function challenge(parentTurn) {
  const chain = {
    id: Date.now(),
    a: currentUser,
    b: "other",
    turns: [],
    active_user: currentUser,
    turn_state: "question"
  };

  if (!parentTurn.nested) parentTurn.nested = [];
  parentTurn.nested.push(chain);

  focusStack.push(chain);
  render();
  updateInput();
}

/* HOME */
function renderHome() {
  const home = document.getElementById("home");

  let html = "";

  posts.forEach(post => {
    html += `
      <div class="card" onclick="openChain(posts.find(p=>p.id===${post.id}).chains[0])">
        <b>${post.text}</b>
        <div style="opacity:0.6;font-size:12px;">@${post.user}</div>
      </div>
    `;
  });

  home.innerHTML = html;
}

/* RECURSIVE TURN RENDER */
function renderTurns(turns) {
  let html = "";

  turns.forEach(t => {
    html += `
      <div class="turn ${t.type === "question" ? "q" : "a"}">
        ${t.text}
        <div style="font-size:11px;opacity:0.6">@${t.user}</div>
      </div>
    `;

    if (t.nested && t.nested.length) {
      html += `<div class="nestedBlock">`;
      t.nested.forEach(n => {
        html += `
          <div class="nestedCard" onclick='openChain(${JSON.stringify(n)})'>
            Nested dispute → ${n.turns?.[0]?.text || "Open"}
          </div>
        `;
      });
      html += `</div>`;
    }
  });

  return html;
}

/* FOCUS */
function renderFocus() {
  const focus = document.getElementById("focus");
  const chain = currentChain();

  if (!chain) {
    focus.innerHTML = "";
    return;
  }

  focus.innerHTML = renderTurns(chain.turns);
}

/* INPUT RULE */
function updateInput() {
  const bar = document.getElementById("inputBar");
  const input = document.getElementById("input");

  const chain = currentChain();

  if (
    chain &&
    chain.active_user === currentUser
  ) {
    bar.classList.remove("hidden");
  } else {
    bar.classList.add("hidden");
  }

  input.onkeydown = (e) => {
    if (e.key !== "Enter") return;
    if (!chain || chain.active_user !== currentUser) return;

    const val = input.value.trim();
    if (!val) return;

    chain.turns.push({
      type: chain.turn_state,
      user: currentUser,
      text: val,
      nested: []
    });

    chain.turn_state =
      chain.turn_state === "question" ? "answer" : "question";

    chain.active_user =
      currentUser === chain.a ? chain.b : chain.a;

    input.value = "";
    render();
  };
}

/* RENDER */
function render() {
  renderHome();
  renderFocus();

  const back = document.getElementById("backBtn");
  back.classList.toggle("hidden", focusStack.length === 0);
}

/* INIT */
switchUser(currentUser);
render();
</script>

</body>
</html>
