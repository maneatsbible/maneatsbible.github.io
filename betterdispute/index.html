<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Better Dispute v17</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER (UNCHANGED) */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.home, .back {
  cursor: pointer;
  font-size: 16px;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

/* USER */
.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button {
  background: #2a2a2d;
  border: 1px solid #333;
  color: #ccc;
  padding: 6px 10px;
  border-radius: 6px;
}

.userBar button.active {
  background: #3a6df0;
  color: #fff;
}

/* LAYOUT */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

/* COMPOSE */
.compose {
  background: #141416;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  background: #1a1a1c;
  color: #fff;
  border: 1px solid #2a2a2d;
  border-radius: 10px;
  padding: 10px;
}

/* CARDS */
.card {
  background: #1a1a1c;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 4px;
}

/* TURN */
.turn {
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 6px;
}

.q { background: #2c2c2f; }
.a { background: #1f3a2c; }

/* NESTED */
.nested {
  margin-left: 14px;
  border-left: 2px solid #333;
  padding-left: 10px;
}

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #0f0f10;
  border-top: 1px solid #222;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="back hidden" id="backBtn" onclick="goBack()">←</div>
    <div><b>Better Dispute</b></div>
  </div>
  <div class="right">v17</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="home"></div>
<div class="container" id="dispute"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>

/* ---------------- STATE ---------------- */

let currentUser = "bob";
let mode = "home";

let activePostId = null;
let activeChainId = null;

/* ---------------- REGISTRY (FIX) ---------------- */

const postsById = new Map();
const chainsById = new Map();
const turnsById = new Map();

/* ---------------- TEST DATA (RICH) ---------------- */

function createTurn(type, user, text) {
  const id = Date.now() + Math.random();
  const t = { id, type, user, text, nested: [] };
  turnsById.set(id, t);
  return t;
}

function createChain(a, b, seedTurns = []) {
  const id = Date.now() + Math.random();
  const c = {
    id,
    a,
    b,
    turns: seedTurns,
    active_user: b,
    turn_state: "question"
  };
  chainsById.set(id, c);
  return c;
}

function createPost(user, text) {
  const id = Date.now() + Math.random();
  const p = { id, user, text, chains: [] };
  postsById.set(id, p);
  return p;
}

/* USERS */
const alice = "alice";
const bob = "bob";
const charlie = "charlie";

/* POSTS */
const p1 = createPost(alice, "Faith alone is sufficient for salvation.");
const p2 = createPost(charlie, "AI will replace most jobs.");
const p3 = createPost(bob, "Truth requires questioning authority.");

/* CHAINS */
const c1 = createChain(alice, bob, [
  createTurn("question", bob, "Where is that stated?"),
  createTurn("answer", alice, "Ephesians 2:8-9."),
]);

const c2 = createChain(charlie, alice, [
  createTurn("question", alice, "Which jobs specifically?"),
  createTurn("answer", charlie, "Most knowledge work."),
]);

p1.chains.push(c1);
p2.chains.push(c2);

/* ---------------- NAV ---------------- */

function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  render();
}

function goHome() {
  mode = "home";
  activePostId = null;
  activeChainId = null;
  render();
  updateInput();
}

function goBack() {
  goHome();
}

/* ---------------- RESOLVE ---------------- */

function getActiveChain() {
  return chainsById.get(activeChainId) || null;
}

function getActivePost() {
  return postsById.get(activePostId) || null;
}

/* ---------------- DRILL ---------------- */

function openChain(postId, chainId) {
  mode = "dispute";
  activePostId = postId;
  activeChainId = chainId;
  render();
  updateInput();
}

/* ---------------- CHALLENGE ---------------- */

function challenge(turn) {
  const chain = getActiveChain();
  if (!chain) return;

  const nested = createChain(currentUser, "other", []);

  turn.nested.push(nested);

  openChain(activePostId, nested.id);
}

/* ---------------- INPUT ---------------- */

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const chain = getActiveChain();
  if (!chain || chain.active_user !== currentUser) return;

  const val = e.target.value.trim();
  if (!val) return;

  const turn = createTurn(chain.turn_state, currentUser, val);
  chain.turns.push(turn);

  chain.turn_state =
    chain.turn_state === "question" ? "answer" : "question";

  chain.active_user =
    currentUser === chain.a ? chain.b : chain.a;

  e.target.value = "";
  render();
  updateInput();
});

/* ---------------- RENDER HOME ---------------- */

function renderHome() {
  const el = document.getElementById("home");

  let html = `
    <div class="compose">
      <textarea id="composeBox" placeholder="Start a fire..."></textarea>
      <button onclick="createPost()">Post</button>
    </div>
  `;

  postsById.forEach(post => {
    html += `
      <div class="card" onclick="openChain('${post.id}','${post.chains[0]?.id || ""}')">
        <b>${post.text}</b>
        <div class="meta">@${post.user}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}

function createPost() {
  const box = document.getElementById("composeBox");
  if (!box.value.trim()) return;

  const p = createPost(currentUser, box.value.trim());
  box.value = "";
  render();
}

/* ---------------- RENDER DISPUTE ---------------- */

function renderChain(chain) {
  let html = "";

  chain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type === "question" ? "q" : "a"}">
        <div onclick="challenge(getTurn('${t.id}'))">
          ${t.text}
        </div>
        <div class="meta">@${t.user}</div>
      </div>
    `;

    if (t.nested.length) {
      html += `<div class="nested">`;
      t.nested.forEach(n => {
        html += `
          <div class="card"
               onclick="openChain('${activePostId}','${n.id}')">
            ${n.turns[0]?.text || "Nested dispute"}
          </div>
        `;
      });
      html += `</div>`;
    }
  });

  return html;
}

function getTurn(id) {
  for (let c of chainsById.values()) {
    for (let t of c.turns) {
      if (String(t.id) === String(id)) return t;
    }
  }
  return null;
}

function renderDispute() {
  const el = document.getElementById("dispute");

  if (mode !== "dispute") {
    el.innerHTML = "";
    return;
  }

  const post = getActivePost();
  const chain = getActiveChain();

  if (!post || !chain) return;

  let html = `
    <div class="card">
      <b>${post.text}</b>
      <div class="meta">@${post.user}</div>
    </div>
  `;

  html += renderChain(chain);

  el.innerHTML = html;
}

/* ---------------- INPUT RULE ---------------- */

function updateInput() {
  const bar = document.getElementById("inputBar");
  const chain = getActiveChain();

  if (mode === "dispute" && chain && chain.active_user === currentUser) {
    bar.classList.remove("hidden");
  } else {
    bar.classList.add("hidden");
  }
}

/* ---------------- MAIN RENDER ---------------- */

function render() {
  document.getElementById("home").style.display = mode === "home" ? "block" : "none";
  document.getElementById("dispute").style.display = mode === "dispute" ? "block" : "none";

  renderHome();
  renderDispute();
  updateInput();

  document.getElementById("backBtn")
    .classList.toggle("hidden", mode === "home");
}

/* INIT */
switchUser(currentUser);
render();

</script>

</body>
</html>
