<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v39</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

#title{font-weight:600}
#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  opacity:.6;
  cursor:pointer;
}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  margin-right:8px;
  cursor:pointer;
}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

/* 2-LANE ALWAYS */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:20;
}

/* SIDEBAR */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:40;
}

#sidebar{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0c0c0c;
  border-left:1px solid #333;
  padding:10px;
  display:none;
  z-index:50;
}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:180px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">v39</div>
</header>

<div id="users"></div>

<div>
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup">
  <div>Dispute</div>
  <textarea id="challenge" placeholder="Challenge (question)"></textarea>
  <textarea id="counter" placeholder="Counter (proclamation)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar"></div>

<div id="log"></div>

<script>

/* ---------------- STATE ---------------- */
let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let pending=null;
let chat={};
let logs=[];

/* ---------------- LOG (APPEND ONLY) ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){ stack=[]; render(); }
function enter(id){ stack=[id]; render(); }

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null});
  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- REACTIONS ---------------- */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pending=id;
    document.getElementById("popup").style.display="block";
    return;
  }

  reactions[k]="up";
  log("up",id);
  render();
}

/* ---------------- DISPUTE ---------------- */
function closePopup(){
  pending=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){

  if(!pending) return;

  const target=pending;

  const q=document.getElementById("challenge").value.trim(); // QUESTION
  const c=document.getElementById("counter").value.trim();   // PROCLAMATION

  if(q){
    items.push({
      id:id++,
      text:q,
      user:currentUser,
      parent:target,
      type:"question",
      side:"left"
    });
  }

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      type:"statement",
      side:"right"
    });
  }

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";

  log("dispute",target);

  pending=null;
  closePopup();
  render();
}

/* ---------------- SIDEBAR ---------------- */
function openSidebar(id){
  chat[id]=chat[id]||[];
  document.getElementById("sidebar").style.display="block";
  document.getElementById("overlay").style.display="block";

  document.getElementById("sidebar").innerHTML=`
    <div style="color:#888;margin-bottom:8px">thread chat</div>

    ${chat[id].map(m=>`<div><b>${m.u}</b>: ${m.m}</div>`).join("")}

    <input id="chatIn" style="width:100%;margin-top:8px">
    <button onclick="sendChat(${id})">send</button>
  `;
}

function closeSidebar(){
  document.getElementById("sidebar").style.display="none";
  document.getElementById("overlay").style.display="none";
}

function sendChat(id){
  const v=document.getElementById("chatIn").value.trim();
  if(!v) return;
  chat[id].push({u:currentUser,m:v});
  openSidebar(id);
}

/* ---------------- NODE ---------------- */
function node(n){

  const r=reactions[key(currentUser,n.id)];
  const show=n.user!==currentUser;

  return `
    <div class="card" onclick="enter(${n.id})">
      <div>${n.text} <span class="meta">@${n.user}</span></div>

      ${show ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'down')">👎</span>

          <span class="icon"
            onclick="event.stopPropagation();openSidebar(${n.id})">💬</span>
        </div>
      `:""}
    </div>
  `;
}

/* ---------------- 2-LANE ---------------- */
function renderDispute(root){

  const children=items.filter(x=>x.parent===root.id);

  const left=children.filter(x=>x.side==="left");
  const right=children.filter(x=>x.side==="right");

  return `
    <div>

      <div class="card">
        ${root.text} <span class="meta">@${root.user}</span>
      </div>

      <div class="disputeWrap">
        <div class="lane">${left.map(node).join("")}</div>
        <div class="lane">${right.map(node).join("")}</div>
      </div>

    </div>
  `;
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null)
      .forEach(n=>view.innerHTML+=node(n));
  } else {
    const cur=find(stack[0]);
    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA (CLEAN + CONSISTENT) ---------------- */

/* PROCLAMATIONS */
items.push({id:id++,text:"Truth exists beyond belief",user:"alice",parent:null});
items.push({id:id++,text:"Consensus defines meaning",user:"bob",parent:null});
items.push({id:id++,text:"Language shapes thought",user:"charlie",parent:null});

/* QUESTIONS (CHALLENGES) */
items.push({id:id++,text:"Is truth independent of agreement?",user:"dana",parent:1,type:"question",side:"left"});
items.push({id:id++,text:"Does consensus define reality?",user:"eve",parent:2,type:"question",side:"left"});

/* COUNTERS (PROCLAMATIONS) */
items.push({id:id++,text:"Truth is not voted into existence",user:"bob",parent:3,type:"statement",side:"right"});
items.push({id:id++,text:"Consensus stabilizes interpretation",user:"charlie",parent:4,type:"statement",side:"right"});

/* Q&A EXPANSION */
items.push({id:id++,text:"What grounds meaning if not consensus?",user:"alice",parent:3,type:"question",side:"left"});
items.push({id:id++,text:"Reality constrains interpretation",user:"dana",parent:6,type:"statement",side:"right"});

renderUsers();
render();

</script>

</body>
</html>
