<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

h5{
  text-align:center;
  margin-bottom:10px;
}

.container{
  max-width:1000px;
}

.columns{
  display:flex;
  gap:10px;
}

.col{
  flex:1;
  background:#141414;
  border-radius:8px;
  padding:10px;
  min-height:80vh;
}

.claim{
  background:#1f1f1f;
  padding:8px;
  border-radius:6px;
  margin-bottom:8px;
}

.meta{
  font-size:11px;
  color:#aaa;
}

.flow{
  margin-left:10px;
  border-left:2px solid #333;
  padding-left:8px;
}

button{
  font-size:11px !important;
  margin-right:5px;
}

.modal{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:15px;
  border-radius:8px;
  width:300px;
  z-index:999;
}

textarea{
  width:100%;
  height:80px;
  background:#111;
  color:#eee;
  border:1px solid #444;
}
</style>
</head>

<body>

<div class="container">

<h5>Better Dispute</h5>

<div class="columns">

  <div class="col">
    <b>Continuing</b>
    <div id="agreeCol"></div>
  </div>

  <div class="col">
    <b>Disputed</b>
    <div id="disagreeCol"></div>
  </div>

</div>

</div>

<!-- CHALLENGE MODAL -->
<div id="modal" class="modal">
  <div id="modalTitle"></div>

  <select id="mode" class="form-control mb-2">
    <option value="claim">Make Counter-Claim</option>
    <option value="question">Ask Question</option>
  </select>

  <textarea id="text"></textarea>

  <button class="btn btn-sm btn-success mt-2" onclick="submitChallenge()">Submit</button>
  <button class="btn btn-sm btn-secondary mt-2" onclick="closeModal()">Cancel</button>
</div>

<script>

//////////////////////
// DATA MODEL
//////////////////////

let id=0;

let claims=[
  {
    id:id++,
    text:"Root claim: something is happening",
    side:"agree"
  }
];

let activeTarget=null;

//////////////////////
// UI HELPERS
//////////////////////

function openModal(id){
  activeTarget=id;
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("text").value="";
}

//////////////////////
// CORE ACTIONS
//////////////////////

function continueClaim(id){
  // for now: just duplicate continuation into agree column
  let c=claims.find(x=>x.id===id);
  claims.push({
    id:id++,
    text:c.text+" (continued)",
    side:"agree"
  });
  render();
}

function challengeClaim(id){
  openModal(id);
}

function submitChallenge(){

  let mode=document.getElementById("mode").value;
  let text=document.getElementById("text").value;

  if(!text) return;

  claims.push({
    id:id++,
    text,
    side:"disagree",
    parent:activeTarget,
    type:mode
  });

  closeModal();
  render();
}

//////////////////////
// RENDER
//////////////////////

function render(){

  let agreeCol=document.getElementById("agreeCol");
  let disagreeCol=document.getElementById("disagreeCol");

  agreeCol.innerHTML="";
  disagreeCol.innerHTML="";

  claims.forEach(c=>{

    let div=document.createElement("div");
    div.className="claim";

    div.innerHTML=`
      ${c.text}
      <div class="meta">${c.type||"claim"}</div>

      <button onclick="continueClaim(${c.id})">Continue</button>
      <button onclick="challengeClaim(${c.id})">Disagree</button>
    `;

    if(c.side==="agree"){
      agreeCol.appendChild(div);
    }else{
      disagreeCol.appendChild(div);
    }

  });
}

//////////////////////
// INIT
//////////////////////

render();

</script>

</body>
</html>
