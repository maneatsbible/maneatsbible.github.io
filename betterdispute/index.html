<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{display:flex;justify-content:space-between;padding:10px}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.rootItem{
  margin:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.nav{
  padding:10px;
  color:#4caf50;
  cursor:pointer;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:120px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

/* log */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v35</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="create()">Proclaim</button>

<div id="nav"></div>
<div id="view"></div>

<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana"];
let currentUser="alice";

let id=0;
let items=[];

/* state */
let state={};

let logs=[];

function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* per-user state */
function getState(){
  if(!state[currentUser]){
    state[currentUser]={
      stack:{}
    };
  }
  return state[currentUser];
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* create root */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* navigation stack (global view stack) */
let stack=[];

function enter(id){
  stack.push(id);
  log("enter",id);
  render();
}

function back(){
  stack.pop();
  log("back","");
  render();
}

/* react */
let reactions={};

function react(id,type){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  reactions[currentUser+"|"+id]=type;
  log(type,id);
  render();
}

/* render dispute (NO nesting UI allowed) */
function renderDispute(node){

  const children = items.filter(x=>x.parent===node.id);

  const left = children.filter(c=>c.side==="left");
  const right = children.filter(c=>c.side==="right");

  return `
    <div class="card">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${node.user!==currentUser ? `
        <div class="actions">
          <span class="icon ${reactions[currentUser+"|"+node.id]==='up'?'active':'dim'}"
                onclick="react(${node.id},'up')">👍</span>

          <span class="icon ${reactions[currentUser+"|"+node.id]==='down'?'active':'dim'}"
                onclick="react(${node.id},'down')">👎</span>
        </div>
      `:""}

      <div style="margin-top:6px;color:#4caf50;cursor:pointer;font-size:12px"
           onclick="enter(${node.id})">
        open dispute →
      </div>

    </div>
  `;
}

/* main render */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  /* ROOT VIEW */
  if(stack.length===0){

    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML += `
        <div class="rootItem" onclick="enter(${n.id})">
          ${n.text} <span class="meta">@${n.user}</span>
        </div>
      `;
    });

  } else {

    const current = find(stack[stack.length-1]);

    nav.innerHTML = `<div class="nav" onclick="back()">⬅ back</div>`;

    const children = items.filter(x=>x.parent===current.id);

    const left = children.filter(c=>c.side==="left");
    const right = children.filter(c=>c.side==="right");

    view.innerHTML = `
      <div class="dispute">

        <div class="lane">
          ${left.map(renderDispute).join("")}
        </div>

        <div class="lane">
          ${right.map(renderDispute).join("")}
        </div>

      </div>
    `;
  }

  /* log */
  const logEl=document.getElementById("log");
  logEl.innerHTML = logs.slice(-200).reverse()
    .map(l=>JSON.stringify(l)).join("<br>");
}

/* seed test data (rich branching) */

items.push({id:id++,text:"Reality is structured",user:"alice",parent:null,side:null});
items.push({id:id++,text:"Structure depends on observer",user:"bob",parent:0,side:"right"});
items.push({id:id++,text:"Observer depends on language",user:"charlie",parent:1,side:"left"});
items.push({id:id++,text:"Language is structured by reality",user:"dana",parent:2,side:"right"});
items.push({id:id++,text:"Therefore reality is circular",user:"bob",parent:3,side:"left"});
items.push({id:id++,text:"Circular systems still require grounding",user:"alice",parent:4,side:"right"});
items.push({id:id++,text:"Grounding is assumed, not proven",user:"charlie",parent:5,side:"left"});

renderUsers();
render();

</script>

</body>
</html>
