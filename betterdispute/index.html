<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v40</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#title{font-weight:600}

/* HOME / BACK */
#homeBtn, #backBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:6px;
}

/* USERS */
#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  opacity:.6;
  cursor:pointer;
}
.user.active{opacity:1;border-color:#fff}

/* INPUT */
#composerWrap{
  padding:10px;
}
textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
  border-radius:6px;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  margin-right:8px;
  cursor:pointer;
}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

/* TWO LANE */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* LOG */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:180px;
  overflow:auto;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:20;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">Better Dispute v40</div>
</header>

<div id="users"></div>

<!-- TOP INPUT (HIDDEN IN DRILL) -->
<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup">
  <div>Dispute</div>
  <textarea id="challenge" placeholder="Challenge (question)"></textarea>
  <textarea id="counter" placeholder="Counter (proclamation)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="log"></div>

<script>

/* ---------------- STATE ---------------- */
let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let pending=null;
let logs=[];

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

function enter(id){
  stack=[id];
  document.getElementById("composerWrap").style.display="none"; // REQUIRED FIX
  render();
}

/* BACK BUTTON */
function back(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null});
  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- REACT ---------------- */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pending=id;
    document.getElementById("popup").style.display="block";
    return;
  }

  reactions[k]="up";
  log("up",id);
  render();
}

/* ---------------- DISPUTE ---------------- */
function closePopup(){
  pending=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){

  if(!pending) return;

  const target=pending;

  const q=document.getElementById("challenge").value.trim();
  const c=document.getElementById("counter").value.trim();

  if(q){
    items.push({
      id:id++,
      text:q,
      user:currentUser,
      parent:target,
      type:"question",
      side:"left"
    });
  }

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      type:"statement",
      side:"right"
    });
  }

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";

  log("dispute",target);

  pending=null;
  closePopup();
  render();
}

/* ---------------- NODE ---------------- */
function node(n){

  const r=reactions[key(currentUser,n.id)];
  const show=n.user!==currentUser;

  return `
    <div class="card" onclick="enter(${n.id})">
      <div>${n.text} <span class="meta">@${n.user}</span></div>

      ${show ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'down')">👎</span>
        </div>
      `:""}
    </div>
  `;
}

/* ---------------- 2-LANE ---------------- */
function renderDispute(root){

  const children=items.filter(x=>x.parent===root.id);

  const left=children.filter(x=>x.side==="left");
  const right=children.filter(x=>x.side==="right");

  return `
    <div>

      <div class="card">
        ${root.text} <span class="meta">@${root.user}</span>
      </div>

      <div class="disputeWrap">
        <div class="lane">${left.map(node).join("")}</div>
        <div class="lane">${right.map(node).join("")}</div>
      </div>

    </div>
  `;
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null)
      .forEach(n=>view.innerHTML+=node(n));
  } else {
    const cur=find(stack[0]);

    nav.innerHTML=`
      <button id="backBtn" onclick="back()">⬅ back</button>
    `;

    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA (FULL RESET, CONSISTENT DISPUTES) ---------------- */

/* ROOT PROCLAMATIONS */
items.push({id:id++,text:"Truth is independent of belief",user:"alice",parent:null});
items.push({id:id++,text:"Meaning is consensus-based",user:"bob",parent:null});
items.push({id:id++,text:"Language shapes reality",user:"charlie",parent:null});
items.push({id:id++,text:"Logic is human constructed",user:"dana",parent:null});

/* DISPUTE 1 */
items.push({id:id++,text:"Is truth dependent on agreement?",user:"bob",parent:0,type:"question",side:"left"});
items.push({id:id++,text:"Truth exists without observers",user:"charlie",parent:0,type:"statement",side:"right"});

/* DISPUTE 2 */
items.push({id:id++,text:"Does consensus define meaning?",user:"alice",parent:1,type:"question",side:"left"});
items.push({id:id++,text:"Consensus stabilizes language",user:"dana",parent:1,type:"statement",side:"right"});

/* DISPUTE 3 */
items.push({id:id++,text:"Can logic exist without language?",user:"bob",parent:2,type:"question",side:"left"});
items.push({id:id++,text:"Logic precedes language structure",user:"charlie",parent:2,type:"statement",side:"right"});

/* SECONDARY NESTING */
items.push({id:id++,text:"What defines truth then?",user:"eve",parent:5,type:"question",side:"left"});
items.push({id:id++,text:"Reality constrains interpretation",user:"alice",parent:5,type:"statement",side:"right"});

renderUsers();
render();

</script>

</body>
</html>
