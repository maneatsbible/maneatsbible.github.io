<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{display:flex;justify-content:space-between;padding:10px}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:80px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px;position:relative}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

.resolved{color:#4caf50;font-size:11px;margin-top:4px}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.sidebar{
  position:absolute;
  right:-220px;
  top:0;
  width:200px;
  background:#101010;
  border-left:1px solid #333;
  height:100%;
  padding:6px;
  font-size:11px;
}

.chatlog{
  max-height:120px;
  overflow:auto;
  margin-bottom:6px;
}

.chatinput{
  width:100%;
  height:50px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
}

.turn{font-size:11px;color:#aaa;margin-top:4px}

.resolveBtn{
  font-size:11px;
  color:#4caf50;
  cursor:pointer;
  margin-top:4px;
}

/* log */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v34</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana"];
let currentUser="alice";

let id=0;
let items=[];

/* per-user state */
let state={};

function getState(){
  if(!state[currentUser]){
    state[currentUser]={
      reacted:{},      // nodeId -> up/down
      resolved:{},     // nodeId -> true
      chat:{}          // nodeId -> messages
    };
  }
  return state[currentUser];
}

/* log */
let logs=[];

function log(e,d){
  logs.push({t:new Date().toISOString(),u:currentUser,e,d});
}

/* find */
function find(i){return items.find(x=>x.id===i);}

/* create */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    type:"proclaim",
    side:"left",
    resolved:false
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* reaction rules */
function react(i,type){

  const s=getState();
  const node=find(i);
  if(!node || node.user===currentUser) return;

  if(s.resolved[i]) return;

  if(s.reacted[i]){
    if(s.reacted[i]===type) return;     // no double
    if(type==="up" && s.reacted[i]==="down") return; // no revert
  }

  s.reacted[i]=type;

  log(type,i);
  render();
}

/* resolve */
function resolve(i){
  const s=getState();
  s.resolved[i]=true;
  log("resolve",i);
  render();
}

/* chat */
function chat(i){
  const msg = prompt("chat:");
  if(!msg) return;

  const s=getState();
  s.chat[i]=s.chat[i]||[];
  s.chat[i].push({u:currentUser,m:msg});

  log("chat",i);
  render();
}

/* render */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  const s=getState();

  function renderNode(node){

    const children = items.filter(x=>x.parent===node.id);

    const my = s.reacted[node.id];
    const resolved = s.resolved[node.id];

    return `
      <div class="card">

        <div>${node.text} <span class="meta">@${node.user}</span></div>

        ${resolved?`<div class="resolved">resolved ✓</div>`:""}

        ${node.user!==currentUser && !resolved?`
        <div class="actions">
          <span class="icon ${my==='up'?'active':my?'dim':''}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${my==='down'?'active':my?'dim':''}" onclick="react(${node.id},'down')">👎</span>
        </div>`:""}

        ${!resolved?`<div class="resolveBtn" onclick="resolve(${node.id})">resolve</div>`:""}

        <div onclick="chat(${node.id})" style="cursor:pointer;font-size:11px;color:#888">💬 chat</div>

        <div class="dispute">

          <div class="lane">
            ${children.filter(c=>c.side==="left").map(renderNode).join("")}
          </div>

          <div class="lane">
            ${children.filter(c=>c.side==="right").map(renderNode).join("")}
          </div>

        </div>

        <div class="sidebar">
          <div class="chatlog">
            ${(s.chat[node.id]||[]).map(c=>`<div><b>${c.u}</b>: ${c.m}</div>`).join("")}
          </div>
          <div>node chat</div>
        </div>

      </div>
    `;
  }

  items.filter(x=>x.parent===null).forEach(r=>{
    feed.innerHTML += renderNode(r);
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.slice(-200).reverse().forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* seed data */
items.push({id:id++,text:"Truth claims should be tested",user:"alice",parent:null,type:"proclaim",side:"left",resolved:false});
items.push({id:id++,text:"Evidence is subjective",user:"bob",parent:0,type:"proclaim",side:"right",resolved:false});
items.push({id:id++,text:"But reproducibility matters",user:"charlie",parent:1,type:"proclaim",side:"left",resolved:false});
items.push({id:id++,text:"Who defines reproducibility?",user:"dana",parent:2,type:"proclaim",side:"right",resolved:false});

render();

</script>
</body>
</html>
