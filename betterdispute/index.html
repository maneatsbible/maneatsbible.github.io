<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Better Dispute v16</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.home {
  cursor: pointer;
  font-size: 18px;
}

.back {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.8;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

/* USER BAR */
.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button {
  background: #2a2a2d;
  color: #ccc;
  border: 1px solid #333;
  padding: 6px 10px;
  border-radius: 6px;
}

.userBar button.active {
  background: #3a6df0;
  color: #fff;
}

/* LAYOUT */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

/* COMPOSE */
.compose {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  padding: 10px;
  background: #1a1a1c;
  color: #fff;
}

/* CARDS */
.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 4px;
}

/* TURN */
.turn {
  background: #141416;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 6px;
}

.q { background: #2c2c2f; }
.a { background: #1f3a2c; }

/* NESTED VISUAL ONLY */
.nested {
  margin-left: 14px;
  border-left: 2px solid #333;
  padding-left: 10px;
  margin-top: 6px;
}

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  border-top: 1px solid #222;
  padding: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="back hidden" id="backBtn" onclick="goBack()">←</div>
    <div><b>Better Dispute</b></div>
  </div>
  <div class="right">v16</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="home"></div>
<div class="container" id="dispute"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";
let mode = "home";

let activePost = null;
let activeChain = null;

/* ------------------ TEST DATA ------------------ */
let posts = [
  {
    id: 1,
    user: "alice",
    text: "Faith alone is sufficient for salvation.",
    chains: [
      {
        id: 101,
        a: "alice",
        b: "bob",
        active_user: "bob",
        turn_state: "question",
        turns: [
          {
            type: "question",
            user: "bob",
            text: "Where is that stated?",
            nested: [
              {
                id: 201,
                a: "bob",
                b: "alice",
                active_user: "alice",
                turn_state: "question",
                turns: [
                  {
                    type: "question",
                    user: "alice",
                    text: "What do you mean by 'faith'?",
                    nested: []
                  }
                ]
              }
            ]
          },
          {
            type: "answer",
            user: "alice",
            text: "Ephesians 2:8-9.",
            nested: []
          }
        ]
      }
    ]
  },
  {
    id: 2,
    user: "charlie",
    text: "AI will replace most jobs in 20 years.",
    chains: [
      {
        id: 301,
        a: "charlie",
        b: "alice",
        active_user: "alice",
        turn_state: "question",
        turns: [
          {
            type: "question",
            user: "alice",
            text: "Which jobs specifically?",
            nested: []
          }
        ]
      }
    ]
  }
];

/* ------------------ STATE ------------------ */
function currentChain() {
  return activeChain;
}

/* ------------------ NAV ------------------ */
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  render();
}

function goHome() {
  mode = "home";
  activePost = null;
  activeChain = null;
  hideInput();
  render();
}

function goBack() {
  if (activeChain?.parent) {
    activeChain = activeChain.parent;
  } else {
    mode = "home";
    activeChain = null;
    activePost = null;
  }
  render();
  updateInput();
}

/* ------------------ CHALLENGE ------------------ */
function challenge(postOrChain) {
  const chain = {
    id: Date.now(),
    a: currentUser,
    b: "opponent",
    active_user: currentUser,
    turn_state: "question",
    turns: [],
    parent: postOrChain
  };

  if (postOrChain.turns) {
    postOrChain.turns.push({
      type: "question",
      user: currentUser,
      text: "Challenge opened",
      nested: [chain]
    });
  } else {
    postOrChain.chains.push(chain);
  }

  openDispute(postOrChain, chain);
}

/* ------------------ OPEN ------------------ */
function openDispute(post, chain) {
  mode = "dispute";
  activePost = post;
  activeChain = chain;
  render();
}

/* ------------------ INPUT ------------------ */
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  if (!activeChain) return;
  if (activeChain.active_user !== currentUser) return;

  const val = e.target.value.trim();
  if (!val) return;

  activeChain.turns.push({
    type: activeChain.turn_state,
    user: currentUser,
    text: val,
    nested: []
  });

  activeChain.turn_state =
    activeChain.turn_state === "question" ? "answer" : "question";

  activeChain.active_user =
    currentUser === activeChain.a ? activeChain.b : activeChain.a;

  e.target.value = "";
  render();
});

/* ------------------ RENDER HOME ------------------ */
function renderHome() {
  const home = document.getElementById("home");

  let html = "";

  posts.forEach(post => {
    html += `
      <div class="card">
        <b>${post.text}</b>
        <div class="meta">@${post.user}</div>
        <button onclick="challenge(posts.find(p=>p.id===${post.id}))">Challenge</button>
    `;

    post.chains.forEach(chain => {
      html += `
        <div class="card" onclick="openDispute(posts.find(p=>p.id===${post.id}), posts.find(p=>p.id===${post.id}).chains.find(c=>c.id===${chain.id}))">
          ${chain.turns.map(t => (t.type === "question" ? "Q" : "A") + ": " + t.text).slice(-2).join(" → ") || "New dispute"}
        </div>
      `;
    });

    html += `</div>`;
  });

  home.innerHTML = html;
}

/* ------------------ RENDER DISPUTE ------------------ */
function renderDispute() {
  const el = document.getElementById("dispute");

  if (mode !== "dispute" || !activeChain) {
    el.innerHTML = "";
    return;
  }

  let html = `
    <div class="card">
      <b>${activePost.text}</b>
      <div class="meta">@${activePost.user}</div>
      <button onclick="challenge(activeChain)">Challenge</button>
    </div>
  `;

  activeChain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type === "question" ? "q" : "a"}">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;

    if (t.nested?.length) {
      html += `<div class="nested">`;
      t.nested.forEach(n => {
        html += `
          <div class="card" onclick="openDispute(activePost, ${JSON.stringify(n)})">
            ${n.turns?.[0]?.text || "Nested dispute"}
          </div>
        `;
      });
      html += `</div>`;
    }
  });

  el.innerHTML = html;
}

/* ------------------ INPUT RULE ------------------ */
function updateInput() {
  const bar = document.getElementById("inputBar");

  if (
    mode === "dispute" &&
    activeChain &&
    activeChain.active_user === currentUser
  ) {
    bar.classList.remove("hidden");
  } else {
    bar.classList.add("hidden");
  }
}

/* ------------------ RENDER ------------------ */
function render() {
  document.getElementById("home").style.display = mode === "home" ? "block" : "none";
  document.getElementById("dispute").style.display = mode === "dispute" ? "block" : "none";

  renderHome();
  renderDispute();
  updateInput();

  document.getElementById("backBtn")
    .classList.toggle("hidden", mode === "home");
}

/* INIT */
switchUser(currentUser);
render();
</script>

</body>
</html>
