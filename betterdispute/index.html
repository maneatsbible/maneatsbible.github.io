<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Better Dispute v1</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #111;
    color: #eee;
  }

  .bar {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
  }

  .bar .title {
    flex: 1;
    text-align: center;
    font-weight: bold;
  }

  .bar .right {
    font-size: 14px;
    opacity: 0.7;
  }

  .users {
    display: flex;
    gap: 8px;
    padding: 8px;
    overflow-x: auto;
    border-bottom: 1px solid #333;
  }

  .user {
    padding: 6px 10px;
    border-radius: 20px;
    background: #333;
    cursor: pointer;
    white-space: nowrap;
  }

  .user.active {
    background: #4caf50;
    color: #000;
  }

  .container {
    padding: 10px;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    font-size: 16px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #222;
    color: #fff;
    box-sizing: border-box;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 8px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #4caf50;
    color: black;
  }

  .post {
    padding: 10px;
    border-bottom: 1px solid #333;
  }

  .meta {
    font-size: 12px;
    opacity: 0.6;
  }

  .clickable {
    cursor: pointer;
  }

  .branch {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 4px;
  }

  .back {
    cursor: pointer;
    margin-right: 10px;
  }

  .waiting {
    text-align: center;
    padding: 20px;
    opacity: 0.6;
  }
</style>
</head>
<body>

<div class="bar">
  <div class="back" onclick="goHome()">⚖️</div>
  <div class="title">Better Dispute</div>
  <div class="right">v1</div>
</div>

<div class="users" id="users"></div>

<div id="app"></div>

<script>
/* ================= MODEL ================= */

let state = {
  posts: [],
  users: [
    { id: 'u1', name: 'Alice' },
    { id: 'u2', name: 'Bob' },
    { id: 'u3', name: 'Charlie' }
  ],
  currentUser: 'u1',
  view: 'home',
  nav: [],
};

let idCounter = 1;

function createPost(type, content, parentId = null) {
  let rootId = parentId
    ? state.posts.find(p => p.id === parentId).rootId
    : idCounter;

  let post = {
    id: idCounter++,
    type,
    content,
    parentId,
    rootId,
    author: state.currentUser,
    challengedBy: null
  };

  state.posts.push(post);
  return post;
}

/* ================= CONTROLLER ================= */

function getUser(id) {
  return state.users.find(u => u.id === id);
}

function getChildren(id) {
  return state.posts.filter(p => p.parentId === id);
}

function canChallenge(post) {
  return post.author !== state.currentUser && !post.challengedBy;
}

function getChain(startId) {
  let chain = [];
  let current = state.posts.find(p => p.id === startId);

  while (current) {
    chain.push(current);
    let next = getChildren(current.id).find(p => p.type !== 'assertion');
    current = next || null;
  }

  return chain;
}

function getOpponent(userId, chain) {
  let users = [...new Set(chain.map(p => p.author))];
  return users.find(u => u !== userId);
}

function getTurn(chain) {
  let last = chain[chain.length - 1];
  return getOpponent(last.author, chain);
}

/* ================= ACTIONS ================= */

function postAssertion(text) {
  createPost('assertion', text);
  render();
}

function postChallenge(parentId, text) {
  let p = createPost('challenge', text, parentId);
  let parent = state.posts.find(x => x.id === parentId);
  parent.challengedBy = p.id;

  state.nav.push(p.id);
  state.view = 'dispute';
  render();
}

function postAnswer(parentId, text) {
  let p = createPost('answer', text, parentId);
  state.nav.push(p.id);
  render();
}

function openPost(id) {
  state.nav.push(id);
  state.view = 'dispute';
  render();
}

function goBack() {
  state.nav.pop();
  if (state.nav.length === 0) state.view = 'home';
  render();
}

function goHome() {
  state.nav = [];
  state.view = 'home';
  render();
}

function switchUser(id) {
  state.currentUser = id;
  render();
}

/* ================= VIEW ================= */

function renderUsers() {
  let el = document.getElementById('users');
  el.innerHTML = state.users.map(u => `
    <div class="user ${u.id === state.currentUser ? 'active' : ''}"
         onclick="switchUser('${u.id}')">
      ${u.name}
    </div>
  `).join('');
}

function renderHome() {
  let app = document.getElementById('app');

  let assertions = state.posts.filter(p => p.type === 'assertion');

  app.innerHTML = `
    <div class="container">
      <textarea id="compose" placeholder="Start a fire..."></textarea>
      <button onclick="submitAssertion()">Post Assertion</button>
    </div>

    ${assertions.map(a => {
      let challenges = getChildren(a.id).filter(p => p.type === 'challenge').length;

      return `
        <div class="post clickable" onclick="openPost(${a.id})">
          <div>${a.content}</div>
          <div class="meta">${getUser(a.author).name}</div>
          <div class="branch">${challenges} disputes</div>
        </div>
      `;
    }).join('')}
  `;
}

function renderDispute() {
  let app = document.getElementById('app');
  let currentId = state.nav[state.nav.length - 1];
  let root = state.posts.find(p => p.id === currentId);

  if (root.type === 'assertion') {
    let children = getChildren(root.id).filter(p => p.type === 'challenge');

    app.innerHTML = `
      <div class="container">
        <div class="post"><b>Assertion:</b> ${root.content}</div>

        ${children.map(c => `
          <div class="post clickable" onclick="openPost(${c.id})">
            <div>${c.content}</div>
            <div class="meta">${getUser(c.author).name}</div>
          </div>
        `).join('')}

        ${canChallenge(root) ? `
          <textarea id="input" placeholder="Challenge this..."></textarea>
          <button onclick="submitChallenge(${root.id})">Challenge</button>
        ` : ''}
      </div>
    `;
    return;
  }

  let chain = getChain(root.id);

  let turn = getTurn(chain);

  app.innerHTML = `
    <div class="container">
      <div class="back" onclick="goBack()">← Back</div>

      ${chain.map(p => `
        <div class="post">
          <div><b>${getUser(p.author).name} (${p.type})</b></div>
          <div>${p.content}</div>
        </div>
      `).join('')}

      ${renderAction(chain, turn)}
    </div>
  `;
}

function renderAction(chain, turn) {
  let last = chain[chain.length - 1];

  if (turn !== state.currentUser) {
    return `<div class="waiting">Waiting for ${getUser(turn).name}...</div>`;
  }

  if (last.type === 'challenge') {
    return `
      <textarea id="input" placeholder="Your answer..."></textarea>
      <button onclick="submitAnswer(${last.id})">Answer</button>
    `;
  }

  if (last.type === 'answer') {
    return `
      <textarea id="input" placeholder="Challenge this..."></textarea>
      <button onclick="submitChallenge(${last.id})">Challenge</button>
    `;
  }
}

function render() {
  renderUsers();

  if (state.view === 'home') {
    renderHome();
  } else {
    renderDispute();
  }
}

/* ================= UI HANDLERS ================= */

function submitAssertion() {
  let val = document.getElementById('compose').value.trim();
  if (!val) return;
  postAssertion(val);
}

function submitChallenge(id) {
  let val = document.getElementById('input').value.trim();
  if (!val) return;
  postChallenge(id, val);
}

function submitAnswer(id) {
  let val = document.getElementById('input').value.trim();
  if (!val) return;
  postAnswer(id, val);
}

/* ================= TEST DATA ================= */

function seed() {
  let a = createPost('assertion', "AI is deception");
  state.currentUser = 'u2';
  let c1 = createPost('challenge', "Prove it", a.id);
  a.challengedBy = c1.id;

  state.currentUser = 'u1';
  let ans = createPost('answer', "It misleads people", c1.id);

  state.currentUser = 'u2';
  createPost('challenge', "How exactly?", ans.id);

  state.currentUser = 'u3';
  createPost('challenge', "Define deception", a.id);

  state.currentUser = 'u1';
}

seed();
render();
</script>

</body>
</html>
