<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Better Dispute v10</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.home { font-size: 18px; cursor: pointer; }

.right { font-size: 11px; opacity: 0.6; }

.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button.active { background: #3a6df0; }

/* LAYOUT */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.message { font-size: 15px; }
.meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary { background: #3a6df0; }

/* SUMMARY */
.summary {
  margin-top: 8px;
  padding: 8px;
  background: #141416;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

/* COMPOSE (RESTORED HOME ONLY) */
.compose {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  padding: 10px;

  background: #1a1a1c;
  color: #fff;
}

/* INPUT BAR (ONLY ACTIVE IN DRILL) */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  padding: 10px;
  border-top: 1px solid #222;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="home" onclick="goHome()">⚖️</div>
    <div><b>Better Dispute</b></div>
  </div>
  <div class="right">v10</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="feed"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] },
  { id: 2, user: "charlie", text: "AI will replace most jobs.", chains: [] }
];

// SAMPLE CHAIN
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ],
  turn_state: "question",
  active_user: "bob"
});

let activePost = null;
let activeChain = null;

// SWITCH USER
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  renderFeed();
}

// HOME
function goHome() {
  activePost = null;
  activeChain = null;
  document.getElementById("inputBar").classList.add("hidden");
  renderFeed();
}

/* CREATE POST (RESTORED COMPOSE) */
function createPost() {
  const ta = document.getElementById("composeInput");
  if (!ta.value.trim()) return;

  posts.unshift({
    id: Date.now(),
    user: currentUser,
    text: ta.value.trim(),
    chains: []
  });

  ta.value = "";
  renderFeed();
}

// CHALLENGE (STABLE)
function challenge(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post || post.user === currentUser) return;

  post.chains.push({
    id: Date.now(),
    a: post.user,
    b: currentUser,
    turns: [],
    turn_state: "question",
    active_user: currentUser
  });

  openThread(post, post.chains[post.chains.length - 1]);
}

// DRILL FIXED
function openThread(post, chain = null) {
  activePost = post;
  activeChain = chain;

  renderFeed();
  updateInputVisibility();
}

// INPUT VISIBILITY RULE (FIXED)
function updateInputVisibility() {
  const bar = document.getElementById("inputBar");

  if (
    activeChain &&
    activeChain.active_user === currentUser
  ) {
    bar.classList.remove("hidden");
    document.getElementById("input").placeholder =
      activeChain.turn_state === "question"
        ? "Ask a question..."
        : "Answer directly...";
  } else {
    bar.classList.add("hidden");
  }
}

// FEED
function renderFeed() {
  const feed = document.getElementById("feed");

  let html = `
    <div class="compose">
      <textarea id="composeInput" placeholder="Start a fire..."></textarea>
      <button class="primary" onclick="createPost()">Post</button>
    </div>
  `;

  posts.forEach(post => {
    const self = post.user === currentUser;

    html += `
      <div class="card">
        <div class="message">${post.text}</div>
        <div class="meta">@${post.user}</div>

        <div class="actions">
          ${self ? "" : `<button class="primary" onclick="challenge(${post.id})">Challenge</button>`}
        </div>
    `;

    post.chains.forEach(chain => {
      html += `
        <div class="summary" onclick="openThread(post, posts.find(p=>p.id===${post.id}).chains.find(c=>c.id===${chain.id}))">
          ${chain.turns.map(t => `${t.type === "question" ? "Q" : "A"}: ${t.text}`).join(" → ") || "New dispute"}
        </div>
      `;
    });

    html += `</div>`;
  });

  feed.innerHTML = html;
}

// INPUT SUBMIT (ENTER)
document.addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;
  if (!activeChain) return;
  if (activeChain.active_user !== currentUser) return;

  const input = document.getElementById("input");
  if (!input.value.trim()) return;

  activeChain.turns.push({
    type: activeChain.turn_state,
    user: currentUser,
    text: input.value.trim()
  });

  activeChain.turn_state =
    activeChain.turn_state === "question" ? "answer" : "question";

  activeChain.active_user =
    currentUser === activeChain.a ? activeChain.b : activeChain.a;

  input.value = "";

  updateInputVisibility();
  renderFeed();
});

// INIT
switchUser(currentUser);
renderFeed();
</script>

</body>
</html>
