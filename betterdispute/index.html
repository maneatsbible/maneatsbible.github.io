<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
  transition:0.2s;
  border-top:4px solid transparent;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  font-size:14px;
}

.version{font-size:11px;color:#777}

/* USER SWITCH */
#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{
  opacity:1;
  border-color:#fff;
  background:#222;
}

/* COMPOSER */
#composer{
  width:100%;
  height:80px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
}

/* FEED */
#feed{
  padding:10px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

/* ACTIONS */
.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* BROWSE */
#browse{
  padding:10px;
  border-top:1px solid #222;
  display:none;
  font-size:12px;
  color:#aaa;
}

/* LOG */
#log{
  display:none;
  font-size:11px;
  padding:10px;
  border-top:1px solid #222;
  max-height:200px;
  overflow:auto;
  color:#7f7;
}

/* THEME ACCENTS */
.theme-alice{ border-top-color:#3a3a3a; }
.theme-bob{ border-top-color:#3a2a4a; }
.theme-charlie{ border-top-color:#1f3a2f; }
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version">v4.0.0</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>

<div id="browse"></div>
<div id="log"></div>

<script>

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

const VERSION="4.0.0";

//////////////////////
// USER UI (FIXED VISUAL STATE)
//////////////////////

function applyUserUI(){

  document.body.className="theme-"+currentUser;

  document.querySelectorAll(".user").forEach(u=>{
    u.classList.remove("active");
    if(u.dataset.u===currentUser) u.classList.add("active");
  });
}

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user";
    d.innerText=u;
    d.dataset.u=u;

    d.onclick=()=>{
      currentUser=u;
      log("switch",{user:u});
      applyUserUI();
      render();
    };

    el.appendChild(d);
  });

  applyUserUI();
}

//////////////////////
// CORE DATA
//////////////////////

function find(i){ return items.find(x=>x.id===i); }

function create(text,type,parent=null){

  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    const p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",item);
  render();
  renderBrowse();
}

function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  create(t,"proclaim",null);
  document.getElementById("composer").value="";
}

//////////////////////
// DISAGREE (FIXED: REAL BRANCH CREATION)
//////////////////////

function disagree(id){

  const parent=find(id);
  if(!parent || parent.user===currentUser) return;

  const counter=createNode(
    "Counter: "+parent.text,
    "proclaim",
    id
  );

  log("disagree_branch_created",{parent:id,child:counter.id});
}

function agree(id){
  const item=find(id);
  if(item.user===currentUser) return;
  log("agree",{id});
}

function createNode(text,type,parent){

  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  const p=find(parent);
  if(p) p.children.push(item.id);

  return item;
}

//////////////////////
// FEED (ACTION-DRIVEN)
//////////////////////

function feedItems(){

  return items.filter(i=>{
    return i.user!==currentUser && i.parent===null;
  });
}

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  feedItems().forEach(item=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="text">${item.text}</div>
      <div class="meta">${item.type} · @${item.user}</div>

      <div class="actions">
        <button onclick="agree(${item.id})">Agree</button>
        <button onclick="disagree(${item.id})">Disagree</button>
      </div>
    `;

    feed.appendChild(div);
  });
}

//////////////////////
// BROWSE (FULL STRUCTURE)
//////////////////////

function renderBrowse(){

  const b=document.getElementById("browse");
  b.innerHTML="";

  items.forEach(i=>{
    const d=document.createElement("div");
    d.innerText=`${i.type.toUpperCase()} @${i.user}: ${i.text}`;
    b.appendChild(d);
  });
}

//////////////////////
// LOG
//////////////////////

function log(event,data){
  const el=document.getElementById("log");

  const div=document.createElement("div");
  div.innerText=JSON.stringify({
    time:Date.now(),
    v:VERSION,
    user:currentUser,
    event,
    data
  });

  el.appendChild(div);
}

//////////////////////
// INIT
//////////////////////

renderUsers();

/* seed */
create("All claims require challenge","proclaim",null);
create("Is challenge always necessary?","question",0);

render();

</script>

</body>
</html>
