<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{
  font-size:12px;
  color:#777;
}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{
  opacity:1;
  border-color:#fff;
}

#composer{
  width:100%;
  height:70px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:8px;
  align-items:center;
}

.iconBtn{
  cursor:pointer;
  font-size:18px;
  user-select:none;
  opacity:0.7;
}

.iconBtn:hover{opacity:1}

.state{
  font-size:11px;
  color:#777;
  margin-left:6px;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.child{
  margin-top:6px;
  font-size:12px;
  color:#ddd;
  border-left:2px solid #333;
  padding-left:8px;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

#popup.open{display:flex}

.box{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
}

input{
  width:100%;
  margin-top:8px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
  border-radius:6px;
}

.row{
  display:flex;
  gap:6px;
  margin-top:10px;
}

/* LOG */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <div>Dispute Branch</div>

    <input id="challenge" placeholder="Ask (optional)">
    <input id="counter" placeholder="Proclaim (optional)">

    <div class="row">
      <button onclick="submitChallenge()">Submit Ask</button>
      <button onclick="submitCounter()">Submit Proclaim</button>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<script>

let VERSION=21;
document.getElementById("version").innerText="v"+VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

let active=null;

/* reactions: { [statementId]: { user: "up"|"down" } } */
let reactions={};

/* LOG */
function log(e,d){
  logs.push({
    t:new Date().toISOString(),
    user:currentUser,
    event:e,
    data:d
  });
}

/* HELP */
function find(i){return items.find(x=>x.id===i);}

function isOwner(item){
  return item.user===currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
      log("switch",u);
    };

    el.appendChild(d);
  });
}

/* CREATE */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* REACTION */
function react(id,type){
  const item=find(id);
  if(!item || isOwner(item)) return;

  reactions[id] = reactions[id] || {};
  reactions[id][currentUser] = type;

  log(type,id);

  if(type==="down"){
    openDispute(id);
  }

  render();
}

/* DISPUTE POPUP */
function openDispute(i){
  const item=find(i);
  if(!item || isOwner(item)) return;

  active=i;
  document.getElementById("popup").classList.add("open");

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";
}

function closePopup(){
  active=null;
  document.getElementById("popup").classList.remove("open");
}

/* BRANCH */
function submitChallenge(){
  const v=document.getElementById("challenge").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:active,
    type:"question"
  });

  log("branch_challenge",v);
  closePopup();
  render();
}

function submitCounter(){
  const v=document.getElementById("counter").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:active,
    type:"proclaim"
  });

  log("branch_counter",v);
  closePopup();
  render();
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  const roots = items.filter(x=>x.parent===null);

  roots.forEach(r=>{

    const rReact = reactions[r.id] || {};
    const my = rReact[currentUser];

    const children = items.filter(x=>x.parent===r.id);

    let childHtml = children.map(c=>
      `<div class="child">${c.text} <span>@${c.user}</span></div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${r.text}</div>
        <div class="meta">@${r.user}</div>

        ${!isOwner(r) ? `
        <div class="actions">
          <span class="iconBtn" onclick="react(${r.id},'up')">👍</span>
          <span class="iconBtn" onclick="react(${r.id},'down')">👎</span>
          <span class="state">${my ? my : '—'}</span>
        </div>
        ` : ""}

        <div class="dispute">
          <div class="lane"></div>
          <div class="lane"></div>
        </div>

        ${childHtml}
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();

/* TEST DATA */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null});
items.push({id:id++,text:"Some claims resist challenge",user:"bob",parent:null});

</script>

</body>
</html>
