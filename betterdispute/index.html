<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v59</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#title{font-weight:600}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  opacity:.6;
  cursor:pointer;
}
.user.active{opacity:1;border-color:#fff}

#composerWrap{padding:10px}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
  border-radius:6px;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

.meta{font-size:11px;color:#888}
.icon{margin-right:6px}

/* LANES */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* REACTIONS */
.reactionRow{
  margin-top:6px;
  display:flex;
  gap:8px;
}

.reactionBtn{
  background:#111;
  border:1px solid #333;
  color:#aaa;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  font-size:12px;
}

.activeAgree{
  color:#7CFF7C;
  border-color:#7CFF7C;
}

.activeDisagree{
  color:#FF7C7C;
  border-color:#FF7C7C;
}

/* MODAL */
#overlay{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  z-index:50;
}

#modal{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:280px;
  max-width:90vw;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  z-index:60;
}

#modal textarea{
  width:100%;
  height:60px;
  margin-bottom:6px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  border-radius:6px;
  padding:6px;
}

.modalActions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
}

.btn{
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  border:1px solid #333;
  background:#1a1a1a;
  color:#ddd;
}

.btn.ok{border-color:#7CFF7C;color:#7CFF7C}
.btn.cancel{border-color:#FF7C7C;color:#FF7C7C}

/* NAV */
#nav{padding:0 10px}

#backBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

/* LOG */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">Better Dispute v59</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a proclamation..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<!-- MODAL -->
<div id="overlay" onclick="closeModal()"></div>

<div id="modal">
  <div style="margin-bottom:6px;">Dispute</div>
  <textarea id="challenge" placeholder="Question"></textarea>
  <textarea id="counter" placeholder="Counter"></textarea>

  <div class="modalActions">
    <button class="btn cancel" onclick="closeModal()">✕ Cancel</button>
    <button class="btn ok" onclick="submitDispute()">✓ Submit</button>
  </div>
</div>

<div id="log"></div>

<script>

/* ---------------- SAFE INIT (prevents modal flash) ---------------- */
window.onload = () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("modal").style.display = "none";
};

/* ---------------- STATE ---------------- */
let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let logs=[];
let openQuestions={};
let reactions={};

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function isOwn(n){return n.user===currentUser;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

function enter(id){
  stack.push(id);
  document.getElementById("composerWrap").style.display="none";
  render();
}

function back(){
  if(stack.length>1) stack.pop();
  else {
    stack=[];
    document.getElementById("composerWrap").style.display="block";
  }
  render();
}

/* ---------------- MODAL ---------------- */
function openModal(){
  document.getElementById("overlay").style.display="block";
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("overlay").style.display="none";
  document.getElementById("modal").style.display="none";
}

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    type:"proclaim"
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- DISPUTE ---------------- */
function submitDispute(){

  const target=stack[stack.length-1];
  const parentNode=find(target);
  if(!parentNode) return;

  if(parentNode.user===currentUser){
    alert("Cannot dispute own statement.");
    return;
  }

  const q=document.getElementById("challenge").value.trim();
  const c=document.getElementById("counter").value.trim();

  if(q){
    const qid=id++;
    items.push({
      id:qid,
      text:q,
      user:currentUser,
      parent:target,
      type:"question",
      lane:"left"
    });
    openQuestions[qid]=parentNode.user;
  }

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      type:"proclaim",
      lane:"right"
    });
  }

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";

  log("dispute",target);
  closeModal();
  render();
}

/* ---------------- AGREEMENT SYSTEM (RESTORED) ---------------- */
function getReaction(id){
  return reactions[id]?.[currentUser];
}

function setReaction(id,type){

  if(!reactions[id]) reactions[id]={};

  const prev=reactions[id][currentUser];

  if(prev==="disagree") return;

  if(type==="agree"){
    reactions[id][currentUser]="agree";
    log("agree",id);
    render();
    return;
  }

  if(type==="disagree"){
    reactions[id][currentUser]="disagree";
    log("disagree",id);
    openModal(); // ONLY here
    render();
  }
}

/* ---------------- ANSWER ---------------- */
function answer(qid){

  const q=find(qid);
  if(!q) return;

  const hasAnswer=items.some(x=>x.parent===qid && x.type==="answer");
  if(hasAnswer) return;

  const expected=openQuestions[qid];
  if(currentUser!==expected){
    alert("Not your turn.");
    return;
  }

  const t=prompt("Answer:");
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:qid,
    type:"answer",
    lane:"left"
  });

  delete openQuestions[qid];
  render();
}

/* ---------------- LANES ---------------- */
function buildLane(rootId,lane){

  const out=[];

  function walk(pid){
    items.filter(x=>x.parent===pid).forEach(c=>{
      if(c.lane!==lane) return;
      out.push(c);

      if(c.type==="question"){
        const ans=items.find(x=>x.parent===c.id && x.type==="answer");
        if(ans){
          out.push(ans);
          walk(ans.id);
        }
      } else walk(c.id);
    });
  }

  walk(rootId);
  return out;
}

/* ---------------- NODE ---------------- */
function renderNode(n){

  const r=getReaction(n.id);
  const agreeActive=r==="agree";
  const disagreeActive=r==="disagree";

  const hasAnswer=n.type==="question"
    ? items.some(x=>x.parent===n.id && x.type==="answer")
    : false;

  return `
    <div class="card">

      <div>
        <span class="icon">${n.type==="question"?"?":n.type==="answer"?"✓":"!"}</span>
        ${n.text}
        <span class="meta">@${n.user}</span>
      </div>

      ${!isOwn(n) ? `
      <div class="reactionRow">
        <button class="reactionBtn ${agreeActive?'activeAgree':''}"
          onclick="setReaction(${n.id},'agree')">👍</button>

        <button class="reactionBtn ${disagreeActive?'activeDisagree':''}"
          onclick="setReaction(${n.id},'disagree')">👎</button>
      </div>
      ` : ""}

      ${
        n.type==="question" &&
        !hasAnswer &&
        openQuestions[n.id]===currentUser
          ? `<button onclick="answer(${n.id})">Answer</button>`
          : ""
      }

    </div>
  `;
}

/* ---------------- DISPUTE VIEW ---------------- */
function renderDispute(root){

  const left=buildLane(root.id,"left");
  const right=buildLane(root.id,"right");

  return `
    <div class="card">
      <span class="icon">!</span>
      ${root.text}
      <span class="meta">@${root.user}</span>
    </div>

    <div class="disputeWrap">
      <div class="lane">${left.map(renderNode).join("")}</div>
      <div class="lane">${right.map(renderNode).join("")}</div>
    </div>
  `;
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){

    items.filter(x=>x.parent===null).forEach(r=>{
      view.innerHTML+=`
        <div class="card" onclick="enter(${r.id})">
          <span class="icon">!</span>
          ${r.text}
        </div>
      `;
    });

  } else {

    const cur=find(stack[stack.length-1]);
    nav.innerHTML=`<button id="backBtn" onclick="back()">⬅ back</button>`;
    view.innerHTML=renderDispute(cur);

  }

  document.getElementById("log").innerHTML=
    logs.slice(-200).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA ---------------- */

items.push({id:id++,text:"Truth exists independent of consensus",user:"alice",parent:null,type:"proclaim"});

items.push({id:id++,text:"Does truth require agreement?",user:"bob",parent:0,type:"question",lane:"left"});
openQuestions[1]="alice";

items.push({id:id++,text:"No, truth stands regardless",user:"alice",parent:1,type:"answer",lane:"left"});

items.push({id:id++,text:"Truth depends on shared understanding",user:"bob",parent:0,type:"proclaim",lane:"right"});

items.push({id:id++,text:"Can shared understanding be wrong?",user:"alice",parent:3,type:"question",lane:"left"});
openQuestions[4]="bob";

items.push({id:id++,text:"Yes, consensus can be mistaken",user:"bob",parent:4,type:"answer",lane:"left"});

renderUsers();
render();

</script>

</body>
</html>
