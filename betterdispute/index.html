<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:12px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{opacity:1;border-color:#fff}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* DISPUTE VIEW */
.dispute{
  display:none;
  margin-top:10px;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.dispute.open{display:grid}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

#popup.open{display:flex}

.box{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
}

input{
  width:100%;
  margin-top:6px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
  border-radius:6px;
}

.actionsRow{
  display:flex;
  gap:6px;
  margin-top:10px;
}

/* nested */
.child{
  margin-left:10px;
  border-left:2px solid #333;
  padding-left:10px;
  margin-top:8px;
}

/* log */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <div id="popupTitle"></div>

    <input id="askField" placeholder="Ask">
    <input id="proclaimField" placeholder="Proclaim">

    <div class="actionsRow">
      <button onclick="submitAsk()">Submit Ask</button>
      <button onclick="submitProclaim()">Submit Proclaim</button>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<script>

let VERSION = 17;
document.getElementById("version").innerText = VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

let activeTarget=null;

/* LOG */
function log(e,data){
  logs.push({t:Date.now(),u:currentUser,e,data});
}

/* HELPERS */
function find(id){ return items.find(x=>x.id===id); }

function isOwner(item){
  return item.user===currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };

    el.appendChild(d);
  });
}

/* CREATE */
function createRoot(){
  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  items.push({
    id:id++,
    text,
    user:currentUser,
    parent:null,
    open:false
  });

  document.getElementById("composer").value="";
  render();
  log("create",text);
}

/* DISAGREE => OPEN POPUP */
function openDispute(id){
  const item=find(id);
  if(!item || isOwner(item)) return;

  activeTarget=id;

  document.getElementById("askField").value="";
  document.getElementById("proclaimField").value="";

  document.getElementById("popup").classList.add("open");
  log("dispute_open",id);
}

function closePopup(){
  activeTarget=null;
  document.getElementById("popup").classList.remove("open");
}

/* SUBMIT */
function submitAsk(){
  const v=document.getElementById("askField").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    type:"question",
    user:currentUser,
    parent:activeTarget
  });

  closePopup();
  render();
  log("ask",v);
}

function submitProclaim(){
  const v=document.getElementById("proclaimField").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    type:"proclaim",
    user:currentUser,
    parent:activeTarget
  });

  closePopup();
  render();
  log("proclaim",v);
}

/* AGREEMENT (HARD BLOCK SELF) */
function agree(id){
  const item=find(id);
  if(!item || isOwner(item)) return;
  log("agree",id);
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  const roots = items.filter(x=>x.parent===null);

  roots.forEach(item=>{

    const blocked = isOwner(item); // CRITICAL FIX

    const children = items.filter(x=>x.parent===item.id);

    let childHtml = children.map(c=>
      `<div class="child">${c.text} <span style="color:#888">@${c.user}</span></div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${item.text}</div>
        <div class="meta">@${item.user}</div>

        <div class="actions">
          <button onclick="agree(${item.id})" ${blocked?'disabled':''}>Agree</button>
          <button onclick="openDispute(${item.id})" ${blocked?'disabled':''}>Disagree</button>
        </div>

        ${childHtml}
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();

</script>

</body>
</html>
