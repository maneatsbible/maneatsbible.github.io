<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:11px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{
  opacity:1;
  border-color:#fff;
}

#composer{
  width:100%;
  height:80px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
}

#feed{padding:10px;}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

.dispute{
  display:none;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.dispute.open{
  display:grid;
}

.col{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.input{
  width:100%;
  margin-top:6px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:6px;
  font-size:12px;
  border-radius:6px;
}

/* LOG */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:200px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>

<div id="log"></div>

<script>

const VERSION="11.0.0";
document.getElementById("version").innerText="v"+VERSION;

/* ======================
   STATE (ONLY SOURCE OF TRUTH)
====================== */

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

let logs=[];

/* ======================
   LOGGING (FIXED: STORED STATE)
====================== */

function log(event,data){
  logs.push({
    time:Date.now(),
    version:VERSION,
    user:currentUser,
    event,
    data
  });
  renderLog();
}

function renderLog(){
  const el=document.getElementById("log");
  el.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    el.appendChild(d);
  });
}

/* ======================
   HELPERS
====================== */

function find(id){
  return items.find(x=>x.id===id);
}

function canInteract(item){
  return item.user !== currentUser;
}

/* ======================
   USERS (FIXED: ALWAYS RE-RENDER FEED)
====================== */

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      log("switch",{user:u});
      renderUsers();
      render(); // CRITICAL FIX
    };

    el.appendChild(d);
  });
}

/* ======================
   CREATE
====================== */

function createRoot(){
  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  items.push({
    id:id++,
    text,
    type:"proclaim",
    user:currentUser,
    parent:null,
    disputeOpen:false
  });

  document.getElementById("composer").value="";
  log("create_root",text);
  render();
}

/* ======================
   DISPUTE TOGGLE (STATE ONLY)
====================== */

function toggleDispute(id){
  const item=find(id);
  if(!item || !canInteract(item)) return;

  item.disputeOpen = !item.disputeOpen;
  log("toggle_dispute",{id,item:item.disputeOpen});
  render();
}

/* ======================
   CHILD CREATION (FIXED RELIABILITY)
====================== */

function addChild(parentId,text,type){

  const parent=find(parentId);
  if(!parent || !canInteract(parent)) return;

  items.push({
    id:id++,
    text,
    type,
    user:currentUser,
    parent:parentId,
    disputeOpen:false
  });

  log("child_created",{parentId,text,type});
}

/* ======================
   SUBMIT (FIXED: ALWAYS CLOSES UI VIA RERENDER)
====================== */

function submitLeft(parentId){
  const v=document.getElementById("l-"+parentId).value.trim();
  if(!v) return;

  addChild(parentId,v,"question");
  document.getElementById("l-"+parentId).value="";
  render();
}

function submitRight(parentId){
  const v=document.getElementById("r-"+parentId).value.trim();
  if(!v) return;

  addChild(parentId,v,"proclaim");
  document.getElementById("r-"+parentId).value="";
  render();
}

/* ======================
   ACTIONS
====================== */

function agree(id){
  const item=find(id);
  if(!item || !canInteract(item)) return;

  log("agree",{id});
}

/* ======================
   RENDER (FULL REBUILD EVERY TIME)
====================== */

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null)
       .forEach(item=>{

    const disabled = !canInteract(item);

    const div=document.createElement("div");

    div.innerHTML=`
      <div class="card">
        <div class="text">${item.text}</div>
        <div class="meta">@${item.user}</div>

        <div class="actions">
          <button onclick="agree(${item.id})" ${disabled?'disabled':''}>Agree</button>
          <button onclick="toggleDispute(${item.id})" ${disabled?'disabled':''}>Disagree</button>
        </div>

        <div class="dispute ${item.disputeOpen?'open':''}">
          <div class="col">
            <div>Challenge</div>
            <input class="input" id="l-${item.id}" placeholder="Ask / challenge...">
            <button onclick="submitLeft(${item.id})">Submit</button>
          </div>

          <div class="col">
            <div>Counter</div>
            <input class="input" id="r-${item.id}" placeholder="Proclaim counter...">
            <button onclick="submitRight(${item.id})">Submit</button>
          </div>
        </div>

      </div>
    `;

    feed.appendChild(div);
  });
}

/* ======================
   INIT
====================== */

renderUsers();
render();
renderLog();

/* seed */
items.push({id:id++,text:"All claims can be challenged",type:"proclaim",user:"alice",parent:null,disputeOpen:false});
items.push({id:id++,text:"Some claims resist challenge",type:"proclaim",user:"bob",parent:null,disputeOpen:false});

render();

</script>

</body>
</html>
