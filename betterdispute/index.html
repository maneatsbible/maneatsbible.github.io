<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:11px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{opacity:1;border-color:#fff}

#composer{
  width:100%;
  height:70px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{margin-top:8px;display:flex;gap:6px}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* SPLIT LANES */
.lanes{
  display:none;
  margin-top:10px;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.lanes.open{display:grid}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:60px;
}

.input{
  width:100%;
  margin-top:6px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:6px;
  font-size:12px;
  border-radius:6px;
}

.child{
  margin-left:10px;
  border-left:2px solid #333;
  padding-left:10px;
  margin-top:8px;
}

/* LOG */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<script>

const VERSION="14.0.0";
document.getElementById("version").innerText="v"+VERSION;

/* STATE */
let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

/* LOG */
function log(e,data){
  logs.push({t:Date.now(),u:currentUser,e,data});
}

/* HELPERS */
function find(id){ return items.find(x=>x.id===id); }

/* HARD RULE: no self interaction EVER */
function canInteract(item){
  return item.user !== currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* CREATE ROOT */
function createRoot(){
  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  items.push({
    id:id++,
    text,
    type:"proclaim",
    user:currentUser,
    parent:null,
    open:true,
    side:null
  });

  document.getElementById("composer").value="";
  log("create",{text});
  render();
}

/* DISPUTE = ALWAYS SPLIT */
function toggleDispute(id){

  const item=find(id);
  if(!item) return;

  if(!canInteract(item)) return; // HARD BLOCK

  // ALWAYS FORCE SPLIT OPEN
  item.open = true;

  // create two lane placeholders if not exist
  if(!item.left) item.left=[];
  if(!item.right) item.right=[];

  log("dispute_split",{id});
  render();
}

/* CHILD ROUTING INTO LANES */
function addLeft(parentId,text){
  const p=find(parentId);
  if(!p || p.user===currentUser) return;

  if(!p.left) p.left=[];
  p.left.push({id:id++,text,user:currentUser});
  log("left",{parentId,text});
}

function addRight(parentId,text){
  const p=find(parentId);
  if(!p || p.user===currentUser) return;

  if(!p.right) p.right=[];
  p.right.push({id:id++,text,user:currentUser});
  log("right",{parentId,text});
}

/* SUBMIT */
function submitLeft(id){
  const v=document.getElementById("l-"+id).value.trim();
  if(!v) return;
  addLeft(id,v);
  render();
}

function submitRight(id){
  const v=document.getElementById("r-"+id).value.trim();
  if(!v) return;
  addRight(id,v);
  render();
}

/* AGREEMENT (STRICT SELF BLOCK) */
function agree(id){
  const item=find(id);
  if(!item) return;
  if(item.user===currentUser) return;
  log("agree",{id});
}

/* RENDER NODE */
function renderNode(item){

  const disabled = (item.user === currentUser);

  let html=`
  <div class="card">
    <div class="text">${item.text}</div>
    <div class="meta">@${item.user}</div>

    <div class="actions">
      <button onclick="agree(${item.id})" ${disabled?'disabled':''}>Agree</button>
      <button onclick="toggleDispute(${item.id})" ${disabled?'disabled':''}>Disagree</button>
    </div>

    <div class="lanes ${item.open?'open':''}">
      <div class="lane">
        <div>Challenge</div>
        <input class="input" id="l-${item.id}" placeholder="Ask / challenge...">
        <button onclick="submitLeft(${item.id})">Submit</button>
      </div>

      <div class="lane">
        <div>Counter</div>
        <input class="input" id="r-${item.id}" placeholder="Proclaim counter...">
        <button onclick="submitRight(${item.id})">Submit</button>
      </div>
    </div>
  `;

  return html + `</div>`;
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.forEach(i=>{
    if(i.parent===null){
      feed.innerHTML += renderNode(i);
    }
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();

/* seed */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null,open:false});

</script>

</body>
</html>
