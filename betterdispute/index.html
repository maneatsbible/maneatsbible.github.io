<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Better Dispute v8</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

.header {
  position: sticky;
  top: 0;
  background: #0f0f10;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.topRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.home { cursor: pointer; font-size: 18px; }

.right { font-size: 11px; opacity: 0.6; }

.userBar {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}

.userBar button.active { background: #3a6df0; }

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.message { font-size: 15px; }
.meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary { background: #3a6df0; }

.chainPreview {
  margin-top: 8px;
  padding: 8px;
  background: #141416;
  border-radius: 8px;
  font-size: 13px;
}

/* FIRE COMPOSER (HOME ONLY) */
.fireBox {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  resize: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="topRow">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="right">v8</div>
  </div>

  <div class="userBar">
    <button id="u-alice" onclick="switchUser('alice')">Alice</button>
    <button id="u-bob" onclick="switchUser('bob')">Bob</button>
    <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
  </div>
</div>

<div class="container" id="feed"></div>
<div class="container hidden" id="threadView"></div>

<script>
let currentUser = "bob";

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] },
  { id: 2, user: "charlie", text: "AI will replace most jobs.", chains: [] }
];

// SAMPLE
posts[0].chains.push({
  id: 101,
  user_a: "alice",
  user_b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ]
});

// STATE
let activePost = null;

// SWITCH USER
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  renderFeed();
}

// HOME
function goHome() {
  activePost = null;
  document.getElementById("feed").classList.remove("hidden");
  document.getElementById("threadView").classList.add("hidden");
}

// CREATE POST (FIRE)
function createPost() {
  const input = document.getElementById("fireInput");
  if (!input.value.trim()) return;

  posts.unshift({
    id: Date.now(),
    user: currentUser,
    text: input.value.trim(),
    chains: []
  });

  input.value = "";
  renderFeed();
}

// CHALLENGE (FIXED CORE RULE)
function challenge(postId, targetUser) {
  const post = posts.find(p => p.id === postId);

  if (!post || targetUser === currentUser) return;

  const chain = {
    id: Date.now(),
    user_a: targetUser,
    user_b: currentUser,
    turns: [],
    turn_state: "question",
    active_user: currentUser,
    status: "active",
    last_action: Date.now()
  };

  post.chains.push(chain);

  openThread(post);
}

// OPEN THREAD
function openThread(post) {
  activePost = post;

  document.getElementById("feed").classList.add("hidden");
  document.getElementById("threadView").classList.remove("hidden");

  renderThread();
}

// FEED
function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  // FIRE ONLY ON HOME
  let fire = `
    <div class="fireBox">
      <textarea id="fireInput" placeholder="Start a fire..."></textarea>
      <button class="primary" onclick="createPost()">Post</button>
    </div>
  `;

  feed.innerHTML += fire;

  posts.forEach(post => {
    const self = post.user === currentUser;

    let html = `
      <div class="card">
        <div class="message" onclick="openThread(posts.find(p=>p.id===${post.id}))">
          ${post.text}
        </div>
        <div class="meta">@${post.user}</div>

        <div class="actions">
          <button class="primary"
            ${self ? 'disabled' : `onclick="challenge(${post.id}, '${post.user}')"`}>
            Challenge
          </button>
        </div>
    `;

    post.chains.forEach(chain => {
      html += `
        <div class="chainPreview" onclick="openThread(posts.find(p=>p.id===${post.id}))">
          ${chain.turns.map(t => `${t.type[0].toUpperCase()}: ${t.text}`).join(" → ")}
        </div>
      `;
    });

    html += `</div>`;
    feed.innerHTML += html;
  });
}

// THREAD VIEW
function renderThread() {
  const view = document.getElementById("threadView");

  let html = "";

  html += `
    <div class="card">
      <div class="message">${activePost.text}</div>
      <div class="meta">@${activePost.user}</div>
    </div>
  `;

  activePost.chains.forEach(chain => {
    html += `<div class="card">`;

    chain.turns.forEach(t => {
      html += `
        <div class="turn ${t.type}">
          ${t.text}
          <div class="meta">@${t.user}</div>
        </div>
      `;
    });

    html += `
      <div class="actions">
        <button class="primary"
          ${chain.user_a === currentUser || chain.user_b === currentUser ? 'disabled' : ''}
          onclick="challenge(${activePost.id}, '${chain.user_a === currentUser ? chain.user_b : chain.user_a}')">
          Challenge
        </button>
      </div>
    `;

    html += `</div>`;
  });

  view.innerHTML = html;
}

// INIT
switchUser(currentUser);
renderFeed();
</script>

</body>
</html>
