<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Better Dispute v3</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: #0f0f10;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.topRow {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.home {
  font-size: 18px;
  cursor: pointer;
}

.title { font-weight: bold; }
.version { font-size: 11px; opacity: 0.6; }

.userBar {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}

.userBar button.active {
  background: #3a6df0;
}

/* FEED */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.message {
  font-size: 15px;
  line-height: 1.4;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 5px;
}

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  background: #2a2a2d;
  color: #fff;
  font-size: 12px;
}

button.primary { background: #3a6df0; }

.chainPreview {
  margin-top: 8px;
  padding: 8px;
  background: #141416;
  border-radius: 8px;
  font-size: 13px;
}

/* CHAIN */
.turn {
  margin-bottom: 8px;
  padding: 10px;
  border-radius: 8px;
}

.question { background: #2c2c2f; }
.answer { background: #1f3a2c; }

.you { outline: 1.5px solid #3a6df0; }

.status {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 6px;
}

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  padding: 10px;
  border-top: 1px solid #222;
}

textarea {
  width: 100%;
  min-height: 80px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  font-size: 16px;
  resize: none;
}

.sendBtn {
  margin-top: 6px;
  width: 100%;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="topRow">
    <div class="left">
      <div class="home" onclick="goHome()">⚖️</div>
      <div>
        <div class="title">Better Dispute</div>
        <div class="version">v3</div>
      </div>
    </div>
  </div>

  <!-- USER SWITCH BELOW HEADER -->
  <div class="userBar">
    <button id="u-alice" onclick="switchUser('alice')">Alice</button>
    <button id="u-bob" onclick="switchUser('bob')">Bob</button>
    <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
  </div>
</div>

<div class="container" id="feed"></div>
<div class="container hidden" id="chainView"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="inputField"></textarea>
  <button class="primary sendBtn" onclick="submitTurn()">Send</button>
</div>

<script>
let currentUser = "bob";
const CRICKET_TIMEOUT = 15000;

// DATA
let posts = [
  {
    id: 1,
    user: "alice",
    text: "Faith alone is sufficient for salvation.",
    chains: []
  },
  {
    id: 2,
    user: "charlie",
    text: "AI will replace most human jobs.",
    chains: []
  }
];

// PRELOAD CHAINS
posts[0].chains.push({
  id: 101,
  user_a: "alice",
  user_b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." },
    { type: "question", user: "bob", text: "Does that exclude works entirely?" }
  ],
  turn_state: "answer",
  active_user: "alice",
  status: "active",
  last_action: Date.now()
});

posts[1].chains.push({
  id: 102,
  user_a: "charlie",
  user_b: "alice",
  turns: [
    { type: "question", user: "alice", text: "Which industries first?" }
  ],
  turn_state: "answer",
  active_user: "charlie",
  status: "active",
  last_action: Date.now() - 20000
});

// USER SWITCH
function switchUser(u) {
  currentUser = u;

  // highlight active user
  document.querySelectorAll(".userBar button").forEach(b => b.classList.remove("active"));
  document.getElementById("u-" + u).classList.add("active");

  renderFeed();
  if (activeChain) renderChain();
}

// NAV
let activePost = null;
let activeChain = null;

function openChain(postId, chainId) {
  activePost = posts.find(p => p.id === postId);
  activeChain = activePost.chains.find(c => c.id === chainId);

  document.getElementById("feed").classList.add("hidden");
  document.getElementById("chainView").classList.remove("hidden");

  renderChain();
}

function goHome() {
  activePost = null;
  activeChain = null;
  document.getElementById("feed").classList.remove("hidden");
  document.getElementById("chainView").classList.add("hidden");
  hideInput();
}

// START CHALLENGE
function startChallenge(postId) {
  const post = posts.find(p => p.id === postId);

  const chain = {
    id: Date.now(),
    user_a: post.user,
    user_b: currentUser,
    turns: [],
    turn_state: "question",
    active_user: currentUser,
    status: "active",
    last_action: Date.now()
  };

  post.chains.push(chain);
  openChain(postId, chain.id);
  setInput("Ask a precise question...");
}

// FEED
function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(post => {
    let html = `
      <div class="card">
        <div class="message">${post.text}</div>
        <div class="meta">@${post.user}</div>
        <div class="actions">
          <button class="primary" onclick="startChallenge(${post.id})">Challenge</button>
        </div>
    `;

    post.chains.forEach(chain => {
      updateCrickets(chain);

      html += `
        <div class="chainPreview" onclick="openChain(${post.id}, ${chain.id})">
          ${summarizeChain(chain)}
          <div class="meta">${chain.statusLabel || ""}</div>
        </div>
      `;
    });

    html += `</div>`;
    feed.innerHTML += html;
  });
}

// FULL CHAIN SUMMARY (NO SKIPPING)
function summarizeChain(chain) {
  return chain.turns.map(t => `${t.type === "question" ? "Q" : "A"}: ${t.text}`).join(" → ");
}

// CHAIN VIEW
function renderChain() {
  updateCrickets(activeChain);

  const view = document.getElementById("chainView");

  let html = `
    <div class="card">
      <div class="message">${activePost.text}</div>
    </div>
  `;

  activeChain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type} ${t.user === currentUser ? 'you' : ''}">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;
  });

  html += `<div class="status">`;

  if (activeChain.status !== "active") {
    html += activeChain.statusLabel;
    hideInput();
  } else if (activeChain.active_user === currentUser) {
    html += activeChain.turn_state === "question"
      ? "Your turn to ask"
      : "Your turn to answer";

    setInput(activeChain.turn_state === "question"
      ? "Ask a precise question..."
      : "Answer directly...");
  } else {
    html += "Waiting on them";

    html += `
      <div class="actions">
        <button onclick="markDodged()">Dodged</button>
        <button onclick="endChain()">End</button>
      </div>
    `;

    hideInput();
  }

  html += `</div>`;
  view.innerHTML = html;
}

// INPUT
const input = document.getElementById("inputField");

function setInput(ph) {
  input.placeholder = ph;
  showInput();
}

function showInput() {
  document.getElementById("inputBar").classList.remove("hidden");
}

function hideInput() {
  document.getElementById("inputBar").classList.add("hidden");
}

// SUBMIT
function submitTurn() {
  if (!activeChain || activeChain.active_user !== currentUser) return;
  if (!input.value.trim()) return;

  const type = activeChain.turn_state;

  activeChain.turns.push({
    type,
    user: currentUser,
    text: input.value.trim()
  });

  activeChain.last_action = Date.now();

  activeChain.turn_state = type === "question" ? "answer" : "question";
  activeChain.active_user =
    currentUser === activeChain.user_a
      ? activeChain.user_b
      : activeChain.user_a;

  input.value = "";
  renderChain();
}

// ACTIONS
function markDodged() {
  activeChain.status = "dodged";
  activeChain.statusLabel = "Marked as dodged";
  renderChain();
}

function endChain() {
  activeChain.status = "ended";
  activeChain.statusLabel = "Ended";
  renderChain();
}

// CRICKETS
function updateCrickets(chain) {
  if (chain.status !== "active") return;

  if (Date.now() - chain.last_action > CRICKET_TIMEOUT) {
    chain.status = "crickets";
    chain.statusLabel = "No response";
  }
}

// LOOP
setInterval(() => {
  posts.forEach(p => p.chains.forEach(updateCrickets));
  renderFeed();
}, 3000);

// INIT
switchUser(currentUser);
</script>

</body>
</html>
