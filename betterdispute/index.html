<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}
header{display:flex;justify-content:space-between;padding:10px}
#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:20px;cursor:pointer;margin-right:10px}
.icon.active{opacity:1}
.icon.dim{opacity:.25}

.answerBtn{
  font-size:12px;
  color:#4caf50;
  cursor:pointer;
  margin-top:4px;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.node{margin-top:8px;border-left:2px solid #333;padding-left:6px}

.turn{font-size:11px;color:#aaa;margin-top:4px}

/* popup */
#popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;
}
#popup.open{display:flex}
.box{background:#1a1a1a;padding:12px;border-radius:10px;width:90%;max-width:420px}
.row{display:flex;justify-content:space-between;margin-top:10px}
.btn{font-size:22px;cursor:pointer;color:#fff}
.btn.ok{color:#4caf50}
.btn.cancel{color:#f44336}

/* log */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v30</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<div id="popup">
  <div class="box">
    <div id="modeTitle">Dispute</div>
    <textarea id="ask" placeholder="Ask"></textarea>
    <textarea id="proclaim" placeholder="Proclaim / Answer"></textarea>
    <div class="row">
      <span class="btn ok" onclick="submit()">✔</span>
      <span class="btn cancel" onclick="cancel()">✖</span>
    </div>
  </div>
</div>

<script>

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];
let reactions={};

let active=null;
let answerMode=false;

/* log */
function log(e,d){
  logs.push({t:new Date().toISOString(),u:currentUser,e,d});
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}

/* unanswered detection */
function owesAnswer(user){
  for(let n of items){
    if(n.type==="question"){
      const children = items.filter(x=>x.parent===n.id);
      const answered = children.some(c=>c.type==="answer");
      if(!answered && n.duel && n.duel.turn===user){
        return n;
      }
    }
  }
  return null;
}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();log("switch",u);}
    el.appendChild(d);
  });
}

/* root */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null,type:"proclaim",duel:null});
  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* reactions */
function react(i,type){

  const owed = owesAnswer(currentUser);
  if(owed){ log("blocked_due_to_answer"); return; }

  const node=find(i);
  if(!node || node.user===currentUser) return;

  reactions[i]=reactions[i]||{};
  reactions[i][currentUser]=type;

  if(type==="down") openDispute(i,false);

  render();
  log(type,i);
}

/* open */
function openDispute(i,isAnswer){
  active=i;
  answerMode=isAnswer;

  document.getElementById("popup").classList.add("open");
  document.getElementById("modeTitle").innerText = isAnswer ? "Answer" : "Dispute";

  document.getElementById("ask").style.display = isAnswer ? "none" : "block";
}

/* cancel */
function cancel(){
  active=null;
  answerMode=false;
  document.getElementById("popup").classList.remove("open");
}

/* submit */
function submit(){

  const ask=document.getElementById("ask").value.trim();
  const pro=document.getElementById("proclaim").value.trim();

  const parent=find(active);
  if(!parent){ cancel(); return; }

  let duel = parent.duel || {a:parent.user,b:currentUser,turn:currentUser};

  if(duel.turn!==currentUser){ cancel(); return; }

  const opponent = currentUser===duel.a ? duel.b : duel.a;

  function push(text,type){
    items.push({
      id:id++,
      text,
      user:currentUser,
      parent:active,
      type,
      duel:{a:duel.a,b:duel.b,turn:opponent}
    });
  }

  if(answerMode){
    if(!pro){ cancel(); return; }
    push(pro,"answer");
  }else{
    if(ask) push(ask,"question");
    if(pro) push(pro,"proclaim");
  }

  cancel();
  render();
  log("submit",active);
}

/* render */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  function renderNode(node){

    const children = items.filter(x=>x.parent===node.id);

    const left = children.filter(c=>c.type==="question");
    const right = children.filter(c=>c.type!=="question");

    const my = reactions[node.id]?.[currentUser];

    const owed = owesAnswer(currentUser);

    return `
      <div class="node">
        <div>${node.text} <span class="meta">@${node.user}</span></div>

        ${node.user!==currentUser ? `
        <div class="actions">
          <span class="icon ${my==='up'?'active':my?'dim':''}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${my==='down'?'active':my?'dim':''}" onclick="react(${node.id},'down')">👎</span>
        </div>
        `:""}

        ${node.type==="question" && node.duel && node.duel.turn===currentUser ? `
          <div class="answerBtn" onclick="openDispute(${node.id},true)">Answer</div>
        `:""}

        ${node.duel ? `<div class="turn">turn: ${node.duel.turn}</div>`:""}

        <div class="dispute">
          <div class="lane">${left.map(renderNode).join("")}</div>
          <div class="lane">${right.map(renderNode).join("")}</div>
        </div>
      </div>
    `;
  }

  items.filter(x=>x.parent===null).forEach(root=>{
    feed.innerHTML += `<div class="card">${renderNode(root)}</div>`;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.slice(-200).forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();

/* TEST DATA */
items.push({id:id++,text:"Truth claims should be examined",user:"alice",parent:null,type:"proclaim"});
items.push({
  id:id++,
  text:"What makes a claim examinable?",
  user:"bob",
  parent:0,
  type:"question",
  duel:{a:"alice",b:"bob",turn:"alice"}
});

render();

</script>
</body>
</html>
