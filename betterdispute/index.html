<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

.container{
  max-width:780px;
}

/* ENTRY */
.composer{
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-bottom:12px;
  border:1px solid #333;
}

textarea{
  width:100%;
  height:110px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #444;
  padding:8px;
  border-radius:6px;
}

/* STATEMENT (PRIMARY) */
.statement{
  background:#262626;
  padding:12px;
  border-radius:10px;
  margin-bottom:6px;
  border:1px solid #3a3a3a;
}

.statement .text{
  font-size:15px;
  font-weight:600;
  color:#fff;
}

.meta{
  font-size:11px;
  color:#aaa;
  margin-top:4px;
}

button{
  font-size:11px !important;
  margin-right:4px;
}

/* 🔥 GLOBAL TWO-COLUMN GRID (KEY FIX) */
.dispute-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

/* left/right lanes */
.lane{
  background:#141414;
  border-radius:8px;
  padding:8px;
  min-height:30px;
}

/* child statements */
.child{
  background:#1b1b1b;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

/* DEBUG (NO REPEAT BUG) */
.debug{
  display:none;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:160px;
  background:#0a0a0a;
  border-top:1px solid #333;
  overflow:auto;
  font-size:11px;
  color:#9f9;
  padding:6px;
}

.userbar{
  display:flex;
  gap:6px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.user{
  border:1px solid #444;
  padding:3px 6px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
}

.active{
  background:#2a2a2a;
}

.debug-toggle{
  position:fixed;
  bottom:170px;
  right:10px;
  font-size:11px;
}
</style>
</head>

<body>

<div class="container py-3">

<h5 class="text-center">Better Dispute</h5>

<div class="userbar" id="users"></div>

<div class="composer">
  <textarea id="composer" placeholder="Start a Proclamation..."></textarea>
  <button class="btn btn-primary btn-sm mt-2" onclick="submitProclamation()">Proclaim</button>
</div>

<div id="feed"></div>

</div>

<button class="btn btn-dark debug-toggle" onclick="toggleDebug()">Debug</button>

<div class="debug" id="debug"></div>

<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
background:#222; padding:12px; border-radius:8px; width:90%; max-width:320px; z-index:999;">

<div><b>Create Dispute Statement</b></div>

<select id="mode" class="form-control mb-2">
  <option value="proclaim">Proclamation</option>
  <option value="question">Question</option>
  <option value="answer">Answer</option>
</select>

<textarea id="text" class="form-control mb-2"></textarea>

<button class="btn btn-success btn-sm" onclick="submitDispute()">Submit</button>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>

</div>

<script>

//////////////////////
// VERSION
//////////////////////

const APP_VERSION="1.0.4";

//////////////////////
// DEBUG (FIXED — NO DUPLICATION BUG)
//////////////////////

function log(event,data){

  const el=document.getElementById("debug");

  const entry={
    time:Date.now(),
    version:APP_VERSION,
    user:currentUser,
    event,
    data
  };

  const div=document.createElement("div");
  div.innerText=JSON.stringify(entry);

  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

function toggleDebug(){
  const d=document.getElementById("debug");
  d.style.display = (d.style.display==="block") ? "none" : "block";
}

//////////////////////
// USERS
//////////////////////

let users=["alice","bob","charlie"];
let currentUser="alice";

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.innerText=u;

    d.onclick=()=>{
      currentUser=u;
      log("user_switch",{user:u});
      renderUsers();
    };

    el.appendChild(d);
  });
}

//////////////////////
// DATA
//////////////////////

let id=0;
let items=[];

function find(i){
  return items.find(x=>x.id===i);
}

//////////////////////
// CREATE
//////////////////////

function create(text,type,parent=null){

  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    const p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",item);

  render();
}

//////////////////////
// ENTRY
//////////////////////

function submitProclamation(){

  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  create(text,"proclaim",null);

  document.getElementById("composer").value="";
  log("proclaim_create",{text});
}

//////////////////////
// ACTIONS
//////////////////////

let active=null;

function disagree(id){
  active=id;
  document.getElementById("modal").style.display="block";
  log("disagree_open",{id});
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("text").value="";
}

function submitDispute(){

  const mode=document.getElementById("mode").value;
  const text=document.getElementById("text").value.trim();

  if(!text) return;

  create(text,mode,active);

  log("fork",{from:active,mode,text});

  closeModal();
}

function agree(id){
  log("agree",{id,user:currentUser});
}

//////////////////////
// RENDER (TRUE TWO-COLUMN STREAM)
//////////////////////

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null)
       .forEach(x=>renderItem(x,feed));
}

function renderItem(item,container){

  const wrap=document.createElement("div");

  wrap.innerHTML=`
    <div class="statement">
      <div class="text">${item.text}</div>
      <div class="meta">${item.type.toUpperCase()} · @${item.user}</div>

      <button class="btn btn-sm btn-success" onclick="agree(${item.id})">Agree</button>
      <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})">Disagree</button>
    </div>

    <div class="dispute-grid" id="grid-${item.id}">
      <div class="lane" id="left-${item.id}"></div>
      <div class="lane" id="right-${item.id}"></div>
    </div>
  `;

  container.appendChild(wrap);

  const left=document.getElementById(`left-${item.id}`);
  const right=document.getElementById(`right-${item.id}`);

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>{

      const el=document.createElement("div");
      el.className="child";

      el.innerHTML=`
        <div><b>${c.type.toUpperCase()}</b></div>
        <div>${c.text}</div>
        <div class="meta">@${c.user}</div>

        <button class="btn btn-sm btn-danger" onclick="disagree(${c.id})">Disagree</button>
      `;

      if(c.type==="proclaim") left.appendChild(el);
      else right.appendChild(el);
    });
}

//////////////////////
// INIT
//////////////////////

renderUsers();
render();

</script>

</body>
</html>
