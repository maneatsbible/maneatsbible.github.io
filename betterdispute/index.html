<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

.container{
  max-width:650px;
}

.card{
  background:#1b1b1b;
  border:none;
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
}

.meta{
  font-size:11px;
  color:#aaa;
}

button{
  font-size:11px !important;
  margin-right:4px;
}

.thread{
  margin-left:12px;
  border-left:2px solid #333;
  padding-left:10px;
}

.chat{
  font-size:11px;
  color:#bbb;
  border-left:2px dashed #555;
  margin-left:10px;
  padding-left:6px;
}

.modal{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#222;
  padding:12px;
  border-radius:8px;
  width:90%;
  max-width:320px;
  z-index:999;
}

textarea{
  width:100%;
  height:80px;
  background:#111;
  color:#eee;
  border:1px solid #444;
}
</style>
</head>

<body>

<div class="container py-3">

<h5 class="text-center">Better Dispute</h5>

<div id="feed"></div>

</div>

<!-- DISPUTE MODAL -->
<div id="modal" class="modal">

<div><b>Dispute this statement</b></div>

<select id="mode" class="form-control mb-2">
  <option value="proclaim">Proclamation (counter claim)</option>
  <option value="question">Question (challenge)</option>
</select>

<textarea id="text" class="form-control mb-2"></textarea>

<button class="btn btn-success btn-sm" onclick="submitDispute()">Submit</button>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>

</div>

<script>

//////////////////////
// USER (simple prototype)
//////////////////////

let user = "user" + Math.floor(Math.random()*1000);

//////////////////////
// DATA MODEL
//////////////////////

let id = 0;

let items = [
  {
    id:id++,
    text:"Start a Proclamation to begin a dispute",
    type:"proclaim",
    user:"system",
    parent:null,
    children:[],
    agrees:[],
    chat:[]
  }
];

let activeTarget = null;

function find(i){
  return items.find(x=>x.id===i);
}

//////////////////////
// CREATE (RULE ENFORCED)
//////////////////////

function create(text,type,parent=null){

  // RULE: ONLY ROOT IS PROCLAMATION ENTRY
  if(parent===null && type!=="proclaim"){
    alert("Only Proclamations can start disputes");
    return;
  }

  let item = {
    id:id++,
    text,
    type,
    user,
    parent,
    children:[],
    agrees:[],
    chat:[]
  };

  items.push(item);

  if(parent!==null){
    let p=find(parent);
    if(p) p.children.push(item.id);
  }

  render();
}

//////////////////////
// PROCLAMATION ENTRY
//////////////////////

function newProclamation(){
  let t = prompt("Proclamation:");
  if(!t) return;
  create(t,"proclaim",null);
}

//////////////////////
// AGREE
//////////////////////

function agree(id){
  let x=find(id);
  if(!x) return;

  if(!x.agrees.includes(user)) x.agrees.push(user);

  render();
}

//////////////////////
// DISAGREE = FORK
//////////////////////

function disagree(id){
  activeTarget=id;
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("text").value="";
}

function submitDispute(){

  let mode=document.getElementById("mode").value;
  let text=document.getElementById("text").value;

  if(!text) return;

  create(text,mode,activeTarget);

  closeModal();
}

//////////////////////
// SIDE CHAT
//////////////////////

function chat(id){

  let x=find(id);
  let t=prompt("Chat:");
  if(!t) return;

  x.chat.push({
    user,
    text:t,
    time:Date.now()
  });

  render();
}

//////////////////////
// RENDER
//////////////////////

function render(){

  let el=document.getElementById("feed");
  el.innerHTML="";

  items.filter(x=>x.parent===null)
       .forEach(x=>renderItem(x,el,0));
}

function renderItem(item,container,depth){

  let div=document.createElement("div");
  div.className="card";
  div.style.marginLeft = depth*10+"px";

  div.innerHTML=`
    <b>${item.type.toUpperCase()}</b>: ${item.text}
    <div class="meta">@${item.user}</div>

    <button class="btn btn-sm btn-primary" onclick="newProclamation()">Proclaim</button>
    <button class="btn btn-sm btn-success" onclick="agree(${item.id})">Agree</button>
    <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})">Disagree</button>
    <button class="btn btn-sm btn-outline-info" onclick="chat(${item.id})">Chat</button>
  `;

  container.appendChild(div);

  item.chat.forEach(c=>{
    let d=document.createElement("div");
    d.className="chat";
    d.innerText=`${c.user}: ${c.text}`;
    container.appendChild(d);
  });

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>renderItem(c,container,depth+1));
}

//////////////////////
// INIT
//////////////////////

render();

</script>

</body>
</html>
