<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Better Dispute v15</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER (UNCHANGED) */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.home {
  cursor: pointer;
  font-size: 18px;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

/* USER BUTTONS (FIXED CONTRAST) */
.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button {
  background: #2a2a2d;
  color: #cfcfcf;
  border: 1px solid #333;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
}

.userBar button.active {
  background: #3a6df0;
  color: #fff;
  border-color: #3a6df0;
}

/* LAYOUT */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

/* COMPOSE (HOME ONLY) */
.compose {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  padding: 10px;
  background: #1a1a1c;
  color: #fff;
}

/* CARDS (CLICKABLE SUMMARIES) */
.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 4px;
}

/* TURN VIEW */
.turn {
  background: #141416;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 6px;
}

.q { background: #2c2c2f; }
.a { background: #1f3a2c; }

/* NESTED VISUAL ONLY (NO LABELS) */
.nested {
  margin-left: 14px;
  border-left: 2px solid #333;
  padding-left: 10px;
  margin-top: 6px;
}

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  border-top: 1px solid #222;
  padding: 10px;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="home" onclick="goHome()">⚖️ Better Dispute</div>
  <div class="right">v15</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="home"></div>
<div class="container" id="focus"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

let mode = "home";
let activePost = null;
let activeChain = null;

/* POSTS */
let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] },
  { id: 2, user: "charlie", text: "AI will replace most jobs.", chains: [] }
];

/* SAMPLE */
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    {
      type: "question",
      user: "bob",
      text: "Where is that stated?",
      nested: []
    }
  ],
  active_user: "bob",
  turn_state: "question"
});

/* SWITCH USER */
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  render();
}

/* HOME */
function goHome() {
  mode = "home";
  activePost = null;
  activeChain = null;
  hideInput();
  render();
}

/* OPEN ANYTHING (UNIFIED DRILL RULE) */
function openChain(post, chain) {
  mode = "dispute";
  activePost = post;
  activeChain = chain;
  render();
}

/* CREATE POST */
function createPost() {
  const ta = document.getElementById("composeInput");
  if (!ta.value.trim()) return;

  posts.unshift({
    id: Date.now(),
    user: currentUser,
    text: ta.value.trim(),
    chains: []
  });

  ta.value = "";
  render();
}

/* CHALLENGE (RESTORED) */
function challenge(chain, parentTurn) {
  const nested = {
    id: Date.now(),
    a: currentUser,
    b: "other",
    turns: [],
    active_user: currentUser,
    turn_state: "question"
  };

  if (!parentTurn.nested) parentTurn.nested = [];
  parentTurn.nested.push(nested);

  openChain(activePost, nested);
}

/* SUMMARY */
function summarize(chain) {
  return chain.turns
    .slice(-2)
    .map(t => (t.type === "question" ? "Q" : "A") + ": " + t.text)
    .join(" → ") || "New dispute";
}

/* HOME RENDER */
function renderHome() {
  const home = document.getElementById("home");

  let html = `
    <div class="compose">
      <textarea id="composeInput" placeholder="Start a fire..."></textarea>
      <button onclick="createPost()">Post</button>
    </div>
  `;

  posts.forEach(post => {
    html += `
      <div class="card" onclick="openChain(posts.find(p=>p.id===${post.id}), posts.find(p=>p.id===${post.id}).chains[0])">
        <b>${post.text}</b>
        <div class="meta">@${post.user}</div>
      </div>
    `;
  });

  home.innerHTML = html;
}

/* RECURSIVE RENDER */
function renderTurns(turns) {
  let html = "";

  turns.forEach(t => {
    html += `
      <div class="turn ${t.type === "question" ? "q" : "a"}"
           onclick="challenge(activeChain, arguments[0])">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;

    if (t.nested && t.nested.length) {
      html += `<div class="nested">`;
      t.nested.forEach(n => {
        html += `
          <div class="card" onclick='openChain(activePost, ${JSON.stringify(n)})'>
            ${summarize(n)}
          </div>
        `;
      });
      html += `</div>`;
    }
  });

  return html;
}

/* FOCUS */
function renderFocus() {
  const focus = document.getElementById("focus");

  if (mode !== "dispute" || !activeChain) {
    focus.innerHTML = "";
    return;
  }

  let html = `
    <div class="card">
      <b>${activePost.text}</b>
      <div class="meta">@${activePost.user}</div>
    </div>
  `;

  html += renderTurns(activeChain.turns);

  focus.innerHTML = html;
}

/* INPUT RULE */
function updateInput() {
  const bar = document.getElementById("inputBar");
  const input = document.getElementById("input");

  if (
    mode === "dispute" &&
    activeChain &&
    activeChain.active_user === currentUser
  ) {
    bar.classList.remove("hidden");

    input.placeholder =
      activeChain.turn_state === "question"
        ? "Ask a question..."
        : "Answer...";
  } else {
    bar.classList.add("hidden");
  }
}

/* RENDER */
function render() {
  document.getElementById("home").style.display =
    mode === "home" ? "block" : "none";

  document.getElementById("focus").style.display =
    mode === "dispute" ? "block" : "none";

  renderHome();
  renderFocus();
  updateInput();
}

/* INIT */
switchUser(currentUser);
render();
</script>

</body>
</html>
