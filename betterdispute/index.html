<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Better Dispute v18</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.home, .back {
  cursor: pointer;
  font-size: 16px;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button {
  background: #2a2a2d;
  border: 1px solid #333;
  color: #ccc;
  padding: 6px 10px;
  border-radius: 6px;
}

.userBar button.active {
  background: #3a6df0;
  color: #fff;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.compose {
  background: #141416;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  background: #1a1a1c;
  color: #fff;
  border: 1px solid #2a2a2d;
  border-radius: 10px;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
  margin-top: 4px;
}

.turn {
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 6px;
}

.q { background: #2c2c2f; }
.a { background: #1f3a2c; }

.nested {
  margin-left: 14px;
  border-left: 2px solid #333;
  padding-left: 10px;
}

.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #0f0f10;
  border-top: 1px solid #222;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div style="display:flex;gap:10px;align-items:center;">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="back hidden" id="backBtn" onclick="goBack()">←</div>
    <div><b>Better Dispute</b></div>
  </div>
  <div class="right">v18</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="home"></div>
<div class="container" id="dispute"></div>

<div class="inputBar hidden">
  <textarea id="input"></textarea>
</div>

<script>

/* ---------------- STATE ---------------- */

let currentUser = "bob";
let mode = "home";

let activePostId = null;
let activeChainId = null;

/* ---------------- STORAGE ---------------- */

const postsById = new Map();
const chainsById = new Map();
const turnsById = new Map();

/* ---------------- HELPERS ---------------- */

function uid() {
  return String(Date.now() + Math.random());
}

/* ---------------- DATA ---------------- */

function createPost(user, text) {
  const p = {
    id: uid(),
    user,
    text,
    chains: []
  };
  postsById.set(p.id, p);
  return p;
}

function createChain(a, b) {
  const c = {
    id: uid(),
    a,
    b,
    turns: [],
    active_user: b,
    turn_state: "question"
  };
  chainsById.set(c.id, c);
  return c;
}

function createTurn(type, user, text) {
  const t = { id: uid(), type, user, text, nested: [] };
  turnsById.set(t.id, t);
  return t;
}

/* ---------------- TEST DATA (RICH) ---------------- */

const p1 = createPost("alice", "Faith alone is sufficient for salvation.");
const p2 = createPost("charlie", "AI will replace most jobs.");
const p3 = createPost("bob", "Truth requires questioning authority.");

const c1 = createChain("alice", "bob");
c1.turns.push(createTurn("question","bob","Where is that stated?"));
c1.turns.push(createTurn("answer","alice","Ephesians 2:8-9."));
p1.chains.push(c1);

const c2 = createChain("charlie","alice");
c2.turns.push(createTurn("question","alice","Which jobs specifically?"));
c2.turns.push(createTurn("answer","charlie","Knowledge work."));
p2.chains.push(c2);

/* ---------------- NAV ---------------- */

function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  render();
}

function goHome() {
  mode = "home";
  activePostId = null;
  activeChainId = null;
  render();
}

/* ---------------- RESOLVE ---------------- */

function getPost(id) {
  return postsById.get(id);
}

function getChain(id) {
  return chainsById.get(id);
}

/* ---------------- DRILL ---------------- */

function openChain(postId, chainId) {
  if (!postId) return;

  mode = "dispute";
  activePostId = postId;
  activeChainId = chainId || null;

  render();
}

/* ---------------- CREATE POST (FIXED NAME COLLISION BUG) ---------------- */

function submitPost() {
  const box = document.getElementById("composeBox");
  if (!box.value.trim()) return;

  const p = createPost(currentUser, box.value.trim());
  box.value = "";

  render();
}

/* ---------------- CHALLENGE (SAFE) ---------------- */

function challenge(target) {
  if (!target) return;

  const chain = createChain(currentUser, "opponent");

  if (target.turns) {
    target.turns.push(createTurn("question", currentUser, "Challenge opened"));
  }

  if (getPost(activePostId)) {
    getPost(activePostId).chains.push(chain);
  }

  openChain(activePostId, chain.id);
}

/* ---------------- RENDER HOME (FIXED) ---------------- */

function renderHome() {
  const el = document.getElementById("home");

  let html = `
    <div class="compose">
      <textarea id="composeBox" placeholder="Start a fire..."></textarea>
      <button onclick="submitPost()">Post</button>
    </div>
  `;

  postsById.forEach(post => {
    const chainPreview =
      (post.chains?.length && post.chains[0].turns.length)
        ? post.chains[0].turns.slice(-2)
            .map(t => (t.type === "question" ? "Q" : "A") + ": " + t.text)
            .join(" → ")
        : "No disputes yet";

    html += `
      <div class="card" onclick="openChain('${post.id}','${post.chains[0]?.id || ""}')">
        <b>${post.text}</b>
        <div class="meta">@${post.user}</div>
        <div class="meta">${chainPreview}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}

/* ---------------- RENDER DISPUTE ---------------- */

function renderDispute() {
  const el = document.getElementById("dispute");

  if (mode !== "dispute") {
    el.innerHTML = "";
    return;
  }

  const post = getPost(activePostId);
  const chain = getChain(activeChainId);

  if (!post) return;

  let html = `
    <div class="card">
      <b>${post.text}</b>
      <div class="meta">@${post.user}</div>
      <button onclick="challenge(${JSON.stringify(post.id)})">Challenge</button>
    </div>
  `;

  if (!chain) {
    el.innerHTML = html;
    return;
  }

  chain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type === "question" ? "q" : "a"}">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;
  });

  el.innerHTML = html;
}

/* ---------------- INPUT ---------------- */

document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const chain = getChain(activeChainId);
  if (!chain || chain.active_user !== currentUser) return;

  const val = e.target.value.trim();
  if (!val) return;

  chain.turns.push(createTurn(chain.turn_state, currentUser, val));

  chain.turn_state =
    chain.turn_state === "question" ? "answer" : "question";

  chain.active_user =
    currentUser === chain.a ? chain.b : chain.a;

  e.target.value = "";
  render();
});

/* ---------------- RENDER ---------------- */

function render() {
  document.getElementById("home").style.display = mode === "home" ? "block" : "none";
  document.getElementById("dispute").style.display = mode === "dispute" ? "block" : "none";

  renderHome();
  renderDispute();

  document.getElementById("backBtn")
    .classList.toggle("hidden", mode === "home");

  const chain = getChain(activeChainId);
  const bar = document.querySelector(".inputBar");

  if (mode === "dispute" && chain && chain.active_user === currentUser) {
    bar.classList.remove("hidden");
  } else {
    bar.classList.add("hidden");
  }
}

/* INIT */
switchUser(currentUser);
render();

</script>

</body>
</html>
