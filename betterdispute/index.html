<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:12px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{opacity:1;border-color:#fff}

#composer{
  width:100%;
  height:80px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  font-size:14px;
  padding:8px;
}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:10px;
  align-items:center;
}

.icon{
  font-size:20px;
  cursor:pointer;
  user-select:none;
  opacity:0.9; /* BOTH BRIGHT DEFAULT */
  transition:0.15s;
}

.icon.dim{
  opacity:0.25;
}

.icon:hover{opacity:1}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

#popup.open{display:flex}

.box{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
}

.title{
  font-weight:600;
  margin-bottom:10px;
}

textarea.input{
  width:100%;
  height:80px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  font-size:14px;
  padding:8px;
  border-radius:6px;
  margin-top:8px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

.iconBtn{
  font-size:20px;
  cursor:pointer;
  opacity:1; /* ALWAYS FULL BRIGHT */
}

/* LOG */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <div class="title">Dispute</div>

    <textarea id="challenge" class="input" placeholder="Ask (optional)"></textarea>
    <textarea id="counter" class="input" placeholder="Proclaim (optional)"></textarea>

    <div class="row">
      <span class="iconBtn" onclick="submitDispute()">✔</span>
      <span class="iconBtn" onclick="closePopup()">✖</span>
    </div>
  </div>
</div>

<script>

let VERSION=23;
document.getElementById("version").innerText="v"+VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

let reactions={};     // {id:{user:"up"|"down"}}
let active=null;
let disagreed={};

/* LOG */
function log(e,d){
  logs.push({t:new Date().toISOString(),u:currentUser,e,d});
}

/* HELP */
function find(i){return items.find(x=>x.id===i);}

function isOwner(item){
  return item.user===currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
      log("switch",u);
    };

    el.appendChild(d);
  });
}

/* CREATE */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* REACTION */
function react(i,type){
  const item=find(i);
  if(!item || isOwner(item)) return;

  reactions[i]=reactions[i]||{};
  reactions[i][currentUser]=type;

  if(type==="down") openDispute(i);

  render();
  log(type,i);
}

/* OPEN DISPUTE */
function openDispute(i){
  const item=find(i);
  if(!item || isOwner(item)) return;

  if(!disagreed[i]) disagreed[i]=new Set();
  if(disagreed[i].has(currentUser)) return;

  active=i;
  document.getElementById("popup").classList.add("open");

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";
}

function closePopup(){
  active=null;
  document.getElementById("popup").classList.remove("open");
}

/* SUBMIT */
function submitDispute(){

  const c=document.getElementById("challenge").value.trim();
  const p=document.getElementById("counter").value.trim();

  if(!c && !p) return;

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:active,
      type:"question"
    });
  }

  if(p){
    items.push({
      id:id++,
      text:p,
      user:currentUser,
      parent:active,
      type:"proclaim"
    });
  }

  if(!disagreed[active]) disagreed[active]=new Set();
  disagreed[active].add(currentUser);

  log("dispute",active);

  closePopup();
  render();
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null).forEach(r=>{

    const rState = reactions[r.id] || {};
    const my = rState[currentUser];

    const children = items.filter(x=>x.parent===r.id);

    let childHtml = children.map(c=>
      `<div style="margin-left:10px;border-left:2px solid #333;padding-left:8px;margin-top:6px;">
        ${c.text} <span style="color:#777">@${c.user}</span>
      </div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${r.text}</div>
        <div class="meta">@${r.user}</div>

        ${r.user!==currentUser ? `
        <div class="actions">
          <span class="icon ${my==='up'?'':'dim'}" onclick="react(${r.id},'up')">👍</span>
          <span class="icon ${my==='down'?'':'dim'}" onclick="react(${r.id},'down')">👎</span>
        </div>
        ` : ""}

        ${childHtml}
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();

/* TEST DATA */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null});
items.push({id:id++,text:"Some claims resist challenge",user:"bob",parent:null});

</script>

</body>
</html>
