<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Better Dispute v12</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.left {
  display: flex;
  gap: 10px;
  align-items: center;
}

.home {
  cursor: pointer;
  font-size: 18px;
}

.back {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.8;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

/* USER BAR */
.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button.active {
  background: #3a6df0;
}

/* LAYOUT */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

/* HOME COMPOSE */
.compose {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  padding: 10px;
  background: #1a1a1c;
  color: #fff;
}

/* COMPACT DISPUTE CARD (IMPORTANT CHANGE) */
.disputeCard {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.meta {
  font-size: 11px;
  opacity: 0.6;
}

.preview {
  margin-top: 6px;
  font-size: 13px;
  opacity: 0.95;
}

/* FOCUS MODE */
.hidden { display: none; }

.focus {
  display: none;
}

.focus.active {
  display: block;
}

.homeView.hidden {
  display: none;
}

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  border-top: 1px solid #222;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="back hidden" id="backBtn" onclick="goBack()">← Back</div>
    <div><b>Better Dispute</b></div>
  </div>
  <div class="right">v12</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="home"></div>

<div class="container focus" id="focus"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] },
  { id: 2, user: "charlie", text: "AI will replace most jobs.", chains: [] }
];

// SAMPLE CHAIN
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ],
  active_user: "bob",
  turn_state: "question"
});

// STATE
let focusStack = []; // FIX: proper nesting model

// HELPERS
function currentChain() {
  return focusStack.length ? focusStack[focusStack.length - 1] : null;
}

function currentPost() {
  return posts.find(p =>
    p.chains.some(c => focusStack.includes(c))
  ) || null;
}

/* SWITCH USER */
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  render();
}

/* HOME */
function goHome() {
  focusStack = [];
  document.getElementById("backBtn").classList.add("hidden");
  hideInput();
  render();
}

/* BACK */
function goBack() {
  focusStack.pop();
  render();
  updateInput();
}

/* COMPOSE */
function createPost() {
  const ta = document.getElementById("composeInput");
  if (!ta.value.trim()) return;

  posts.unshift({
    id: Date.now(),
    user: currentUser,
    text: ta.value.trim(),
    chains: []
  });

  ta.value = "";
  render();
}

/* CHALLENGE */
function challenge(post) {
  if (post.user === currentUser) return;

  const chain = {
    id: Date.now(),
    a: post.user,
    b: currentUser,
    turns: [],
    active_user: currentUser,
    turn_state: "question"
  };

  post.chains.push(chain);
  focusStack = [chain];
  render();
}

/* DRILL (ANYWHERE CLICK) */
function openChain(chain) {
  focusStack.push(chain);
  render();
}

/* SUMMARY (COMPRESSED CARD) */
function summarize(chain) {
  return chain.turns
    .slice(-3)
    .map(t => (t.type === "question" ? "Q" : "A") + ": " + t.text)
    .join(" → ") || "New dispute";
}

/* RENDER */
function render() {
  renderHome();
  renderFocus();
  updateUI();
}

/* HOME RENDER */
function renderHome() {
  const home = document.getElementById("home");

  let html = `
    <div class="compose">
      <textarea id="composeInput" placeholder="Start a fire..."></textarea>
      <button onclick="createPost()">Post</button>
    </div>
  `;

  posts.forEach(post => {
    html += `
      <div class="disputeCard">
        <div><b>${post.text}</b></div>
        <div class="meta">@${post.user}</div>
    `;

    if (post.user !== currentUser) {
      html += `<button onclick='challenge(posts.find(p=>p.id===${post.id}))'>Challenge</button>`;
    }

    post.chains.forEach(chain => {
      html += `
        <div class="preview" onclick='openChain(posts.find(p=>p.id===${post.id}).chains.find(c=>c.id===${chain.id}))'>
          ${summarize(chain)}
        </div>
      `;
    });

    html += `</div>`;
  });

  home.innerHTML = html;
}

/* FOCUS RENDER */
function renderFocus() {
  const focus = document.getElementById("focus");
  const chain = currentChain();

  if (!chain) {
    focus.classList.remove("active");
    return;
  }

  focus.classList.add("active");

  let html = `
    <div class="disputeCard">
      <b>Focus Mode</b>
      <div class="meta">${chain.a} vs ${chain.b}</div>
    </div>
  `;

  chain.turns.forEach(t => {
    html += `
      <div class="disputeCard">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;
  });

  focus.innerHTML = html;
}

/* UI STATE */
function updateUI() {
  const chain = currentChain();

  const back = document.getElementById("backBtn");
  const input = document.getElementById("inputBar");

  if (focusStack.length > 0) back.classList.remove("hidden");
  else back.classList.add("hidden");

  if (chain && chain.active_user === currentUser) {
    input.classList.remove("hidden");
    document.getElementById("input").placeholder =
      chain.turn_state === "question"
        ? "Ask a question..."
        : "Answer...";
  } else {
    input.classList.add("hidden");
  }
}

/* INPUT */
document.getElementById("input").addEventListener("keydown", (e) => {
  if (e.key !== "Enter") return;

  const chain = currentChain();
  if (!chain || chain.active_user !== currentUser) return;

  const val = e.target.value.trim();
  if (!val) return;

  chain.turns.push({
    type: chain.turn_state,
    user: currentUser,
    text: val
  });

  chain.turn_state =
    chain.turn_state === "question" ? "answer" : "question";

  chain.active_user =
    currentUser === chain.a ? chain.b : chain.a;

  e.target.value = "";

  render();
});

/* INIT */
switchUser(currentUser);
render();
</script>

</body>
</html>
