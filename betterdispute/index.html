<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v34</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{display:flex;justify-content:space-between;padding:10px}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:20px;cursor:pointer;margin-right:10px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.nav{
  padding:10px;
  color:#4caf50;
  cursor:pointer;
}

/* root list */
.rootItem{
  padding:10px;
  margin:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v34</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="create()">Proclaim</button>

<div id="nav"></div>
<div id="view"></div>

<script>

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

/* state */
let state={};

function getState(){
  if(!state[currentUser]){
    state[currentUser]={
      reactions:{},
      stack:[]   // drill-down stack
    };
  }
  return state[currentUser];
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* create root */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null
  });

  document.getElementById("composer").value="";
  render();
}

/* navigation */
function enter(id){
  getState().stack.push(id);
  render();
}

function back(){
  getState().stack.pop();
  render();
}

/* react */
function react(id,type){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  getState().reactions[id]=type;
  render();
}

/* render single dispute view */
function renderDispute(node){

  const children = items.filter(x=>x.parent===node.id);
  const left = children.filter(c=>c.side==="left");
  const right = children.filter(c=>c.side==="right");

  const r = getState().reactions[node.id];

  return `
    <div class="card">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${node.user!==currentUser ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':r?'dim':''}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${r==='down'?'active':r?'dim':''}" onclick="react(${node.id},'down')">👎</span>
        </div>
      `:""}

      <div class="dispute">

        <div class="lane">
          ${left.map(renderDispute).join("")}
        </div>

        <div class="lane">
          ${right.map(renderDispute).join("")}
        </div>

      </div>

      ${children.map(c=>`
        <div style="margin-top:6px;cursor:pointer;color:#aaa"
             onclick="enter(${c.id})">
          ↳ ${c.text}
        </div>
      `).join("")}

    </div>
  `;
}

/* main render */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  const s=getState();

  /* ROOT MODE */
  if(s.stack.length===0){

    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML += `
        <div class="rootItem" onclick="enter(${n.id})">
          ${n.text} <span class="meta">@${n.user}</span>
        </div>
      `;
    });

    return;
  }

  /* SINGLE DISPUTE MODE */
  const current = find(s.stack[s.stack.length-1]);

  nav.innerHTML = `<div class="nav" onclick="back()">⬅ back</div>`;
  view.innerHTML = renderDispute(current);
}

/* init */
renderUsers();

/* seed data */
items.push({id:id++,text:"Truth is structured",user:"alice",parent:null,side:null});
items.push({id:id++,text:"Structure is interpretation",user:"bob",parent:0,side:"right"});
items.push({id:id++,text:"Interpretation needs constraints",user:"charlie",parent:1,side:"left"});
items.push({id:id++,text:"Constraints are subjective",user:"bob",parent:2,side:"right"});

render();

</script>

</body>
</html>
