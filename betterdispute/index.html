<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dispute UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #eee;
}

header {
  background: #1a1a1a;
  padding: 12px;
  text-align: center;
  font-weight: bold;
  border-bottom: 1px solid #333;
}

.container {
  display: flex;
  height: calc(100vh - 50px);
}

.lane {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
  border-right: 1px solid #222;
}

.lane:last-child {
  border-right: none;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 8px;
}

.proclamation { border-left: 4px solid #ffcc00; }
.question { border-left: 4px solid #00bfff; }
.answer { border-left: 4px solid #00cc66; }

.meta {
  font-size: 11px;
  color: #aaa;
  margin-top: 4px;
}

.icon {
  font-weight: bold;
  margin-right: 6px;
}

button {
  margin-top: 6px;
  padding: 5px 8px;
  border: none;
  background: #333;
  color: #fff;
  cursor: pointer;
}

button:hover {
  background: #555;
}

.error {
  color: red;
  padding: 10px;
}
</style>
</head>

<body>

<header>Dispute</header>

<div id="error" class="error"></div>

<div class="container">
  <div class="lane" id="laneA"></div>
  <div class="lane" id="laneB"></div>
</div>

<script>
/* =========================
   CONFIG / SESSION
========================= */

const CURRENT_USER = "B";

/* =========================
   STRICT DATA MODEL
========================= */

const dispute = {
  users: ["A", "B"],

  messages: [
    {
      id: 1,
      type: "proclamation",
      author: "A",
      text: "AI is inherently deceptive."
    },
    {
      id: 2,
      type: "question",
      author: "B",
      target: "A",
      parentId: 1,
      text: "What makes it deceptive?"
    },
    {
      id: 3,
      type: "answer",
      author: "A",
      parentId: 2,
      text: "Because it scales fallen human influence."
    },
    {
      id: 4,
      type: "question",
      author: "A",
      target: "B",
      parentId: 1,
      text: "Can it ever produce truth?"
    }
  ]
};

/* =========================
   VALIDATION (CRITICAL)
========================= */

function validateDispute() {
  const err = [];

  if (dispute.users.length !== 2) {
    err.push("Must have exactly 2 users.");
  }

  const ids = new Set();

  dispute.messages.forEach(m => {
    if (ids.has(m.id)) err.push("Duplicate message ID: " + m.id);
    ids.add(m.id);

    if (!dispute.users.includes(m.author)) {
      err.push("Invalid author: " + m.author);
    }

    if (m.type === "question") {
      if (!m.target) err.push("Question missing target");
      if (!dispute.users.includes(m.target)) {
        err.push("Invalid target: " + m.target);
      }
      if (m.target === m.author) {
        err.push("User cannot question themselves");
      }
    }

    if (m.type === "answer") {
      const parent = dispute.messages.find(p => p.id === m.parentId);
      if (!parent || parent.type !== "question") {
        err.push("Answer must target a question");
      } else if (parent.target !== m.author) {
        err.push("Only target user can answer");
      }
    }
  });

  return err;
}

/* =========================
   TREE BUILD
========================= */

function buildTree() {
  const map = {};
  dispute.messages.forEach(m => {
    map[m.id] = {...m, children: []};
  });

  const roots = [];

  dispute.messages.forEach(m => {
    if (m.parentId) {
      map[m.parentId].children.push(map[m.id]);
    } else {
      roots.push(map[m.id]);
    }
  });

  return roots;
}

/* =========================
   UI HELPERS
========================= */

function getIcon(type) {
  return type === "proclamation" ? "!" :
         type === "question" ? "?" :
         "✓";
}

function createCard(msg) {
  const div = document.createElement("div");
  div.className = `card ${msg.type}`;

  div.innerHTML = `
    <div><span class="icon">${getIcon(msg.type)}</span>${msg.text}</div>
    <div class="meta">${msg.author}</div>
  `;

  // Answer button rules
  if (
    msg.type === "question" &&
    msg.target === CURRENT_USER &&
    !msg.children.some(c => c.type === "answer")
  ) {
    const btn = document.createElement("button");
    btn.textContent = "Answer";

    btn.onclick = () => {
      const text = prompt("Answer:");
      if (!text) return;

      dispute.messages.push({
        id: Date.now(),
        type: "answer",
        author: CURRENT_USER,
        parentId: msg.id,
        text
      });

      render();
    };

    div.appendChild(btn);
  }

  return div;
}

/* =========================
   RENDER LOGIC (NO DUPES)
========================= */

function renderThread(root, laneEl) {
  laneEl.appendChild(createCard(root));

  root.children
    .filter(c => c.type === "question")
    .forEach(q => {
      laneEl.appendChild(createCard(q));

      const ans = q.children.find(c => c.type === "answer");
      if (ans) {
        laneEl.appendChild(createCard(ans));
      }
    });
}

function render() {
  const errorEl = document.getElementById("error");
  errorEl.innerHTML = "";

  const errors = validateDispute();
  if (errors.length) {
    errorEl.innerHTML = errors.join("<br>");
    return;
  }

  const laneA = document.getElementById("laneA");
  const laneB = document.getElementById("laneB");

  laneA.innerHTML = "";
  laneB.innerHTML = "";

  const roots = buildTree();

  roots.forEach(root => {
    if (root.author === "A") {
      renderThread(root, laneA);
    } else {
      renderThread(root, laneB);
    }
  });
}

/* =========================
   INIT
========================= */

render();

</script>

</body>
</html>
