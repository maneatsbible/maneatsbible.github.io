<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v41</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#title{font-weight:600}

#homeBtn, #backBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  display:flex;
  gap:6px;
  align-items:center;
}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  opacity:.6;
  cursor:pointer;
}
.user.active{opacity:1;border-color:#fff}

/* composer hidden in drill */
#composerWrap{
  padding:10px;
}
textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
  border-radius:6px;
}

/* cards */
.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  margin-right:8px;
  cursor:pointer;
}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

/* lanes */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* sidebar */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:40;
}

#sidebar{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0c0c0c;
  border-left:1px solid #333;
  padding:10px;
  display:none;
  z-index:50;
}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:180px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">v41</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup" style="display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#111;border:1px solid #333;padding:10px;width:300px;z-index:20;">
  <div>Dispute</div>
  <textarea id="challenge" placeholder="Challenge (question)"></textarea>
  <textarea id="counter" placeholder="Counter (proclamation)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar"></div>

<div id="log"></div>

<script>

/* ---------------- STATE ---------------- */
let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let pending=null;
let mustAnswer={};
let logs=[];
let chat={};

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

/* BACK = ONE LEVEL BUT SAFE */
function back(){
  if(stack.length>1){
    stack.pop();
  } else {
    stack=[];
    document.getElementById("composerWrap").style.display="block";
  }
  render();
}

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null});
  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- DRILL ---------------- */
function enter(id){
  stack.push(id);
  document.getElementById("composerWrap").style.display="none";
  render();
}

/* ---------------- REACTION ---------------- */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;
  if(mustAnswer[id]) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pending=id;
    document.getElementById("popup").style.display="block";
    return;
  }

  reactions[k]="up";
  log("up",id);
  render();
}

/* ---------------- DISPUTE ---------------- */
function closePopup(){
  pending=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){

  if(!pending) return;
  const target=pending;

  const q=document.getElementById("challenge").value.trim();
  const c=document.getElementById("counter").value.trim();

  if(q){
    let qid=id++;
    items.push({
      id:qid,
      text:q,
      user:currentUser,
      parent:target,
      side:"left",
      type:"question"
    });
    mustAnswer[qid]=true;
  }

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      side:"right",
      type:"statement"
    });
  }

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";

  log("dispute",target);

  pending=null;
  closePopup();
  render();
}

/* ---------------- ANSWER ---------------- */
function answer(id){

  const t=prompt("Answer:");
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:id,
    type:"answer"
  });

  mustAnswer[id]=false;
  log("answer",id);
  render();
}

/* ---------------- SIDEBAR ---------------- */
function openSidebar(id){
  chat[id]=chat[id]||[];

  document.getElementById("sidebar").style.display="block";
  document.getElementById("overlay").style.display="block";

  document.getElementById("sidebar").innerHTML=`
    <div style="color:#888">thread chat</div>
    ${chat[id].map(m=>`<div><b>${m.u}</b>: ${m.m}</div>`).join("")}
    <input id="chatIn" style="width:100%;margin-top:8px">
    <button onclick="sendChat(${id})">send</button>
  `;
}

function sendChat(id){
  const v=document.getElementById("chatIn").value.trim();
  if(!v) return;
  chat[id].push({u:currentUser,m:v});
  openSidebar(id);
}

function closeSidebar(){
  document.getElementById("sidebar").style.display="none";
  document.getElementById("overlay").style.display="none";
}

/* ---------------- NODE ---------------- */
function node(n){

  const r=reactions[key(currentUser,n.id)];
  const show=n.user!==currentUser;

  return `
    <div class="card" onclick="enter(${n.id})">

      <div>${n.text} <span class="meta">@${n.user}</span></div>

      ${n.type==="question" ? `
        <button onclick="event.stopPropagation();answer(${n.id})">Answer</button>
      `:""}

      ${show ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'down')">👎</span>

          <span class="icon"
            onclick="event.stopPropagation();openSidebar(${n.id})">💬</span>
        </div>
      `:""}

    </div>
  `;
}

/* ---------------- DISPUTE VIEW ---------------- */
function renderDispute(root){

  const children=items.filter(x=>x.parent===root.id);

  const left=children.filter(x=>x.side==="left");
  const right=children.filter(x=>x.side==="right");

  return `
    <div>

      <div class="card">
        ${root.text} <span class="meta">@${root.user}</span>
      </div>

      <div class="disputeWrap">
        <div class="lane">${left.map(node).join("")}</div>
        <div class="lane">${right.map(node).join("")}</div>
      </div>

      ${children.length>0 ? `<div class="meta" style="padding:0 10px">↳ more branches available</div>`:""}

    </div>
  `;
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  view.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null)
      .forEach(n=>view.innerHTML+=node(n));
  } else {
    let cur=find(stack[stack.length-1]);

    view.innerHTML=`
      <button id="backBtn" onclick="back()">⬅ back</button>
      ${renderDispute(cur)}
    `;
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA (CLEAN 3 USER ROOT DISPUTE) ---------------- */

/* ROOT */
items.push({id:id++,text:"Should truth depend on consensus?",user:"alice",parent:null});

/* BRANCH 1 */
items.push({id:id++,text:"Yes, shared agreement defines truth",user:"bob",parent:0,side:"left",type:"question"});
items.push({id:id++,text:"No, truth exists independently",user:"charlie",parent:0,side:"right",type:"statement"});

/* ANSWERS */
items.push({id:id++,text:"But how do we verify without agreement?",user:"alice",parent:1,side:"left",type:"question"});
items.push({id:id++,text:"Through consistent external reality",user:"bob",parent:2,side:"right",type:"statement"});

/* SECOND LEVEL */
items.push({id:id++,text:"Is consistency itself agreement?",user:"charlie",parent:3,side:"left",type:"question"});
items.push({id:id++,text:"No, it is constraint-based",user:"alice",parent:4,side:"right",type:"statement"});

renderUsers();
render();

</script>

</body>
</html>
