<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v65</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#title{font-weight:600}

#composerWrap{padding:10px}

textarea{
  width:100%;
  font-size:16px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
  border-radius:6px;
  box-sizing:border-box;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.reactionRow{margin-top:6px}

.reactionBtn{
  background:#111;
  border:1px solid #333;
  color:#aaa;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
}

.activeAgree{color:#7CFF7C;border-color:#7CFF7C}
.activeDisagree{color:#FF7C7C;border-color:#FF7C7C}

#nav{padding:0 10px}
#backBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:140px;
  overflow:auto;
}

#modal{
  display:none;
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:280px;
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
  z-index:10;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">Better Dispute v65</div>
</header>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="modal">
  <textarea id="q" placeholder="Question"></textarea>
  <textarea id="c" placeholder="Counter"></textarea>
  <button onclick="submitDispute()">Submit</button>
</div>

<div id="log"></div>

<script>

/* ---------------- STATE ---------------- */

let id=0;
let nodes=[];
let stack=[];
let logs=[];

let reactions={};
let pendingDisagree=null;

/* ---------------- LOG ---------------- */

function log(e,d){
  logs.push({t:Date.now(),e,d});
}

/* ---------------- NAV ---------------- */

function home(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

function enter(i){
  stack.push(i);
  document.getElementById("composerWrap").style.display="none";
  render();
}

function back(){
  if(stack.length>1) stack.pop();
  else {
    stack=[];
    document.getElementById("composerWrap").style.display="block";
  }
  render();
}

/* ---------------- CREATE ---------------- */

function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  nodes.push({
    id:id++,
    rootId:id,
    parentId:null,
    type:"proclaim",
    user:"alice",
    text:t
  });

  document.getElementById("composer").value="";
  render();
}

/* ---------------- REACTIONS (FIXED) ---------------- */

function react(nodeId,type){

  const node=nodes.find(n=>n.id===nodeId);
  if(!node || node.user==="alice") return;

  if(type==="agree"){
    if(!reactions[nodeId]) reactions[nodeId]={};
    reactions[nodeId]["bob"]="agree";
    render();
    return;
  }

  if(type==="disagree"){
    pendingDisagree=nodeId;
    openModal();
  }
}

/* commit only on submit */
function commitDisagree(){
  if(pendingDisagree!==null){
    if(!reactions[pendingDisagree]) reactions[pendingDisagree]={};
    reactions[pendingDisagree]["bob"]="disagree";
    pendingDisagree=null;
  }
}

/* ---------------- DISPUTE (RESTORED + FORK) ---------------- */

function submitDispute(){

  if(pendingDisagree!==null){
    commitDisagree();
    closeModal();
    render();
    return;
  }

  const target=nodes[stack[stack.length-1]];
  if(!target) return;

  const forkId=id++;

  nodes.push({
    id:forkId,
    rootId:forkId,
    parentId:target.id,
    type:"dispute_root",
    user:target.user,
    text:target.text
  });

  const q=document.getElementById("q").value.trim();
  const c=document.getElementById("c").value.trim();

  if(q){
    nodes.push({
      id:id++,
      rootId:forkId,
      parentId:forkId,
      type:"question",
      user:"bob",
      text:q,
      lane:"left"
    });
  }

  if(c){
    nodes.push({
      id:id++,
      rootId:forkId,
      parentId:forkId,
      type:"proclaim",
      user:"alice",
      text:c,
      lane:"right"
    });
  }

  closeModal();
  render();
}

/* ---------------- MODAL ---------------- */

function openModal(){
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  pendingDisagree=null;
}

/* ---------------- Q/A RULE ---------------- */

function answer(qid){
  const q=nodes.find(n=>n.id===qid);
  if(!q) return;

  if(q.answered) return;

  const t=prompt("Answer:");
  if(!t) return;

  nodes.push({
    id:id++,
    rootId:q.rootId,
    parentId:q.id,
    type:"answer",
    user:"alice",
    text:t,
    lane:"left"
  });

  q.answered=true;
  render();
}

/* ---------------- LANES ---------------- */

function lane(rootId,lane){
  const out=[];
  function walk(pid){
    nodes.filter(n=>n.parentId===pid).forEach(n=>{
      if(n.lane!==lane && n.lane) return;
      out.push(n);
      walk(n.id);
    });
  }
  walk(rootId);
  return out;
}

/* ---------------- RENDER ---------------- */

function renderNode(n){

  const r=reactions[n.id]?.["bob"];

  return `
    <div class="card" onclick="enter(${n.id})">

      <div><b>${n.type}</b>: ${n.text}</div>

      ${n.user!=="alice" ? `
      <div class="reactionRow">
        <button class="reactionBtn ${r==='agree'?'activeAgree':''}"
          onclick="event.stopPropagation(); react(${n.id},'agree')">👍</button>

        <button class="reactionBtn ${r==='disagree'?'activeDisagree':''}"
          onclick="event.stopPropagation(); react(${n.id},'disagree')">👎</button>
      </div>
      ` : ""}

    </div>
  `;
}

function renderDispute(root){

  const left=lane(root.rootId||root.id,"left");
  const right=lane(root.rootId||root.id,"right");

  return `
    <div class="card"><b>${root.text}</b></div>
    <div class="disputeWrap">
      <div class="lane">${left.map(renderNode).join("")}</div>
      <div class="lane">${right.map(renderNode).join("")}</div>
    </div>
  `;
}

/* ---------------- MAIN RENDER ---------------- */

function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){

    nodes.filter(n=>n.parentId===null).forEach(n=>{
      view.innerHTML+=renderNode(n);
    });

  } else {

    const cur=nodes[stack[stack.length-1]];
    nav.innerHTML=`<button id="backBtn" onclick="back()">⬅ back</button>`;
    view.innerHTML=renderDispute(cur);

  }

  document.getElementById("log").innerHTML=
    logs.slice(-100).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA ---------------- */

nodes.push({
  id:id++,
  rootId:0,
  parentId:null,
  type:"proclaim",
  user:"alice",
  text:"Truth exists independent of consensus"
});

nodes.push({
  id:id++,
  rootId:0,
  parentId:0,
  type:"question",
  user:"bob",
  text:"Does truth require agreement?",
  lane:"left"
});

</script>

</body>
</html>
