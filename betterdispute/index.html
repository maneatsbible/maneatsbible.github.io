<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Better Dispute v1</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f0f;
  color: #fff;
}

#titlebar {
  position: sticky;
  top: 0;
  background: #111;
  padding: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #222;
  z-index: 10;
}

.icon {
  cursor: pointer;
}

.container {
  padding: 12px;
}

textarea {
  width: 100%;
  min-height: 100px;
  font-size: 16px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  background: #1a1a1a;
  color: #fff;
}

button {
  margin-top: 8px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #2a2a2a;
  color: #fff;
  cursor: pointer;
}

.card {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.row {
  display: flex;
}

.left {
  justify-content: flex-start;
}

.right {
  justify-content: flex-end;
}

.bubble {
  max-width: 75%;
  padding: 10px;
  border-radius: 12px;
}

.left .bubble {
  background: #2a2a2a;
}

.right .bubble {
  background: #0044ff;
}

.meta {
  font-size: 12px;
  opacity: 0.6;
  margin-bottom: 4px;
}

.status {
  font-size: 13px;
  margin-top: 6px;
  opacity: 0.8;
}

.back {
  cursor: pointer;
}
</style>
</head>

<body>

<div id="titlebar">
  <div class="icon" onclick="goHome()">⚖️</div>
  <div>Better Dispute v1</div>
</div>

<div id="app" class="container"></div>

<script>
let state = {
  view: 'home',
  navigationStack: [],
  currentDisputeId: null,
  posts: {},
  disputes: {},
  currentUser: 'alice'
}

let idCounter = 1
function genId() {
  return "id" + (idCounter++)
}

function now() {
  return Date.now()
}

// MODEL HELPERS

function createPost(type, content, parentId=null, disputeId=null) {
  const id = genId()
  state.posts[id] = {
    id,
    type,
    content,
    parentId,
    childrenIds: [],
    disputeId,
    authorId: state.currentUser,
    createdAt: now()
  }

  if (parentId) {
    state.posts[parentId].childrenIds.push(id)
  }

  return state.posts[id]
}

function createDispute(rootPostId, challengeContent) {
  const root = state.posts[rootPostId]

  const id = genId()

  const challenge = createPost('challenge', challengeContent, rootPostId, id)

  state.disputes[id] = {
    id,
    rootPostId,
    userA: root.authorId,
    userB: state.currentUser,
    lastTurnUserId: state.currentUser,
    isResolved: false
  }

  return id
}

function getPostsByDispute(disputeId) {
  return Object.values(state.posts)
    .filter(p => p.disputeId === disputeId)
    .sort((a,b) => a.createdAt - b.createdAt)
}

function getLastPost(disputeId) {
  const posts = getPostsByDispute(disputeId)
  return posts[posts.length - 1]
}

// CONTROLLER

function createAssertion(content) {
  createPost('assertion', content)
  render()
}

function challengePost(postId, content) {
  const post = state.posts[postId]
  if (post.authorId === state.currentUser) {
    alert("Cannot challenge your own post")
    return
  }

  const dispute = state.disputes[post.disputeId]

  if (!dispute) {
    const newId = createDispute(postId, content)
    openDispute(newId)
    return
  }

  const isParticipant =
    state.currentUser === dispute.userA ||
    state.currentUser === dispute.userB

  const lastPost = getLastPost(dispute.id)

  const isCorrectTurn = dispute.lastTurnUserId !== state.currentUser
  const isDirectFollowUp = lastPost.id === postId

  if (isParticipant && isCorrectTurn && isDirectFollowUp) {
    createPost('challenge', content, postId, dispute.id)
    dispute.lastTurnUserId = state.currentUser
    render()
  } else {
    const newId = createDispute(postId, content)
    openDispute(newId)
  }
}

function answerPost(postId, content) {
  const post = state.posts[postId]
  const dispute = state.disputes[post.disputeId]

  if (!dispute) return

  if (dispute.lastTurnUserId === state.currentUser) {
    alert("Not your turn")
    return
  }

  createPost('answer', content, postId, dispute.id)
  dispute.lastTurnUserId = state.currentUser
  render()
}

// NAV

function openDispute(disputeId) {
  state.navigationStack.push({
    view: state.view,
    disputeId: state.currentDisputeId
  })

  state.view = 'dispute'
  state.currentDisputeId = disputeId
  render()
}

function goBack() {
  const prev = state.navigationStack.pop()
  if (!prev) return goHome()

  state.view = prev.view
  state.currentDisputeId = prev.disputeId
  render()
}

function goHome() {
  state.view = 'home'
  state.currentDisputeId = null
  state.navigationStack = []
  render()
}

// VIEW

function render() {
  const app = document.getElementById('app')
  app.innerHTML = ''

  if (state.view === 'home') renderHome(app)
  if (state.view === 'dispute') renderDispute(app)
}

function renderHome(app) {
  const compose = document.createElement('div')

  compose.innerHTML = `
    <textarea id="assertionInput" placeholder="Start a fire..."></textarea>
    <button onclick="submitAssertion()">Post Assertion</button>
  `
  app.appendChild(compose)

  Object.values(state.posts)
    .filter(p => p.type === 'assertion')
    .forEach(p => {
      const div = document.createElement('div')
      div.className = 'card'
      div.innerHTML = `
        <div>${p.content}</div>
        <button onclick="challengePrompt('${p.id}')">Challenge</button>
      `
      app.appendChild(div)
    })
}

function renderDispute(app) {
  const dispute = state.disputes[state.currentDisputeId]

  const back = document.createElement('div')
  back.className = 'back'
  back.innerText = "← Back"
  back.onclick = goBack
  app.appendChild(back)

  const header = document.createElement('div')
  header.className = 'card'
  header.innerText = `${dispute.userA} vs ${dispute.userB}`
  app.appendChild(header)

  const thread = getPostsByDispute(dispute.id)

  thread.forEach(p => {
    const row = document.createElement('div')
    row.className = 'row ' + (p.authorId === state.currentUser ? 'right' : 'left')

    const bubble = document.createElement('div')
    bubble.className = 'bubble'

    bubble.innerHTML = `
      <div class="meta">${p.type}</div>
      <div>${p.content}</div>
      <button onclick="challengePrompt('${p.id}')">Challenge</button>
    `

    if (p.type === 'challenge' && p.authorId !== state.currentUser) {
      bubble.innerHTML += `<button onclick="answerPrompt('${p.id}')">Answer</button>`
    }

    row.appendChild(bubble)
    app.appendChild(row)
  })

  const last = getLastPost(dispute.id)

  const status = document.createElement('div')
  status.className = 'status'

  if (last.authorId === state.currentUser) {
    status.innerText = "Waiting for opponent..."
  } else {
    status.innerText = "Your turn"
  }

  app.appendChild(status)
}

// PROMPTS

function challengePrompt(postId) {
  const content = prompt("Enter challenge")
  if (!content) return
  challengePost(postId, content)
}

function answerPrompt(postId) {
  const content = prompt("Enter answer")
  if (!content) return
  answerPost(postId, content)
}

function submitAssertion() {
  const input = document.getElementById('assertionInput')
  if (!input.value) return
  createAssertion(input.value)
  input.value = ''
}

// INIT
render()
</script>

</body>
</html>
