<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

.container{
  max-width:780px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.version{
  font-size:11px;
  color:#888;
}

/* COMPOSER */
.composer{
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-bottom:12px;
  border:1px solid #333;
}

textarea{
  width:100%;
  height:110px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #444;
  padding:8px;
  border-radius:6px;
}

/* STATEMENTS */
.statement{
  background:#262626;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  border:1px solid #3a3a3a;
}

.statement .text{
  font-size:15px;
  font-weight:600;
  color:#fff;
}

.meta{
  font-size:11px;
  color:#aaa;
  margin-top:4px;
}

button{
  font-size:11px !important;
  margin-right:4px;
}

/* TWO COLUMN DISPUTE EXPANSION */
.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:8px;
}

.col{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:70px;
}

.child{
  background:#1b1b1b;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

/* LOG (ALWAYS AT BOTTOM) */
.log{
  position:relative;
  margin-top:20px;
  background:#0a0a0a;
  border-top:1px solid #333;
  font-size:11px;
  color:#9f9;
  padding:8px;
  max-height:220px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container py-3">

<div class="header">
  <h5>Better Dispute</h5>
  <div class="version">v2.0.0</div>
</div>

<!-- ENTRY -->
<div class="composer">
  <textarea id="composer" placeholder="Start a Proclamation..."></textarea>
  <button class="btn btn-primary btn-sm mt-2" onclick="submitProclamation()">Proclaim</button>
</div>

<div id="feed"></div>

<!-- LOG ALWAYS AT BOTTOM -->
<div class="log" id="log"></div>

</div>

<!-- DISPUTE MODAL (2-COLUMN EXPANSION INPUTS) -->
<div id="modal" style="display:none; position:fixed; top:15%; left:50%; transform:translateX(-50%);
background:#222; padding:12px; border-radius:8px; width:95%; max-width:420px; z-index:999;">

<div><b>Dispute Statement</b></div>

<div class="mt-2"><b>Left (Question / Challenge)</b></div>
<textarea id="leftInput" class="form-control mb-2" placeholder="Optional question..."></textarea>

<div><b>Right (Proclamation / Counter Claim)</b></div>
<textarea id="rightInput" class="form-control mb-2" placeholder="Optional counter-proclamation..."></textarea>

<button class="btn btn-success btn-sm" onclick="submitDispute()">Submit</button>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>

</div>

<script>

//////////////////////
// VERSION
//////////////////////

const APP_VERSION="2.0.0";

//////////////////////
// LOG (NO DUPLICATION, ALWAYS VISIBLE)
//////////////////////

function log(event,data){

  const el=document.getElementById("log");

  const entry={
    time:Date.now(),
    version:APP_VERSION,
    user:currentUser,
    event,
    data
  };

  const div=document.createElement("div");
  div.innerText=JSON.stringify(entry);

  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

//////////////////////
// USERS (TEST MODE)
//////////////////////

let users=["alice","bob","charlie"];
let currentUser="alice";

//////////////////////
// DATA
//////////////////////

let id=0;
let items=[];

function find(i){
  return items.find(x=>x.id===i);
}

//////////////////////
// CREATE
//////////////////////

function create(text,type,parent=null){

  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    const p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",item);
  render();
}

//////////////////////
// ENTRY
//////////////////////

function submitProclamation(){

  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  create(text,"proclaim",null);

  document.getElementById("composer").value="";
  log("proclaim",text);
}

//////////////////////
// DISAGREE = EXPAND TWO-COLUMN INPUT
//////////////////////

let active=null;

function disagree(id){
  active=id;

  document.getElementById("leftInput").value="";
  document.getElementById("rightInput").value="";

  document.getElementById("modal").style.display="block";

  log("disagree_open",{id});
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function submitDispute(){

  const left=document.getElementById("leftInput").value.trim();
  const right=document.getElementById("rightInput").value.trim();

  if(left){
    create(left,"question",active);
  }

  if(right){
    create(right,"proclaim",active);
  }

  log("dispute_submit",{active,left,right});

  closeModal();
}

//////////////////////
// RENDER
//////////////////////

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null)
       .forEach(x=>renderItem(x,feed));
}

function renderItem(item,container){

  const div=document.createElement("div");

  div.innerHTML=`
    <div class="statement">
      <div class="text">${item.text}</div>
      <div class="meta">${item.type.toUpperCase()} · @${item.user}</div>

      <button class="btn btn-sm btn-success" onclick="disagree(${item.id})">Disagree</button>
    </div>

    <div class="dispute" id="d-${item.id}">
      <div class="col" id="left-${item.id}"></div>
      <div class="col" id="right-${item.id}"></div>
    </div>
  `;

  container.appendChild(div);

  const left=document.getElementById(`left-${item.id}`);
  const right=document.getElementById(`right-${item.id}`);

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>{

      const el=document.createElement("div");
      el.className="child";

      el.innerHTML=`
        <b>${c.type.toUpperCase()}</b>
        <div>${c.text}</div>
        <div class="meta">@${c.user}</div>
      `;

      if(c.type==="question") left.appendChild(el);
      else right.appendChild(el);
    });
}

//////////////////////
// INIT
//////////////////////

render();

</script>

</body>
</html>
