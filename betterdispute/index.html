<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}
header{display:flex;justify-content:space-between;padding:10px}
#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888;margin-top:4px}

.actions{margin-top:6px}
.icon{font-size:20px;cursor:pointer;margin-right:10px}
.icon.dim{opacity:.3}

.turn{
  display:inline-block;
  margin-top:6px;
  font-size:11px;
  padding:2px 6px;
  border-radius:6px;
  background:#222;
  color:#bbb;
}
.turn.active{
  background:#2e7d32;
  color:#fff;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.node{
  margin-top:8px;
  border-left:2px solid #333;
  padding-left:6px;
}

.unanswered{
  outline:1px solid #f44336;
  border-radius:6px;
  padding:4px;
}

/* popup */
#popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;
}
#popup.open{display:flex}
.box{background:#1a1a1a;padding:12px;border-radius:10px;width:90%;max-width:420px}
.row{display:flex;justify-content:space-between;margin-top:10px}
.btn{font-size:22px;cursor:pointer}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>

<div id="popup">
  <div class="box">
    <div>Respond</div>
    <textarea id="ask" placeholder="Ask"></textarea>
    <textarea id="proclaim" placeholder="Proclaim / Answer"></textarea>
    <div class="row">
      <span class="btn" onclick="submit()">✔</span>
      <span class="btn" onclick="closePopup()">✖</span>
    </div>
  </div>
</div>

<script>

let VERSION=27;
document.getElementById("version").innerText="v"+VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let active=null;

/*
node:
{
 id,text,user,parent,type,
 duel:{a,b,turn}
}
*/

function find(i){return items.find(x=>x.id===i);}

/* ROOT */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    duel:null,
    type:"proclaim"
  });

  document.getElementById("composer").value="";
  render();
}

/* DISPUTE ENTRY */
function openDispute(i){
  const node=find(i);
  if(!node || node.user===currentUser) return;

  active=i;
  document.getElementById("popup").classList.add("open");
}

function closePopup(){
  active=null;
  document.getElementById("popup").classList.remove("open");
}

/* SUBMIT */
function submit(){

  const ask=document.getElementById("ask").value.trim();
  const pro=document.getElementById("proclaim").value.trim();

  if(!ask && !pro){
    closePopup();
    return;
  }

  const parent=find(active);

  // establish duel
  let duel = parent.duel;
  if(!duel){
    duel = {a:parent.user,b:currentUser,turn:currentUser};
  }

  // enforce turn
  if(duel.turn !== currentUser){
    closePopup();
    return;
  }

  const opponent = currentUser===duel.a ? duel.b : duel.a;

  function push(text,type){
    items.push({
      id:id++,
      text,
      user:currentUser,
      parent:active,
      type,
      duel:{
        a:duel.a,
        b:duel.b,
        turn:opponent
      }
    });
  }

  // must-answer rule:
  const children = items.filter(x=>x.parent===active);
  const last = children[children.length-1];

  if(last && last.type==="question" && last.user!==currentUser){
    if(!pro){
      closePopup();
      return; // must answer
    }
    push(pro,"answer");
  }else{
    if(ask) push(ask,"question");
    if(pro) push(pro,"proclaim");
  }

  closePopup();
  render();
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null).forEach(root=>{

    function renderNode(node){

      const children = items.filter(x=>x.parent===node.id);

      const duel = node.duel;

      const left = children.filter(c=>c.user===node.user);
      const right = children.filter(c=>c.user!==node.user);

      const unanswered = node.type==="question" &&
        (!children.length);

      return `
        <div class="node ${unanswered?'unanswered':''}">
          <div>
            ${node.text}
            <span class="meta">@${node.user}</span>
          </div>

          ${duel ? `
            <div class="turn ${duel.turn===node.user?'active':''}">
              turn: ${duel.turn}
            </div>
          `:""}

          ${node.user!==currentUser ? `
            <div class="actions">
              <span class="icon" onclick="openDispute(${node.id})">↩️</span>
            </div>
          `:""}

          <div class="dispute">
            <div class="lane">
              ${left.map(renderNode).join("")}
            </div>
            <div class="lane">
              ${right.map(renderNode).join("")}
            </div>
          </div>
        </div>
      `;
    }

    feed.innerHTML += `<div class="card">${renderNode(root)}</div>`;
  });
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();}
    el.appendChild(d);
  });
}

renderUsers();
render();

/* TEST DATA */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null,type:"proclaim"});
items.push({id:id++,text:"Some claims resist challenge",user:"bob",parent:null,type:"proclaim"});

</script>

</body>
</html>
