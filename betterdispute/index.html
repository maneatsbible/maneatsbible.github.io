<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:11px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{opacity:1;border-color:#fff}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{margin-top:8px;display:flex;gap:6px}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* DISPUTE */
.lanes{
  display:none;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lanes.open{display:grid}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* MODAL */
#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  align-items:center;
  justify-content:center;
}

#modal.open{display:flex}

.modalBox{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
}

input{
  width:100%;
  margin-top:6px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
  border-radius:6px;
}

.modalBtns{
  display:flex;
  gap:6px;
  margin-top:10px;
}

#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- MODAL -->
<div id="modal">
  <div class="modalBox">
    <div id="modalTitle"></div>

    <input id="askInput" placeholder="Ask">
    <input id="proclaimInput" placeholder="Proclaim">

    <div class="modalBtns">
      <button onclick="submitAsk()">Submit Ask</button>
      <button onclick="submitProclaim()">Submit Proclaim</button>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script>

const VERSION="15.0.0";
document.getElementById("version").innerText="v"+VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

let activeTarget=null;

/* LOG */
function log(e,data){
  logs.push({t:Date.now(),u:currentUser,e,data});
}

/* STARTUP LOG */
log("startup",{version:VERSION});

/* HELPERS */
function find(id){return items.find(x=>x.id===id);}

/* STRICT SELF BLOCK */
function canInteract(item){
  return item.user !== currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render(); // CRITICAL FIX
      log("switch",{u});
    };

    el.appendChild(d);
  });
}

/* CREATE */
function createRoot(){
  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  items.push({
    id:id++,
    text,
    user:currentUser,
    parent:null,
    open:false
  });

  document.getElementById("composer").value="";
  render();
  log("create",{text});
}

/* DISPUTE OPEN */
function openDispute(item){
  if(!item || !canInteract(item)) return;
  item.open=true;
  render();
  log("dispute_open",{id:item.id});
}

/* MODAL CONTROL */
function openModal(id){
  activeTarget=id;
  document.getElementById("modal").classList.add("open");
  document.getElementById("askInput").value="";
  document.getElementById("proclaimInput").value="";
}

function closeModal(){
  activeTarget=null;
  document.getElementById("modal").classList.remove("open");
}

/* SUBMIT */
function submitAsk(){
  const v=document.getElementById("askInput").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:activeTarget,
    type:"ask"
  });

  closeModal();
  render();
  log("ask",{activeTarget,v});
}

function submitProclaim(){
  const v=document.getElementById("proclaimInput").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:activeTarget,
    type:"proclaim"
  });

  closeModal();
  render();
  log("proclaim",{activeTarget,v});
}

/* AGREEMENT (SELF BLOCKED) */
function agree(id){
  const item=find(id);
  if(!item || item.user===currentUser) return;
  log("agree",{id});
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null)
  .forEach(root=>{

    const disabled = root.user===currentUser;

    let children = items.filter(x=>x.parent===root.id);

    let childHtml = children.map(c=>
      `<div style="margin-left:10px;border-left:2px solid #333;padding-left:8px;margin-top:6px;">
        ${c.text} <span style="color:#888">@${c.user}</span>
      </div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${root.text}</div>
        <div class="meta">@${root.user}</div>

        <div class="actions">
          <button onclick="agree(${root.id})" ${disabled?'disabled':''}>Agree</button>
          <button onclick="openDispute(find(${root.id}))" ${disabled?'disabled':''}>Disagree</button>
          <button onclick="openModal(${root.id})" ${disabled?'disabled':''}>Respond</button>
        </div>

        ${childHtml}
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();

</script>

</body>
</html>
