<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Better Dispute v20</title>

<style>
body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:#0f0f10;
  color:#fff;
}

.header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

.container {
  max-width:600px;
  margin:auto;
  padding:10px;
}

.card {
  background:#1a1a1c;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.meta { opacity:0.6; font-size:12px; }

.turn {
  padding:10px;
  border-radius:8px;
  margin:6px 0;
}

.q { background:#2c2c2f; }
.a { background:#1f3a2c; }

.inputBar {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:10px;
  background:#0f0f10;
  border-top:1px solid #222;
}

.hidden { display:none; }

textarea {
  width:100%;
  min-height:70px;
  background:#1a1a1c;
  color:#fff;
  border:1px solid #333;
  border-radius:8px;
  padding:10px;
}
button {
  margin-top:6px;
  padding:6px 10px;
}
</style>
</head>

<body>

<div class="header">
  <div><b>Better Dispute</b></div>
  <div>v20</div>
</div>

<div class="container" id="home"></div>
<div class="container" id="view"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
  <button onclick="submit()">Send</button>
</div>

<script>

/* ---------------- USERS ---------------- */

let currentUser = "bob";

/* ---------------- STATE STACK (KEY FIX) ---------------- */

let stack = []; 
// [ {type:"post", id}, {type:"chain", id}, ... ]

/* ---------------- DATA ---------------- */

const posts = {
  p1: {
    id:"p1",
    user:"alice",
    text:"Faith alone is sufficient for salvation.",
    chains:["c1"]
  }
};

const chains = {
  c1: {
    id:"c1",
    a:"alice",
    b:"bob",
    state:"awaiting_answer",
    turns:[
      {id:"t1", type:"question", user:"bob", text:"Where is that stated?", status:"awaiting_answer", nested:[]}
    ]
  }
};

/* ---------------- NAV ---------------- */

function openPost(id){
  stack = [{type:"post", id}];
  render();
}

function drillChain(id){
  stack.push({type:"chain", id});
  render();
}

function back(){
  stack.pop();
  render();
}

/* ---------------- RESOLVE ---------------- */

function currentPost(){
  return posts[stack[0].id];
}

function currentChain(){
  const c = stack.findLast(s=>s.type==="chain");
  return c ? chains[c.id] : null;
}

/* ---------------- CHALLENGE ---------------- */

function challenge(turn){
  const c = {
    id:"c"+Math.random(),
    a:currentUser,
    b:"other",
    state:"awaiting_answer",
    turns:[
      {id:"x"+Math.random(), type:"question", user:currentUser, text:"Challenge opened", status:"awaiting_answer", nested:[]}
    ]
  };

  chains[c.id]=c;
  turn.nested.push(c);

  stack.push({type:"chain", id:c.id});
  render();
}

/* ---------------- INPUT ---------------- */

function submit(){
  const chain = currentChain();
  if(!chain) return;

  const text = document.getElementById("input").value.trim();
  if(!text) return;

  const lastTurn = chain.turns[chain.turns.length-1];

  if(lastTurn.status === "awaiting_answer"){
    lastTurn.answer = text;
    lastTurn.status = "answered";
    chain.state = "ready_to_challenge";
  } else {
    chain.turns.push({
      id:"t"+Math.random(),
      type:"question",
      user:currentUser,
      text,
      status:"awaiting_answer",
      nested:[]
    });
    chain.state = "awaiting_answer";
  }

  document.getElementById("input").value="";
  render();
}

/* ---------------- RENDER HOME ---------------- */

function renderHome(){
  let html="";

  Object.values(posts).forEach(p=>{
    html += `
      <div class="card" onclick="openPost('${p.id}')">
        <b>${p.text}</b>
        <div class="meta">@${p.user}</div>
      </div>
    `;
  });

  document.getElementById("home").innerHTML = html;
}

/* ---------------- RENDER VIEW ---------------- */

function renderView(){

  if(stack.length===0){
    document.getElementById("view").innerHTML="";
    return;
  }

  const post = currentPost();
  const chain = currentChain();

  let html = "";

  if(stack.length>1){
    html += `<div onclick="back()" class="meta">← Back (level ${stack.length})</div>`;
  }

  if(post){
    html += `<div class="card"><b>${post.text}</b><div class="meta">@${post.user}</div></div>`;
  }

  if(chain){
    chain.turns.forEach(t=>{
      html += `
        <div class="turn ${t.type==="question"?"q":"a"}">
          <b>${t.text}</b>
          <div class="meta">@${t.user}</div>
          ${t.status==="awaiting_answer" ? "<div class='meta'>Awaiting answer…</div>" : ""}
          ${t.status==="answered" ? "<div class='meta'>Answered ✓</div>" : ""}
        </div>
      `;

      if(t.nested.length){
        t.nested.forEach(n=>{
          html += `<div class="card" onclick="drillChain('${n.id}')">Nested dispute →</div>`;
        });
      }
    });

    if(chain.state==="ready_to_challenge"){
      html += `<div class="meta">You may challenge again or drill deeper.</div>`;
    }

    document.getElementById("inputBar").classList.remove("hidden");
  } else {
    document.getElementById("inputBar").classList.add("hidden");
  }

  document.getElementById("view").innerHTML = html;
}

/* ---------------- INPUT RULE ---------------- */

function updateInput(){
  const chain = currentChain();
  if(!chain) {
    document.getElementById("inputBar").classList.add("hidden");
  }
}

/* ---------------- RENDER ---------------- */

function render(){
  document.getElementById("home").style.display = stack.length ? "none":"block";
  document.getElementById("view").style.display = stack.length ? "block":"none";

  renderHome();
  renderView();
  updateInput();
}

/* INIT */

render();

</script>

</body>
</html>
