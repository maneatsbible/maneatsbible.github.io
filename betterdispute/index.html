<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

.container { max-width:650px; }

.card {
  background:#1b1b1b;
  border:none;
  margin-bottom:10px;
  padding:10px;
  border-radius:8px;
}

.meta {
  font-size:11px;
  color:#aaa;
}

button {
  font-size:11px !important;
  margin-right:4px;
}

.thread {
  margin-left:12px;
  border-left:2px solid #333;
  padding-left:10px;
}

.chat {
  font-size:11px;
  color:#bbb;
  border-left:2px dashed #555;
  margin-left:10px;
  padding-left:6px;
}

.userbar {
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  margin-bottom:10px;
}

.userpill {
  padding:3px 6px;
  border:1px solid #444;
  border-radius:5px;
  cursor:pointer;
  font-size:11px;
}

.active {
  background:#2a2a2a;
}
</style>
</head>

<body>

<div class="container py-3">

<h5 class="text-center">Better Dispute</h5>

<div class="userbar" id="users"></div>

<div id="feed"></div>

</div>

<!-- DISPUTE MODAL -->
<div id="modal" class="modal" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
background:#222; padding:12px; border-radius:8px; width:90%; max-width:320px; z-index:999;">

<div><b>Start Dispute</b></div>

<select id="mode" class="form-control mb-2">
  <option value="proclaim">Proclaim</option>
  <option value="question">Question</option>
</select>

<textarea id="text" class="form-control mb-2"></textarea>

<button class="btn btn-success btn-sm" onclick="submitDispute()">Submit</button>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>

</div>

<script>

//////////////////////
// MULTI USER (RESTORED)
//////////////////////

let users = ["alice","bob","charlie"];
let currentUser = "alice";

function renderUsers(){
  let el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    let d=document.createElement("div");
    d.className="userpill"+(u===currentUser?" active":"");
    d.innerText=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
    };
    el.appendChild(d);
  });
}

//////////////////////
// SYNC ACROSS TABS
//////////////////////

const channel = new BroadcastChannel("better_dispute");

channel.onmessage = (e)=>{
  if(e.data?.type==="sync"){
    items = e.data.items;
    users = e.data.users;
    renderUsers();
    render();
  }
};

function sync(){
  channel.postMessage({
    type:"sync",
    items,
    users
  });
}

//////////////////////
// DATA MODEL
//////////////////////

let id=0;

let items=[
  {
    id:id++,
    text:"Root dispute",
    type:"proclaim",
    user:"system",
    parent:null,
    agrees:[],
    disagrees:[],
    chat:[],
    children:[]
  }
];

function find(i){ return items.find(x=>x.id===i); }

//////////////////////
// CORE
//////////////////////

function create(text,type,parent=null){

  let n={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    agrees:[],
    disagrees:[],
    chat:[],
    children:[]
  };

  items.push(n);

  if(parent!==null){
    let p=find(parent);
    if(p) p.children.push(n.id);
  }

  sync();
}

//////////////////////
// SIDE CHAT (RESTORED)
//////////////////////

function chat(id){
  let n=find(id);
  let t=prompt("Chat:");
  if(!t) return;

  n.chat.push({
    user:currentUser,
    text:t,
    time:Date.now()
  });

  sync();
  render();
}

//////////////////////
// VOTES
//////////////////////

function agree(id){
  let n=find(id);

  n.disagrees=n.disagrees.filter(u=>u!==currentUser);
  if(!n.agrees.includes(currentUser)) n.agrees.push(currentUser);

  sync();
  render();
}

function disagree(id){
  active=id;
  openModal(id);
}

//////////////////////
// DISPUTE FORK (RESTORED PROPERLY)
//////////////////////

let active=null;

function openModal(){
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("text").value="";
}

function submitDispute(){

  let mode=document.getElementById("mode").value;
  let text=document.getElementById("text").value;

  if(!text) return;

  create(text,mode,active);

  closeModal();
}

//////////////////////
// ACTIONS
//////////////////////

function interact(id){

  let mode=prompt("1 Proclaim\n2 Question\n3 Answer");

  if(mode==="1"){
    let t=prompt("Proclaim:");
    if(t) create(t,"proclaim",id);
  }

  if(mode==="2"){
    let t=prompt("Question:");
    if(t) create(t,"question",id);
  }

  if(mode==="3"){
    let t=prompt("Answer:");
    if(t) create(t,"answer",id);
  }
}

//////////////////////
// RENDER
//////////////////////

function render(){

  let el=document.getElementById("feed");
  el.innerHTML="";

  items.filter(x=>x.parent===null)
       .forEach(x=>renderItem(x,el,0));
}

function renderItem(item,container,depth){

  let div=document.createElement("div");

  div.className="card";
  div.style.marginLeft=depth*10+"px";

  div.innerHTML=`
    <b>${item.type.toUpperCase()}</b>: ${item.text}
    <div class="meta">@${item.user}</div>

    <button class="btn btn-sm btn-outline-light" onclick="interact(${item.id})">Interact</button>
    <button class="btn btn-sm btn-success" onclick="agree(${item.id})">Agree</button>
    <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})">Disagree</button>
    <button class="btn btn-sm btn-outline-info" onclick="chat(${item.id})">Chat</button>
  `;

  container.appendChild(div);

  item.chat.forEach(c=>{
    let d=document.createElement("div");
    d.className="chat";
    d.innerText=`${c.user}: ${c.text}`;
    container.appendChild(d);
  });

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>renderItem(c,container,depth+1));
}

//////////////////////
// INIT
//////////////////////

renderUsers();
render();

</script>

</body>
</html>
