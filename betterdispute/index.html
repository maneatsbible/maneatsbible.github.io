<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Better Dispute v3</title>

<style>
:root {
  --bg: #0f1115;
  --card: #1a1d24;
  --muted: #888;
  --text: #eaeaea;
  --accent: #4da3ff;
  --warn: #ffcc00;
  --ok: #4caf50;
  --danger: #ff5252;
}

body {
  margin: 0;
  font-family: system-ui;
  background: var(--bg);
  color: var(--text);
}

header {
  display: flex;
  justify-content: space-between;
  padding: 12px;
  background: #000;
  border-bottom: 1px solid #222;
}

.container {
  padding: 12px;
}

.card {
  background: var(--card);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
}

button {
  background: none;
  border: 1px solid #333;
  color: var(--text);
  padding: 8px 10px;
  border-radius: 8px;
  margin-top: 6px;
}

button:disabled {
  opacity: 0.3;
}

textarea {
  width: 100%;
  background: #000;
  color: var(--text);
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px;
  font-size: 16px;
}

.badge {
  background: var(--warn);
  color: #000;
  padding: 2px 6px;
  border-radius: 6px;
  font-size: 12px;
  margin-left: 6px;
}

.highlight {
  border: 1px solid var(--accent);
}

.terminal {
  opacity: 0.5;
}

.row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.icon {
  margin-right: 6px;
}

.topline {
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>

<header>
  <div>⚖️ Better Dispute</div>
  <div>v3</div>
</header>

<div class="container">

<!-- USER SWITCH -->
<div class="card">
  <div>Current User:</div>
  <div id="users"></div>
</div>

<!-- HOME -->
<div id="homeView">

  <div class="card">
    <textarea id="assertionInput" placeholder="Start a fire..."></textarea>
    <button onclick="Controller.createAssertion()">Post Assertion</button>
  </div>

  <div id="feed"></div>
</div>

<!-- DISPUTE -->
<div id="disputeView" style="display:none;">
  <button onclick="Controller.back()">⬅ Back</button>
  <div id="lineage"></div>
  <div id="thread"></div>
</div>

</div>

<script>
/* ===================== MODEL ===================== */

const Model = {
  users: ["Alice", "Bob", "Charlie"],
  currentUser: "Alice",
  posts: [],
  disputes: [],

  createPost(type, content, parentId = null, meta = {}) {
    const post = {
      id: Math.random().toString(36).substr(2, 9),
      type,
      content,
      user: this.currentUser,
      parentId,
      meta,
      created: Date.now()
    };
    this.posts.push(post);
    return post;
  },

  getChildren(parentId) {
    return this.posts.filter(p => p.parentId === parentId);
  },

  getPost(id) {
    return this.posts.find(p => p.id === id);
  }
};

/* ===================== CONTROLLER ===================== */

const Controller = {
  stack: [],

  createAssertion() {
    const val = document.getElementById("assertionInput").value.trim();
    if (!val) return;
    Model.createPost("assertion", val);
    document.getElementById("assertionInput").value = "";
    View.renderHome();
  },

  challenge(postId) {
    if (!this.canChallenge(postId)) return;

    const content = prompt("Enter challenge (Y/N question):");
    if (!content) return;

    const challenge = Model.createPost("challenge", content, postId);

    // create dispute
    Model.disputes.push({
      id: challenge.id,
      postId: challenge.id,
      users: [Model.currentUser, Model.getPost(postId).user],
      turn: Model.getPost(postId).user,
      active: true
    });

    View.renderHome();
  },

  answer(postId, yesNo) {
    if (!this.canAnswer(postId)) return;

    const text = prompt("Optional explanation:");
    Model.createPost("answer", text || yesNo, postId, { yn: yesNo });

    this.advanceTurn(postId);

    View.renderDispute(this.currentDisputeId());
  },

  canChallenge(postId) {
    const post = Model.getPost(postId);
    if (!post) return false;
    if (post.user === Model.currentUser) return false;

    const existing = Model.getChildren(postId).find(p => p.type === "challenge");
    return !existing;
  },

  canAnswer(postId) {
    const post = Model.getPost(postId);
    if (!post || post.type !== "challenge") return false;

    const dispute = Model.disputes.find(d => d.postId === postId);
    if (!dispute) return false;

    if (dispute.turn !== Model.currentUser) return false;

    const existing = Model.getChildren(postId).find(p => p.type === "answer" && p.user === Model.currentUser);
    return !existing;
  },

  advanceTurn(postId) {
    const dispute = Model.disputes.find(d => d.postId === postId);
    dispute.turn = dispute.users.find(u => u !== Model.currentUser);
  },

  openDispute(postId) {
    this.stack.push(postId);
    View.renderDispute(postId);
  },

  back() {
    this.stack.pop();
    if (this.stack.length === 0) {
      View.renderHome();
    } else {
      View.renderDispute(this.stack[this.stack.length - 1]);
    }
  },

  currentDisputeId() {
    return this.stack[this.stack.length - 1];
  }
};

/* ===================== VIEW ===================== */

const View = {
  renderUsers() {
    const el = document.getElementById("users");
    el.innerHTML = "";
    Model.users.forEach(u => {
      const btn = document.createElement("button");
      btn.innerText = u;
      if (u === Model.currentUser) btn.style.borderColor = "var(--accent)";
      btn.onclick = () => {
        Model.currentUser = u;
        this.renderHome();
      };
      el.appendChild(btn);
    });
  },

  renderHome() {
    document.getElementById("homeView").style.display = "block";
    document.getElementById("disputeView").style.display = "none";

    this.renderUsers();

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    Model.posts
      .filter(p => p.type === "assertion")
      .forEach(p => {
        const div = document.createElement("div");
        div.className = "card";

        const hasDispute = Model.disputes.find(d => d.postId === p.id);
        const yourTurn = hasDispute && hasDispute.turn === Model.currentUser;

        div.innerHTML = `
          <div><span class="icon">!</span>${p.content}
            ${yourTurn ? '<span class="badge">Your turn</span>' : ''}
          </div>
          <button onclick="Controller.openDispute('${p.id}')">
            ${hasDispute ? "Open" : "View"}
          </button>
        `;

        if (!hasDispute) div.classList.add("terminal");

        feed.appendChild(div);
      });
  },

  renderDispute(postId) {
    document.getElementById("homeView").style.display = "none";
    document.getElementById("disputeView").style.display = "block";

    const lineage = document.getElementById("lineage");
    lineage.innerHTML = "";

    let current = Model.getPost(postId);
    const chain = [];

    while (current) {
      chain.unshift(current);
      current = Model.getPost(current.parentId);
    }

    lineage.innerHTML = chain.map(p => {
      const icon = p.type === "assertion" ? "!" : p.type === "challenge" ? "?" : "✓";
      return `<span>${icon} ${p.content}</span>`;
    }).join(" → ");

    const thread = document.getElementById("thread");
    thread.innerHTML = "";

    const children = Model.getChildren(postId);

    children.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      const canChallenge = Controller.canChallenge(p.id);
      const canAnswer = Controller.canAnswer(p.id);

      div.innerHTML = `
        <div class="topline">${p.user}</div>
        <div>
          <span class="icon">${p.type === "challenge" ? "?" : "✓"}</span>
          ${p.content}
        </div>

        <div class="row">
          <button ${canChallenge ? "" : "disabled"} onclick="Controller.challenge('${p.id}')">Challenge</button>
          <button ${canAnswer ? "" : "disabled"} onclick="Controller.answer('${p.id}','Yes')">Yes</button>
          <button ${canAnswer ? "" : "disabled"} onclick="Controller.answer('${p.id}','No')">No</button>
        </div>
      `;

      if (canChallenge || canAnswer) {
        div.classList.add("highlight");
      }

      thread.appendChild(div);
    });
  }
};

/* ===================== INIT ===================== */

// seed data
Model.createPost("assertion", "God exists.");
Model.createPost("assertion", "AI is spiritually dangerous.");

View.renderHome();

</script>

</body>
</html>
