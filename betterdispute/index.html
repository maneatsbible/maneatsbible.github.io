<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Better Dispute v7</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

.header {
  position: sticky;
  top: 0;
  background: #0f0f10;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.topRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.left {
  display: flex;
  gap: 8px;
  align-items: center;
}

.home { cursor: pointer; font-size: 18px; }

.right { font-size: 11px; opacity: 0.6; }

.userBar {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}

.userBar button.active { background: #3a6df0; }

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.message { font-size: 15px; }
.meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary { background: #3a6df0; }

.chainPreview {
  margin-top: 8px;
  padding: 8px;
  background: #141416;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

.turn {
  margin-bottom: 8px;
  padding: 10px;
  border-radius: 8px;
}

.question { background: #2c2c2f; }
.answer { background: #1f3a2c; }
.you { outline: 1.5px solid #3a6df0; }

.status {
  font-size: 12px;
  margin-top: 6px;
  opacity: 0.85;
}

.tailBox {
  margin-top: 10px;
  padding: 10px;
  background: #141416;
  border-radius: 8px;
}

.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  padding: 10px;
  border-top: 1px solid #222;
}

textarea {
  width: 100%;
  min-height: 78px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  resize: none;
  outline: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="topRow">
    <div class="left">
      <div class="home" onclick="goHome()">⚖️</div>
      <div>Better Dispute</div>
    </div>
    <div class="right">v7</div>
  </div>

  <div class="userBar">
    <button id="u-alice" onclick="switchUser('alice')">Alice</button>
    <button id="u-bob" onclick="switchUser('bob')">Bob</button>
    <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
  </div>
</div>

<div class="container" id="feed"></div>
<div class="container hidden" id="threadView"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

let posts = [
  {
    id: 1,
    user: "alice",
    text: "Faith alone is sufficient for salvation.",
    chains: []
  }
];

// SAMPLE CHAIN
posts[0].chains.push({
  id: 101,
  user_a: "alice",
  user_b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ],
  turn_state: "question",
  active_user: "bob",
  status: "active",
  last_action: Date.now()
});

// STATE
let activePost = null;
let activeChain = null;

// SWITCH USER
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  renderFeed();
  if (activeChain) renderThread();
}

// NAV
function goHome() {
  activePost = null;
  activeChain = null;
  document.getElementById("feed").classList.remove("hidden");
  document.getElementById("threadView").classList.add("hidden");
  hideInput();
}

// DRILL INTO POST (NEW REQUIREMENT)
function openPost(postId) {
  activePost = posts.find(p => p.id === postId);

  document.getElementById("feed").classList.add("hidden");
  document.getElementById("threadView").classList.remove("hidden");

  activeChain = null;
  renderThread();
}

// START DISPUTE
function startChallenge(postId, targetUser) {
  const post = posts.find(p => p.id === postId);

  if (targetUser === currentUser) return;

  const chain = {
    id: Date.now(),
    user_a: targetUser,
    user_b: currentUser,
    turns: [],
    turn_state: "question",
    active_user: currentUser,
    status: "active",
    last_action: Date.now()
  };

  post.chains.push(chain);

  activeChain = chain;
  activePost = post;

  document.getElementById("feed").classList.add("hidden");
  document.getElementById("threadView").classList.remove("hidden");

  renderThread();
}

// FEED
function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(post => {
    const self = post.user === currentUser;

    let html = `
      <div class="card">
        <div class="message" onclick="openPost(${post.id})">${post.text}</div>
        <div class="meta">@${post.user}</div>

        <div class="actions">
          <button class="primary"
            ${self ? 'disabled' : `onclick="startChallenge(${post.id}, '${post.user}')"`}>
            Challenge
          </button>
        </div>
    `;

    post.chains.forEach(chain => {
      html += `
        <div class="chainPreview" onclick="openPost(${post.id})">
          ${chain.turns.map(t => `${t.type[0].toUpperCase()}: ${t.text}`).join(" → ")}
        </div>
      `;
    });

    html += `</div>`;
    feed.innerHTML += html;
  });
}

// THREAD VIEW (POST + ALL CHAINS)
function renderThread() {
  const view = document.getElementById("threadView");

  let html = "";

  if (!activePost) {
    view.innerHTML = "";
    return;
  }

  html += `
    <div class="card">
      <div class="message">${activePost.text}</div>
      <div class="meta">@${activePost.user}</div>
    </div>
  `;

  activePost.chains.forEach(chain => {
    html += `<div class="card">`;

    chain.turns.forEach(t => {
      html += `
        <div class="turn ${t.type}">
          ${t.text}
          <div class="meta">@${t.user}</div>
        </div>
      `;
    });

    html += `
      <div class="actions">
        <button class="primary"
          ${chain.user_a === currentUser || chain.user_b === currentUser ? 'disabled' : '' }
          onclick="startChallenge(${activePost.id}, '${chain.user_a === currentUser ? chain.user_b : chain.user_a}')">
          Challenge This
        </button>
      </div>
    `;

    html += `</div>`;
  });

  view.innerHTML = html;
}

// INPUT (FIXED UX)
const input = document.getElementById("input");

function submitTurn() {
  if (!activeChain) return;
  if (activeChain.active_user !== currentUser) return;
  if (!input.value.trim()) return;

  activeChain.turns.push({
    type: activeChain.turn_state,
    user: currentUser,
    text: input.value.trim()
  });

  activeChain.last_action = Date.now();

  activeChain.turn_state =
    activeChain.turn_state === "question" ? "answer" : "question";

  activeChain.active_user =
    currentUser === activeChain.user_a
      ? activeChain.user_b
      : activeChain.user_a;

  input.value = "";

  // FIX: prevents zoom/focus loop issues
  document.activeElement.blur();

  renderThread();
}

function hideInput() {
  document.getElementById("inputBar").classList.add("hidden");
}

// INIT
switchUser(currentUser);
renderFeed();
</script>

</body>
</html>
