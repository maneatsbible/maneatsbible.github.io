<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Better Dispute v11</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.home {
  cursor: pointer;
  font-size: 18px;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button.active {
  background: #3a6df0;
}

/* LAYOUT */
.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

/* SUMMARY CARD (HOME ONLY) */
.summary {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 10px;
  cursor: pointer;
}

.summary small {
  display: block;
  opacity: 0.6;
  margin-top: 4px;
}

.actions {
  margin-top: 8px;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary {
  background: #3a6df0;
}

/* FOCUS MODE */
.focus {
  display: none;
}

.focus.active {
  display: block;
}

.homeView {
  display: block;
}

.homeView.hidden {
  display: none;
}

/* TURN DISPLAY */
.turn {
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 8px;
  background: #141416;
}

.turn.q { background: #2c2c2f; }
.turn.a { background: #1f3a2c; }

/* INPUT */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  border-top: 1px solid #222;
  padding: 10px;
}

textarea {
  width: 100%;
  min-height: 80px;
  font-size: 16px;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  background: #1a1a1c;
  color: #fff;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div class="home" onclick="goHome()">⚖️ Better Dispute</div>
  <div class="right">v11</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container homeView" id="home"></div>

<div class="container focus" id="focus"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] },
  { id: 2, user: "charlie", text: "AI will replace most jobs.", chains: [] }
];

// SAMPLE CHAIN
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ],
  active_user: "bob",
  turn_state: "question"
});

// STATE
let activePost = null;
let activeChain = null;

// TRACK USER PARTICIPATION (CRITICAL FIX FOR CHALLENGE RULE)
let userParticipation = {}; // key: postId -> true if user started chain

// SWITCH USER
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  renderHome();
}

// HOME ONLY VIEW
function goHome() {
  activePost = null;
  activeChain = null;
  hideInput();

  document.getElementById("home").classList.remove("hidden");
  document.getElementById("focus").classList.remove("active");

  renderHome();
}

// CHALLENGE RULE FIXED
function canChallenge(post) {
  if (post.user === currentUser) return false;
  return !userParticipation[post.id + ":" + currentUser];
}

// CREATE CHALLENGE
function challenge(post) {
  const chain = {
    id: Date.now(),
    a: post.user,
    b: currentUser,
    turns: [],
    active_user: currentUser,
    turn_state: "question"
  };

  post.chains.push(chain);

  userParticipation[post.id + ":" + currentUser] = true;

  openFocus(post, chain);
}

// DRILL FIXED (CRITICAL)
function openFocus(post, chain) {
  activePost = post;
  activeChain = chain;

  document.getElementById("home").classList.add("hidden");
  document.getElementById("focus").classList.add("active");

  renderFocus();
  updateInput();
}

// SUMMARY (BRIEF + SCALABLE)
function summarize(chain) {
  return chain.turns
    .slice(-3)
    .map(t => (t.type === "question" ? "Q" : "A") + ": " + t.text)
    .join(" → ") || "New dispute";
}

// HOME RENDER (SUMMARIES ONLY)
function renderHome() {
  const home = document.getElementById("home");

  let html = "";

  posts.forEach(post => {
    html += `
      <div class="summary">
        <div><b>${post.text}</b></div>
        <small>@${post.user}</small>
    `;

    if (canChallenge(post)) {
      html += `<div class="actions"><button class="primary" onclick="challenge(posts.find(p=>p.id===${post.id}))">Challenge</button></div>`;
    }

    post.chains.forEach(chain => {
      html += `
        <div class="summary" onclick="openFocus(posts.find(p=>p.id===${post.id}), posts.find(p=>p.id===${post.id}).chains.find(c=>c.id===${chain.id}))">
          ${summarize(chain)}
          <small>tap to enter dispute</small>
        </div>
      `;
    });

    html += `</div>`;
  });

  home.innerHTML = html;
}

// FOCUS VIEW
function renderFocus() {
  const focus = document.getElementById("focus");

  let html = `
    <div class="summary">
      <b>${activePost.text}</b>
      <small>@${activePost.user}</small>
    </div>
  `;

  activeChain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type === "question" ? "q" : "a"}">
        ${t.text}
        <small>@${t.user}</small>
      </div>
    `;
  });

  focus.innerHTML = html;
}

// INPUT RULE (STRICT)
function updateInput() {
  const bar = document.getElementById("inputBar");
  const input = document.getElementById("input");

  if (activeChain && activeChain.active_user === currentUser) {
    bar.classList.remove("hidden");

    input.placeholder =
      activeChain.turn_state === "question"
        ? "Ask a question..."
        : "Answer directly...";

    input.onkeydown = (e) => {
      if (e.key !== "Enter") return;
      if (!input.value.trim()) return;
      if (activeChain.active_user !== currentUser) return;

      activeChain.turns.push({
        type: activeChain.turn_state,
        user: currentUser,
        text: input.value.trim()
      });

      activeChain.turn_state =
        activeChain.turn_state === "question" ? "answer" : "question";

      activeChain.active_user =
        currentUser === activeChain.a ? activeChain.b : activeChain.a;

      input.value = "";
      renderFocus();
      updateInput();
    };

  } else {
    bar.classList.add("hidden");
  }
}

// INIT
switchUser(currentUser);
renderHome();
</script>

</body>
</html>
