<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}
header{display:flex;justify-content:space-between;padding:10px}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:80px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.answer{
  margin-top:6px;
  padding-left:10px;
  border-left:2px solid #4caf50;
}

.turn{font-size:11px;color:#aaa;margin-top:4px}

.resolve{
  font-size:11px;
  color:#4caf50;
  cursor:pointer;
  margin-top:6px;
}

.chatToggle{
  font-size:11px;
  color:#888;
  cursor:pointer;
  margin-top:6px;
}

.chatbox{
  display:none;
  margin-top:6px;
  padding:6px;
  background:#101010;
  border:1px solid #333;
}

.chatbox.open{display:block}

.log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v35</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="create()">Proclaim</button>

<div id="feed"></div>

<div class="log" id="log"></div>

<script>

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

/* flat state maps (no nesting in render path) */
let reactions={};   // key: user|node -> up/down
let resolved={};    // key: node -> true
let chats={};       // node -> [msg]

let logData=[];

/* logging */
function log(e,d){
  logData.push({t:Date.now(),u:currentUser,e,d});
}

/* helpers */
function key(u,id){return u+"|"+id;}
function find(i){return items.find(x=>x.id===i);}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* create */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:"left"
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* react */
function react(id,dir){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  if(resolved[id]) return;

  const k=key(currentUser,id);

  if(reactions[k]){
    if(reactions[k]===dir) return;
    if(reactions[k]!==dir) return; // no flip-flop allowed
  }

  reactions[k]=dir;
  log(dir,id);
  render();
}

/* resolve */
function resolve(id){
  resolved[id]=true;
  log("resolve",id);
  render();
}

/* chat */
function toggleChat(id){
  const box=document.getElementById("chat-"+id);
  box.classList.toggle("open");
}

function sendChat(id){
  const input=document.getElementById("c-"+id);
  const v=input.value.trim();
  if(!v) return;

  chats[id]=chats[id]||[];
  chats[id].push({u:currentUser,m:v});

  input.value="";
  render();
}

/* render node */
function renderNode(node){

  const children = items.filter(x=>x.parent===node.id);

  const left = children.filter(c=>c.side==="left");
  const right = children.filter(c=>c.side==="right");

  const myUp = reactions[key(currentUser,node.id)]==="up";
  const myDown = reactions[key(currentUser,node.id)]==="down";

  return `
  <div class="card">

    <div>${node.text} <span class="meta">@${node.user}</span></div>

    <div class="actions">
      <span class="icon ${myUp?'active':'dim'}" onclick="react(${node.id},'up')">👍</span>
      <span class="icon ${myDown?'active':'dim'}" onclick="react(${node.id},'down')">👎</span>
    </div>

    ${resolved[node.id]?`<div class="resolve">resolved ✓</div>`:`<div class="resolve" onclick="resolve(${node.id})">resolve</div>`}

    <div class="chatToggle" onclick="toggleChat(${node.id})">💬 chat</div>

    <div class="chatbox" id="chat-${node.id}">
      ${(chats[node.id]||[]).map(c=>`<div><b>${c.u}</b>: ${c.m}</div>`).join("")}
      <input id="c-${node.id}" style="width:100%;margin-top:6px;background:#0b0b0b;color:#eee;border:1px solid #333">
      <button onclick="sendChat(${node.id})">send</button>
    </div>

    <div class="dispute">

      <div class="lane">
        ${left.map(renderNode).join("")}
      </div>

      <div class="lane">
        ${right.map(renderNode).join("")}
      </div>

    </div>

  </div>
  `;
}

/* render */
function render(){
  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null).forEach(n=>{
    feed.innerHTML += renderNode(n);
  });

  const l=document.getElementById("log");
  l.innerHTML=logData.slice(-200).reverse().map(x=>JSON.stringify(x)).join("<br>");
}

/* init */
renderUsers();

/* test data (expanded + branching) */
items.push({id:id++,text:"Truth is structured",user:"alice",parent:null,side:"left"});
items.push({id:id++,text:"Truth is contextual",user:"bob",parent:0,side:"right"});
items.push({id:id++,text:"Structure implies hierarchy",user:"charlie",parent:0,side:"right"});
items.push({id:id++,text:"Context depends on structure",user:"alice",parent:2,side:"left"});
items.push({id:id++,text:"Then structure is unstable",user:"bob",parent:3,side:"right"});
items.push({id:id++,text:"Instability can still be mapped",user:"charlie",parent:4,side:"left"});

render();

</script>

</body>
</html>
