<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35.1</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
}

button{cursor:pointer}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.rootItem{
  margin:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.nav{
  padding:10px;
  color:#4caf50;
  cursor:pointer;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:120px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  position:relative;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

/* chat */
.chatBtn{
  font-size:11px;
  color:#888;
  cursor:pointer;
  margin-top:6px;
}

.chatBox{
  display:none;
  margin-top:6px;
  padding:6px;
  background:#101010;
  border:1px solid #333;
}

.chatBox.open{display:block}

.smallInput{
  width:100%;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  margin-top:4px;
}

/* log */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>
    <button onclick="home()">🏠 Home</button>
    Better Dispute v35.1
  </div>
</header>

<div id="users"></div>

<!-- composer (hidden in drill mode) -->
<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>
<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana"];
let currentUser="alice";

let id=0;
let items=[];

/* state */
let stack=[]; // drill path

let reactions={};   // key=user|node
let chat={};        // node -> messages
let logs=[];

function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}

function key(u,id){return u+"|"+id;}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* home */
function home(){
  stack=[];
  render();
}

/* create */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null,
    resolved:false
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* navigation */
function enter(id){
  stack.push(id);
  render();
}

function back(){
  stack.pop();
  render();
}

/* reactions (LOCKED: no flipping) */
function react(id,type){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);

  if(reactions[k]) return; // cannot change twice

  reactions[k]=type;
  log(type,id);
  render();
}

/* chat */
function toggleChat(id){
  const el=document.getElementById("chat_"+id);
  el.classList.toggle("open");
}

function sendChat(id){
  const input=document.getElementById("c_"+id);
  const v=input.value.trim();
  if(!v) return;

  chat[id]=chat[id]||[];
  chat[id].push({u:currentUser,m:v});

  input.value="";
  render();
}

/* render node (NO nesting UI) */
function renderNode(node){

  const r = reactions[key(currentUser,node.id)];

  return `
    <div class="card">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${node.user!==currentUser ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${r==='down'?'active':'dim'}" onclick="react(${node.id},'down')">👎</span>
        </div>
      `:""}

      <div class="chatBtn" onclick="toggleChat(${node.id})">💬 chat</div>

      <div class="chatBox" id="chat_${node.id}">
        ${(chat[node.id]||[]).map(c=>`<div><b>${c.u}</b>: ${c.m}</div>`).join("")}
        <input id="c_${node.id}" class="smallInput">
        <button onclick="sendChat(${node.id})">send</button>
      </div>

      <div style="margin-top:6px;color:#4caf50;cursor:pointer;font-size:12px"
           onclick="enter(${node.id})">
        open dispute →
      </div>

    </div>
  `;
}

/* render dispute view */
function renderDispute(node){

  const children = items.filter(x=>x.parent===node.id);

  const left = children.filter(c=>c.side==="left");
  const right = children.filter(c=>c.side==="right");

  return `
    <div>

      <!-- TOP: disputed statement -->
      <div class="card" style="border:1px solid #333">
        <div>${node.text} <span class="meta">@${node.user}</span></div>
      </div>

      <!-- 2 lanes -->
      <div class="dispute">

        <div class="lane">
          ${left.map(renderNode).join("")}
        </div>

        <div class="lane">
          ${right.map(renderNode).join("")}
        </div>

      </div>

    </div>
  `;
}

/* main render */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");
  const comp=document.getElementById("composerWrap");

  view.innerHTML="";
  nav.innerHTML="";

  /* hide composer in drill mode */
  comp.style.display = stack.length ? "none" : "block";

  if(stack.length===0){

    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML += `
        <div class="rootItem" onclick="enter(${n.id})">
          ${n.text} <span class="meta">@${n.user}</span>
        </div>
      `;
    });

  } else {

    const current = find(stack[stack.length-1]);

    nav.innerHTML = `
      <div class="nav" onclick="back()">⬅ back</div>
    `;

    view.innerHTML = renderDispute(current);
  }

  /* log */
  const logEl=document.getElementById("log");
  logEl.innerHTML = logs.slice(-200).reverse()
    .map(l=>JSON.stringify(l)).join("<br>");
}

/* seed test data (expanded disputes) */

items.push({id:id++,text:"Truth depends on structure",user:"alice",parent:null});
items.push({id:id++,text:"Structure depends on perception",user:"bob",parent:0,side:"right"});
items.push({id:id++,text:"Perception is language-bound",user:"charlie",parent:1,side:"left"});
items.push({id:id++,text:"Language is social constraint",user:"dana",parent:2,side:"right"});
items.push({id:id++,text:"Constraints shape truth",user:"bob",parent:3,side:"left"});
items.push({id:id++,text:"Truth resists constraint",user:"alice",parent:4,side:"right"});
items.push({id:id++,text:"Resistance implies structure",user:"charlie",parent:5,side:"left"});
items.push({id:id++,text:"Structure implies hierarchy",user:"dana",parent:6,side:"right"});

renderUsers();
render();

</script>

</body>
</html>
