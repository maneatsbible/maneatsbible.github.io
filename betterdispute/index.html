<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0f0f0f; color:#eee; font-size:14px; }

.node {
  border-left:2px solid #333;
  margin-left:10px;
  padding-left:10px;
  margin-top:10px;
}

.card-node {
  padding:8px;
  border-radius:6px;
  margin-bottom:6px;
  background:#1b1b1b;
}

.meta { font-size:11px; color:#aaa; }

.chat {
  margin-left:12px;
  font-size:11px;
  color:#bbb;
  border-left:2px dashed #555;
  padding-left:6px;
}

button { font-size:11px!important; margin-right:3px; }

.resolved-supported {
  border-left:4px solid #3ddc84;
}

.resolved-rejected {
  border-left:4px solid #ff4d4d;
}

.resolved-unresolved {
  border-left:4px solid #666;
}

.badge {
  font-size:10px;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="container p-2">

<h5 class="text-center">⚖️ Better Dispute</h5>

<div class="small mb-2">
Users are actively disputing and resolving nodes based on votes.
</div>

<div id="root"></div>

</div>

<script>

//////////////////////
// DATA
//////////////////////

let id = 0;
let nodes = [];

let users = ["alice","bob","charlie"];
let currentUser = "alice";

function find(i){ return nodes.find(n=>n.id===i); }

function score(n){
  return (n.votes.agree.length - n.votes.disagree.length);
}

//////////////////////
// RESOLUTION ENGINE (DERIVED ONLY)
//////////////////////

function resolution(n){

  let s = score(n);

  if(s >= 3) return "supported";
  if(s <= -3) return "rejected";
  return "unresolved";
}

//////////////////////
// CREATE
//////////////////////

function create(text,type,parent=null){

  let n = {
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[],
    votes:{agree:[],disagree:[]},
    chat:[]
  };

  nodes.push(n);

  if(parent!==null){
    let p = find(parent);
    if(p) p.children.push(n.id);
  }

  return n;
}

//////////////////////
// ACTIONS
//////////////////////

function interact(id){

  let mode = prompt("1 Proclaim\n2 Question\n3 Answer");

  if(mode==="1"){
    let t = prompt("Proclamation:");
    if(t) create(t,"proclamation",id);
  }

  if(mode==="2"){
    let t = prompt("Question:");
    if(t) create(t,"question",id);
  }

  if(mode==="3"){
    let t = prompt("Answer:");
    if(t) create(t,"answer",id);
  }

  render();
}

function voteAgree(id){
  let n = find(id);
  n.votes.disagree = n.votes.disagree.filter(u=>u!==currentUser);
  if(!n.votes.agree.includes(currentUser)) n.votes.agree.push(currentUser);
  render();
}

function voteDisagree(id){
  let n = find(id);
  n.votes.agree = n.votes.agree.filter(u=>u!==currentUser);
  if(!n.votes.disagree.includes(currentUser)) n.votes.disagree.push(currentUser);
  render();
}

function chat(id){
  let n = find(id);
  let t = prompt("Chat:");
  if(!t) return;
  n.chat.push({user:currentUser,text:t,time:Date.now()});
  render();
}

//////////////////////
// RENDER
//////////////////////

function render(){

  let el = document.getElementById("root");
  el.innerHTML="";

  nodes.filter(n=>n.parent===null)
       .forEach(n=>renderNode(n,el));
}

function renderNode(n,container){

  let div = document.createElement("div");

  let s = score(n);
  let r = resolution(n);

  let cls =
    r==="supported" ? "resolved-supported" :
    r==="rejected" ? "resolved-rejected" :
    "resolved-unresolved";

  div.className = "card-node "+cls;

  div.innerHTML = `
<b>${n.type.toUpperCase()}</b>: ${n.text}

<div class="meta">
@${n.user} | score: ${s}
</div>

<div class="badge">
Resolution: ${r.toUpperCase()}
</div>

<button onclick="interact(${n.id})">Interact</button>
<button onclick="voteAgree(${n.id})">👍</button>
<button onclick="voteDisagree(${n.id})">👎</button>
<button onclick="chat(${n.id})">Chat</button>
`;

  container.appendChild(div);

  n.chat.forEach(c=>{
    let d=document.createElement("div");
    d.className="chat";
    d.innerText=`${c.user}: ${c.text}`;
    container.appendChild(d);
  });

  let box=document.createElement("div");
  box.className="node";
  container.appendChild(box);

  n.children.map(find).filter(Boolean)
    .forEach(c=>renderNode(c,box));
}

//////////////////////
// INIT
//////////////////////

create("Root Dispute Node","proclamation",null);
render();

</script>

</body>
</html>
