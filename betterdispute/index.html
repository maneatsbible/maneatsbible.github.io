<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:12px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{
  opacity:1;
  border-color:#fff;
}

#composer{
  width:100%;
  height:70px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

.child{
  margin-left:10px;
  border-left:2px solid #333;
  padding-left:10px;
  margin-top:8px;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

#popup.open{display:flex}

.box{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
}

input{
  width:100%;
  margin-top:6px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
  border-radius:6px;
}

.row{
  display:flex;
  gap:6px;
  margin-top:10px;
}

/* LOG */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <div id="title"></div>

    <input id="challengeInput" placeholder="Ask (challenge)">
    <input id="counterInput" placeholder="Proclaim (counter)">

    <div class="row">
      <button onclick="submitChallenge()">Submit Challenge</button>
      <button onclick="submitCounter()">Submit Counter</button>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<script>

let VERSION=19;
document.getElementById("version").innerText=VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

let active=null;

/* LOG */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* HELP */
function find(i){return items.find(x=>x.id===i);}

function isOwner(item){
  return item.user===currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
      log("switch",u);
    };

    el.appendChild(d);
  });
}

/* CREATE */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* OPEN DISPUTE */
function openDispute(i){
  const item=find(i);
  if(!item || isOwner(item)) return;

  active=i;
  document.getElementById("popup").classList.add("open");

  document.getElementById("challengeInput").value="";
  document.getElementById("counterInput").value="";
}

/* CLOSE */
function closePopup(){
  active=null;
  document.getElementById("popup").classList.remove("open");
}

/* SUBMIT CHILDREN */
function submitChallenge(){
  const v=document.getElementById("challengeInput").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:active,
    type:"question"
  });

  closePopup();
  render();
  log("challenge",v);
}

function submitCounter(){
  const v=document.getElementById("counterInput").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:active,
    type:"proclaim"
  });

  closePopup();
  render();
  log("counter",v);
}

/* AGREE (NOT SHOWN FOR OWN ITEMS) */
function agree(i){
  const item=find(i);
  if(!item || isOwner(item)) return;
  log("agree",i);
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null)
  .forEach(r=>{

    const hideActions = isOwner(r); // HARD RULE

    const children = items.filter(x=>x.parent===r.id);

    let childHtml = children.map(c=>
      `<div class="child">${c.text} <span style="color:#888">@${c.user}</span></div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${r.text}</div>
        <div class="meta">@${r.user}</div>

        ${!hideActions ? `
        <div class="actions">
          <button onclick="agree(${r.id})">Agree</button>
          <button onclick="openDispute(${r.id})">Disagree</button>
        </div>
        ` : ""}

        ${childHtml}
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* TEST DATA */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null});
items.push({id:id++,text:"Some claims resist challenge",user:"bob",parent:null});

/* INIT */
renderUsers();
render();

</script>

</body>
</html>
