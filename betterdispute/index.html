<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

.container{
  max-width:700px;
}

/* TOP ACTION BAR (NEW FIX) */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
  padding:8px;
  background:#111;
  border-radius:8px;
  border:1px solid #333;
}

.version{
  font-size:11px;
  color:#888;
}

.card{
  background:#1b1b1b;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.meta{
  font-size:11px;
  color:#aaa;
}

button{
  font-size:11px !important;
  margin-right:4px;
}

/* TWO-LANE STRUCTURE */
.lanes{
  display:flex;
  gap:10px;
  margin-top:8px;
}

.lane{
  flex:1;
  background:#141414;
  padding:8px;
  border-radius:6px;
  min-height:40px;
}

.debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:140px;
  background:#0a0a0a;
  border-top:1px solid #333;
  overflow:auto;
  font-size:11px;
  color:#9f9;
  padding:6px;
}

.userbar{
  display:flex;
  gap:6px;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.user{
  border:1px solid #444;
  padding:3px 6px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
}

.active{
  background:#2a2a2a;
}
</style>
</head>

<body>

<div class="container py-3">

<!-- FIXED ENTRY POINT -->
<div class="topbar">
  <button class="btn btn-sm btn-primary" onclick="newProclamation()">+ Proclaim</button>
  <div>Better Dispute</div>
  <div class="version">v1.0.1</div>
</div>

<div class="userbar" id="users"></div>

<div id="feed"></div>

</div>

<div class="debug" id="debug"></div>

<!-- DISPUTE MODAL -->
<div id="modal" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
background:#222; padding:12px; border-radius:8px; width:90%; max-width:320px; z-index:999;">

<div><b>Dispute</b></div>

<select id="mode" class="form-control mb-2">
  <option value="proclaim">Proclamation</option>
  <option value="question">Question</option>
  <option value="answer">Answer</option>
</select>

<textarea id="text" class="form-control mb-2"></textarea>

<button class="btn btn-success btn-sm" onclick="submitDispute()">Submit</button>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>

</div>

<script>

//////////////////////
// VERSION + DEBUG
//////////////////////

const APP_VERSION="1.0.1";

function log(event,data){

  let el=document.getElementById("debug");

  let entry={
    time:Date.now(),
    version:APP_VERSION,
    user:currentUser,
    event,
    data
  };

  let div=document.createElement("div");
  div.innerText=JSON.stringify(entry);

  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

//////////////////////
// USERS (TEST MODE)
//////////////////////

let users=["alice","bob","charlie"];
let currentUser="alice";

function renderUsers(){
  let el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    let d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.innerText=u;

    d.onclick=()=>{
      currentUser=u;
      log("user_switch",{user:u});
      renderUsers();
    };

    el.appendChild(d);
  });
}

//////////////////////
// DATA MODEL
//////////////////////

let id=0;

let items=[];

function find(i){
  return items.find(x=>x.id===i);
}

//////////////////////
// PROCLAMATION ENTRY (FIXED + ALWAYS AVAILABLE)
//////////////////////

function newProclamation(){
  let t=prompt("Proclamation:");
  if(!t) return;

  create(t,"proclaim",null);
  log("proclaim_create",{text:t});
}

//////////////////////
// CREATE
//////////////////////

function create(text,type,parent=null){

  let item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    let p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",item);

  render();
}

//////////////////////
// ACTIONS
//////////////////////

let active=null;

function agree(id){
  log("agree",{id});
}

function disagree(id){
  active=id;
  document.getElementById("modal").style.display="block";
  log("disagree_open",{id});
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("text").value="";
}

function submitDispute(){

  let mode=document.getElementById("mode").value;
  let text=document.getElementById("text").value;

  if(!text) return;

  create(text,mode,active);

  log("fork",{from:active,mode,text});

  closeModal();
}

//////////////////////
// RENDER (TWO LANES PER ITEM)
//////////////////////

function render(){

  let feed=document.getElementById("feed");
  feed.innerHTML="";

  items
    .filter(x=>x.parent===null)
    .forEach(x=>renderItem(x,feed,0));
}

function renderItem(item,container,depth){

  let div=document.createElement("div");
  div.className="card";
  div.style.marginLeft=depth*10+"px";

  div.innerHTML=`
    <b>${item.type.toUpperCase()}</b>: ${item.text}
    <div class="meta">@${item.user}</div>

    <button class="btn btn-sm btn-success" onclick="agree(${item.id})">Agree</button>
    <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})">Disagree</button>
  `;

  container.appendChild(div);

  // lanes under each item
  let lanes=document.createElement("div");
  lanes.className="lanes";

  let left=document.createElement("div");
  left.className="lane";
  left.innerHTML="<b>Continuing</b>";

  let right=document.createElement("div");
  right.className="lane";
  right.innerHTML="<b>Disputed</b>";

  lanes.appendChild(left);
  lanes.appendChild(right);
  container.appendChild(lanes);

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>{
      if(c.type==="proclaim") left.appendChild(mini(c));
      else right.appendChild(mini(c));
    });
}

function mini(item){

  let div=document.createElement("div");
  div.className="card";
  div.style.marginLeft="5px";

  div.innerHTML=`
    <b>${item.type.toUpperCase()}</b>: ${item.text}
    <div class="meta">@${item.user}</div>

    <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})">Disagree</button>
  `;

  return div;
}

//////////////////////
// INIT
//////////////////////

renderUsers();
render();

</script>

</body>
</html>
