<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#0f0f0f;
  color:#eee;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

.version{
  font-size:11px;
  color:#777;
}

/* USER SWITCHER */
#users{
  display:flex;
  gap:6px;
  padding:8px;
  flex-wrap:wrap;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:12px;
  font-size:12px;
  cursor:pointer;
}

.active{
  background:#2a2a2a;
}

/* FEED */
#feed{
  padding:10px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{
  font-weight:600;
  font-size:15px;
}

.meta{
  font-size:11px;
  color:#888;
  margin-top:3px;
}

.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  border-radius:8px;
  padding:6px 8px;
  font-size:12px;
}

/* COMPOSER */
#composer{
  width:100%;
  height:80px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
  margin:10px 0;
}

/* BROWSE PANEL */
#browse{
  display:none;
  padding:10px;
  border-top:1px solid #222;
  background:#0c0c0c;
}

.small{
  font-size:12px;
  color:#aaa;
}

/* LOG */
#log{
  display:none;
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:200px;
  overflow:auto;
}

/* TOP CONTROLS */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:8px 10px;
}

.toggle{
  font-size:12px;
  cursor:pointer;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version">v3.0.0</div>
</header>

<div id="users"></div>

<div class="topbar">
  <div class="toggle" onclick="toggleBrowse()">Browse</div>
  <div class="toggle" onclick="toggleLog()">Log</div>
</div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()" style="margin:0 10px 10px 10px;">Proclaim</button>

<div id="feed"></div>

<div id="browse"></div>

<div id="log"></div>

<script>

//////////////////////
// STATE
//////////////////////

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

const VERSION="3.0.0";

//////////////////////
// USER SWITCH UI STATE SHIFT
//////////////////////

function theme(){
  document.body.style.background =
    currentUser==="alice" ? "#0f0f0f" :
    currentUser==="bob" ? "#101018" :
    "#0e1115";
}

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.innerText=u;

    d.onclick=()=>{
      currentUser=u;
      theme();
      log("switch",{user:u});
      render();
      renderBrowse();
    };

    el.appendChild(d);
  });
}

//////////////////////
// CORE DATA
//////////////////////

function find(i){
  return items.find(x=>x.id===i);
}

function create(text,type,parent=null){
  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    const p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",item);
  render();
  renderBrowse();
}

function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  create(t,"proclaim",null);
  document.getElementById("composer").value="";
}

//////////////////////
// ACTION FILTERING (CORE UX ENGINE)
//////////////////////

function actionable(item){
  if(item.user===currentUser) return false;
  return true;
}

function unansweredQuestions(){
  return items.filter(x=>x.type==="question" && x.user!==currentUser);
}

function topStatements(){
  return items.filter(x=>x.parent===null && x.user!==currentUser);
}

//////////////////////
// ACTIONS
//////////////////////

function agree(id){
  const i=find(id);
  if(i.user===currentUser) return;
  log("agree",{id});
}

function disagree(id){
  const i=find(id);
  if(i.user===currentUser) return;

  create("Counter: "+i.text,"proclaim",id);
}

//////////////////////
// MAIN FEED (ACTION QUEUE)
//////////////////////

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  const queue=[
    ...unansweredQuestions(),
    ...topStatements()
  ];

  queue.forEach(item=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="text">${item.text}</div>
      <div class="meta">${item.type.toUpperCase()} · @${item.user}</div>

      <div class="actions">
        <button onclick="agree(${item.id})">Agree</button>
        <button onclick="disagree(${item.id})">Disagree</button>
      </div>
    `;

    feed.appendChild(div);
  });
}

//////////////////////
// BROWSE (FULL TREE)
//////////////////////

function renderBrowse(){
  const b=document.getElementById("browse");
  b.innerHTML="";

  items.filter(x=>x.parent===null).forEach(root=>{
    const d=document.createElement("div");
    d.className="card small";

    d.innerText=`${root.type.toUpperCase()}: ${root.text} (${root.user})`;

    b.appendChild(d);
  });
}

function toggleBrowse(){
  const b=document.getElementById("browse");
  b.style.display = b.style.display==="block"?"none":"block";
}

function toggleLog(){
  const l=document.getElementById("log");
  l.style.display = l.style.display==="block"?"none":"block";
}

//////////////////////
// LOG
//////////////////////

function log(event,data){
  const el=document.getElementById("log");

  const div=document.createElement("div");
  div.innerText=JSON.stringify({
    time:Date.now(),
    v:VERSION,
    user:currentUser,
    event,
    data
  });

  el.appendChild(div);
}

//////////////////////
// INIT
//////////////////////

renderUsers();
theme();

/* SEED DATA */
create("Existence requires interpretation","proclaim",null);
create("Is interpretation always subjective?","question",0);
create("Only when context is incomplete","proclaim",1);

render();

</script>

</body>
</html>
