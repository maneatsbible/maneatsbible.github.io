<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35.4</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.homeBtn{
  background:#1f1f1f;
  border:1px solid #333;
  color:#eee;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.rootItem{
  margin:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
  position:relative;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

/* popup */
#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:10;
}

#popup textarea{
  height:70px;
}

/* sidebar chat */
#sidebar{
  position:fixed;
  right:0;
  top:0;
  width:240px;
  height:100%;
  background:#0c0c0c;
  border-left:1px solid #333;
  padding:10px;
  display:none;
}

.chatMsg{font-size:12px;margin-bottom:4px}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button class="homeBtn" onclick="home()">🏠 Home</button>
  <div>Better Dispute v35.4</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup">
  <div>Dispute</div>
  <textarea id="counter" placeholder="Counter (optional)"></textarea>
  <textarea id="challenge" placeholder="Challenge (optional)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="sidebar"></div>

<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let logs=[];
let activeDisputeNode=null;
let chat={};

function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* home */
function home(){
  stack=[];
  render();
}

/* create */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null,side:null});
  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* nav */
function enter(i){stack.push(i);render();}
function back(){stack.pop();render();}

/* reactions (FIXED: always show for non-owner) */
function react(id,type){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  reactions[k]=type;
  log(type,id);
  render();
}

/* popup */
function openDispute(id){
  activeDisputeNode=id;
  document.getElementById("popup").style.display="block";
}

function closePopup(){
  activeDisputeNode=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){
  const c=document.getElementById("counter").value.trim();
  const q=document.getElementById("challenge").value.trim();

  if(c){
    items.push({id:id++,text:c,user:currentUser,parent:activeDisputeNode,side:"right"});
  }
  if(q){
    items.push({id:id++,text:q,user:currentUser,parent:activeDisputeNode,side:"left"});
  }

  document.getElementById("counter").value="";
  document.getElementById("challenge").value="";
  closePopup();

  log("dispute",activeDisputeNode);
  render();
}

/* sidebar */
function toggleChat(id){
  const s=document.getElementById("sidebar");
  s.style.display="block";

  chat[id]=chat[id]||[];
  renderSidebar(id);
}

function renderSidebar(id){
  const s=document.getElementById("sidebar");
  const msgs=chat[id]||[];

  s.innerHTML=`
    <div>Chat</div>
    ${msgs.map(m=>`<div class="chatMsg"><b>${m.u}</b>: ${m.m}</div>`).join("")}
    <input id="chatIn">
    <button onclick="sendChat(${id})">send</button>
  `;
}

function sendChat(id){
  const v=document.getElementById("chatIn").value.trim();
  if(!v) return;

  chat[id].push({u:currentUser,m:v});
  renderSidebar(id);
}

/* node */
function renderNode(node,showActions){

  const r=reactions[key(currentUser,node.id)];

  return `
    <div class="card" onclick="enter(${node.id})">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${node.user!==currentUser && showActions ? `
        <div>
          <span class="icon ${r==='up'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'down')">👎</span>

          <span class="icon" onclick="event.stopPropagation();openDispute(${node.id})">⚖</span>
          <span class="icon" onclick="event.stopPropagation();toggleChat(${node.id})">💬</span>
        </div>
      `:""}

    </div>
  `;
}

/* dispute view */
function renderDispute(node){

  const children=items.filter(x=>x.parent===node.id);
  const forked=children.some(c=>c.side);

  const header=`<div class="card" style="border:1px solid #333">
    ${node.text} <span class="meta">@${node.user}</span>
  </div>`;

  if(!forked){
    return `
      <div>
        ${header}
        <div>${children.map(c=>renderNode(c,true)).join("")}</div>
      </div>
    `;
  }

  const left=children.filter(c=>c.side==="left");
  const right=children.filter(c=>c.side==="right");

  return `
    <div>
      ${header}
      <div class="dispute">
        <div class="lane">${left.map(c=>renderNode(c,true)).join("")}</div>
        <div class="lane">${right.map(c=>renderNode(c,true)).join("")}</div>
      </div>
    </div>
  `;
}

/* render */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");
  const comp=document.getElementById("composerWrap");

  comp.style.display = stack.length ? "none" : "block";

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML+=renderNode(n,true);
    });
  } else {
    const cur=find(stack[stack.length-1]);
    nav.innerHTML=`<button onclick="back()">⬅ back</button>`;
    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).reverse().map(l=>JSON.stringify(l)).join("<br>");
}

/* ===== FIXED TEST DATA ===== */

/* roots (many valid independent proclamations) */
items.push({id:id++,text:"Truth exists independently of belief",user:"alice",parent:null});
items.push({id:id++,text:"Reality is socially mediated",user:"bob",parent:null});
items.push({id:id++,text:"Logic is context-dependent",user:"charlie",parent:null});
items.push({id:id++,text:"Knowledge evolves over time",user:"dana",parent:null});
items.push({id:id++,text:"Some questions are unanswerable",user:"eve",parent:null});
items.push({id:id++,text:"Meaning is constructed",user:"bob",parent:null});

/* VALID QUESTION (NOT OWNED BY ALICE NOW FIXED) */
items.push({id:id++,text:"What grounds truth?",user:"bob",parent:0,side:"left"});

/* ANSWER UNDER QUESTION */
items.push({id:id++,text:"Shared observation framework",user:"charlie",parent:6,side:null});

/* DISPUTE BRANCH */
items.push({id:id++,text:"Truth depends on consensus",user:"bob",parent:1,side:"right"});
items.push({id:id++,text:"Consensus can be wrong",user:"alice",parent:8,side:"left"});
items.push({id:id++,text:"Wrong consensus persists socially",user:"charlie",parent:9,side:"right"});

/* deeper chain */
items.push({id:id++,text:"Persistence ≠ truth",user:"dana",parent:10,side:"left"});

/* unchallenged roots remain intentionally large */

renderUsers();
render();

</script>

</body>
</html>
