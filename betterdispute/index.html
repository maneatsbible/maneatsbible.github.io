<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v53</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#title{font-weight:600}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  opacity:.6;
  cursor:pointer;
}
.user.active{opacity:1;border-color:#fff}

#composerWrap{padding:10px}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
  border-radius:6px;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

/* ICONS */
.icon{margin-right:6px}

/* LANES */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* NAV */
#nav{padding:0 10px}

#backBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

/* LOG */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">Better Dispute v53</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a proclamation..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup" style="display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#111;border:1px solid #333;padding:10px;width:320px;z-index:20;">
  <div>Dispute</div>
  <textarea id="challenge" placeholder="Question"></textarea>
  <textarea id="counter" placeholder="Counter"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="log"></div>

<script>

/* ---------------- STATE ---------------- */
let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let logs=[];
let openQuestions={};

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

function enter(id){
  stack.push(id);
  document.getElementById("composerWrap").style.display="none";
  render();
}

function back(){
  if(stack.length>1) stack.pop();
  else {
    stack=[];
    document.getElementById("composerWrap").style.display="block";
  }
  render();
}

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    type:"proclaim"
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- DISPUTE ---------------- */
function submitDispute(){

  const target=stack[stack.length-1];
  const parentNode=find(target);
  if(!parentNode) return;

  const participants=[parentNode.user,currentUser];

  const q=document.getElementById("challenge").value.trim();
  const c=document.getElementById("counter").value.trim();

  if(q){
    const qid=id++;
    items.push({
      id:qid,
      text:q,
      user:currentUser,
      parent:target,
      type:"question",
      lane:"left",
      participants
    });
    openQuestions[qid]=parentNode.user;
  }

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      type:"proclaim",
      lane:"right",
      participants
    });
  }

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";

  log("dispute",target);
  closePopup();
  render();
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

/* ---------------- ANSWER ---------------- */
function answer(qid){

  const q=find(qid);
  if(!q || q.answerBy) return;

  const expected=openQuestions[qid];
  if(currentUser!==expected){
    alert("Only the targeted user can answer.");
    return;
  }

  const t=prompt("Answer:");
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:qid,
    type:"answer",
    lane:"left",
    participants:q.participants
  });

  q.answerBy=currentUser;
  delete openQuestions[qid];

  log("answer",qid);
  render();
}

/* ---------------- BUILD LANES ---------------- */
function buildLane(rootId, lane){

  const out=[];

  function walk(parentId){

    const children=items.filter(x=>x.parent===parentId);

    children.forEach(c=>{

      if(c.lane!==lane) return;

      out.push(c);

      if(c.type==="question"){
        const ans=items.find(x=>x.parent===c.id && x.type==="answer");
        if(ans){
          out.push(ans);
          walk(ans.id);
        }
      } else {
        walk(c.id);
      }

    });
  }

  walk(rootId);
  return out;
}

/* ---------------- NODE ---------------- */
function renderNode(n){

  let icon="!";
  if(n.type==="question") icon="?";
  if(n.type==="answer") icon="✓";

  return `
    <div class="card">
      <div>
        <span class="icon">${icon}</span>
        ${n.text}
        <span class="meta">@${n.user}</span>
      </div>

      ${
        n.type==="question" &&
        !n.answerBy &&
        openQuestions[n.id]===currentUser
        ? `<button onclick="answer(${n.id})">Answer</button>`
        : ""
      }
    </div>
  `;
}

/* ---------------- DISPUTE VIEW ---------------- */
function renderDispute(root){

  const leftLane=buildLane(root.id,"left");
  const rightLane=buildLane(root.id,"right");

  return `
    <div class="card">
      <span class="icon">!</span>
      ${root.text}
      <span class="meta">@${root.user}</span>
    </div>

    <div class="disputeWrap">
      <div class="lane">${leftLane.map(renderNode).join("")}</div>
      <div class="lane">${rightLane.map(renderNode).join("")}</div>
    </div>
  `;
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){

    items.filter(x=>x.parent===null).forEach(r=>{
      view.innerHTML+=`
        <div class="card" onclick="enter(${r.id})">
          <span class="icon">!</span>
          ${r.text}
          <span class="meta">@${r.user}</span>
        </div>
      `;
    });

  } else {

    const cur=find(stack[stack.length-1]);
    nav.innerHTML=`<button id="backBtn" onclick="back()">⬅ back</button>`;
    view.innerHTML=renderDispute(cur);

  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA (STRICT + CLEAN) ---------------- */

/* Top-level proclamations */
items.push({id:id++,text:"Truth exists independent of consensus",user:"alice",parent:null,type:"proclaim"});
items.push({id:id++,text:"Meaning is socially constructed",user:"charlie",parent:null,type:"proclaim"});

/* Dispute 1: Alice vs Bob ONLY */
items.push({id:id++,text:"Does truth require agreement?",user:"bob",parent:0,type:"question",lane:"left",participants:["alice","bob"]});
openQuestions[2]="alice";

items.push({id:id++,text:"No, truth stands regardless of belief",user:"alice",parent:2,type:"answer",lane:"left",participants:["alice","bob"]});

items.push({id:id++,text:"Truth must be grounded in reality",user:"alice",parent:0,type:"proclaim",lane:"right",participants:["alice","bob"]});

items.push({id:id++,text:"How do we access that reality?",user:"bob",parent:4,type:"question",lane:"left",participants:["alice","bob"]});
openQuestions[5]="alice";

items.push({id:id++,text:"Through consistent observation and testing",user:"alice",parent:5,type:"answer",lane:"left",participants:["alice","bob"]});

/* Dispute 2: Charlie vs Alice ONLY (separate clean dispute) */
items.push({id:id++,text:"Is meaning ever objective?",user:"alice",parent:1,type:"question",lane:"left",participants:["charlie","alice"]});
openQuestions[7]="charlie";

items.push({id:id++,text:"No, meaning depends on interpretation",user:"charlie",parent:7,type:"answer",lane:"left",participants:["charlie","alice"]});

items.push({id:id++,text:"Some meanings are constrained by reality",user:"charlie",parent:1,type:"proclaim",lane:"right",participants:["charlie","alice"]});

renderUsers();
render();

</script>

</body>
</html>
