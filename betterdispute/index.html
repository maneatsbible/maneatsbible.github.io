<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Better Dispute v9</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

.header {
  position: sticky;
  top: 0;
  background: #0f0f10;
  padding: 10px 12px;
  border-bottom: 1px solid #222;
}

.topRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.home { cursor: pointer; font-size: 18px; }

.right { font-size: 11px; opacity: 0.6; }

.userBar {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}

.userBar button.active { background: #3a6df0; }

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.message { font-size: 15px; }
.meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary { background: #3a6df0; }

/* STACKED DISPUTE BLOCK (scales better than flat threads) */
.block {
  margin-top: 8px;
  padding: 10px;
  background: #141416;
  border-radius: 10px;
}

.turn {
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
}

.question { background: #2c2c2f; }
.answer { background: #1f3a2c; }

.hidden { display: none; }

/* FIRE */
.fireBox {
  background: #141416;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

textarea {
  width: 100%;
  min-height: 70px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  resize: none;
}
</style>
</head>

<body>

<div class="header">
  <div class="topRow">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="right">v9</div>
  </div>

  <div class="userBar">
    <button id="u-alice" onclick="switchUser('alice')">Alice</button>
    <button id="u-bob" onclick="switchUser('bob')">Bob</button>
    <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
  </div>
</div>

<div class="container" id="feed"></div>

<script>
let currentUser = "bob";

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] }
];

// SAMPLE CHAIN
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ]
});

// SWITCH USER
function switchUser(u) {
  currentUser = u;
  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));
  document.getElementById("u-" + u).classList.add("active");

  renderFeed();
}

// SAFE CHALLENGE (FIXED CORE BUG)
function challenge(postId, targetUser) {
  const post = posts.find(p => p.id === postId);
  if (!post || targetUser === currentUser) return;

  post.chains.push({
    id: Date.now(),
    a: targetUser,
    b: currentUser,
    turns: []
  });

  renderFeed();
}

// HOME
function goHome() {
  renderFeed();
}

// FEED
function renderFeed() {
  const feed = document.getElementById("feed");

  let html = `
    <div class="fireBox">
      <textarea id="fireInput" placeholder="Start a fire..."></textarea>
      <button class="primary" onclick="createPost()">Post</button>
    </div>
  `;

  posts.forEach(post => {
    const self = post.user === currentUser;

    html += `
      <div class="card">
        <div class="message">${post.text}</div>
        <div class="meta">@${post.user}</div>

        <div class="actions">
          <button class="primary"
            ${self ? 'disabled' : `onclick="challenge(${post.id}, '${post.user}')"`}>
            Challenge
          </button>
        </div>
    `;

    post.chains.forEach(chain => {
      html += renderBlock(chain, post);
    });

    html += `</div>`;
  });

  feed.innerHTML = html;
}

// SCALABLE BLOCK RENDER (NO FLAT THREADS)
function renderBlock(chain, post) {
  let html = `<div class="block">`;

  chain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type}">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;
  });

  const opponent = (chain.a === currentUser) ? chain.b : chain.a;
  const canChallenge = opponent !== currentUser;

  html += `
    <div class="actions">
      <button class="primary"
        ${!canChallenge ? 'disabled' : ''}
        onclick="challenge(${post.id}, '${opponent}')">
        Challenge
      </button>
    </div>
  `;

  html += `</div>`;
  return html;
}

// POST
function createPost() {
  const input = document.getElementById("fireInput");
  if (!input.value.trim()) return;

  posts.unshift({
    id: Date.now(),
    user: currentUser,
    text: input.value.trim(),
    chains: []
  });

  input.value = "";
  renderFeed();
}

// INIT
switchUser(currentUser);
renderFeed();
</script>

</body>
</html>
