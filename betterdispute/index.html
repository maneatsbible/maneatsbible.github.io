<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Better Dispute v3o</title>
<style>
:root{
  --bg:#0b0c10;
  --panel:#12141a;
  --panel2:#171a22;
  --text:#e6e6e6;
  --muted:#8b8f98;
  --accent:#7c5cff;
  --good:#2ee59d;
  --warn:#ffcc00;
  --bad:#ff4d4d;
  --border:#232634;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}
body{margin:0;background:var(--bg);color:var(--text);}

header{
  position:sticky;top:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
  background:rgba(10,11,15,.9);
  backdrop-filter: blur(10px);
  border-bottom:1px solid var(--border);
  z-index:10;
}
.header-left{display:flex;gap:10px;align-items:center;}
.iconbtn{background:none;border:none;color:var(--text);font-size:18px;}
.title{font-weight:600}
.version{color:var(--muted);font-size:12px}

#userBar{
  display:flex;gap:8px;align-items:center;
  padding:10px 14px;
  border-bottom:1px solid var(--border);
}
.userpill{
  padding:6px 10px;border-radius:999px;
  background:var(--panel);
  border:1px solid var(--border);
  cursor:pointer;font-size:12px;
}
.userpill.active{background:var(--accent);color:white}

#homeInput{
  padding:14px;
}
textarea{
  width:100%;
  min-height:70px;
  resize:none;
  padding:12px;
  border-radius:12px;
  background:var(--panel);
  border:1px solid var(--border);
  color:var(--text);
  outline:none;
  font-size:15px;
}

.btn{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--panel);
  color:var(--text);
  cursor:pointer;
}
.btn.primary{background:var(--accent);border:none;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

#feed{padding:10px 10px 120px;}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  position:relative;
}

.stack{
  margin-left:10px;
  border-left:1px dashed #2b2f3c;
  padding-left:10px;
}

.meta{font-size:11px;color:var(--muted);margin-bottom:6px}
.badge{
  font-size:11px;
  padding:2px 6px;
  border-radius:999px;
  background:var(--panel2);
  border:1px solid var(--border);
  margin-left:6px;
}
.badge.turn{color:var(--warn)}
.badge.your{color:var(--good)}

.icon{
  font-weight:700;margin-right:6px;
}
.assertion .icon{color:#fff}
.challenge .icon{color:var(--warn)}
.answer .icon{color:var(--good)}

.clickable{cursor:pointer}
.terminal::after{
  content:"";
  position:absolute;right:10px;top:10px;
  width:10px;height:10px;border-radius:50%;
  background:var(--muted);
  opacity:.4;
}

.highlight{
  outline:1px solid var(--accent);
}

/* DISPUTE VIEW */
#disputeView{display:none;padding-bottom:120px}

.threadTop{
  padding:10px 14px;
  color:var(--muted);
  font-size:12px;
}

.arrowline{
  display:flex;align-items:center;gap:6px;
  flex-wrap:wrap;
}

/* COMPOSER */
#composer{
  position:fixed;left:0;right:0;bottom:-400px;
  background:var(--panel);
  border-top:1px solid var(--border);
  padding:10px;
  transition:bottom .25s ease;
  z-index:20;
}
#composer.open{bottom:0}
.composerRow{display:flex;gap:8px;margin-top:8px}
.smallhint{font-size:12px;color:var(--muted)}

/* TOPBAR ICONS */
.topbarIcon{font-size:18px;margin-right:6px}
</style>
</head>
<body>

<header>
  <div class="header-left">
    <button class="iconbtn" onclick="App.goHome()">🏠</button>
    <div class="title">Better Dispute</div>
  </div>
  <div class="version">v3o</div>
</header>

<div id="userBar"></div>

<div id="homeView">
  <div id="homeInput">
    <textarea id="assertInput" placeholder="Start a fire..."></textarea>
    <div style="margin-top:8px;display:flex;justify-content:flex-end">
      <button class="btn primary" onclick="App.createAssertion()">Post</button>
    </div>
  </div>

  <div id="feed"></div>
</div>

<div id="disputeView">
  <div class="threadTop" id="threadTop"></div>
  <div id="disputeFeed"></div>
</div>

<div id="composer">
  <div class="smallhint" id="composerHint"></div>
  <textarea id="composerInput"></textarea>
  <div class="composerRow">
    <button class="btn" onclick="App.closeComposer()">Cancel</button>
    <button class="btn primary" id="composerSubmit" onclick="App.submitComposer()">Submit</button>
  </div>
</div>

<script>
/* =========================
   MODEL
========================= */

const Model = {
  users:[
    {id:"u1",name:"Alice"},
    {id:"u2",name:"Bob"},
    {id:"u3",name:"Cara"}
  ],
  currentUser:"u1",
  posts:[],
  disputes:{}, // key: pairId -> {turnIndex, resolved, history}
  id:1
};

function uid(){return "p"+(Model.id++)}

function pairId(a,b){
  return [a,b].sort().join("_");
}

/* =========================
   CONTROLLER
========================= */

const Controller = {

  createAssertion(text){
    Model.posts.push({
      id:uid(),
      type:"assertion",
      user:Model.currentUser,
      text,
      children:[]
    });
    App.renderHome();
  },

  startDispute(postId){
    const post = Model.posts.find(p=>p.id===postId);
    const otherUser = "u2"; // simplified starter opponent
    const pid = pairId(post.user, otherUser);

    if(!Model.disputes[pid]){
      Model.disputes[pid]={
        participants:[post.user, otherUser],
        turnIndex:0,
        root:postId,
        nodes:[]
      };
    }

    App.openDispute(pid);
  },

  canAct(dispute){
    return dispute.participants[dispute.turnIndex] === Model.currentUser;
  },

  nextTurn(dispute){
    dispute.turnIndex = (dispute.turnIndex+1)%2;
  },

  addNode(dispute, node){
    dispute.nodes.push(node);
  }
};

/* =========================
   VIEW / APP
========================= */

const App = {

  mode:"home",
  activeDispute:null,
  composerCtx:null,

  init(){
    this.renderUsers();
    this.renderHome();
  },

  renderUsers(){
    const bar = document.getElementById("userBar");
    bar.innerHTML = Model.users.map(u=>`
      <div class="userpill ${Model.currentUser===u.id?'active':''}"
           onclick="App.switchUser('${u.id}')">
        ${u.name}
      </div>
    `).join("");
  },

  switchUser(id){
    Model.currentUser=id;
    this.renderUsers();
    this.renderHome();
    if(this.activeDispute) this.openDispute(this.activeDispute);
  },

  goHome(){
    this.mode="home";
    this.activeDispute=null;
    document.getElementById("homeView").style.display="block";
    document.getElementById("disputeView").style.display="none";
  },

  renderHome(){
    const feed = document.getElementById("feed");

    feed.innerHTML = Model.posts.map(p=>{
      const yourTurn = this.isYourTurnOnPost(p);

      return `
        <div class="card assertion clickable ${yourTurn?'highlight':''} ${p.children.length===0?'terminal':''}"
             onclick="App.expandPost('${p.id}')">
          <div class="meta">
            ${this.userName(p.user)}
            ${yourTurn?'<span class="badge your">Your turn</span>':''}
          </div>
          <div><span class="icon">!</span>${p.text}</div>
          <div style="margin-top:6px">
            <button class="btn" onclick="event.stopPropagation();App.startDispute('${p.id}')"
            ${p.user===Model.currentUser?'disabled':''}>
              Challenge
            </button>
          </div>
        </div>
      `;
    }).join("");
  },

  expandPost(id){
    // simple drill-in placeholder (could become recursive view)
    this.startDispute(id);
  },

  isYourTurnOnPost(p){
    return p.user !== Model.currentUser;
  },

  userName(id){
    return Model.users.find(u=>u.id===id)?.name || "Unknown";
  },

  createAssertion(){
    const text = document.getElementById("assertInput").value.trim();
    if(!text) return;
    Controller.createAssertion(text);
    document.getElementById("assertInput").value="";
  },

  openDispute(pid){
    this.mode="dispute";
    this.activeDispute=pid;

    document.getElementById("homeView").style.display="none";
    document.getElementById("disputeView").style.display="block";

    this.renderDispute();
  },

  renderDispute(){
    const d = Model.disputes[this.activeDispute];
    const feed = document.getElementById("disputeFeed");
    const top = document.getElementById("threadTop");

    const root = Model.posts.find(p=>p.id===d.root);

    top.innerHTML = this.renderThreadRoot(root);

    const canAct = Controller.canAct(d);

    feed.innerHTML = d.nodes.map(n=>`
      <div class="card ${n.type}">
        <div class="meta">
          ${this.userName(n.user)}
          ${canAct && n.user!==Model.currentUser ? '<span class="badge turn">Your turn</span>':''}
        </div>
        <div>
          <span class="icon">${n.type==="challenge"?"?":"✓"}</span>
          ${n.text}
        </div>
        ${n.type==="challenge" ? `
          <div style="margin-top:6px">
            <button class="btn" onclick="App.openAnswer('${n.id}','yes')">Yes</button>
            <button class="btn" onclick="App.openAnswer('${n.id}','no')">No</button>
          </div>`:""}
      </div>
    `).join("");

    if(canAct){
      this.showComposer({mode:"challenge"});
    }
  },

  renderThreadRoot(root){
    return `
      <div class="arrowline">
        <span class="icon">!</span>${root.text}
        ${" → "}
        <span class="badge">Dispute</span>
      </div>
    `;
  },

  startDispute(postId){
    Controller.startDispute(postId);
  },

  openComposer(ctx){
    this.composerCtx=ctx;
    document.getElementById("composer").classList.add("open");
    document.getElementById("composerInput").value="";
    document.getElementById("composerHint").innerText =
      ctx.mode==="challenge"
        ? "Ask a Yes/No challenge"
        : "Respond (Yes/No + optional explanation)";
  },

  closeComposer(){
    document.getElementById("composer").classList.remove("open");
  },

  showComposer(ctx){
    this.openComposer(ctx);
  },

  submitComposer(){
    const d = Model.disputes[this.activeDispute];
    const text = document.getElementById("composerInput").value.trim();

    if(!Controller.canAct(d)) return;

    const node = {
      id:uid(),
      type:this.composerCtx.mode,
      user:Model.currentUser,
      text
    };

    Controller.addNode(d,node);
    Controller.nextTurn(d);

    this.closeComposer();
    this.renderDispute();
  },

  openAnswer(challengeId, value){
    const d = Model.disputes[this.activeDispute];

    const node = {
      id:uid(),
      type:"answer",
      user:Model.currentUser,
      text:value.toUpperCase() + (document.getElementById("composerInput")?.value || "")
    };

    Controller.addNode(d,node);
    Controller.nextTurn(d);
    this.renderDispute();
  }
};

App.init();
</script>
</body>
</html>
