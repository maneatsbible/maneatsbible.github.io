<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Better Dispute v8.2</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

/* HEADER FIXED INTO SINGLE BAR */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 10px 12px;
  border-bottom: 1px solid #222;
  background: #0f0f10;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.home {
  font-size: 18px;
  cursor: pointer;
}

.title {
  font-weight: 600;
}

.right {
  font-size: 11px;
  opacity: 0.6;
}

.userBar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
}

.userBar button.active {
  background: #3a6df0;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 10px;
}

.card {
  background: #1a1a1c;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 10px;
}

.message { font-size: 15px; }
.meta { font-size: 11px; opacity: 0.6; margin-top: 4px; }

.actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary { background: #3a6df0; }

/* HOME SUMMARY */
.summary {
  margin-top: 8px;
  padding: 8px;
  background: #141416;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
}

/* DISPUTE BLOCK */
.block {
  margin-top: 8px;
  padding: 10px;
  background: #141416;
  border-radius: 10px;
}

.turn {
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
}

.question { background: #2c2c2f; }
.answer { background: #1f3a2c; }

.hidden { display: none; }

/* INPUT (ONLY WHEN ACTIVE TURN) */
.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  padding: 10px;
  border-top: 1px solid #222;
}

textarea {
  width: 100%;
  min-height: 80px;
  font-size: 16px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  padding: 10px;
  resize: none;

  background: #1a1a1c;
  color: #fff;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="home" onclick="goHome()">⚖️</div>
    <div class="title">Better Dispute</div>
  </div>
  <div class="right">v8.2</div>
</div>

<div class="userBar">
  <button id="u-alice" onclick="switchUser('alice')">Alice</button>
  <button id="u-bob" onclick="switchUser('bob')">Bob</button>
  <button id="u-charlie" onclick="switchUser('charlie')">Charlie</button>
</div>

<div class="container" id="feed"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="input"></textarea>
</div>

<script>
let currentUser = "bob";

let posts = [
  { id: 1, user: "alice", text: "Faith alone is sufficient for salvation.", chains: [] },
  { id: 2, user: "charlie", text: "AI will replace most jobs.", chains: [] }
];

// SAMPLE CHAIN
posts[0].chains.push({
  id: 101,
  a: "alice",
  b: "bob",
  turns: [
    { type: "question", user: "bob", text: "Where is that stated?" },
    { type: "answer", user: "alice", text: "Ephesians 2:8-9." }
  ],
  turn_state: "question",
  active_user: "bob"
});

// SWITCH USER
function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".userBar button")
    .forEach(b => b.classList.remove("active"));

  document.getElementById("u-" + u).classList.add("active");

  renderFeed();
}

// HOME
function goHome() {
  renderFeed();
}

// CHALLENGE (FIXED: always creates new 1v1 chain)
function challenge(postId) {
  const post = posts.find(p => p.id === postId);
  if (!post || post.user === currentUser) return;

  post.chains.push({
    id: Date.now(),
    a: post.user,
    b: currentUser,
    turns: [],
    turn_state: "question",
    active_user: currentUser
  });

  renderFeed();
}

// FEED
function renderFeed() {
  const feed = document.getElementById("feed");

  let html = "";

  posts.forEach(post => {
    const self = post.user === currentUser;

    html += `
      <div class="card">
        <div class="message">${post.text}</div>
        <div class="meta">@${post.user}</div>
    `;

    // SUMMARY (STACKED, SCALABLE)
    post.chains.forEach(chain => {
      html += `
        <div class="summary" onclick="openChain(${post.id}, ${chain.id})">
          ${chain.turns.map(t => `${t.type === "question" ? "Q" : "A"}: ${t.text}`).join(" → ") || "New dispute"}
        </div>
      `;
    });

    html += `
      <div class="actions">
        ${self ? "" : `<button class="primary" onclick="challenge(${post.id})">Challenge</button>`}
      </div>
    </div>
    `;
  });

  feed.innerHTML = html;
}

// OPEN CHAIN
function openChain(postId, chainId) {
  const post = posts.find(p => p.id === postId);
  const chain = post.chains.find(c => c.id === chainId);

  const input = document.getElementById("input");
  const bar = document.getElementById("inputBar");

  renderFeed(); // keep simple (no full view split in this version)

  // INPUT RULE (CRITICAL FIX)
  if (chain.active_user === currentUser) {
    bar.classList.remove("hidden");
    input.placeholder = chain.turn_state === "question"
      ? "Ask a question..."
      : "Answer directly...";
  } else {
    bar.classList.add("hidden");
  }

  input.onkeydown = (e) => {
    if (e.key !== "Enter") return;
    if (!input.value.trim()) return;
    if (chain.active_user !== currentUser) return;

    chain.turns.push({
      type: chain.turn_state,
      user: currentUser,
      text: input.value.trim()
    });

    chain.turn_state =
      chain.turn_state === "question" ? "answer" : "question";

    chain.active_user =
      currentUser === chain.a ? chain.b : chain.a;

    input.value = "";
    openChain(postId, chainId);
  };
}

// INIT
switchUser(currentUser);
renderFeed();
</script>

</body>
</html>
