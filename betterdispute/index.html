<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:12px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{
  opacity:1;
  border-color:#fff;
}

#composer{
  width:100%;
  height:70px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
}

#feed{padding:10px;}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* dispute */
.dispute{
  display:none;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.dispute.open{display:grid}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.input{
  width:100%;
  margin-top:6px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:6px;
  border-radius:6px;
}

/* nested */
.child{
  margin-left:10px;
  border-left:2px solid #333;
  padding-left:10px;
  margin-top:8px;
}

/* log */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<script>

let VERSION = 16;
document.getElementById("version").innerText = VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

/* LOG */
function log(e,data){
  logs.push({t:Date.now(),u:currentUser,e,data});
}

/* HELPERS */
function find(id){ return items.find(x=>x.id===id); }

function isOwner(item){
  return item.user===currentUser;
}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
      log("switch",u);
    };

    el.appendChild(d);
  });
}

/* CREATE ROOT */
function createRoot(){
  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  items.push({
    id:id++,
    text,
    type:"proclaim",
    user:currentUser,
    parent:null,
    dispute:false,
    open:false
  });

  document.getElementById("composer").value="";
  render();
  log("create",text);
}

/* DISPUTE OPEN = SPLIT */
function toggleDispute(id){
  const item=find(id);
  if(!item || isOwner(item)) return;

  item.dispute=true;
  item.open=true;

  render();
  log("dispute",id);
}

/* SUBMIT LEFT/RIGHT */
function submitLeft(id){
  const v=document.getElementById("l-"+id).value.trim();
  if(!v) return;

  items.push({
    id:idCounter++,
    text:v,
    type:"question",
    user:currentUser,
    parent:id
  });

  render();
  log("ask",v);
}

function submitRight(id){
  const v=document.getElementById("r-"+id).value.trim();
  if(!v) return;

  items.push({
    id:idCounter++,
    text:v,
    type:"proclaim",
    user:currentUser,
    parent:id
  });

  render();
  log("proclaim",v);
}

/* AGREEMENT */
function agree(id){
  const item=find(id);
  if(!item || isOwner(item)) return;
  log("agree",id);
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  const roots = items.filter(x=>x.parent===null);

  roots.forEach(item=>{

    const blocked = isOwner(item);

    const children = items.filter(x=>x.parent===item.id);

    let childHtml = children.map(c=>
      `<div class="child">${c.text} <span style="color:#888">@${c.user}</span></div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${item.text}</div>
        <div class="meta">@${item.user}</div>

        <div class="actions">
          <button onclick="agree(${item.id})" ${blocked?'disabled':''}>Agree</button>
          <button onclick="toggleDispute(${item.id})" ${blocked?'disabled':''}>Disagree</button>
        </div>

        <div class="dispute ${item.open?'open':''}">
          <div class="lane">
            <div>Ask</div>
            <input class="input" id="l-${item.id}">
            <button onclick="submitLeft(${item.id})">Submit</button>
          </div>

          <div class="lane">
            <div>Proclaim</div>
            <input class="input" id="r-${item.id}">
            <button onclick="submitRight(${item.id})">Submit</button>
          </div>
        </div>

        ${childHtml}
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();
log("startup","v"+VERSION);

</script>

</body>
</html>
