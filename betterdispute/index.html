<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v33 (Restored)</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{display:flex;justify-content:space-between;padding:10px}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:20px;cursor:pointer;margin-right:10px}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.branch{
  margin-top:8px;
  padding:6px;
  background:#101010;
  border:1px solid #333;
  border-radius:6px;
  cursor:pointer;
}

.answer{
  margin-top:6px;
  padding-left:10px;
  border-left:2px solid #4caf50;
}

.turn{font-size:11px;color:#aaa;margin-top:4px}

.nav{
  padding:10px;
  cursor:pointer;
  color:#4caf50;
}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v33 (restored)</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="nav"></div>
<div id="feed"></div>
<div id="log"></div>

<script>

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

/* per-user isolated state */
let state={};

function getState(){
  if(!state[currentUser]){
    state[currentUser]={
      reactions:{},
      navStack:[],
      logs:[]
    };
  }
  return state[currentUser];
}

/* logging */
function log(e,d){
  getState().logs.push({t:new Date().toISOString(),u:currentUser,e,d});
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}

/* unanswered detection */
function owesAnswer(user){
  for(let n of items){
    if(n.type==="question"){
      const children = items.filter(x=>x.parent===n.id);
      const answered = children.some(c=>c.type==="answer");
      if(!answered && n.duel && n.duel.turn===user){
        return n;
      }
    }
  }
  return null;
}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* root */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    type:"proclaim",
    side:"left",
    duel:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* react */
function react(i,type){

  if(owesAnswer(currentUser)) return;

  const node=find(i);
  if(!node || node.user===currentUser) return;

  let s=getState();
  s.reactions[i]=type;

  if(type==="down") openDispute(i);
}

/* open dispute */
let active=null;

function openDispute(i){
  active=i;
  render();
}

/* submit simple branch */
function submitBranch(text,type,parentId,side){

  items.push({
    id:id++,
    text,
    user:currentUser,
    parent:parentId,
    type,
    side,
    duel:null
  });

  render();
  log("submit",text);
}

/* navigation */
function enter(id){
  getState().navStack.push(id);
  render();
}

function back(){
  getState().navStack.pop();
  render();
}

/* render */
function render(){

  const feed=document.getElementById("feed");
  const nav=document.getElementById("nav");

  feed.innerHTML="";
  nav.innerHTML="";

  let s=getState();

  if(s.navStack.length){
    nav.innerHTML=`<div class="nav" onclick="back()">⬅ back</div>`;
  }

  let roots = s.navStack.length
    ? [find(s.navStack[s.navStack.length-1])]
    : items.filter(x=>x.parent===null);

  function renderNode(node){

    const children = items.filter(x=>x.parent===node.id);

    const left = children.filter(c=>c.side==="left");
    const right = children.filter(c=>c.side==="right");

    const my = s.reactions[node.id];

    return `
      <div class="card">

        <div>${node.text} <span class="meta">@${node.user}</span></div>

        ${node.user!==currentUser ? `
        <div class="actions">
          <span class="icon ${my==='up'?'active':my?'dim':''}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${my==='down'?'active':my?'dim':''}" onclick="react(${node.id},'down')">👎</span>
        </div>`:""}

        ${node.type==="question" && node.duel && node.duel.turn===currentUser ? `
          <div onclick="submitBranch('answer','answer',${node.id},'left')" style="color:#4caf50;cursor:pointer;font-size:12px">answer</div>
        `:""}

        ${node.duel?`<div class="turn">turn: ${node.duel.turn}</div>`:""}

        <div class="dispute">

          <div class="lane">
            ${left.map(renderNode).join("")}
          </div>

          <div class="lane">
            ${right.map(renderNode).join("")}
          </div>

        </div>

        ${children.filter(c=>c.type!=="answer").map(c=>`
          <div class="branch" onclick="enter(${c.id})">
            ${c.text} →
          </div>
        `).join("")}

      </div>
    `;
  }

  roots.forEach(r=>{
    feed.innerHTML += renderNode(r);
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  s.logs.slice(-200).forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* init */
renderUsers();

/* test data */
items.push({id:id++,text:"Truth claims should be examined",user:"alice",parent:null,type:"proclaim",side:"left"});
items.push({id:id++,text:"What defines truth?",user:"bob",parent:0,type:"question",side:"right",duel:{a:"alice",b:"bob",turn:"alice"}});
items.push({id:id++,text:"Truth is correspondence",user:"charlie",parent:1,type:"proclaim",side:"left"});
items.push({id:id++,text:"Correspondence assumes realism",user:"bob",parent:2,type:"proclaim",side:"right"});

render();

</script>

</body>
</html>
