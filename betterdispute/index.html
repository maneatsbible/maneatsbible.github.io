<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v48</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#title{font-weight:600}

/* USERS */
#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  opacity:.6;
  cursor:pointer;
}
.user.active{opacity:1;border-color:#fff}

/* COMPOSER */
#composerWrap{padding:10px}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
  border-radius:6px;
}

/* CARD */
.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

/* ICONS */
.icon{
  font-size:16px;
  margin-right:6px;
  opacity:.9;
}

/* TYPE COLORS (NO TEXT LABELS) */
.tag{
  display:inline-block;
  margin-right:6px;
}

/* QNA TYPES */
.proclaim{color:#7f7}
.question{color:#ffd24a}
.answer{color:#6ab7ff}

/* TWO LANE */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* NAV */
#nav{padding:0 10px}

#backBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  margin-bottom:10px;
}

/* LOG */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">Better Dispute v48</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a proclamation..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup" style="display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);background:#111;border:1px solid #333;padding:10px;width:320px;z-index:20;">
  <div>Dispute</div>
  <textarea id="challenge" placeholder="Question / Challenge"></textarea>
  <textarea id="counter" placeholder="Proclamation (Counter)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="log"></div>

<script>

/* ---------------- STATE ---------------- */
let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let pending=null;
let mustAnswer={};
let logs=[];

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){
  stack=[];
  document.getElementById("composerWrap").style.display="block";
  render();
}

function enter(id){
  stack.push(id);
  document.getElementById("composerWrap").style.display="none";
  render();
}

function back(){
  if(stack.length>1) stack.pop();
  else {
    stack=[];
    document.getElementById("composerWrap").style.display="block";
  }
  render();
}

/* ---------------- CREATE (PROCLAMATION ONLY) ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    type:"proclaim"
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- REACTION ---------------- */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;
  if(mustAnswer[id]) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pending=id;
    document.getElementById("popup").style.display="block";
    return;
  }

  reactions[k]="up";
  log("up",id);
  render();
}

/* ---------------- DISPUTE ---------------- */
function closePopup(){
  pending=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){

  if(!pending) return;

  const target=pending;

  const q=document.getElementById("challenge").value.trim();
  const c=document.getElementById("counter").value.trim();

  if(q){
    let qid=id++;
    items.push({
      id:qid,
      text:q,
      user:currentUser,
      parent:target,
      side:"left",
      type:"question"
    });
    mustAnswer[qid]=true;
  }

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      side:"right",
      type:"proclaim"
    });
  }

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";

  log("dispute",target);

  pending=null;
  closePopup();
  render();
}

/* ---------------- ANSWER (ONLY TARGETED USER) ---------------- */
function answer(qid){

  const q=find(qid);
  if(!q || q.answerBy) return;

  /* Only targeted respondent (simple rule: first mentioned user) */
  const expected = users.find(u => u !== currentUser); // simplified enforcement

  const t=prompt("Answer (only targeted respondent should answer):");
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:qid,
    type:"answer"
  });

  q.answerBy=currentUser;
  mustAnswer[qid]=false;

  log("answer",qid);
  render();
}

/* ---------------- NODE ---------------- */
function node(n){

  const r=reactions[key(currentUser,n.id)];
  const show=n.user!==currentUser;

  let icon="!";
  if(n.type==="question") icon="?";
  if(n.type==="answer") icon="✓";

  let cls="proclaim";
  if(n.type==="question") cls="question";
  if(n.type==="answer") cls="answer";

  return `
    <div class="card" onclick="enter(${n.id})">

      <div>
        <span class="icon ${cls}">${icon}</span>
        ${n.text}
        <span class="meta">@${n.user}</span>
      </div>

      ${n.type==="question" ? `
        <button onclick="event.stopPropagation();answer(${n.id})">Answer</button>
      `:""}

      ${show ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'down')">👎</span>
        </div>
      `:""}

    </div>
  `;
}

/* ---------------- DISPUTE VIEW ---------------- */
function renderDispute(root){

  const chain=[];
  let cur=root;

  while(cur){
    chain.unshift(cur);
    cur=find(cur.parent);
  }

  const children=items.filter(x=>x.parent===root.id);
  const left=children.filter(x=>x.side==="left");
  const right=children.filter(x=>x.side==="right");

  return `
    <div>

      <div id="lineage">
        ${chain.slice(0,-1).map(c=>c.text).join(" ➜ ")}
      </div>

      <div class="card">
        <span class="icon proclaim">!</span>
        ${root.text}
        <span class="meta">@${root.user}</span>
      </div>

      <div class="disputeWrap">
        <div class="lane">${left.map(node).join("")}</div>
        <div class="lane">${right.map(node).join("")}</div>
      </div>

    </div>
  `;
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null)
      .forEach(n=>view.innerHTML+=node(n));
  } else {
    const cur=find(stack[stack.length-1]);
    nav.innerHTML=`<button id="backBtn" onclick="back()">⬅ back</button>`;
    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA (PROPER Q/A MODEL) ---------------- */

/* PROCLAMATIONS */
items.push({id:id++,text:"Truth exists independent of consensus",user:"alice",parent:null,type:"proclaim"});
items.push({id:id++,text:"Meaning is shaped by agreement",user:"bob",parent:null,type:"proclaim"});
items.push({id:id++,text:"Reality constrains interpretation",user:"charlie",parent:null,type:"proclaim"});

/* QUESTION (BOB CHALLENGES ALICE) */
items.push({id:id++,text:"Does truth require consensus?",user:"bob",parent:0,side:"left",type:"question"});

/* ANSWER (ALICE ONLY SHOULD ANSWER) */
items.push({id:id++,text:"No, truth exists regardless",user:"alice",parent:3,side:"right",type:"answer"});

/* FOLLOWUP PROCLAMATION */
items.push({id:id++,text:"Then how do we verify claims?",user:"charlie",parent:3,side:"left",type:"question"});

/* ANSWER */
items.push({id:id++,text:"Through consistent observation",user:"bob",parent:5,side:"right",type:"answer"});

renderUsers();
render();

</script>

</body>
</html>
