<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v37</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

#title{font-weight:600}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  cursor:pointer;
  opacity:.6;
}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  cursor:pointer;
  margin-right:8px;
}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

/* TWO-LANE ALWAYS */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* LOG ALWAYS */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:180px;
  overflow:auto;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:20;
}

#popup textarea{height:70px}
</style>
</head>

<body>

<header>
  <button onclick="home()" id="homeBtn">⚖ home</button>
  <div id="title">v37</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup">
  <div>Dispute</div>
  <textarea id="counter" placeholder="Counter question (optional)"></textarea>
  <textarea id="challenge" placeholder="Challenge question (optional)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let pending=null;

let logs=[];

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */
function home(){ stack=[]; render(); }

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null});
  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- ENFORCED QUESTION STATE ---------------- */
let mustAnswer={}; // nodeId -> true if user must answer before continuing

function canAct(nodeId){
  return !mustAnswer[nodeId];
}

/* ---------------- REACT ---------------- */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;

  if(!canAct(id)) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pending=id;
    document.getElementById("popup").style.display="block";
    return;
  }

  reactions[k]="up";
  log("up",id);
  render();
}

/* ---------------- DISPUTE (QUESTION FLOW) ---------------- */
function closePopup(){
  pending=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){

  if(!pending) return;

  const target=pending;

  const c=document.getElementById("counter").value.trim();
  const q=document.getElementById("challenge").value.trim();

  // QUESTIONS ONLY NOW
  if(c){
    const cid=id++;
    items.push({
      id:cid,
      text:c,
      user:currentUser,
      parent:target,
      type:"question",
      side:"right"
    });
    mustAnswer[cid]=true;
  }

  if(q){
    const qid=id++;
    items.push({
      id:qid,
      text:q,
      user:currentUser,
      parent:target,
      type:"question",
      side:"left"
    });
    mustAnswer[qid]=true;
  }

  document.getElementById("counter").value="";
  document.getElementById("challenge").value="";

  log("dispute-question",target);

  pending=null;
  closePopup();
  render();
}

/* ---------------- ANSWER SYSTEM (FORCING FLOW) ---------------- */
function answer(nodeId){

  const text=prompt("Answer:");
  if(!text) return;

  const n=find(nodeId);
  if(!n) return;

  items.push({
    id:id++,
    text:text,
    user:currentUser,
    parent:nodeId,
    type:"answer"
  });

  mustAnswer[nodeId]=false;

  log("answer",nodeId);
  render();
}

/* ---------------- NODE ---------------- */
function node(n){

  const r=reactions[key(currentUser,n.id)];
  const show=n.user!==currentUser;

  const needsAnswer = mustAnswer[n.id];

  return `
    <div class="card" onclick="enter(${n.id})">

      <div>
        ${n.text}
        <span class="meta">@${n.user}</span>
      </div>

      ${n.type==="question" ? `
        <div style="margin-top:6px">
          <button onclick="event.stopPropagation();answer(${n.id})">
            Answer
          </button>
        </div>
      `:""}

      ${show ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'down')">👎</span>
        </div>
      `:""}

    </div>
  `;
}

/* ---------------- DISPUTE VIEW (2-LANE) ---------------- */
function renderDispute(root){

  const children=items.filter(x=>x.parent===root.id);

  const left=children.filter(x=>x.side==="left");
  const right=children.filter(x=>x.side==="right");

  return `
    <div>

      <div class="card">
        ${root.text} <span class="meta">@${root.user}</span>
      </div>

      <div class="disputeWrap">

        <div class="lane">
          ${left.map(node).join("")}
        </div>

        <div class="lane">
          ${right.map(node).join("")}
        </div>

      </div>

    </div>
  `;
}

/* ---------------- DRILL ---------------- */
function enter(id){
  stack=[id];
  render();
}

/* ---------------- RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){

    items.filter(x=>x.parent===null)
      .forEach(n=>view.innerHTML+=node(n));

  } else {

    const cur=find(stack[0]);
    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).reverse().map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA (Q&A HEAVY) ---------------- */

items.push({id:id++,text:"Is truth independent of belief?",user:"alice",parent:null,type:"question"});
items.push({id:id++,text:"Truth depends on shared reality",user:"bob",parent:0,type:"answer"});

items.push({id:id++,text:"Can consensus define truth?",user:"charlie",parent:null,type:"question"});
items.push({id:id++,text:"Consensus stabilizes perception",user:"dana",parent:2,type:"answer"});

items.push({id:id++,text:"Does language limit logic?",user:"eve",parent:null,type:"question"});
items.push({id:id++,text:"Language structures logic",user:"alice",parent:4,type:"answer"});

/* DISPUTES */
items.push({id:id++,text:"Is consensus reliable?",user:"bob",parent:2,side:"left"});
items.push({id:id++,text:"Is consensus useful?",user:"charlie",parent:2,side:"right"});

renderUsers();
render();

</script>

</body>
</html>
