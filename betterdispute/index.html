<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35.3</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
}

.homeBtn{
  background:#1f1f1f;
  border:1px solid #333;
  color:#eee;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.rootItem{
  margin:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

/* vertical chain (non-fork disputes) */
.thread{
  margin:10px;
  padding-left:10px;
  border-left:2px solid #333;
}

#nav{
  padding:10px;
  color:#4caf50;
  cursor:pointer;
}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button class="homeBtn" onclick="home()">🏠 Home</button>
  <div>Better Dispute v35.3</div>
</header>

<div id="users"></div>

<!-- only visible on HOME -->
<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>
<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];

let stack=[];
let reactions={};
let logs=[];

/* ---------------- LOG ---------------- */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- HELPERS ---------------- */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* ---------------- USERS ---------------- */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* ---------------- HOME ---------------- */
function home(){
  stack=[];
  render();
}

/* ---------------- CREATE ---------------- */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null,
    type:"proclaim"
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- NAV ---------------- */
function enter(id){
  stack.push(id);
  log("enter",id);
  render();
}

function back(){
  stack.pop();
  log("back","");
  render();
}

/* ---------------- REACTIONS (LOCKED) ---------------- */
function react(id,type){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  reactions[k]=type;
  log(type,id);
  render();
}

/* ---------------- NODE RENDER ---------------- */
function renderNode(node,showActions){

  const r = reactions[key(currentUser,node.id)];
  const children = items.filter(x=>x.parent===node.id);
  const answers = children.filter(c=>c.type==="answer");
  const hasFork = children.some(c=>c.side==="left"||c.side==="right");

  return `
    <div class="card" onclick="enter(${node.id})">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${node.user!==currentUser && showActions ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'up')">👍</span>
          <span class="icon ${r==='down'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'down')">👎</span>
        </div>
      ` : ""}

      <!-- answers always under questions -->
      ${answers.length ? `
        <div style="margin-top:6px;padding-left:10px;border-left:2px solid #4caf50">
          ${answers.map(a=>`
            <div>↳ ${a.text} <span class="meta">@${a.user}</span></div>
          `).join("")}
        </div>
      ` : ""}

    </div>
  `;
}

/* ---------------- DISPUTE VIEW ---------------- */
function renderDispute(node){

  const children = items.filter(x=>x.parent===node.id);
  const forked = children.some(c=>c.side==="left"||c.side==="right");

  /* vertical thread (no fork) */
  if(!forked){
    return `
      <div>

        <div class="card" style="border:1px solid #333">
          ${node.text} <span class="meta">@${node.user}</span>
        </div>

        <div class="thread">
          ${children.map(c=>renderNode(c,true)).join("")}
        </div>

      </div>
    `;
  }

  /* 2-lane dispute */
  const left = children.filter(c=>c.side==="left");
  const right = children.filter(c=>c.side==="right");

  return `
    <div>

      <div class="card" style="border:1px solid #333">
        ${node.text} <span class="meta">@${node.user}</span>
      </div>

      <div class="dispute">

        <div class="lane">
          ${left.map(c=>renderNode(c,true)).join("")}
        </div>

        <div class="lane">
          ${right.map(c=>renderNode(c,true)).join("")}
        </div>

      </div>

    </div>
  `;
}

/* ---------------- MAIN RENDER ---------------- */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");
  const comp=document.getElementById("composerWrap");

  view.innerHTML="";
  nav.innerHTML="";

  /* hide composer in drill mode */
  comp.style.display = stack.length ? "none" : "block";

  if(stack.length===0){

    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML += renderNode(n,true);
    });

  } else {

    const current = find(stack[stack.length-1]);

    nav.innerHTML = `<div onclick="back()">⬅ back</div>`;

    view.innerHTML = renderDispute(current);
  }

  const logEl=document.getElementById("log");
  logEl.innerHTML = logs.slice(-200).reverse()
    .map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- SEED TEST DATA ---------------- */

/* top-level proclamations */
items.push({id:id++,text:"Truth exists independent of perception",user:"alice",parent:null});
items.push({id:id++,text:"Reality is socially constructed",user:"bob",parent:null});
items.push({id:id++,text:"Logic is not universal",user:"charlie",parent:null});
items.push({id:id++,text:"Some truths are undiscoverable",user:"dana",parent:null});
items.push({id:id++,text:"Knowledge is contextual",user:"eve",parent:null});

/* questions + answers */
items.push({id:id++,text:"What validates truth?",user:"alice",parent:0,side:"right",type:"question"});
items.push({id:id++,text:"Consistency within a system",user:"bob",parent:5,side:"left",type:"answer"});
items.push({id:id++,text:"Which system though?",user:"charlie",parent:6,side:"right"});

/* disputes */
items.push({id:id++,text:"Truth depends on consensus",user:"bob",parent:1,side:"right"});
items.push({id:id++,text:"Consensus can be wrong",user:"alice",parent:8,side:"left"});
items.push({id:id++,text:"Wrong consensus still functions",user:"charlie",parent:9,side:"right"});

/* deeper chain */
items.push({id:id++,text:"Function does not imply truth",user:"dana",parent:10,side:"left"});
items.push({id:id++,text:"Truth may be emergent",user:"eve",parent:11,side:"right"});

/* more unchallenged roots */
items.push({id:id++,text:"Meaning is derived, not fixed",user:"alice",parent:null});
items.push({id:id++,text:"Disagreement sharpens reasoning",user:"bob",parent:null});
items.push({id:id++,text:"Not all questions resolve",user:"charlie",parent:null});

renderUsers();
render();

</script>

</body>
</html>
