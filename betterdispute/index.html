<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Better Dispute v1</title>
<style>
  body {
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
    background: #111;
    color: #eee;
  }

  .titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #1c1c1c;
    border-bottom: 1px solid #333;
    font-weight: 600;
  }

  .title-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .home-btn {
    cursor: pointer;
    font-size: 18px;
  }

  .container {
    padding: 12px;
  }

  textarea {
    width: 100%;
    min-height: 100px;
    font-size: 16px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    margin-bottom: 10px;
  }

  button {
    padding: 10px 14px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    background: #2e7dff;
    color: white;
  }

  .post {
    border: 1px solid #333;
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 10px;
    cursor: pointer;
  }

  .post.terminal {
    opacity: 0.6;
  }

  .meta {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 5px;
  }

  .icon {
    margin-right: 6px;
  }

  .breadcrumb {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 10px;
  }

  .userbar {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .user {
    padding: 6px 10px;
    border-radius: 6px;
    background: #333;
    cursor: pointer;
  }

  .user.active {
    background: #2e7dff;
  }

  .action {
    margin-top: 10px;
  }

</style>
</head>
<body>

<div class="titlebar">
  <div class="title-left">
    <div class="home-btn" onclick="goHome()">⚖️</div>
    <div>Better Dispute</div>
  </div>
  <div>v1</div>
</div>

<div class="container">

  <div class="userbar" id="userbar"></div>

  <div id="view"></div>

</div>

<script>

// ===== MODEL =====

let currentUser = "alice";

let users = ["alice", "bob", "carol"];

let posts = {};
let nextId = 1;

// Post types: assertion, challenge, answer
function createPost(type, content, parentId=null, extra={}) {
  const id = nextId++;
  posts[id] = {
    id,
    type,
    content,
    parentId,
    author: currentUser,
    children: [],
    ...extra
  };
  if (parentId) posts[parentId].children.push(id);
  return id;
}

// ===== SEED DATA =====

const a1 = createPost("assertion", "Truth is absolute.");
const c1 = createPost("challenge", "Is truth independent of perception?", a1, {target: "alice"});
const ans1 = createPost("answer", "Yes", c1, {target: "bob", yes: true});

currentUser = "bob";
const a2 = createPost("assertion", "Morality is subjective.");

currentUser = "carol";
const c2 = createPost("challenge", "Is morality ever universal?", a2, {target: "bob"});

currentUser = "alice";

// ===== STATE =====

let viewStack = []; // drill navigation

// ===== CONTROLLER =====

function canChallenge(post) {
  if (post.author === currentUser) return false;

  const active = getActiveDispute(post.id);
  if (active && active.turn !== currentUser) return false;

  return true;
}

function canAnswer(post) {
  return post.type === "challenge" && post.target === currentUser;
}

function getActiveDispute(postId) {
  const post = posts[postId];
  if (!post) return null;

  const last = post.children.map(id => posts[id]).slice(-1)[0];

  if (!last) return {turn: post.target};

  if (last.type === "answer") {
    return {turn: post.author};
  }

  return null;
}

// ===== VIEW =====

function render() {
  renderUsers();

  if (viewStack.length === 0) {
    renderHome();
  } else {
    renderDispute(viewStack[viewStack.length - 1]);
  }
}

function renderUsers() {
  const el = document.getElementById("userbar");
  el.innerHTML = "";

  users.forEach(u => {
    const d = document.createElement("div");
    d.className = "user" + (u === currentUser ? " active" : "");
    d.innerText = u;
    d.onclick = () => {
      currentUser = u;
      render();
    };
    el.appendChild(d);
  });
}

function renderHome() {
  const el = document.getElementById("view");

  el.innerHTML = `
    <textarea id="assertionInput" placeholder="Start a fire..."></textarea>
    <button onclick="submitAssertion()">Post</button>
    <hr/>
  `;

  Object.values(posts)
    .filter(p => p.type === "assertion")
    .forEach(p => el.appendChild(renderSummary(p)));
}

function renderSummary(post) {
  const div = document.createElement("div");

  const hasChildren = post.children.length > 0;

  div.className = "post" + (hasChildren ? "" : " terminal");

  div.innerHTML = `
    <div class="meta">${post.author}</div>
    <div><span class="icon">${icon(post.type)}</span>${post.content}</div>
  `;

  if (hasChildren) {
    div.onclick = () => {
      viewStack.push(post.id);
      render();
    };
  }

  return div;
}

function renderDispute(rootId) {
  const el = document.getElementById("view");

  const lineage = [];
  let cur = rootId;
  while (cur) {
    lineage.unshift(posts[cur]);
    cur = posts[cur].parentId;
  }

  el.innerHTML = `
    <div class="breadcrumb">${lineage.map(p => icon(p.type)).join(" → ")}</div>
    <button onclick="goBack()">Back</button>
    <hr/>
  `;

  lineage.forEach(p => {
    const div = document.createElement("div");
    div.className = "post";
    div.innerHTML = `
      <div class="meta">${p.author}</div>
      <div><span class="icon">${icon(p.type)}</span>${p.content}</div>
    `;
    el.appendChild(div);
  });

  const current = posts[rootId];

  // actions
  if (canAnswer(current)) {
    const a = document.createElement("div");
    a.className = "action";
    a.innerHTML = `
      <button onclick="submitAnswer(true)">Yes</button>
      <button onclick="submitAnswer(false)">No</button>
      <textarea id="answerText" placeholder="Optional explanation..."></textarea>
    `;
    el.appendChild(a);
  }

  if (canChallenge(current)) {
    const a = document.createElement("div");
    a.className = "action";
    a.innerHTML = `
      <textarea id="challengeInput" placeholder="Ask a yes/no question..."></textarea>
      <button onclick="submitChallenge()">Challenge</button>
    `;
    el.appendChild(a);
  }

  // children summaries
  current.children.forEach(id => {
    el.appendChild(renderSummary(posts[id]));
  });
}

// ===== ACTIONS =====

function submitAssertion() {
  const text = document.getElementById("assertionInput").value.trim();
  if (!text) return;

  createPost("assertion", text);
  render();
}

function submitChallenge() {
  const text = document.getElementById("challengeInput").value.trim();
  if (!text) return;

  const parentId = viewStack[viewStack.length - 1];

  createPost("challenge", text, parentId, {
    target: posts[parentId].author
  });

  render();
}

function submitAnswer(yes) {
  const text = document.getElementById("answerText").value.trim();
  const parentId = viewStack[viewStack.length - 1];

  createPost("answer", text || (yes ? "Yes" : "No"), parentId, {
    target: posts[parentId].author,
    yes
  });

  render();
}

function goHome() {
  viewStack = [];
  render();
}

function goBack() {
  viewStack.pop();
  render();
}

// ===== UTILS =====

function icon(type) {
  if (type === "assertion") return "!";
  if (type === "challenge") return "?";
  if (type === "answer") return "✓";
}

// ===== INIT =====

render();

</script>

</body>
</html>
