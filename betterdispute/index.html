<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Better Dispute v1.1</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0f0f10;
  color: #fff;
}

.header {
  position: sticky;
  top: 0;
  background: #0f0f10;
  padding: 12px;
  border-bottom: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.title { font-weight: bold; }
.version { font-size: 12px; opacity: 0.6; }
.balance { font-size: 18px; }

.userSwitch button {
  margin-right: 4px;
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: 12px;
}

.card {
  background: #1a1a1c;
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.message { font-size: 16px; }

.meta {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 6px;
}

.actions {
  margin-top: 10px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

button {
  border: none;
  border-radius: 8px;
  padding: 8px 12px;
  background: #2a2a2d;
  color: #fff;
}

button.primary { background: #3a6df0; }

.chainPreview {
  margin-top: 10px;
  padding: 10px;
  background: #141416;
  border-radius: 10px;
  font-size: 14px;
}

.turn {
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
}

.question { background: #2c2c2f; }
.answer { background: #1f3a2c; }

.you { outline: 2px solid #3a6df0; }

.status {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 8px;
}

.inputBar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #0f0f10;
  padding: 10px;
  border-top: 1px solid #222;
}

textarea {
  width: 100%;
  min-height: 80px;
  border-radius: 12px;
  border: none;
  padding: 12px;
  font-size: 15px;
  resize: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<div class="header">
  <div>
    <div class="title">Better Dispute</div>
    <div class="version">v1.1</div>
  </div>

  <div class="userSwitch">
    <button onclick="switchUser('alice')">Alice</button>
    <button onclick="switchUser('bob')">Bob</button>
  </div>

  <div class="balance">⚖️</div>
</div>

<div class="container" id="feed"></div>
<div class="container hidden" id="chainView"></div>

<div class="inputBar hidden" id="inputBar">
  <textarea id="inputField"></textarea>
</div>

<script>
let currentUser = "bob";

// Demo timeout for crickets (10s instead of hours)
const CRICKET_TIMEOUT = 10000;

let posts = [
  {
    id: 1,
    user: "alice",
    text: "This claim can be challenged.",
    chains: []
  }
];

// SWITCH USER
function switchUser(u) {
  currentUser = u;
  renderFeed();
}

// START CHALLENGE
function startChallenge(postId) {
  const post = posts.find(p => p.id === postId);

  const chain = {
    id: Date.now(),
    user_a: post.user,
    user_b: currentUser,
    turns: [],
    turn_state: "question",
    active_user: currentUser,
    status: "active",
    last_action: Date.now()
  };

  post.chains.push(chain);
  openChain(postId, chain.id);

  setInput("Ask a precise question...");
}

// OPEN CHAIN
let activePost, activeChain;

function openChain(postId, chainId) {
  activePost = posts.find(p => p.id === postId);
  activeChain = activePost.chains.find(c => c.id === chainId);

  document.getElementById("feed").classList.add("hidden");
  document.getElementById("chainView").classList.remove("hidden");

  renderChain();
}

// BACK
function goHome() {
  document.getElementById("feed").classList.remove("hidden");
  document.getElementById("chainView").classList.add("hidden");
  hideInput();
}

// RENDER FEED
function renderFeed() {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  posts.forEach(post => {
    let html = `
      <div class="card">
        <div class="message">${post.text}</div>
        <div class="meta">@${post.user}</div>

        <div class="actions">
          <button class="primary" onclick="startChallenge(${post.id})">Challenge</button>
        </div>
    `;

    post.chains.forEach(chain => {
      const last = chain.turns[chain.turns.length - 1];
      if (!last) return;

      html += `
        <div class="chainPreview" onclick="openChain(${post.id}, ${chain.id})">
          ${last.type.toUpperCase()}: ${last.text}
          <div class="meta">${chain.statusLabel || ""}</div>
        </div>
      `;
    });

    html += `</div>`;
    feed.innerHTML += html;
  });
}

// RENDER CHAIN
function renderChain() {
  updateCrickets(activeChain);

  const view = document.getElementById("chainView");

  let html = `
    <button onclick="goHome()">← Back</button>
    <div class="card">
      <div class="message">${activePost.text}</div>
    </div>
  `;

  activeChain.turns.forEach(t => {
    html += `
      <div class="turn ${t.type} ${t.user === currentUser ? 'you' : ''}">
        ${t.text}
        <div class="meta">@${t.user}</div>
      </div>
    `;
  });

  html += `<div class="status">`;

  if (activeChain.status !== "active") {
    html += activeChain.statusLabel;
    hideInput();
  } else if (activeChain.active_user === currentUser) {
    html += activeChain.turn_state === "question"
      ? "Your turn to ask"
      : "Your turn to answer";
    showInput();
  } else {
    html += "Waiting on them";
    showInput();
    html += `
      <div class="actions">
        <button onclick="markDodged()">Dodged</button>
        <button onclick="endChain()">End</button>
      </div>
    `;
  }

  html += `</div>`;

  view.innerHTML = html;
}

// INPUT
const input = document.getElementById("inputField");

input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    submitTurn();
  }
});

function setInput(ph) {
  input.placeholder = ph;
  showInput();
  input.focus();
}

function showInput() {
  document.getElementById("inputBar").classList.remove("hidden");
}

function hideInput() {
  document.getElementById("inputBar").classList.add("hidden");
}

// SUBMIT TURN
function submitTurn() {
  if (!input.value.trim()) return;

  const type = activeChain.turn_state;

  activeChain.turns.push({
    type,
    user: currentUser,
    text: input.value.trim()
  });

  activeChain.last_action = Date.now();

  activeChain.turn_state = type === "question" ? "answer" : "question";
  activeChain.active_user =
    currentUser === activeChain.user_a
      ? activeChain.user_b
      : activeChain.user_a;

  input.value = "";

  renderChain();
}

// DODGED
function markDodged() {
  activeChain.status = "dodged";
  activeChain.statusLabel = "Marked as dodged";
  renderChain();
}

// END
function endChain() {
  activeChain.status = "ended";
  activeChain.statusLabel = "Ended";
  renderChain();
}

// CRICKETS
function updateCrickets(chain) {
  if (chain.status !== "active") return;

  const now = Date.now();
  if (now - chain.last_action > CRICKET_TIMEOUT) {
    chain.status = "crickets";
    chain.statusLabel = "🐦 No response (crickets)";
  }
}

// INIT
setInterval(() => {
  posts.forEach(p =>
    p.chains.forEach(updateCrickets)
  );
  renderFeed();
}, 2000);

renderFeed();
</script>

</body>
</html>
