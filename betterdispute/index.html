<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35.7</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
}

/* USERS */
#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  cursor:pointer;
  opacity:.6;
}
.user.active{
  opacity:1;
  border-color:#fff;
}

/* COMPOSER */
textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

/* CARDS */
.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  cursor:pointer;
  margin-right:8px;
}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

/* DISPUTE LAYOUT */
.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

/* NAV */
#nav{
  padding:10px;
}

/* LOG */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:20;
}

#popup textarea{
  height:70px;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0c0c0c;
  border-left:1px solid #333;
  padding:10px;
  display:none;
  z-index:10;
}

#overlay{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.5);
  z-index:9;
}

.chatMsg{font-size:12px;margin-bottom:4px}
</style>
</head>

<body>

<header>
  <button onclick="home()" style="
    background:#1f1f1f;
    border:1px solid #333;
    color:#eee;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
  ">⚖️</button>

  <div>Better Dispute v35.7</div>
</header>

<div id="users"></div>

<!-- COMPOSER (hidden in drill mode) -->
<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<!-- DISPUTE POPUP -->
<div id="popup">
  <div>Dispute</div>
  <textarea id="counter" placeholder="Counter (optional)"></textarea>
  <textarea id="challenge" placeholder="Challenge (optional)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<!-- SIDEBAR -->
<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar"></div>

<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let logs=[];

/* TURN STATE (ENFORCEMENT) */
let userState = {
  lockedNode:null,
  awaitingAnswer:false
};

/* LOG */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* HELPERS */
function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* HOME */
function home(){stack=[];render();}

/* NAV */
function enter(i){stack.push(i);render();}
function back(){stack.pop();render();}

/* CREATE */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* QUESTION CHECK */
function isQuestionUnanswered(id){
  const n=find(id);
  const children=items.filter(x=>x.parent===id);
  return n && n.type==="question" && children.length===0;
}

/* REACTIONS + TURN LOCK */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  reactions[k]=type;

  if(type==="down"){
    userState.lockedNode=id;
    userState.awaitingAnswer=isQuestionUnanswered(id);
    openDispute(id);
  }

  log(type,id);
  render();
}

/* DISPUTE POPUP */
let activeDisputeNode=null;

function openDispute(id){
  activeDisputeNode=id;
  document.getElementById("popup").style.display="block";
}

function closePopup(){
  activeDisputeNode=null;
  document.getElementById("popup").style.display="none";
}

/* SUBMIT + UNLOCK TURN */
function submitDispute(){

  const c=document.getElementById("counter").value.trim();
  const q=document.getElementById("challenge").value.trim();

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:activeDisputeNode,
      side:"right"
    });
  }

  if(q){
    items.push({
      id:id++,
      text:q,
      user:currentUser,
      parent:activeDisputeNode,
      side:"left"
    });
  }

  document.getElementById("counter").value="";
  document.getElementById("challenge").value="";

  closePopup();

  userState.lockedNode=null;
  userState.awaitingAnswer=false;

  log("dispute",activeDisputeNode);
  render();
}

/* SIDEBAR */
function openSidebar(id){
  document.getElementById("sidebar").style.display="block";
  document.getElementById("overlay").style.display="block";

  renderSidebar(id);
}

function closeSidebar(){
  document.getElementById("sidebar").style.display="none";
  document.getElementById("overlay").style.display="none";
}

let chat={};

function renderSidebar(id){

  chat[id]=chat[id]||[];

  document.getElementById("sidebar").innerHTML=`
    <div>Chat</div>

    ${chat[id].map(m=>`
      <div class="chatMsg"><b>${m.u}</b>: ${m.m}</div>
    `).join("")}

    <input id="chatIn" style="width:100%;margin-top:6px">
    <button onclick="sendChat(${id})">send</button>
  `;
}

function sendChat(id){
  const v=document.getElementById("chatIn").value.trim();
  if(!v) return;

  chat[id].push({u:currentUser,m:v});
  renderSidebar(id);
}

/* NODE */
function renderNode(node,showActions){

  const r=reactions[key(currentUser,node.id)];

  return `
    <div class="card" onclick="enter(${node.id})">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${node.user!==currentUser && showActions ? `
        <div class="actions">

          <span class="icon ${r==='up'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'down')">👎</span>

          <span class="icon"
                onclick="event.stopPropagation();openSidebar(${node.id})">💬</span>

        </div>
      `:""}

    </div>
  `;
}

/* DISPUTE VIEW */
function renderDispute(node){

  const children=items.filter(x=>x.parent===node.id);
  const forked=children.some(c=>c.side);

  const header=`
    <div class="card" style="border:1px solid #333">
      ${node.text} <span class="meta">@${node.user}</span>
    </div>
  `;

  if(!forked){
    return `
      <div>
        ${header}
        <div>${children.map(c=>renderNode(c,true)).join("")}</div>
      </div>
    `;
  }

  const left=children.filter(c=>c.side==="left");
  const right=children.filter(c=>c.side==="right");

  return `
    <div>
      ${header}
      <div class="dispute">
        <div class="lane">${left.map(c=>renderNode(c,true)).join("")}</div>
        <div class="lane">${right.map(c=>renderNode(c,true)).join("")}</div>
      </div>
    </div>
  `;
}

/* RENDER */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");
  const comp=document.getElementById("composerWrap");

  comp.style.display = stack.length ? "none" : "block";

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML+=renderNode(n,true);
    });
  } else {
    const cur=find(stack[stack.length-1]);
    nav.innerHTML=`<button onclick="back()">⚖️ back</button>`;
    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).reverse().map(l=>JSON.stringify(l)).join("<br>");
}

/* SEED DATA */
items.push({id:id++,text:"Truth exists independent of belief",user:"alice",parent:null});
items.push({id:id++,text:"Reality is socially constructed",user:"bob",parent:null});
items.push({id:id++,text:"Logic depends on language",user:"charlie",parent:null});
items.push({id:id++,text:"Some truths are emergent",user:"dana",parent:null});
items.push({id:id++,text:"Not all questions resolve",user:"eve",parent:null});

/* QUESTION (valid, no self-violation) */
items.push({id:id++,text:"What grounds truth?",user:"bob",parent:0,side:"left",type:"question"});

/* ANSWER */
items.push({id:id++,text:"Shared observation frameworks",user:"charlie",parent:5});

renderUsers();
render();

</script>

</body>
</html>
