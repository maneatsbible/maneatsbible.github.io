<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{display:flex;justify-content:space-between;padding:10px}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:20px;cursor:pointer;margin-right:10px}
.icon.active{opacity:1}
.icon.dim{opacity:.25}

.branch{
  margin-top:8px;
  padding:8px;
  background:#141414;
  border-radius:8px;
  cursor:pointer;
}

.answer{
  margin-top:6px;
  padding-left:10px;
  border-left:2px solid #4caf50;
}

.answerBtn{font-size:12px;color:#4caf50;cursor:pointer}

.turn{font-size:11px;color:#aaa;margin-top:4px}

.nav{
  padding:10px;
  cursor:pointer;
  color:#4caf50;
}

/* popup */
#popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;
}
#popup.open{display:flex}
.box{background:#1a1a1a;padding:12px;border-radius:10px;width:90%;max-width:420px}
.row{display:flex;justify-content:space-between;margin-top:10px}
.btn{font-size:22px;cursor:pointer;color:#fff}
.btn.ok{color:#4caf50}
.btn.cancel{color:#f44336}

/* log */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div>v33</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="nav"></div>
<div id="feed"></div>
<div id="log"></div>

<div id="popup">
  <div class="box">
    <div id="modeTitle">Respond</div>
    <textarea id="ask" placeholder="Ask"></textarea>
    <textarea id="proclaim" placeholder="Proclaim / Answer"></textarea>
    <div class="row">
      <span class="btn ok" onclick="submit()">✔</span>
      <span class="btn cancel" onclick="cancel()">✖</span>
    </div>
  </div>
</div>

<script>

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

/* per-user isolated state */
let state={};

function getState(){
  if(!state[currentUser]){
    state[currentUser]={
      reactions:{},
      navStack:[],
      logs:[]
    };
  }
  return state[currentUser];
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}

/* log */
function log(e,d){
  getState().logs.push({t:new Date().toISOString(),u:currentUser,e,d});
}

/* owes answer */
function owesAnswer(user){
  for(let n of items){
    if(n.type==="question"){
      const children = items.filter(x=>x.parent===n.id);
      const answered = children.some(c=>c.type==="answer");
      if(!answered && n.duel && n.duel.turn===user){
        return n;
      }
    }
  }
  return null;
}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* root */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({id:id++,text:t,user:currentUser,parent:null,type:"proclaim",side:"left"});
  document.getElementById("composer").value="";
  render();
}

/* react */
function react(i,type){

  if(owesAnswer(currentUser)) return;

  const node=find(i);
  if(!node || node.user===currentUser) return;

  const s=getState();
  s.reactions[i]=type;

  window.pendingSide = (type==="up")?"left":"right";
  openDispute(i,false);
}

/* popup */
let active=null,answerMode=false;

function openDispute(i,isAnswer){
  active=i;
  answerMode=isAnswer;

  document.getElementById("popup").classList.add("open");
  document.getElementById("modeTitle").innerText=isAnswer?"Answer":"Respond";
  document.getElementById("ask").style.display=isAnswer?"none":"block";
}

function cancel(){
  active=null;
  document.getElementById("popup").classList.remove("open");
}

function submit(){

  const ask=document.getElementById("ask").value.trim();
  const pro=document.getElementById("proclaim").value.trim();

  const parent=find(active);
  if(!parent){ cancel(); return; }

  let duel = parent.duel || {a:parent.user,b:currentUser,turn:currentUser};
  if(duel.turn!==currentUser){ cancel(); return; }

  const opponent = currentUser===duel.a ? duel.b : duel.a;

  function push(text,type){
    items.push({
      id:id++,
      text,
      user:currentUser,
      parent:active,
      type,
      side:window.pendingSide,
      duel:{a:duel.a,b:duel.b,turn:opponent}
    });
  }

  if(answerMode){
    if(!pro){ cancel(); return; }
    push(pro,"answer");
  }else{
    if(ask) push(ask,"question");
    if(pro) push(pro,"proclaim");
  }

  cancel();
  render();
}

/* navigation */
function enter(id){
  getState().navStack.push(id);
  render();
}

function back(){
  getState().navStack.pop();
  render();
}

/* render */
function render(){

  const feed=document.getElementById("feed");
  const nav=document.getElementById("nav");

  feed.innerHTML="";
  nav.innerHTML="";

  const s=getState();

  if(s.navStack.length){
    nav.innerHTML=`<div class="nav" onclick="back()">⬅ back</div>`;
  }

  let roots;

  if(s.navStack.length){
    roots=[find(s.navStack[s.navStack.length-1])];
  }else{
    roots=items.filter(x=>x.parent===null);
  }

  function renderNode(node){

    const children = items.filter(x=>x.parent===node.id);
    const answers = children.filter(c=>c.type==="answer");

    const my = s.reactions[node.id];

    return `
      <div class="card">
        <div>${node.text} <span class="meta">@${node.user}</span></div>

        ${node.user!==currentUser?`
        <div class="actions">
          <span class="icon ${my==='up'?'active':my?'dim':''}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${my==='down'?'active':my?'dim':''}" onclick="react(${node.id},'down')">👎</span>
        </div>`:""}

        ${node.type==="question" && node.duel && node.duel.turn===currentUser?`
          <div class="answerBtn" onclick="openDispute(${node.id},true)">Answer</div>
        `:""}

        ${node.duel?`<div class="turn">turn: ${node.duel.turn}</div>`:""}

        ${answers.map(a=>`
          <div class="answer">${a.text} <span class="meta">@${a.user}</span></div>
        `).join("")}

        ${children.filter(c=>c.type!=="answer").map(c=>`
          <div class="branch" onclick="enter(${c.id})">
            ${c.text} → 
          </div>
        `).join("")}
      </div>
    `;
  }

  roots.forEach(r=>{
    feed.innerHTML+=renderNode(r);
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  s.logs.slice(-200).forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* init */
renderUsers();

/* test */
items.push({id:id++,text:"Truth claims should be examined",user:"alice",parent:null,type:"proclaim",side:"left"});
items.push({
  id:id++,
  text:"What makes a claim examinable?",
  user:"bob",
  parent:0,
  type:"question",
  side:"right",
  duel:{a:"alice",b:"bob",turn:"alice"}
});

render();

</script>
</body>
</html>
