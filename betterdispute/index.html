<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
}

.container{
  max-width:1000px;
}

.lanes{
  display:flex;
  gap:10px;
}

.lane{
  flex:1;
  background:#141414;
  padding:10px;
  border-radius:8px;
  min-height:80vh;
  overflow:auto;
}

.card{
  background:#1b1b1b;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

.meta{
  font-size:11px;
  color:#aaa;
}

button{
  font-size:11px !important;
  margin-right:4px;
}

.debug{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:180px;
  background:#0a0a0a;
  border-top:1px solid #333;
  overflow:auto;
  font-size:11px;
  padding:6px;
  color:#9f9;
}

.userbar{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.user{
  border:1px solid #444;
  padding:3px 6px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
}

.active{
  background:#2a2a2a;
}
</style>
</head>

<body>

<div class="container py-3">

<h5 class="text-center">Better Dispute</h5>

<div class="userbar" id="users"></div>

<div class="lanes">

  <div class="lane">
    <b>Continuing Lane</b>
    <div id="left"></div>
  </div>

  <div class="lane">
    <b>Disputed Lane</b>
    <div id="right"></div>
  </div>

</div>

</div>

<!-- DEBUG CONSOLE -->
<div class="debug" id="debug"></div>

<!-- DISPUTE MODAL -->
<div id="modal" style="display:none; position:fixed; top:20%; left:50%; transform:translateX(-50%);
background:#222; padding:12px; border-radius:8px; width:90%; max-width:320px; z-index:999;">

<div><b>Dispute</b></div>

<select id="mode" class="form-control mb-2">
  <option value="proclaim">Proclamation</option>
  <option value="question">Question</option>
</select>

<textarea id="text" class="form-control mb-2"></textarea>

<button class="btn btn-success btn-sm" onclick="submitDispute()">Submit</button>
<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>

</div>

<script>

//////////////////////
// DEBUG LOGGER
//////////////////////

function log(msg,obj){
  let el=document.getElementById("debug");
  let line=document.createElement("div");
  line.innerText = msg + (obj ? " " + JSON.stringify(obj) : "");
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

//////////////////////
// AUTH (STUB + TEST MODE)
//////////////////////

let users=["alice","bob","charlie","debug_user"];
let currentUser="alice";

function renderUsers(){
  let el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    let d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.innerText=u;
    d.onclick=()=>{
      currentUser=u;
      log("user_switch",{user:u});
      renderUsers();
    };
    el.appendChild(d);
  });
}

//////////////////////
// DATA MODEL
//////////////////////

let id=0;

let items=[
  {
    id:id++,
    text:"Start a Proclamation",
    type:"proclaim",
    user:"system",
    parent:null,
    lane:"left",
    children:[]
  }
];

function find(i){
  return items.find(x=>x.id===i);
}

//////////////////////
// CREATE + TRACE
//////////////////////

function create(text,type,parent,lane){

  let item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    lane:lane,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    let p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",{item});

  render();
}

//////////////////////
// PROCLAIM ENTRY
//////////////////////

function newProclamation(){
  let t=prompt("Proclamation:");
  if(!t) return;

  create(t,"proclaim",null,"left");
}

//////////////////////
// AGREE (NO BRANCH)
//////////////////////

function agree(id){
  log("agree",{id,user:currentUser});
}

//////////////////////
// DISAGREE = FORK
//////////////////////

let active=null;

function disagree(id){
  active=id;
  document.getElementById("modal").style.display="block";
  log("disagree_open",{id});
}

function closeModal(){
  document.getElementById("modal").style.display="none";
  document.getElementById("text").value="";
}

function submitDispute(){

  let mode=document.getElementById("mode").value;
  let text=document.getElementById("text").value;

  if(!text) return;

  create(text,mode,active,"right");

  log("fork",{from:active,text,mode});

  closeModal();
}

//////////////////////
// RENDER (TWO LANES)
//////////////////////

function render(){

  let left=document.getElementById("left");
  let right=document.getElementById("right");

  left.innerHTML="";
  right.innerHTML="";

  items
    .filter(x=>x.parent===null)
    .forEach(x=>renderItem(x,0));
}

function renderItem(item,depth){

  let div=document.createElement("div");
  div.className="card";
  div.style.marginLeft=depth*10+"px";

  div.innerHTML=`
    <b>${item.type.toUpperCase()}</b>: ${item.text}
    <div class="meta">@${item.user}</div>

    <button class="btn btn-sm btn-primary" onclick="newProclamation()">Proclaim</button>
    <button class="btn btn-sm btn-success" onclick="agree(${item.id})">Agree</button>
    <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})">Disagree</button>
  `;

  let target = item.lane==="right"
    ? document.getElementById("right")
    : document.getElementById("left");

  target.appendChild(div);

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>renderItem(c,depth+1));
}

//////////////////////
// INIT
//////////////////////

renderUsers();
render();

</script>

</body>
</html>
