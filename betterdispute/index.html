<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:11px;color:#777}

/* USERS */
#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.7;
}

.user.active{
  opacity:1;
  border-color:#fff;
}

/* COMPOSER */
#composer{
  width:100%;
  height:80px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
}

/* FEED */
#feed{
  padding:10px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{
  font-weight:600;
}

.meta{
  font-size:11px;
  color:#888;
  margin-top:4px;
}

/* ACTIONS */
.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* DISPUTE GRID */
.dispute{
  display:none;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.dispute.active{
  display:grid;
}

.col{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:80px;
}

.input{
  width:100%;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:6px;
  font-size:12px;
  border-radius:6px;
  margin-top:6px;
}

/* LOG */
#log{
  display:none;
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:200px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version">v5.0.0</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>

<div id="log"></div>

<script>

const VERSION="5.0.0";

//////////////////////
// STATE
//////////////////////

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];

function log(event,data){

  const el=document.getElementById("log");

  const div=document.createElement("div");
  div.innerText=JSON.stringify({
    time:Date.now(),
    version:VERSION,
    user:currentUser,
    event,
    data
  });

  el.appendChild(div);
}

//////////////////////
// STARTUP LOG (FIXED)
//////////////////////

function startup(){
  log("startup",{version:VERSION});
}

//////////////////////
// USERS
//////////////////////

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.innerText=u;

    d.onclick=()=>{
      currentUser=u;
      log("switch",{user:u});
      renderUsers();
      render();
    };

    el.appendChild(d);
  });
}

//////////////////////
// CORE
//////////////////////

function find(i){ return items.find(x=>x.id===i); }

function create(text,type,parent=null){

  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  if(parent!==null){
    const p=find(parent);
    if(p) p.children.push(item.id);
  }

  log("create",item);
}

function createRoot(){

  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  create(t,"proclaim",null);
  document.getElementById("composer").value="";
  render();
}

//////////////////////
// DISAGREE = REAL TWO COLUMN EXPANSION
//////////////////////

function toggleDispute(id){
  const el=document.getElementById("d-"+id);
  el.classList.toggle("active");
  log("disagree_open",{id});
}

function submitLeft(id){
  const el=document.getElementById("l-"+id);
  const t=el.value.trim();
  if(!t) return;

  create(t,"question",id);
  el.value="";
  render();
}

function submitRight(id){
  const el=document.getElementById("r-"+id);
  const t=el.value.trim();
  if(!t) return;

  create(t,"proclaim",id);
  el.value="";
  render();
}

//////////////////////
// FEED RULE (FIXED)
//////////////////////

function topLevel(){
  return items.filter(x=>x.parent===null);
}

//////////////////////
// RENDER
//////////////////////

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  topLevel().forEach(item=>{

    const div=document.createElement("div");

    div.innerHTML=`
      <div class="card">
        <div class="text">${item.text}</div>
        <div class="meta">${item.type.toUpperCase()} · @${item.user}</div>

        <div class="actions">
          <button onclick="agree(${item.id})">Agree</button>
          <button onclick="toggleDispute(${item.id})">Disagree</button>
        </div>

        <div class="dispute" id="d-${item.id}">
          <div class="col">
            <div>Challenge</div>
            <input class="input" id="l-${item.id}" placeholder="Ask / challenge...">
            <button onclick="submitLeft(${item.id})">Submit</button>
          </div>

          <div class="col">
            <div>Counter</div>
            <input class="input" id="r-${item.id}" placeholder="Proclaim counter...">
            <button onclick="submitRight(${item.id})">Submit</button>
          </div>
        </div>
      </div>
    `;

    feed.appendChild(div);
  });
}

//////////////////////
// ACTIONS
//////////////////////

function agree(id){
  const i=find(id);
  if(i.user===currentUser) return;
  log("agree",{id});
}

//////////////////////
// INIT
//////////////////////

renderUsers();
startup();

/* seed */
create("All claims invite dispute","proclaim",null);
create("Is dispute always productive?","question",0);

render();

</script>

</body>
</html>
