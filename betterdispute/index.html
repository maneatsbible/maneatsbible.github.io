<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35.2</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
}

/* nicer home button */
.homeBtn{
  background:#1f1f1f;
  border:1px solid #333;
  color:#eee;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}
.homeBtn:hover{border-color:#4caf50}

#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.rootItem{
  margin:10px;
  padding:10px;
  background:#1a1a1a;
  border-radius:10px;
  cursor:pointer;
  position:relative;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:18px;cursor:pointer;margin-right:8px}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <button class="homeBtn" onclick="home()">🏠 Home</button>
  <div>Better Dispute v35.2</div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="create()">Proclaim</button>

<div id="nav"></div>
<div id="view"></div>
<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];

let stack=[];
let reactions={};
let logs=[];

function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
    };
    el.appendChild(d);
  });
}

/* HOME */
function home(){
  stack=[];
  render();
}

/* create */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null,
    type:"proclaim"
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* reactions (STRICT) */
function react(id,type){
  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);

  if(reactions[k]) return; // no change after first decision

  reactions[k]=type;
  log(type,id);
  render();
}

/* navigation */
function enter(id){
  stack.push(id);
  log("enter",id);
  render();
}

function back(){
  stack.pop();
  log("back","");
  render();
}

/* node render (used in both lanes + root) */
function renderNode(node,showActions){

  const r = reactions[key(currentUser,node.id)];

  return `
    <div class="card">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${showActions ? `
        <div class="actions">
          <span class="icon ${r==='up'?'active':'dim'}" onclick="react(${node.id},'up')">👍</span>
          <span class="icon ${r==='down'?'active':'dim'}" onclick="react(${node.id},'down')">👎</span>
        </div>
      ` : ""}

      <div style="margin-top:6px;color:#4caf50;cursor:pointer;font-size:12px"
           onclick="enter(${node.id})">
        open →
      </div>

    </div>
  `;
}

/* DISPUTE VIEW */
function renderDispute(node){

  const children = items.filter(x=>x.parent===node.id);

  const left = children.filter(c=>c.side==="left");
  const right = children.filter(c=>c.side==="right");

  return `
    <div>

      <div class="card" style="border:1px solid #333">
        <div>${node.text} <span class="meta">@${node.user}</span></div>
      </div>

      <div class="dispute">

        <div class="lane">
          ${left.map(c=>renderNode(c,true)).join("")}
        </div>

        <div class="lane">
          ${right.map(c=>renderNode(c,true)).join("")}
        </div>

      </div>

    </div>
  `;
}

/* ROOT VIEW (now includes up/down controls) */
function renderRoot(){

  return items
    .filter(x=>x.parent===null)
    .map(n=>renderNode(n,true))
    .join("");
}

/* MAIN */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){

    view.innerHTML = renderRoot();

  } else {

    const current = find(stack[stack.length-1]);

    nav.innerHTML = `<button onclick="back()">⬅ back</button>`;

    view.innerHTML = renderDispute(current);
  }

  const logEl=document.getElementById("log");
  logEl.innerHTML = logs.slice(-200).reverse()
    .map(l=>JSON.stringify(l)).join("<br>");
}

/* =======================
   EXPANDED TEST DATA
   ======================= */

/* TOP-LEVEL PROCLAMATIONS (many unchallenged) */
items.push({id:id++,text:"Truth exists independent of opinion",user:"alice",parent:null});
items.push({id:id++,text:"Logic is a human construct",user:"bob",parent:null});
items.push({id:id++,text:"Language limits thought",user:"charlie",parent:null});
items.push({id:id++,text:"Perception defines reality",user:"dana",parent:null});
items.push({id:id++,text:"Some truths are revealed, not discovered",user:"eve",parent:null});

/* QUESTION + ANSWER CHAIN */
items.push({id:id++,text:"What makes a claim valid?",user:"alice",parent:0,side:"right",type:"question"});
items.push({id:id++,text:"Empirical consistency",user:"bob",parent:5,side:"left",type:"answer"});
items.push({id:id++,text:"But consistency across what frame?",user:"charlie",parent:6,side:"right",type:"proclaim"});

/* DISPUTE BRANCH */
items.push({id:id++,text:"Truth depends on consensus",user:"bob",parent:1,side:"right"});
items.push({id:id++,text:"Consensus can be wrong",user:"alice",parent:8,side:"left"});
items.push({id:id++,text:"Wrong consensus still functions socially",user:"charlie",parent:9,side:"right"});

/* MORE UNCHALLENGED ROOT PROCLAMATIONS */
items.push({id:id++,text:"Reason requires shared assumptions",user:"eve",parent:null});
items.push({id:id++,text:"Disagreement is necessary for clarity",user:"alice",parent:null});
items.push({id:id++,text:"Not all questions have answers",user:"bob",parent:null});

renderUsers();
render();

</script>

</body>
</html>
