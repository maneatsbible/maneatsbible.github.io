<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Better Dispute</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #111;
      color: #eee;
    }
    .column {
      min-height: 70vh;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 10px;
      background: #1a1a1a;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
    }
    .proclamation { background: #2a2a2a; }
    .question { background: #1f3a5f; }
    .answer { background: #1f5f3a; }

    .locked {
      opacity: 0.4;
      pointer-events: none;
    }

    .score {
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="container-fluid p-2">
  <h4 class="text-center mb-3">⚖️ Better Dispute</h4>

  <div class="row g-2">
    <!-- LEFT SIDE -->
    <div class="col-6">
      <div class="column" id="leftColumn"></div>

      <div class="mt-2">
        <select id="leftType" class="form-select mb-1">
          <option value="proclamation">Proclamation</option>
          <option value="question">Question</option>
          <option value="answer">Answer</option>
        </select>
        <textarea id="leftInput" class="form-control mb-1" placeholder="Enter message"></textarea>
        <button class="btn btn-primary w-100" onclick="submitMessage('left')">Send</button>
      </div>

      <div class="score mt-2">
        Unanswered: <span id="leftUnanswered">0</span>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="col-6">
      <div class="column" id="rightColumn"></div>

      <div class="mt-2">
        <select id="rightType" class="form-select mb-1">
          <option value="proclamation">Proclamation</option>
          <option value="question">Question</option>
          <option value="answer">Answer</option>
        </select>
        <textarea id="rightInput" class="form-control mb-1" placeholder="Enter message"></textarea>
        <button class="btn btn-danger w-100" onclick="submitMessage('right')">Send</button>
      </div>

      <div class="score mt-2">
        Unanswered: <span id="rightUnanswered">0</span>
      </div>
    </div>
  </div>
</div>

<script>
let state = {
  pendingQuestion: null, // { to: 'left'|'right' }
  unanswered: {
    left: 0,
    right: 0
  }
};

function submitMessage(side) {
  const input = document.getElementById(side + "Input");
  const type = document.getElementById(side + "Type").value;
  const text = input.value.trim();

  if (!text) return;

  const opponent = side === 'left' ? 'right' : 'left';

  // RULE: must answer pending question
  if (state.pendingQuestion && state.pendingQuestion.to === side && type !== "answer") {
    alert("You must answer the pending question first.");
    return;
  }

  // Render message
  renderMessage(side, type, text);

  // Handle logic
  if (type === "question") {
    state.pendingQuestion = { to: opponent };
    state.unanswered[side]++;
    updateScores();
    lockSide(side, true);
    lockSide(opponent, false);
  }

  if (type === "answer") {
    if (state.pendingQuestion && state.pendingQuestion.to === side) {
      state.pendingQuestion = null;
      lockSide('left', false);
      lockSide('right', false);
    }
  }

  input.value = "";
}

function renderMessage(side, type, text) {
  const col = document.getElementById(side + "Column");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = type.toUpperCase() + ": " + text;
  col.appendChild(div);
  col.scrollTop = col.scrollHeight;
}

function lockSide(side, locked) {
  const controls = document.querySelector(`#${side}Type`).parentElement;
  if (locked) {
    controls.classList.add("locked");
  } else {
    controls.classList.remove("locked");
  }
}

function updateScores() {
  document.getElementById("leftUnanswered").innerText = state.unanswered.left;
  document.getElementById("rightUnanswered").innerText = state.unanswered.right;
}
</script>

</body>
</html>
