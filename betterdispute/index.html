<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v36.4</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
  border-bottom:1px solid #222;
}

#homeBtn{
  background:#1c1c1c;
  border:1px solid #333;
  color:#aaa;
  padding:5px 8px;
  border-radius:6px;
  cursor:pointer;
}

#title{font-weight:600}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  cursor:pointer;
  opacity:.6;
}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  cursor:pointer;
  margin-right:8px;
}
.icon.dim{opacity:.25}
.icon.active{opacity:1}

/* TRUE TWO LANE */
.disputeWrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:40px;
}

.laneTitle{
  font-size:11px;
  color:#777;
  margin-bottom:4px;
}

#nav{padding:10px}

/* LOG ALWAYS */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:180px;
  overflow:auto;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:20;
}

/* SIDEBAR RESTORED */
#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:40;
}

#sidebar{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0c0c0c;
  border-left:1px solid #333;
  padding:10px;
  display:none;
  z-index:50;
}

.chatMsg{font-size:12px;margin-bottom:6px}
</style>
</head>

<body>

<header>
  <button id="homeBtn" onclick="home()">⚖ home</button>
  <div id="title">v36.4</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup">
  <div>Dispute</div>
  <textarea id="counter" placeholder="Counter (optional)"></textarea>
  <textarea id="challenge" placeholder="Challenge (optional)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar"></div>

<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let pending=null;

let chat={};
let logs=[];

/* ---------------- HELPERS ---------------- */

function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* ---------------- USERS ---------------- */

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* ---------------- NAV ---------------- */

function home(){
  stack=[];
  render();
}

function enter(id){
  stack=[id];
  render();
}

function back(){
  stack=[];
  render();
}

/* ---------------- CREATE ---------------- */

function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* ---------------- REACT ---------------- */

function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pending=id;
    document.getElementById("popup").style.display="block";
    return;
  }

  reactions[k]="up";
  log("up",id);
  render();
}

/* ---------------- DISPUTE ---------------- */

function closePopup(){
  pending=null;
  document.getElementById("popup").style.display="none";
}

function submitDispute(){

  if(!pending) return;

  const target=pending;

  const c=document.getElementById("counter").value.trim();
  const q=document.getElementById("challenge").value.trim();

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      side:"right"
    });
  }

  if(q){
    items.push({
      id:id++,
      text:q,
      user:currentUser,
      parent:target,
      side:"left"
    });
  }

  document.getElementById("counter").value="";
  document.getElementById("challenge").value="";

  log("dispute",target);

  pending=null;
  closePopup();
  render();
}

/* ---------------- SIDEBAR (RESTORED + FIXED) ---------------- */

function openSidebar(id){
  chat[id]=chat[id]||[];

  document.getElementById("sidebar").style.display="block";
  document.getElementById("overlay").style.display="block";

  renderSidebar(id);
}

function closeSidebar(){
  document.getElementById("sidebar").style.display="none";
  document.getElementById("overlay").style.display="none";
}

function renderSidebar(id){

  document.getElementById("sidebar").innerHTML=`
    <div style="color:#888;margin-bottom:8px">node chat</div>

    ${chat[id].map(m=>`
      <div class="chatMsg"><b>${m.u}</b>: ${m.m}</div>
    `).join("")}

    <input id="chatIn" style="width:100%;margin-top:8px">
    <button onclick="sendChat(${id})">send</button>
  `;
}

function sendChat(id){
  const v=document.getElementById("chatIn").value.trim();
  if(!v) return;

  chat[id].push({u:currentUser,m:v});
  renderSidebar(id);
}

/* ---------------- NODE ---------------- */

function node(n){

  const r=reactions[key(currentUser,n.id)];
  const show=n.user!==currentUser;

  return `
    <div class="card" onclick="enter(${n.id})">
      <div>${n.text} <span class="meta">@${n.user}</span></div>

      ${show ? `
        <div class="actions">

          <span class="icon ${r==='up'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
            onclick="event.stopPropagation();react(${n.id},'down')">👎</span>

          <span class="icon"
            onclick="event.stopPropagation();openSidebar(${n.id})">💬</span>

        </div>
      `:""}
    </div>
  `;
}

/* ---------------- DISPUTE VIEW ---------------- */

function renderDispute(root){

  const children=items.filter(x=>x.parent===root.id);

  const left=children.filter(x=>x.side==="left");
  const right=children.filter(x=>x.side==="right");

  return `
    <div>

      <div class="card">
        ${root.text} <span class="meta">@${root.user}</span>
      </div>

      <div class="disputeWrap">

        <div class="lane">
          <div class="laneTitle">Left</div>
          ${left.map(node).join("")}
        </div>

        <div class="lane">
          <div class="laneTitle">Right</div>
          ${right.map(node).join("")}
        </div>

      </div>

    </div>
  `;
}

/* ---------------- RENDER ---------------- */

function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){

    items.filter(x=>x.parent===null)
      .forEach(n=>view.innerHTML+=node(n));

  } else {

    const cur=find(stack[0]);

    nav.innerHTML=`
      <button onclick="back()" style="
        background:#1c1c1c;
        border:1px solid #333;
        color:#aaa;
        padding:5px 8px;
        border-radius:6px;
        cursor:pointer;
      ">back</button>
    `;

    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).reverse().map(l=>JSON.stringify(l)).join("<br>");
}

/* ---------------- TEST DATA ---------------- */

items.push({id:id++,text:"Truth exists independent of belief",user:"alice",parent:null});
items.push({id:id++,text:"Truth is consensus-based",user:"bob",parent:null});
items.push({id:id++,text:"Logic depends on language",user:"charlie",parent:null});

items.push({id:id++,text:"Consensus is fragile",user:"alice",parent:1,side:"left"});
items.push({id:id++,text:"Consensus is functional",user:"bob",parent:1,side:"right"});
items.push({id:id++,text:"Function ≠ truth",user:"dana",parent:1,side:"left"});

renderUsers();
render();

</script>

</body>
</html>
