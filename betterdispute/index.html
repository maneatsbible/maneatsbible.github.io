<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{margin:0;font-family:system-ui;background:#0f0f0f;color:#eee}
header{display:flex;justify-content:space-between;padding:10px}
#users{display:flex;gap:6px;padding:8px}
.user{padding:4px 8px;border:1px solid #333;border-radius:999px;cursor:pointer;opacity:.6}
.user.active{opacity:1;border-color:#fff}

textarea{width:100%;height:90px;background:#0b0b0b;color:#eee;border:1px solid #333;padding:8px}

.card{background:#1a1a1a;margin:10px;padding:10px;border-radius:10px}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}
.icon{font-size:20px;cursor:pointer;margin-right:10px;opacity:.7}
.icon.active{opacity:1}
.icon.dim{opacity:.25}

.turn{font-size:11px;margin-top:4px;color:#aaa}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{background:#141414;padding:8px;border-radius:8px}

.node{margin-top:8px;border-left:2px solid #333;padding-left:6px}

/* popup */
#popup{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;
}
#popup.open{display:flex}
.box{background:#1a1a1a;padding:12px;border-radius:10px;width:90%;max-width:420px}
.row{display:flex;justify-content:space-between;margin-top:10px}
.btn{font-size:22px;cursor:pointer;color:#fff}
.btn.ok{color:#4caf50}
.btn.cancel{color:#f44336}

/* log */
#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- popup -->
<div id="popup">
  <div class="box">
    <div>Dispute</div>
    <textarea id="ask" placeholder="Ask (challenge)"></textarea>
    <textarea id="proclaim" placeholder="Proclaim (counter)"></textarea>
    <div class="row">
      <span class="btn ok" onclick="submit()">✔</span>
      <span class="btn cancel" onclick="cancel()">✖</span>
    </div>
  </div>
</div>

<script>

let VERSION=28;
document.getElementById("version").innerText="v"+VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];
let reactions={};

let active=null;

/* log */
function log(e,d){
  logs.push({t:new Date().toISOString(),u:currentUser,e,d});
}

/* helpers */
function find(i){return items.find(x=>x.id===i);}
function isOwner(node){return node.user===currentUser;}

/* users */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();log("switch",u);}
    el.appendChild(d);
  });
}

/* root */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    type:"proclaim",
    duel:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* reactions */
function react(i,type){
  const node=find(i);
  if(!node || isOwner(node)) return;

  reactions[i]=reactions[i]||{};
  reactions[i][currentUser]=type;

  if(type==="down") openDispute(i);

  render();
  log(type,i);
}

/* dispute */
function openDispute(i){
  active=i;
  document.getElementById("popup").classList.add("open");
}

function cancel(){
  active=null;
  document.getElementById("popup").classList.remove("open");
  log("cancel");
}

function submit(){

  const ask=document.getElementById("ask").value.trim();
  const pro=document.getElementById("proclaim").value.trim();

  const parent=find(active);
  if(!parent){cancel();return;}

  let duel = parent.duel || {a:parent.user,b:currentUser,turn:currentUser};

  if(duel.turn!==currentUser){cancel();return;}

  const opponent = currentUser===duel.a ? duel.b : duel.a;

  function push(text,type){
    items.push({
      id:id++,
      text,
      user:currentUser,
      parent:active,
      type,
      duel:{a:duel.a,b:duel.b,turn:opponent}
    });
  }

  if(ask) push(ask,"question");
  if(pro) push(pro,"proclaim");

  cancel();
  render();
  log("dispute",active);
}

/* render */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null).forEach(root=>{

    function renderNode(node){

      const children = items.filter(x=>x.parent===node.id);

      const left = children.filter(c=>c.type==="question");
      const right = children.filter(c=>c.type!=="question");

      const my = reactions[node.id]?.[currentUser];

      return `
        <div class="node">
          <div>${node.text} <span class="meta">@${node.user}</span></div>

          ${node.user!==currentUser ? `
          <div class="actions">
            <span class="icon ${my==='up'?'active':my?'dim':''}" onclick="react(${node.id},'up')">👍</span>
            <span class="icon ${my==='down'?'active':my?'dim':''}" onclick="react(${node.id},'down')">👎</span>
          </div>
          `:""}

          ${node.duel ? `<div class="turn">turn: ${node.duel.turn}</div>`:""}

          <div class="dispute">
            <div class="lane">
              ${left.map(renderNode).join("")}
            </div>
            <div class="lane">
              ${right.map(renderNode).join("")}
            </div>
          </div>
        </div>
      `;
    }

    feed.innerHTML += `<div class="card">${renderNode(root)}</div>`;
  });

  /* log latest correct */
  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.slice(-200).forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* init */
renderUsers();
render();

/* test */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null,type:"proclaim"});
items.push({id:id++,text:"Some claims resist challenge",user:"bob",parent:null,type:"proclaim"});

</script>

</body>
</html>
