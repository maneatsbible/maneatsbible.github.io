<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Better Dispute v1</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f10;
      color: #fff;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 12px;
    }

    .card {
      background: #1a1a1c;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .message {
      font-size: 16px;
      line-height: 1.4;
    }

    .meta {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 6px;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      background: #2a2a2d;
      color: #fff;
      font-size: 14px;
    }

    button.primary {
      background: #3a6df0;
    }

    .chain {
      margin-top: 12px;
    }

    .turn {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 10px;
    }

    .question {
      background: #2c2c2f;
    }

    .answer {
      background: #1f3a2c;
    }

    .turn.you {
      outline: 2px solid #3a6df0;
    }

    .status {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 6px;
    }

    .inputBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0f0f10;
      padding: 10px;
      border-top: 1px solid #222;
    }

    .inputBar input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- ROOT MESSAGE -->
  <div class="card" id="rootCard">
    <div class="message" id="rootText">
      “This claim can be challenged.”
    </div>

    <div class="meta">
      Posted by @alice
    </div>

    <div class="actions">
      <button class="primary" onclick="startChallenge()">Challenge</button>
      <button onclick="viewChains()">View Interrogations</button>
    </div>
  </div>

  <!-- INTERROGATION LIST -->
  <div id="chainList"></div>

  <!-- ACTIVE CHAIN -->
  <div id="chainView" class="hidden"></div>

</div>

<!-- INPUT -->
<div class="inputBar hidden" id="inputBar">
  <input id="inputField" placeholder="" />
</div>

<script>
  // ---- MOCK USER ----
  const currentUser = "bob";

  // ---- STATE ----
  let chains = [];
  let activeChain = null;

  // ---- START CHALLENGE ----
  function startChallenge() {
    const newChain = {
      id: Date.now(),
      root_id: 1,
      user_a: "alice",
      user_b: currentUser,
      turns: [],
      turn_state: "question", // first move = challenger asks
      active_user: currentUser,
      status: "active"
    };

    chains.push(newChain);
    openChain(newChain.id);

    setInput("Ask a precise question...");
  }

  // ---- VIEW CHAINS ----
  function viewChains() {
    const list = document.getElementById("chainList");
    list.innerHTML = "";

    chains.forEach(c => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        Interrogation (${c.turns.length} turns)<br/>
        <button onclick="openChain(${c.id})">Open</button>
      `;
      list.appendChild(div);
    });
  }

  // ---- OPEN CHAIN ----
  function openChain(id) {
    activeChain = chains.find(c => c.id === id);
    renderChain();
    document.getElementById("chainView").classList.remove("hidden");
  }

  // ---- RENDER CHAIN ----
  function renderChain() {
    const view = document.getElementById("chainView");

    let html = `<div class="card"><strong>Interrogation</strong></div>`;

    activeChain.turns.forEach(t => {
      html += `
        <div class="turn ${t.type} ${t.user === currentUser ? 'you' : ''}">
          <div>${t.text}</div>
          <div class="meta">@${t.user}</div>
        </div>
      `;
    });

    html += `<div class="status">`;

    if (activeChain.active_user === currentUser) {
      html += activeChain.turn_state === "question"
        ? "Your turn to ask"
        : "Your turn to answer";
      showInput();
    } else {
      html += "Waiting on them";
      hideInput();
    }

    html += `</div>`;

    view.innerHTML = html;
  }

  // ---- INPUT ----
  const input = document.getElementById("inputField");

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") submitTurn();
  });

  function setInput(placeholder) {
    input.placeholder = placeholder;
    showInput();
    input.focus();
  }

  function showInput() {
    document.getElementById("inputBar").classList.remove("hidden");
  }

  function hideInput() {
    document.getElementById("inputBar").classList.add("hidden");
  }

  // ---- SUBMIT TURN ----
  function submitTurn() {
    if (!input.value.trim()) return;

    const type = activeChain.turn_state;

    activeChain.turns.push({
      type: type,
      user: currentUser,
      text: input.value.trim()
    });

    // SWITCH TURN
    activeChain.turn_state = type === "question" ? "answer" : "question";
    activeChain.active_user =
      activeChain.active_user === activeChain.user_a
        ? activeChain.user_b
        : activeChain.user_a;

    input.value = "";

    renderChain();
  }

</script>

</body>
</html>
