<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f0f0f;
  color:#eee;
  font-size:14px;
  transition:background 0.3s;
}

.container{ max-width:800px; }

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.version{
  font-size:11px;
  color:#888;
}

/* USER SWITCHER */
.userbar{
  display:flex;
  gap:6px;
  margin:10px 0;
  flex-wrap:wrap;
}

.user{
  border:1px solid #444;
  padding:3px 6px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
}

.active{
  background:#2a2a2a;
}

/* COMPOSER */
.composer{
  background:#111;
  padding:10px;
  border-radius:8px;
  margin-bottom:12px;
  border:1px solid #333;
}

textarea{
  width:100%;
  height:100px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #444;
  padding:8px;
  border-radius:6px;
}

/* STATEMENTS */
.statement{
  background:#262626;
  padding:12px;
  border-radius:10px;
  margin-bottom:8px;
  border:1px solid #3a3a3a;
}

.statement .text{
  font-size:15px;
  font-weight:600;
  color:#fff;
}

.meta{
  font-size:11px;
  color:#aaa;
  margin-top:4px;
}

/* TWO COLUMN */
.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:8px;
}

.col{
  background:#141414;
  border-radius:8px;
  padding:8px;
  min-height:70px;
}

.child{
  background:#1b1b1b;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

/* INPUTS */
.inputBox{
  width:100%;
  background:#0b0b0b;
  border:1px solid #444;
  color:#eee;
  border-radius:6px;
  padding:6px;
  font-size:12px;
}

/* LOG */
.log{
  margin-top:20px;
  background:#0a0a0a;
  border-top:1px solid #333;
  font-size:11px;
  color:#9f9;
  padding:8px;
  max-height:180px;
  overflow:auto;
}

/* USER THEMES (TEST VISUAL SHIFT) */
.theme-alice{ background:#0f0f0f; }
.theme-bob{ background:#111018; }
.theme-charlie{ background:#101010; }
</style>
</head>

<body>

<div class="container py-3">

<div class="header">
  <h5>Better Dispute</h5>
  <div class="version">v2.2.0</div>
</div>

<div class="userbar" id="users"></div>

<div class="composer">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button class="btn btn-primary btn-sm mt-2" onclick="createRoot()">Proclaim</button>
</div>

<div id="feed"></div>

<div class="log" id="log"></div>

</div>

<script>

const APP_VERSION="2.2.0";

//////////////////////
// USERS
//////////////////////

let users=["alice","bob","charlie"];
let currentUser="alice";

function applyTheme(){
  document.body.className="theme-"+currentUser;
}

function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.innerText=u;

    d.onclick=()=>{
      currentUser=u;
      applyTheme();
      log("user_switch",{user:u});
      renderUsers();
    };

    el.appendChild(d);
  });

  applyTheme();
}

//////////////////////
// DATA
//////////////////////

let id=0;
let items=[];

function find(i){
  return items.find(x=>x.id===i);
}

//////////////////////
// SEED DATA (TEST DISPUTES)
//////////////////////

function seed(){

  const a=addSeed("Truth requires confrontation","proclaim","alice",null);
  const b=addSeed("Is that always the case?","question","bob",a);
  const c=addSeed("Only in contested claims","proclaim","charlie",a);

  const d=addSeed("Faith overrides contradiction","proclaim","bob",null);
  const e=addSeed("How do you define contradiction?","question","alice",d);
  const f=addSeed("By consistency failure","proclaim","bob",d);
}

function addSeed(text,type,user,parent){

  const item={id:id++,text,type,user,parent,children:[]};

  items.push(item);

  if(parent!==null){
    const p=find(parent);
    if(p) p.children.push(item.id);
  }

  return item.id;
}

//////////////////////
// CREATE ROOT
//////////////////////

function createRoot(){

  const text=document.getElementById("composer").value.trim();
  if(!text) return;

  items.push({
    id:id++,
    text,
    type:"proclaim",
    user:currentUser,
    parent:null,
    children:[]
  });

  document.getElementById("composer").value="";
  log("proclaim",text);

  render();
}

//////////////////////
// ACTIONS
//////////////////////

function agree(id){
  const item=find(id);
  if(item.user===currentUser) return; // BLOCK SELF ACTION
  log("agree",{id,user:currentUser});
}

function disagree(id){
  const item=find(id);
  if(item.user===currentUser) return; // BLOCK SELF ACTION
  log("disagree",{id,user:currentUser});
  render();
}

function submitLeft(id){
  const el=document.getElementById("left-"+id);
  const text=el.value.trim();
  if(!text) return;

  addChild(id,text,"question");
  el.value="";
}

function submitRight(id){
  const el=document.getElementById("right-"+id);
  const text=el.value.trim();
  if(!text) return;

  addChild(id,text,"proclaim");
  el.value="";
}

function addChild(parent,text,type){

  const item={
    id:id++,
    text,
    type,
    user:currentUser,
    parent,
    children:[]
  };

  items.push(item);

  const p=find(parent);
  if(p) p.children.push(item.id);

  log("create_child",{parent,text,type});
  render();
}

//////////////////////
// LOG
//////////////////////

function log(event,data){

  const el=document.getElementById("log");

  const entry={
    time:Date.now(),
    version:APP_VERSION,
    user:currentUser,
    event,
    data
  };

  const div=document.createElement("div");
  div.innerText=JSON.stringify(entry);

  el.appendChild(div);
  el.scrollTop=el.scrollHeight;
}

//////////////////////
// RENDER
//////////////////////

function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  items.filter(x=>x.parent===null)
       .forEach(x=>renderItem(x,feed));
}

function renderItem(item,container){

  const div=document.createElement("div");

  div.innerHTML=`
    <div class="statement">
      <div class="text">${item.text}</div>
      <div class="meta">${item.type.toUpperCase()} · @${item.user}</div>

      <button class="btn btn-sm btn-success" onclick="agree(${item.id})"
        ${item.user===currentUser?'disabled':''}>Agree</button>

      <button class="btn btn-sm btn-danger" onclick="disagree(${item.id})"
        ${item.user===currentUser?'disabled':''}>Disagree</button>
    </div>

    <div class="dispute">
      <div class="col">
        <input class="inputBox" id="left-${item.id}" placeholder="Question (optional)">
        <button class="btn btn-sm btn-primary mt-1" onclick="submitLeft(${item.id})">Submit</button>
      </div>

      <div class="col">
        <input class="inputBox" id="right-${item.id}" placeholder="Proclamation (optional)">
        <button class="btn btn-sm btn-primary mt-1" onclick="submitRight(${item.id})">Submit</button>
      </div>
    </div>
  `;

  container.appendChild(div);

  item.children.map(find)
    .filter(Boolean)
    .forEach(c=>{

      const el=document.createElement("div");
      el.className="child";

      el.innerHTML=`
        <b>${c.type.toUpperCase()}</b>
        <div>${c.text}</div>
        <div class="meta">@${c.user}</div>

        <button class="btn btn-sm btn-success" onclick="agree(${c.id})"
          ${c.user===currentUser?'disabled':''}>Agree</button>

        <button class="btn btn-sm btn-danger" onclick="disagree(${c.id})"
          ${c.user===currentUser?'disabled':''}>Disagree</button>
      `;

      if(c.type==="question"){
        container.querySelector(`#left-${item.id}`).parentElement.appendChild(el);
      } else {
        container.querySelector(`#right-${item.id}`).parentElement.appendChild(el);
      }
    });
}

//////////////////////
// INIT
//////////////////////

renderUsers();
seed();
render();

</script>

</body>
</html>
