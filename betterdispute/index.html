<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.version{font-size:12px;color:#777}

#users{
  display:flex;
  gap:6px;
  padding:8px;
}

.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  font-size:12px;
  cursor:pointer;
  opacity:0.6;
}

.user.active{opacity:1;border-color:#fff}

#composer{
  width:100%;
  height:70px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
}

#feed{padding:10px}

.card{
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.text{font-weight:600}
.meta{font-size:11px;color:#888;margin-top:4px}

.actions{
  margin-top:8px;
  display:flex;
  gap:6px;
}

button{
  background:#222;
  color:#eee;
  border:1px solid #333;
  padding:6px 8px;
  border-radius:8px;
  font-size:12px;
}

/* TRUE SPLIT VIEW */
.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
  min-height:40px;
}

.child{
  margin-top:6px;
  font-size:12px;
  color:#ddd;
}

.child span{color:#888}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  align-items:center;
  justify-content:center;
}

#popup.open{display:flex}

.box{
  width:90%;
  max-width:420px;
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
}

input{
  width:100%;
  margin-top:8px;
  background:#0b0b0b;
  border:1px solid #333;
  color:#eee;
  padding:8px;
  border-radius:6px;
}

.row{
  display:flex;
  gap:6px;
  margin-top:10px;
}

/* LOG */
#log{
  padding:10px;
  font-size:11px;
  color:#7f7;
  border-top:1px solid #222;
  max-height:140px;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div>Better Dispute</div>
  <div class="version" id="version"></div>
</header>

<div id="users"></div>

<textarea id="composer" placeholder="Start a fire..."></textarea>
<button onclick="createRoot()">Proclaim</button>

<div id="feed"></div>
<div id="log"></div>

<!-- POPUP -->
<div id="popup">
  <div class="box">
    <div>Dispute (choose one)</div>

    <input id="challenge" placeholder="Ask (challenge)">
    <input id="counter" placeholder="Proclaim (counter)">

    <div class="row">
      <button onclick="submitChallenge()">Submit Ask</button>
      <button onclick="submitCounter()">Submit Proclaim</button>
      <button onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<script>

let VERSION=20;
document.getElementById("version").innerText=VERSION;

let users=["alice","bob","charlie"];
let currentUser="alice";

let id=0;
let items=[];
let logs=[];

/* track per-user disputes */
let disputes = {}; 
// key: statementId -> set(users who already disagreed)

let active=null;

/* LOG */
function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

/* HELP */
function find(i){return items.find(x=>x.id===i);}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";

  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;

    d.onclick=()=>{
      currentUser=u;
      renderUsers();
      render();
      log("switch",u); // FIX: immediate logging
    };

    el.appendChild(d);
  });
}

/* CREATE ROOT */
function createRoot(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null
  });

  document.getElementById("composer").value="";
  render();
  log("create",t);
}

/* DISPUTE OPEN */
function openDispute(i){
  const item=find(i);
  if(!item || item.user===currentUser) return;

  if(!disputes[i]) disputes[i]=new Set();
  if(disputes[i].has(currentUser)) return; // ONLY ONE DISAGREE PER USER

  active=i;
  document.getElementById("popup").classList.add("open");

  document.getElementById("challenge").value="";
  document.getElementById("counter").value="";
}

/* CLOSE */
function closePopup(){
  active=null;
  document.getElementById("popup").classList.remove("open");
}

/* SUBMIT BRANCH */
function submitChallenge(){
  const v=document.getElementById("challenge").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:active,
    type:"question",
    lane:"left"
  });

  if(!disputes[active]) disputes[active]=new Set();
  disputes[active].add(currentUser);

  closePopup();
  render();
  log("challenge",v);
}

function submitCounter(){
  const v=document.getElementById("counter").value.trim();
  if(!v) return;

  items.push({
    id:id++,
    text:v,
    user:currentUser,
    parent:active,
    type:"proclaim",
    lane:"right"
  });

  if(!disputes[active]) disputes[active]=new Set();
  disputes[active].add(currentUser);

  closePopup();
  render();
  log("counter",v);
}

/* AGREEMENT */
function agree(i){
  const item=find(i);
  if(!item || item.user===currentUser) return;
  log("agree",i);
}

/* RENDER */
function render(){

  const feed=document.getElementById("feed");
  feed.innerHTML="";

  const roots = items.filter(x=>x.parent===null);

  roots.forEach(r=>{

    const children = items.filter(x=>x.parent===r.id);

    const left = children.filter(c=>c.lane==="left" || c.type==="question");
    const right = children.filter(c=>c.lane==="right" || c.type==="proclaim");

    let leftHtml = left.map(c=>
      `<div class="child">${c.text} <span>@${c.user}</span></div>`
    ).join("");

    let rightHtml = right.map(c=>
      `<div class="child">${c.text} <span>@${c.user}</span></div>`
    ).join("");

    feed.innerHTML += `
      <div class="card">
        <div class="text">${r.text}</div>
        <div class="meta">@${r.user}</div>

        ${r.user !== currentUser ? `
        <div class="actions">
          <button onclick="agree(${r.id})">Agree</button>
          <button onclick="openDispute(${r.id})">Disagree</button>
        </div>
        ` : ""}

        <div class="dispute">
          <div class="lane">
            <div>Ask</div>
            ${leftHtml}
          </div>

          <div class="lane">
            <div>Proclaim</div>
            ${rightHtml}
          </div>
        </div>
      </div>
    `;
  });

  const logEl=document.getElementById("log");
  logEl.innerHTML="";
  logs.forEach(l=>{
    const d=document.createElement("div");
    d.textContent=JSON.stringify(l);
    logEl.appendChild(d);
  });
}

/* INIT */
renderUsers();
render();

/* TEST DATA */
items.push({id:id++,text:"All claims can be challenged",user:"alice",parent:null});
items.push({id:id++,text:"Some claims resist challenge",user:"bob",parent:null});

</script>

</body>
</html>
