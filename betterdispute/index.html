<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Better Dispute v35.9</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f0f0f;
  color:#eee;
}

header{
  display:flex;
  justify-content:space-between;
  padding:10px;
  align-items:center;
}

#users{display:flex;gap:6px;padding:8px}
.user{
  padding:4px 8px;
  border:1px solid #333;
  border-radius:999px;
  cursor:pointer;
  opacity:.6;
}
.user.active{opacity:1;border-color:#fff}

textarea{
  width:100%;
  height:90px;
  background:#0b0b0b;
  color:#eee;
  border:1px solid #333;
  padding:8px;
}

.card{
  background:#1a1a1a;
  padding:10px;
  margin-bottom:8px;
  border-radius:8px;
  cursor:pointer;
}

.meta{font-size:11px;color:#888}

.actions{margin-top:6px}

.icon{
  font-size:18px;
  cursor:pointer;
  margin-right:8px;
}
.icon.dim{opacity:.3}
.icon.active{opacity:1}

.dispute{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin:10px;
}

.lane{
  background:#141414;
  padding:8px;
  border-radius:8px;
}

#nav{padding:10px}

#log{
  border-top:1px solid #222;
  padding:10px;
  font-size:11px;
  color:#7f7;
  max-height:160px;
  overflow:auto;
}

#popup{
  display:none;
  position:fixed;
  top:20%;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid #333;
  padding:10px;
  width:300px;
  z-index:20;
}

#popup textarea{height:70px}

#sidebar{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0c0c0c;
  border-left:1px solid #333;
  padding:10px;
  display:none;
  z-index:10;
}

#overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:9;
}

.chatMsg{font-size:12px;margin-bottom:4px}
</style>
</head>

<body>

<header>
  <button onclick="home()" style="
    background:#1f1f1f;
    border:1px solid #333;
    color:#eee;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
  ">⚖️</button>

  <div>Better Dispute v35.9</div>
</header>

<div id="users"></div>

<div id="composerWrap">
  <textarea id="composer" placeholder="Start a fire..."></textarea>
  <button onclick="create()">Proclaim</button>
</div>

<div id="nav"></div>
<div id="view"></div>

<div id="popup">
  <div>Dispute</div>
  <textarea id="counter" placeholder="Counter (optional)"></textarea>
  <textarea id="challenge" placeholder="Challenge (optional)"></textarea>
  <button onclick="submitDispute()">✓</button>
  <button onclick="closePopup()">✕</button>
</div>

<div id="overlay" onclick="closeSidebar()"></div>
<div id="sidebar"></div>

<div id="log"></div>

<script>

let users=["alice","bob","charlie","dana","eve"];
let currentUser="alice";

let id=0;
let items=[];
let stack=[];
let reactions={};
let logs=[];

/* pending dispute intent (IMPORTANT FIX) */
let pendingDispute=null;

function log(e,d){
  logs.push({t:Date.now(),u:currentUser,e,d});
}

function find(i){return items.find(x=>x.id===i);}
function key(u,id){return u+"|"+id;}

/* USERS */
function renderUsers(){
  const el=document.getElementById("users");
  el.innerHTML="";
  users.forEach(u=>{
    const d=document.createElement("div");
    d.className="user"+(u===currentUser?" active":"");
    d.textContent=u;
    d.onclick=()=>{currentUser=u;renderUsers();render();};
    el.appendChild(d);
  });
}

/* NAV */
function home(){stack=[];render();}
function enter(i){stack.push(i);render();}
function back(){stack.pop();render();}

/* CREATE */
function create(){
  const t=document.getElementById("composer").value.trim();
  if(!t) return;

  items.push({
    id:id++,
    text:t,
    user:currentUser,
    parent:null,
    side:null
  });

  document.getElementById("composer").value="";
  log("create",t);
  render();
}

/* REACT (FIXED: no commit on down) */
function react(id,type){

  const n=find(id);
  if(!n || n.user===currentUser) return;

  const k=key(currentUser,id);
  if(reactions[k]) return;

  if(type==="down"){
    pendingDispute={id,type};
    openDispute(id);
    return; // ❗ NO COMMIT HERE
  }

  reactions[k]=type;
  log(type,id);
  render();
}

/* DISPUTE */
let activeDisputeNode=null;

function openDispute(id){
  activeDisputeNode=id;
  document.getElementById("popup").style.display="block";
}

/* FIX: cancel discards everything */
function closePopup(){
  pendingDispute=null;
  activeDisputeNode=null;
  document.getElementById("popup").style.display="none";
}

/* FIX: submit is ONLY commit point */
function submitDispute(){

  if(!pendingDispute) return;

  const target=pendingDispute.id;

  const k=key(currentUser,target);
  if(!reactions[k]){
    reactions[k]="down";
  }

  const c=document.getElementById("counter").value.trim();
  const q=document.getElementById("challenge").value.trim();

  if(c){
    items.push({
      id:id++,
      text:c,
      user:currentUser,
      parent:target,
      side:"right"
    });
  }

  if(q){
    items.push({
      id:id++,
      text:q,
      user:currentUser,
      parent:target,
      side:"left"
    });
  }

  document.getElementById("counter").value="";
  document.getElementById("challenge").value="";

  log("dispute",target);

  pendingDispute=null;
  activeDisputeNode=null;

  render();
}

/* SIDEBAR */
function openSidebar(id){
  document.getElementById("sidebar").style.display="block";
  document.getElementById("overlay").style.display="block";
  renderSidebar(id);
}

function closeSidebar(){
  document.getElementById("sidebar").style.display="none";
  document.getElementById("overlay").style.display="none";
}

let chat={};

function renderSidebar(id){
  chat[id]=chat[id]||[];

  document.getElementById("sidebar").innerHTML=`
    <div>Chat</div>
    ${chat[id].map(m=>`<div class="chatMsg"><b>${m.u}</b>: ${m.m}</div>`).join("")}
    <input id="chatIn">
    <button onclick="sendChat(${id})">send</button>
  `;
}

function sendChat(id){
  const v=document.getElementById("chatIn").value.trim();
  if(!v) return;
  chat[id].push({u:currentUser,m:v});
  renderSidebar(id);
}

/* NODE */
function renderNode(node){

  const r=reactions[key(currentUser,node.id)];
  const show=node.user!==currentUser;

  return `
    <div class="card" onclick="enter(${node.id})">

      <div>${node.text} <span class="meta">@${node.user}</span></div>

      ${show ? `
        <div class="actions">

          <span class="icon ${r==='up'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'up')">👍</span>

          <span class="icon ${r==='down'?'active':'dim'}"
                onclick="event.stopPropagation();react(${node.id},'down')">👎</span>

          <span class="icon"
                onclick="event.stopPropagation();openSidebar(${node.id})">💬</span>

        </div>
      `:""}

    </div>
  `;
}

/* DISPUTE VIEW */
function renderDispute(node){

  const children=items.filter(x=>x.parent===node.id);
  const forked=children.some(c=>c.side);

  const header=`
    <div class="card" style="border:1px solid #333">
      ${node.text} <span class="meta">@${node.user}</span>
    </div>
  `;

  if(!forked){
    return `
      <div>
        ${header}
        <div>${children.map(renderNode).join("")}</div>
      </div>
    `;
  }

  const left=children.filter(c=>c.side==="left");
  const right=children.filter(c=>c.side==="right");

  return `
    <div>
      ${header}
      <div class="dispute">
        <div class="lane">${left.map(renderNode).join("")}</div>
        <div class="lane">${right.map(renderNode).join("")}</div>
      </div>
    </div>
  `;
}

/* RENDER */
function render(){

  const view=document.getElementById("view");
  const nav=document.getElementById("nav");
  const comp=document.getElementById("composerWrap");

  comp.style.display = stack.length ? "none" : "block";

  view.innerHTML="";
  nav.innerHTML="";

  if(stack.length===0){
    items.filter(x=>x.parent===null).forEach(n=>{
      view.innerHTML+=renderNode(n);
    });
  } else {
    const cur=find(stack[stack.length-1]);
    nav.innerHTML=`<button onclick="back()">⚖️ back</button>`;
    view.innerHTML=renderDispute(cur);
  }

  document.getElementById("log").innerHTML =
    logs.slice(-200).reverse().map(l=>JSON.stringify(l)).join("<br>");
}

/* SEED DATA */
items.push({id:id++,text:"Truth exists independent of belief",user:"alice",parent:null});
items.push({id:id++,text:"Reality is socially constructed",user:"bob",parent:null});
items.push({id:id++,text:"Logic depends on language",user:"charlie",parent:null});
items.push({id:id++,text:"Meaning evolves over time",user:"dana",parent:null});
items.push({id:id++,text:"Some truths cannot be known",user:"eve",parent:null});

items.push({id:id++,text:"What grounds truth?",user:"bob",parent:0,side:"left",type:"question"});
items.push({id:id++,text:"Empirical consistency",user:"charlie",parent:5});

items.push({id:id++,text:"Truth emerges socially",user:"bob",parent:1,side:"right"});
items.push({id:id++,text:"Emergence is not truth",user:"alice",parent:7,side:"left"});
items.push({id:id++,text:"But stability matters",user:"charlie",parent:8,side:"right"});

renderUsers();
render();

</script>

</body>
</html>
