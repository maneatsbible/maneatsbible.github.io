<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loopify v2</title>
<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b0f14;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header {
  padding:10px;
  display:flex;
  justify-content:space-between;
  background:#111;
}

button {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  background:#1e88e5;
  color:white;
}

#grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:10px;
}

.clip {
  height:70px;
  background:#222;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.clip.active { background:#00c853; }
.clip.muted { opacity:0.3; }

canvas {
  flex:1;
  background:#05070a;
}
</style>
</head>
<body>

<header>
  <button id="start">Start Audio</button>
  <div>BPM <input id="bpm" type="number" value="100" style="width:60px"></div>
  <button id="record">Record</button>
  <button id="ai">AI Beat</button>
</header>

<canvas id="viz"></canvas>
<div id="grid"></div>

<script>
// ============================
// STATE
// ============================

const state = {
  bpm: 100,
  beatsPerBar: 4,
  bars: 2,
  loops: [],
  audioCtx: null,
  master: null,
  mediaStream: null,
  epoch: performance.now(),
  offset: 0
};

function cycleDuration() {
  return (60 / state.bpm) * state.beatsPerBar * state.bars;
}

function phase() {
  const now = performance.now();
  const t = (now + state.offset - state.epoch) / 1000;
  return (t % cycleDuration()) / cycleDuration();
}

// ============================
// AUDIO ENGINE
// ============================

function initAudio() {
  state.audioCtx = new AudioContext();
  state.master = state.audioCtx.createGain();
  state.master.connect(state.audioCtx.destination);
}

function playLoop(loop) {
  const src = state.audioCtx.createBufferSource();
  src.buffer = loop.buffer;
  src.loop = true;

  const gain = state.audioCtx.createGain();
  gain.gain.value = loop.muted ? 0 : loop.gain;

  src.connect(gain).connect(state.master);

  const startTime = state.audioCtx.currentTime + 0.1;
  src.start(startTime);

  loop.node = { src, gain };
}

// ============================
// RECORDING
// ============================

async function recordLoop() {
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});
  const rec = new MediaRecorder(stream);
  let chunks = [];

  rec.ondataavailable = e => chunks.push(e.data);

  rec.start();

  setTimeout(() => rec.stop(), cycleDuration()*1000);

  rec.onstop = async () => {
    const blob = new Blob(chunks);
    const array = await blob.arrayBuffer();
    const buffer = await state.audioCtx.decodeAudioData(array);

    const loop = {
      id: crypto.randomUUID(),
      buffer,
      gain:1,
      muted:false
    };

    state.loops.push(loop);
    playLoop(loop);
    renderGrid();
    save();
  };
}

// ============================
// AI GENERATOR (demo)
// ============================

function generateBeat() {
  const ctx = state.audioCtx;
  const buffer = ctx.createBuffer(1, ctx.sampleRate * cycleDuration(), ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i=0;i<data.length;i++) {
    if (i % (ctx.sampleRate/2) < 200) {
      data[i] = Math.random()*0.5;
    }
  }

  const loop = {
    id: crypto.randomUUID(),
    buffer,
    gain:1,
    muted:false
  };

  state.loops.push(loop);
  playLoop(loop);
  renderGrid();
}

// ============================
// UI GRID
// ============================

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  state.loops.forEach(loop => {
    const div = document.createElement("div");
    div.className = "clip active";

    if (loop.muted) div.classList.add("muted");

    div.innerText = "Loop";

    div.onclick = () => {
      loop.muted = !loop.muted;
      loop.node.gain.gain.value = loop.muted ? 0 : loop.gain;
      renderGrid();
    };

    grid.appendChild(div);
  });
}

// ============================
// VISUALIZATION
// ============================

const canvas = document.getElementById("viz");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight * 0.5;
}
window.onresize = resize;
resize();

function draw() {
  requestAnimationFrame(draw);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const p = phase();

  state.loops.forEach((loop,i) => {
    const radius = 50 + i*30;

    ctx.beginPath();
    ctx.arc(cx,cy,radius,0,Math.PI*2);
    ctx.strokeStyle = loop.muted ? "#555" : "#0f0";
    ctx.stroke();

    // playhead
    const angle = p * Math.PI*2;

    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle)*radius,
            cy + Math.sin(angle)*radius,
            5,0,Math.PI*2);
    ctx.fillStyle="#fff";
    ctx.fill();
  });
}
draw();

// ============================
// PERSISTENCE
// ============================

function save() {
  const data = state.loops.map(l => ({
    gain:l.gain,
    muted:l.muted,
    buffer: Array.from(l.buffer.getChannelData(0))
  }));
  localStorage.setItem("loops", JSON.stringify(data));
}

async function load() {
  const data = JSON.parse(localStorage.getItem("loops") || "[]");
  for (let d of data) {
    const buffer = state.audioCtx.createBuffer(1, d.buffer.length, state.audioCtx.sampleRate);
    buffer.copyToChannel(new Float32Array(d.buffer),0);

    const loop = { ...d, buffer };
    state.loops.push(loop);
    playLoop(loop);
  }
  renderGrid();
}

// ============================
// EVENTS
// ============================

document.getElementById("start").onclick = async () => {
  initAudio();
  await load();
};

document.getElementById("record").onclick = () => {
  recordLoop();
};

document.getElementById("ai").onclick = () => {
  generateBeat();
};

document.getElementById("bpm").onchange = e => {
  state.bpm = Number(e.target.value);
};

// ============================
// P2P (SCAFFOLD)
// ============================

class P2P {
  constructor() {
    this.peers = [];
  }

  send(msg) {
    console.log("send", msg);
  }

  receive(msg) {
    console.log("recv", msg);
  }
}

state.p2p = new P2P();

</script>
</body>
</html>
