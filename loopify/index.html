<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Loopify</title>

<style>
  :root {
    --bg: #0b0f14;
    --accent: #00ffc3;
    --muted: #1b2530;
    --text: #d6e1ea;
  }

  body {
    margin: 0;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: #111822;
    font-size: 14px;
    align-items: center;
  }

  button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-weight: bold;
  }

  #canvas {
    flex: 1;
    touch-action: none;
  }

  .controls {
    display: flex;
    justify-content: space-around;
    padding: 12px;
    background: #111822;
  }

  .record-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: red;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
  }

  .recording {
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.6; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>
</head>

<body>

<header>
  <div id="session">Session: --</div>
  <div>
    BPM: <input id="bpm" type="number" value="100" style="width:60px" />
  </div>
  <button id="share">Share</button>
</header>

<canvas id="canvas"></canvas>

<div class="controls">
  <div id="recordBtn" class="record-btn">REC</div>
</div>

<script type="module">
/* =========================
   Utils
========================= */

const base58 = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";

function randomId(len = 12) {
  return Array.from(crypto.getRandomValues(new Uint8Array(len)))
    .map(x => base58[x % base58.length])
    .join('');
}

/* =========================
   IndexedDB Storage
========================= */

class Storage {
  constructor() {
    this.db = null;
  }

  async init() {
    this.db = await new Promise((res, rej) => {
      const req = indexedDB.open("loopify", 1);
      req.onupgradeneeded = e => {
        e.target.result.createObjectStore("loops", { keyPath: "id" });
      };
      req.onsuccess = () => res(req.result);
      req.onerror = rej;
    });
  }

  saveLoop(loop) {
    const tx = this.db.transaction("loops", "readwrite");
    tx.objectStore("loops").put(loop);
  }

  async getLoops() {
    const tx = this.db.transaction("loops", "readonly");
    const store = tx.objectStore("loops");
    return new Promise(res => {
      const req = store.getAll();
      req.onsuccess = () => res(req.result);
    });
  }
}

/* =========================
   Transport (Cycle Sync)
========================= */

class Transport {
  constructor(bpm = 100) {
    this.bpm = bpm;
    this.beatsPerBar = 4;
    this.bars = 1;
    this.startTime = performance.now();
  }

  get cycleDuration() {
    return (60 / this.bpm) * this.beatsPerBar * this.bars * 1000;
  }

  get phase() {
    return ((performance.now() - this.startTime) % this.cycleDuration) / this.cycleDuration;
  }

  nextCycleTime(ctx) {
    const now = ctx.currentTime * 1000;
    const offset = this.cycleDuration - ((performance.now() - this.startTime) % this.cycleDuration);
    return ctx.currentTime + offset / 1000;
  }
}

/* =========================
   Loop Model
========================= */

class Loop {
  constructor({ id, buffer, author }) {
    this.id = id;
    this.buffer = buffer;
    this.author = author;
    this.muted = false;
    this.gain = 1;
  }
}

/* =========================
   Audio Engine
========================= */

class AudioEngine {
  constructor(transport) {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.transport = transport;
    this.master = this.ctx.createGain();
    this.master.connect(this.ctx.destination);
    this.loops = [];
  }

  addLoop(loop) {
    this.loops.push(loop);
    this.schedule(loop);
  }

  schedule(loop) {
    const src = this.ctx.createBufferSource();
    const gain = this.ctx.createGain();

    src.buffer = loop.buffer;
    src.loop = true;

    gain.gain.value = loop.gain;

    src.connect(gain).connect(this.master);

    const startTime = this.transport.nextCycleTime(this.ctx);

    src.start(startTime);
    loop._node = { src, gain };
  }
}

/* =========================
   Recorder
========================= */

class Recorder {
  constructor(engine, transport) {
    this.engine = engine;
    this.transport = transport;
    this.chunks = [];
  }

  async init() {
    this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    this.rec = new MediaRecorder(this.stream);

    this.rec.ondataavailable = e => this.chunks.push(e.data);
  }

  start() {
    this.chunks = [];
    this.rec.start();
  }

  async stop() {
    return new Promise(res => {
      this.rec.onstop = async () => {
        const blob = new Blob(this.chunks);
        const array = await blob.arrayBuffer();
        const buffer = await this.engine.ctx.decodeAudioData(array);
        res(buffer);
      };
      this.rec.stop();
    });
  }
}

/* =========================
   Visualization
========================= */

class Visualizer {
  constructor(canvas, engine, transport) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.engine = engine;
    this.transport = transport;

    this.resize();
    window.addEventListener("resize", () => this.resize());

    requestAnimationFrame(() => this.draw());
  }

  resize() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight - 140;
  }

  draw() {
    const ctx = this.ctx;
    const { width, height } = this.canvas;

    ctx.clearRect(0, 0, width, height);

    const cx = width / 2;
    const cy = height / 2;

    this.engine.loops.forEach((loop, i) => {
      const radius = 60 + i * 30;

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.strokeStyle = loop.muted ? "#444" : "#00ffc3";
      ctx.lineWidth = 3;
      ctx.stroke();
    });

    // playhead
    const angle = this.transport.phase * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * 200, cy + Math.sin(angle) * 200);
    ctx.strokeStyle = "#fff";
    ctx.stroke();

    requestAnimationFrame(() => this.draw());
  }
}

/* =========================
   Session Controller (stub P2P)
========================= */

class SessionController {
  constructor() {
    const url = new URL(location.href);
    this.sessionId = url.searchParams.get("session") || randomId();

    url.searchParams.set("session", this.sessionId);
    history.replaceState({}, "", url);
  }

  share() {
    navigator.clipboard.writeText(location.href);
    alert("Session link copied!");
  }
}

/* =========================
   App Bootstrap
========================= */

const storage = new Storage();
await storage.init();

const transport = new Transport(100);
const engine = new AudioEngine(transport);
const recorder = new Recorder(engine, transport);
const session = new SessionController();

await recorder.init();

const canvas = document.getElementById("canvas");
const viz = new Visualizer(canvas, engine, transport);

document.getElementById("session").textContent = "Session: " + session.sessionId;

document.getElementById("share").onclick = () => session.share();

document.getElementById("bpm").onchange = e => {
  transport.bpm = Number(e.target.value);
};

const recordBtn = document.getElementById("recordBtn");

let recording = false;

recordBtn.onclick = async () => {
  if (!recording) {
    recordBtn.classList.add("recording");
    recorder.start();

    const wait = transport.cycleDuration;

    setTimeout(async () => {
      const buffer = await recorder.stop();

      const loop = new Loop({
        id: randomId(),
        buffer,
        author: "local"
      });

      engine.addLoop(loop);
      storage.saveLoop({ id: loop.id });

      recordBtn.classList.remove("recording");
      recording = false;

    }, wait);

    recording = true;
  }
};

/* =========================
   Restore saved loops (stub)
========================= */

const saved = await storage.getLoops();
console.log("Restored loops:", saved);

</script>

</body>
</html>
