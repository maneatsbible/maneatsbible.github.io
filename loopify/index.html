<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Loopify v4</title>
<style>
  body {
    font-family: system-ui;
    background: #0f0f14;
    color: #eee;
    margin: 0;
    padding: 0;
  }
  header {
    padding: 10px;
    background: #181820;
    display: flex;
    gap: 10px;
  }
  button {
    background: #2a2a40;
    color: white;
    border: none;
    padding: 8px 12px;
    cursor: pointer;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
    padding: 10px;
  }
  .loop {
    background: #222;
    padding: 10px;
    text-align: center;
    border-radius: 6px;
  }
  .active { background: #4caf50; }
  #debug {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #111;
    padding: 10px;
    font-size: 12px;
  }
</style>
</head>
<body>

<header>
  <button id="start">Start Audio</button>
  <button id="record">Record Loop</button>
  <button id="synth">Add Synth Loop</button>
</header>

<div id="grid"></div>

<div id="debug"></div>

<script>
/* ================================
   GLOBAL CONFIG
================================ */
const cycleDuration = 2.0 // seconds
let epoch = 0

/* ================================
   AUDIO ENGINE
================================ */
class LoopScheduler {
  constructor(ctx) {
    this.ctx = ctx
    this.sources = new Map()
  }

  schedule(loop, startTime, offset = 0) {
    const src = this.ctx.createBufferSource()
    src.buffer = loop.buffer
    src.loop = true

    src.connect(loop.gainNode)
    loop.gainNode.connect(this.ctx.destination)

    src.start(startTime, offset)
    this.sources.set(loop.id, src)
  }

  stop(loopId) {
    const src = this.sources.get(loopId)
    if (src) src.stop()
  }
}

/* ================================
   LOOP MODEL
================================ */
class Loop {
  constructor(buffer) {
    this.id = crypto.randomUUID()
    this.buffer = buffer
    this.gainNode = audioCtx.createGain()
    this.gainNode.gain.value = 1
  }
}

/* ================================
   LOOPSET
================================ */
class LoopSet {
  constructor(name) {
    this.id = crypto.randomUUID()
    this.name = name
    this.loops = []
    this.active = true
  }
}

/* ================================
   STATE
================================ */
let audioCtx
let scheduler
let loops = []
let loopSets = []
let currentSet = null

/* ================================
   TIMING
================================ */
function now() {
  return audioCtx.currentTime
}

function nextCycleBoundary() {
  const t = now()
  const cycles = Math.ceil((t - epoch) / cycleDuration)
  return epoch + cycles * cycleDuration
}

function phase() {
  return ((now() - epoch) % cycleDuration) / cycleDuration
}

/* ================================
   RECORDING ENGINE
================================ */
let mediaStream
let recorder
let chunks = []

async function initMic() {
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true })
}

async function recordLoop() {
  const start = nextCycleBoundary()
  const end = start + cycleDuration

  chunks = []
  recorder = new MediaRecorder(mediaStream)

  recorder.ondataavailable = e => chunks.push(e.data)

  recorder.start()

  setTimeout(() => recorder.stop(), (end - now()) * 1000)

  recorder.onstop = async () => {
    const blob = new Blob(chunks)
    const array = await blob.arrayBuffer()
    const buffer = await audioCtx.decodeAudioData(array)

    const loop = new Loop(buffer)
    loops.push(loop)

    scheduler.schedule(loop, nextCycleBoundary())
    render()
    saveLoop(buffer)
  }
}

/* ================================
   SYNTH ENGINE
================================ */
function createSynthLoop() {
  const length = audioCtx.sampleRate * cycleDuration
  const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate)
  const data = buffer.getChannelData(0)

  for (let i = 0; i < length; i++) {
    data[i] = Math.sin(i * 0.01) * 0.3
  }

  const loop = new Loop(buffer)
  loops.push(loop)
  scheduler.schedule(loop, nextCycleBoundary())
  render()
}

/* ================================
   DRUM MACHINE (simple)
================================ */
function createKickLoop() {
  const length = audioCtx.sampleRate * cycleDuration
  const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate)
  const data = buffer.getChannelData(0)

  for (let i = 0; i < length; i++) {
    if (i % (audioCtx.sampleRate / 2) < 2000) {
      data[i] = Math.exp(-i * 0.0005) * Math.sin(i * 0.2)
    }
  }

  const loop = new Loop(buffer)
  loops.push(loop)
  scheduler.schedule(loop, nextCycleBoundary())
  render()
}

/* ================================
   INDEXED DB
================================ */
let db

function initDB() {
  const req = indexedDB.open("loopify", 1)

  req.onupgradeneeded = e => {
    db = e.target.result
    db.createObjectStore("loops", { keyPath: "id" })
  }

  req.onsuccess = e => {
    db = e.target.result
    loadLoops()
  }
}

function saveLoop(buffer) {
  const tx = db.transaction("loops", "readwrite")
  const store = tx.objectStore("loops")

  store.put({
    id: crypto.randomUUID(),
    data: buffer.getChannelData(0)
  })
}

function loadLoops() {
  const tx = db.transaction("loops", "readonly")
  const store = tx.objectStore("loops")

  store.getAll().onsuccess = async e => {
    for (let item of e.target.result) {
      const buf = audioCtx.createBuffer(1, item.data.length, audioCtx.sampleRate)
      buf.copyToChannel(item.data, 0)

      const loop = new Loop(buf)
      loops.push(loop)
      scheduler.schedule(loop, nextCycleBoundary())
    }
    render()
  }
}

/* ================================
   UI
================================ */
function render() {
  const grid = document.getElementById("grid")
  grid.innerHTML = ""

  loops.forEach(loop => {
    const el = document.createElement("div")
    el.className = "loop active"
    el.innerText = loop.id.slice(0, 4)

    el.onclick = () => {
      loop.gainNode.gain.value =
        loop.gainNode.gain.value ? 0 : 1
      el.classList.toggle("active")
    }

    grid.appendChild(el)
  })
}

/* ================================
   DEBUG PANEL
================================ */
function updateDebug() {
  const dbg = document.getElementById("debug")
  dbg.innerHTML = `
    phase: ${phase().toFixed(3)} |
    loops: ${loops.length} |
    time: ${now().toFixed(2)}
  `
  requestAnimationFrame(updateDebug)
}

/* ================================
   INIT
================================ */
document.getElementById("start").onclick = async () => {
  audioCtx = new AudioContext()
  scheduler = new LoopScheduler(audioCtx)
  epoch = audioCtx.currentTime

  await initMic()
  initDB()

  updateDebug()
}

document.getElementById("record").onclick = recordLoop
document.getElementById("synth").onclick = createSynthLoop

</script>
</body>
</html>
