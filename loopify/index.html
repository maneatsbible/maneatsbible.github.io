<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loopify</title>
<style>
  body {
    margin: 0;
    font-family: system-ui;
    background: #0f0f14;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    padding: 12px;
    width: 100%;
    background: #181824;
    display: flex;
    justify-content: space-between;
    font-size: 14px;
  }

  #loops {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 16px;
    padding: 12px;
  }

  canvas {
    touch-action: none;
  }

  .controls {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #181824;
    display: flex;
    justify-content: space-around;
    padding: 10px;
  }

  button {
    background: #2a2a40;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
  }

  .status {
    font-size: 12px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<header>
  <div>Loopify</div>
  <div id="session"></div>
</header>

<div id="loops"></div>

<div class="controls">
  <button id="record">🎤 Record</button>
  <button id="beat">🥁 Beat</button>
  <button id="copy">🔗 Share</button>
</div>

<div class="status" id="status"></div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let loops = [];
let peers = [];
let dataChannels = [];

const tempo = 100;
const loopBeats = 4;
const secondsPerBeat = 60 / tempo;
const loopDuration = loopBeats * secondsPerBeat;

const startTime = audioCtx.currentTime + 1;

function nowLoopTime() {
  return (audioCtx.currentTime - startTime) % loopDuration;
}

// ---- P2P LAYER (WebRTC minimal mesh) ----
const urlParams = new URLSearchParams(location.search);
let sessionId = urlParams.get("session") || Math.random().toString(36).slice(2);

document.getElementById("session").innerText = sessionId;

function copySession() {
  const url = location.origin + location.pathname + "?session=" + sessionId;
  navigator.clipboard.writeText(url);
}

document.getElementById("copy").onclick = copySession;

// signaling via BroadcastChannel (same browser / tab demo)
const signaling = new BroadcastChannel("loopify-" + sessionId);

signaling.onmessage = async (e) => {
  const msg = e.data;

  if (msg.type === "offer") {
    const pc = createPeer();
    await pc.setRemoteDescription(msg.offer);
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    signaling.postMessage({ type: "answer", answer });
  }

  if (msg.type === "answer") {
    peers[0]?.setRemoteDescription(msg.answer);
  }

  if (msg.type === "candidate") {
    peers[0]?.addIceCandidate(msg.candidate);
  }
};

function createPeer() {
  const pc = new RTCPeerConnection();

  const dc = pc.createDataChannel("loops");
  setupDataChannel(dc);

  pc.ondatachannel = (e) => setupDataChannel(e.channel);

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      signaling.postMessage({ type: "candidate", candidate: e.candidate });
    }
  };

  peers.push(pc);
  return pc;
}

function setupDataChannel(dc) {
  dataChannels.push(dc);

  dc.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "loop") {
      receiveLoop(msg);
    }
  };
}

// init connection if first
async function initConnection() {
  const pc = createPeer();
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  signaling.postMessage({ type: "offer", offer });
}
initConnection();

// ---- LOOP SYSTEM ----
function createLoop(buffer) {
  const source = audioCtx.createBufferSource();
  source.buffer = buffer;
  source.loop = true;
  source.playbackRate.value = 1;

  const gain = audioCtx.createGain();
  source.connect(gain).connect(audioCtx.destination);

  source.start(startTime);

  const loop = {
    buffer,
    source,
    gain,
    muted: false,
    speed: 1
  };

  loops.push(loop);
  drawLoop(loop);
  broadcastLoop(buffer);
}

function broadcastLoop(buffer) {
  const channelData = buffer.getChannelData(0);
  const arr = Array.from(channelData);

  const msg = JSON.stringify({
    type: "loop",
    data: arr
  });

  dataChannels.forEach(dc => dc.send(msg));
}

function receiveLoop(msg) {
  const arr = new Float32Array(msg.data);
  const buffer = audioCtx.createBuffer(1, arr.length, audioCtx.sampleRate);
  buffer.copyToChannel(arr, 0);

  createLoop(buffer);
}

// ---- RECORD MIC ----
document.getElementById("record").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const recorder = audioCtx.createMediaStreamSource(stream);

  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * loopDuration, audioCtx.sampleRate);
  let offset = 0;

  const processor = audioCtx.createScriptProcessor(1024, 1, 1);
  recorder.connect(processor);
  processor.connect(audioCtx.destination);

  processor.onaudioprocess = (e) => {
    const input = e.inputBuffer.getChannelData(0);
    buffer.getChannelData(0).set(input, offset);
    offset += input.length;

    if (offset >= buffer.length) {
      processor.disconnect();
      createLoop(buffer);
    }
  };
};

// ---- SIMPLE BEAT ----
document.getElementById("beat").onclick = () => {
  const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * loopDuration, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i = 0; i < data.length; i++) {
    const t = i / audioCtx.sampleRate;
    const beat = Math.floor(t / secondsPerBeat);

    if (beat % 4 === 0) {
      data[i] = Math.sin(2 * Math.PI * 100 * t) * Math.exp(-t * 10);
    }
  }

  createLoop(buffer);
};

// ---- UI RENDER ----
function drawLoop(loop) {
  const canvas = document.createElement("canvas");
  canvas.width = 140;
  canvas.height = 140;
  document.getElementById("loops").appendChild(canvas);

  const ctx = canvas.getContext("2d");

  function draw() {
    ctx.clearRect(0, 0, 140, 140);

    const data = loop.buffer.getChannelData(0);

    ctx.beginPath();
    for (let i = 0; i < data.length; i += 200) {
      const angle = (i / data.length) * Math.PI * 2;
      const r = 50 + data[i] * 20;
      const x = 70 + Math.cos(angle) * r;
      const y = 70 + Math.sin(angle) * r;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.strokeStyle = "#6cf";
    ctx.stroke();

    // playhead
    const t = nowLoopTime() / loopDuration;
    const angle = t * Math.PI * 2;

    ctx.beginPath();
    ctx.moveTo(70, 70);
    ctx.lineTo(
      70 + Math.cos(angle) * 60,
      70 + Math.sin(angle) * 60
    );
    ctx.strokeStyle = "#fff";
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  draw();

  canvas.onclick = () => {
    loop.muted = !loop.muted;
    loop.gain.gain.value = loop.muted ? 0 : 1;
  };

  canvas.oncontextmenu = (e) => {
    e.preventDefault();
    loop.speed = loop.speed === 1 ? 2 : loop.speed === 2 ? 0.5 : 1;
    loop.source.playbackRate.value = loop.speed;
  };
}

// ---- STATUS ----
setInterval(() => {
  document.getElementById("status").innerText =
    `Loops: ${loops.length} | Peers: ${dataChannels.length} | Sync: ${nowLoopTime().toFixed(2)}`;
}, 500);

</script>
</body>
</html>
