<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Loopify</title>
<style>
  body {
    margin: 0;
    background: #0b0b0f;
    color: #fff;
    font-family: sans-serif;
    overflow: hidden;
  }
  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    background: #111;
  }
  button {
    background: #222;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
  }
  #canvas {
    width: 100vw;
    height: 60vh;
    display: block;
  }
  #controls {
    display: flex;
    justify-content: space-around;
    padding: 10px;
  }
</style>
</head>
<body>

<div id="topbar">
  <div id="sessionId"></div>
  <button id="shareBtn">Share</button>
</div>

<canvas id="canvas"></canvas>

<div id="controls">
  <button id="recordBtn">● Record</button>
  <button id="beatBtn">Beat</button>
  <button id="synthBtn">Synth</button>
</div>

<script>
// ==========================
// Utilities
// ==========================
const randId = () => Math.random().toString(36).slice(2);

// ==========================
// Session
// ==========================
const url = new URL(location.href);
let sessionId = url.searchParams.get("session");

if (!sessionId) {
  sessionId = randId();
  url.searchParams.set("session", sessionId);
  history.replaceState(null, "", url);
}

document.getElementById("sessionId").innerText = sessionId;

document.getElementById("shareBtn").onclick = () => {
  navigator.clipboard.writeText(location.href);
  alert("Copied session URL");
};

// ==========================
// Audio Engine
// ==========================
const ctx = new (window.AudioContext || window.webkitAudioContext)();
const master = ctx.createGain();
master.connect(ctx.destination);

let BPM = 100;
let bars = 1;
let beatsPerBar = 4;

const cycleDuration = () => (60 / BPM) * beatsPerBar * bars;

// ==========================
// Loop Model
// ==========================
class Loop {
  constructor(buffer) {
    this.id = randId();
    this.buffer = buffer;
    this.gainNode = ctx.createGain();
    this.gainNode.connect(master);
    this.muted = false;
    this.speed = 1;
  }

  play(startTime) {
    const src = ctx.createBufferSource();
    src.buffer = this.buffer;
    src.loop = true;
    src.playbackRate.value = this.speed;
    src.connect(this.gainNode);
    src.start(startTime);
    this.src = src;
  }
}

// ==========================
// Transport
// ==========================
let cycleStart = ctx.currentTime;

function nextCycleTime() {
  const dur = cycleDuration();
  const now = ctx.currentTime;
  return Math.ceil((now - cycleStart) / dur) * dur + cycleStart;
}

// ==========================
// Loop Controller
// ==========================
const loops = [];

function addLoop(buffer) {
  const loop = new Loop(buffer);
  loops.push(loop);
  schedule(loop);
  broadcast({type:"LOOP_ADD", data: serialize(buffer)});
}

function schedule(loop) {
  const t = nextCycleTime();
  loop.play(t);
}

// ==========================
// Recording
// ==========================
let mediaStream, recorder, chunks = [];

async function setupMic() {
  mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
}

async function recordLoop() {
  if (!mediaStream) await setupMic();

  recorder = new MediaRecorder(mediaStream);
  chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = async () => {
    const blob = new Blob(chunks);
    const array = await blob.arrayBuffer();
    const buffer = await ctx.decodeAudioData(array);
    addLoop(buffer);
  };

  recorder.start();

  setTimeout(() => recorder.stop(), cycleDuration() * 1000);
}

document.getElementById("recordBtn").onclick = () => {
  ctx.resume();
  recordLoop();
};

// ==========================
// Visualization
// ==========================
const canvas = document.getElementById("canvas");
const c = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight * 0.6;
}
resize();
window.onresize = resize;

function draw() {
  requestAnimationFrame(draw);
  c.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const now = ctx.currentTime;
  const angle = ((now % cycleDuration()) / cycleDuration()) * Math.PI*2;

  loops.forEach((loop, i) => {
    const r = 60 + i*40;

    c.beginPath();
    c.arc(cx, cy, r, 0, Math.PI*2);
    c.strokeStyle = loop.muted ? "#444" : "#0f0";
    c.stroke();

    // playhead
    c.beginPath();
    c.moveTo(cx, cy);
    c.lineTo(cx + Math.cos(angle)*r, cy + Math.sin(angle)*r);
    c.strokeStyle = "#fff";
    c.stroke();
  });
}
draw();

// ==========================
// Simple Beat
// ==========================
document.getElementById("beatBtn").onclick = () => {
  const buffer = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i=0;i<data.length;i++) {
    data[i] = Math.random()*2-1;
  }
  addLoop(buffer);
};

// ==========================
// Simple Synth
// ==========================
document.getElementById("synthBtn").onclick = () => {
  const buffer = ctx.createBuffer(1, ctx.sampleRate * cycleDuration(), ctx.sampleRate);
  const data = buffer.getChannelData(0);

  for (let i=0;i<data.length;i++) {
    data[i] = Math.sin(i/20);
  }
  addLoop(buffer);
};

// ==========================
// P2P (Minimal WebRTC)
// ==========================
let pc = new RTCPeerConnection();
let dc = pc.createDataChannel("data");

dc.onmessage = e => {
  const msg = JSON.parse(e.data);
  if (msg.type === "LOOP_ADD") {
    deserialize(msg.data).then(addLoop);
  }
};

function broadcast(msg) {
  if (dc.readyState === "open") {
    dc.send(JSON.stringify(msg));
  }
}

// naive encoding
function serialize(buffer) {
  return Array.from(buffer.getChannelData(0));
}

async function deserialize(arr) {
  const buffer = ctx.createBuffer(1, arr.length, ctx.sampleRate);
  buffer.copyToChannel(new Float32Array(arr),0);
  return buffer;
}

</script>
</body>
</html>
