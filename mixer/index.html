<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

#stage {
  position:relative;
  width:100%;
  height:58vh;
  background:black;
  overflow:hidden;
  border-radius:10px;
}

.video {
  position:absolute;
  transition: all 0.35s ease;
}

#debug {
  height:160px;
  overflow:auto;
  background:#000;
  color:#0f0;
  font-size:11px;
  display:none;
}

#cam {
  width:100%;
  max-height:180px;
  border-radius:10px;
}

.tab-active {
  background:#0d6efd !important;
  color:white !important;
}
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<div class="d-flex gap-2 mb-2">
  <button id="tabPlay" class="btn btn-outline-light flex-fill tab-active" onclick="setMode('play')">Playback</button>
  <button id="tabRec" class="btn btn-outline-light flex-fill" onclick="setMode('record')">Record</button>
</div>

<!-- PLAYBACK -->
<div id="playUI">
  <input id="commentaryId" class="form-control mb-2" placeholder="Commentary ID (or ?commentary=)">
  <input id="subjectId" class="form-control mb-2" placeholder="Subject ID">
  <button class="btn btn-success w-100" onclick="initPlayback()">Start Playback</button>
</div>

<!-- RECORD -->
<div id="recordUI" style="display:none;">
  <input id="recordSubject" class="form-control mb-2" placeholder="Subject (auto fallback from playback)">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-secondary w-100 mb-2" onclick="toggleCam()">Toggle Camera PiP</button>
  <button class="btn btn-primary w-100 mb-2" onclick="upload()">Upload (OAuth)</button>
</div>

<div id="stage"></div>

<video id="cam" autoplay muted playsinline></video>

<button class="btn btn-dark w-100 mt-2" onclick="toggleDebug()">Toggle Debug</button>
<div id="debug"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>

/* =========================
   REACTIVE ENGINE STATE
========================= */

let players = {};
let mode = "play";

let clock = {
  t: 0,
  running: false,
  drift: 0,
  last: 0,
  paused: false
};

let bufferLock = false;

/* =========================
   METADATA SYSTEM
========================= */

let meta = {
  default: `
00:00 play subject
00:02 show commentary 65% 65% 35% 35%
`
};

function getQuery(){
  let p = new URLSearchParams(location.search);
  return {
    commentary: p.get("commentary") || null
  };
}

function loadMetadata(){
  let q = getQuery();
  if(q.commentary){
    commentaryId.value = q.commentary;
    log("Loaded commentary from URL param");
  }
}

/* =========================
   DEBUG + LOGGING
========================= */

function log(m){
  debug.innerHTML += m + "<br>";
  debug.scrollTop = debug.scrollHeight;
}

/* =========================
   MODE SWITCH
========================= */

function setMode(m){
  mode = m;

  tabPlay.classList.toggle("tab-active", m==="play");
  tabRec.classList.toggle("tab-active", m==="record");

  playUI.style.display = m==="play" ? "block" : "none";
  recordUI.style.display = m==="record" ? "block" : "none";
}

/* =========================
   CLOCK (REACTIVE CORE)
========================= */

function tick(){
  if(!clock.running || bufferLock) return;

  let now = performance.now();
  let delta = (now - clock.last)/1000;
  clock.last = now;

  clock.t += delta;

  requestAnimationFrame(tick);
}

/* =========================
   PLAYBACK INIT
========================= */

function initPlayback(){

  loadMetadata();

  stage.innerHTML = "";
  players = {};

  create("subject", subjectId.value || "b9_CS8gTOR0", 0,0,100,100);
  create("commentary", commentaryId.value, 65,65,35,35);

  clock.t = 0;
  clock.running = true;
  clock.last = performance.now();

  requestAnimationFrame(tick);

  log("Playback started");
}

/* =========================
   PLAYER CREATION
========================= */

function create(name,id,x,y,w,h){

  let div = document.createElement("div");
  div.id = "p_"+name;
  div.className = "video";
  stage.appendChild(div);

  players[name] = new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1,controls:0},
    events:{
      onReady:()=>{
        let el = players[name].getIframe();
        el.style.left=x+"%";
        el.style.top=y+"%";
        el.style.width=w+"%";
        el.style.height=h+"%";
        el.style.display="block";

        log(name+" ready");
      },

      onStateChange:(e)=>handleState(name,e.data)
    }
  });
}

/* =========================
   BUFFER + DRIFT CONTROL
========================= */

function pauseAll(reason){
  bufferLock = true;
  log("PAUSE ALL: "+reason);

  Object.values(players).forEach(p=>{
    try { p.pauseVideo(); } catch(e){}
  });
}

function resumeAll(){
  bufferLock = false;
  clock.last = performance.now();

  Object.values(players).forEach(p=>{
    try { p.playVideo(); } catch(e){}
  });

  log("RESUME ALL");
}

/* =========================
   STATE HANDLER
========================= */

function handleState(name,state){

  // buffering
  if(state === 3){
    pauseAll(name+" buffering");
  }

  // playing
  if(state === 1 && bufferLock){
    resumeAll();
  }
}

/* =========================
   RECORD ENGINE (separate)
========================= */

let recording = false;
let recStart = 0;
let recLog = [];
let camStream;

async function startRecording(){

  recording = true;
  recStart = performance.now();
  recLog = [];

  let subject = recordSubject.value || subjectId.value || "b9_CS8gTOR0";

  stage.innerHTML = "";
  players = {};

  create("subject", subject, 0,0,100,100);

  camStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  cam.srcObject = camStream;

  log("Recording started");
}

function toggleCam(){

  let t = (performance.now()-recStart)/1000;

  if(cam.style.display==="none"){
    cam.style.display="block";
    recLog.push({t,cmd:"cam_show"});
  } else {
    cam.style.display="none";
    recLog.push({t,cmd:"cam_hide"});
  }
}

/* =========================
   UPLOAD (OAUTH STUB)
========================= */

function upload(){
  log("OAuth upload placeholder (GIS + YouTube Data API v3 required)");
  alert("Upload wiring next step.");
}

/* =========================
   DEBUG TOGGLE
========================= */

function toggleDebug(){
  debug.style.display = debug.style.display==="none"?"block":"none";
}

</script>

</body>
</html>
