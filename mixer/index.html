<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

#stage {
  position:relative;
  width:100%;
  height:55vh;
  background:black;
  overflow:hidden;
}

.video {
  position:absolute;
}

#debug {
  height:120px;
  overflow:auto;
  background:black;
  color:#0f0;
  font-size:12px;
}

video#cam {
  width:100%;
  max-height:180px;
}
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center mb-2">Mixed Reviews</h4>

<ul class="nav nav-tabs mb-2">
  <li class="nav-item">
    <button class="nav-link active" onclick="showTab('play')">Playback</button>
  </li>
  <li class="nav-item">
    <button class="nav-link" onclick="showTab('record')">Record</button>
  </li>
</ul>

<div id="playTab">
  <input id="controlId" class="form-control mb-2" placeholder="Control Video ID">
  <button class="btn btn-success w-100 mb-2" onclick="startPlayback()">Start Playback</button>
</div>

<div id="recordTab" style="display:none;">
  <input id="vidAInput" class="form-control mb-2" placeholder="Video ID to comment on">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-secondary w-100 mb-2" onclick="toggleCommentary()">Pause/Resume Commentary</button>
  <button class="btn btn-danger w-100 mb-2" onclick="stopRecording()">Stop Recording</button>
</div>

<div id="stage"></div>
<video id="cam" autoplay muted playsinline></video>

<div class="mt-2"><b>Time:</b> <span id="time">0</span></div>
<div id="debug" class="mt-2"></div>

<textarea id="output" class="form-control mt-2" rows="6"></textarea>
<button class="btn btn-primary w-100 mt-2" onclick="upload()">Upload to YouTube</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
let players={}, readyCount=0, totalPlayers=0;
let startTime=0, running=false;

let recording=false, recorder, chunks=[];
let recordStart=0, events=[];
let commentaryVisible=true;

// ---------- UI ----------
function showTab(tab){
  playTab.style.display = tab==="play"?"block":"none";
  recordTab.style.display = tab==="record"?"block":"none";
}

// ---------- DEBUG ----------
function log(m){
  debug.innerHTML += m+"<br>";
  debug.scrollTop = debug.scrollHeight;
}

// ---------- TIME ----------
function now(){
  return (performance.now()-startTime)/1000;
}

// ---------- CREATE ----------
function create(name,id,x,y,w,h){

  let div=document.createElement("div");
  div.id="p_"+name;
  div.className="video";
  stage.appendChild(div);

  totalPlayers++;

  players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1, controls:0},
    events:{
      onReady:()=>{
        readyCount++;
        log(name+" ready");

        // APPLY LAYOUT
        let el=players[name].getIframe();
        el.style.left=x;
        el.style.top=y;
        el.style.width=w;
        el.style.height=h;
        el.style.display="block";

        if(readyCount===totalPlayers){
          log("ALL READY → START");

          startTime=performance.now();
          running=true;

          // USER GESTURE PLAY
          Object.values(players).forEach(p=>p.playVideo());

          requestAnimationFrame(tick);
        }
      },
      onStateChange:e=>handleState(name,e.data)
    }
  });
}

// ---------- STATE ----------
let suppress=false;

function handleState(name,state){

  if(suppress) return;

  // BUFFERING
  if(state==3){
    suppress=true;
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.pauseVideo();
    });
    suppress=false;
  }

  // PLAYING
  if(state==1){
    suppress=true;
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.playVideo();
    });
    suppress=false;
  }

  // RECORD vidA
  if(recording && name==="vidA"){
    let t=(performance.now()-recordStart)/1000;
    if(state==1) events.push({time:t,cmd:"play",args:["vidA"]});
    if(state==2) events.push({time:t,cmd:"pause",args:["vidA"]});
  }
}

// ---------- LOOP ----------
function tick(){
  if(!running) return;

  let t=now();
  time.innerText=t.toFixed(2);

  requestAnimationFrame(tick);
}

// ---------- PLAYBACK ----------
function startPlayback(){

  stage.innerHTML="";
  players={};
  readyCount=0;
  totalPlayers=0;

  let control=controlId.value || "dQw4w9WgXcQ";

  // SAMPLE PIP
  create("vidA","b9_CS8gTOR0","0%","0%","100%","100%");
  create("this",control,"65%","65%","35%","35%");
}

// ---------- RECORD ----------
async function startRecording(){

  events=[];
  recording=true;
  recordStart=performance.now();

  let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  cam.srcObject=stream;

  recorder=new MediaRecorder(stream);
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.start();

  stage.innerHTML="";
  players={}; readyCount=0; totalPlayers=0;

  create("vidA",vidAInput.value,"0%","0%","100%","100%");

  log("Recording started");
}

// ---------- COMMENTARY ----------
function toggleCommentary(){

  if(!recording) return;

  let t=(performance.now()-recordStart)/1000;

  if(commentaryVisible){
    events.push({time:t,cmd:"hide",args:["this"]});
    commentaryVisible=false;
  } else {
    events.push({time:t,cmd:"show",args:["this","65%","65%","35%","35%"]});
    events.push({time:t,cmd:"play",args:["this"]});
    commentaryVisible=true;
  }
}

// ---------- STOP ----------
function stopRecording(){

  recording=false;

  recorder.stop();
  recorder.onstop=()=>{

    let blob=new Blob(chunks,{type:"video/webm"});
    let url=URL.createObjectURL(blob);

    let a=document.createElement("a");
    a.href=url;
    a.download="commentary.webm";
    a.click();

    let meta="video vidA "+vidAInput.value+"\\n\\n";

    events.forEach(e=>{
      let m=String(Math.floor(e.time/60)).padStart(2,"0");
      let s=String(Math.floor(e.time%60)).padStart(2,"0");
      meta+=`${m}:${s} ${e.cmd} ${e.args.join(" ")}\\n`;
    });

    let desc=`Mixed Reviews commentary track

Use with:
https://maneatsbible.live/mixer

---

${meta}`;

    output.value=desc;
  };
}

// ---------- UPLOAD (OAUTH READY) ----------
function upload(){
  log("Upload flow requires OAuth client ID setup.");
}
</script>

</body>
</html>
