<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Mixer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }
#stage {
  position:relative;
  width:100%;
  height:60vh;
  background:black;
  overflow:hidden;
}
.video {
  position:absolute;
  display:none;
}
#debug {
  height:120px;
  overflow:auto;
  background:black;
  color:#0f0;
  font-size:12px;
}
video#cam { width:100%; max-height:200px; }
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<div class="row g-2 mb-2">
  <div class="col-12 col-md-8">
    <input id="controlId" class="form-control" placeholder="Control Video ID">
  </div>
  <div class="col-12 col-md-4">
    <button class="btn btn-success w-100" onclick="initPlayback()">Start Playback</button>
  </div>
</div>

<div class="row g-2 mb-2">
  <div class="col-12 col-md-6">
    <input id="vidAInput" class="form-control" placeholder="Video ID to comment on">
  </div>
  <div class="col-6 col-md-2">
    <button class="btn btn-warning w-100" onclick="startRecording()">Record</button>
  </div>
  <div class="col-6 col-md-2">
    <button class="btn btn-secondary w-100" onclick="toggleCommentary()">Pause/Resume Commentary</button>
  </div>
  <div class="col-12 col-md-2">
    <button class="btn btn-danger w-100" onclick="stopRecording()">Stop</button>
  </div>
</div>

<div id="stage"></div>
<video id="cam" autoplay muted playsinline></video>

<div class="mt-2"><b>Time:</b> <span id="time">0</span></div>
<div id="debug" class="mt-2"></div>

<textarea id="output" class="form-control mt-2" rows="6"></textarea>

<button class="btn btn-primary w-100 mt-2" onclick="upload()">Upload to YouTube</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
let players={}, ready=false;
let startTime=0, running=false;

let recording=false, recorder, chunks=[];
let recordStart=0, events=[];
let commentaryVisible=true;

// ---------- DEBUG ----------
function log(m){
  debug.innerHTML+=m+"<br>";
  debug.scrollTop=debug.scrollHeight;
}

// ---------- TIME ----------
function now(){
  return (performance.now()-startTime)/1000;
}

// ---------- CREATE PLAYER ----------
function create(name,id){
  let div=document.createElement("div");
  div.id="p_"+name;
  div.className="video";
  stage.appendChild(div);

  players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1},
    events:{
      onReady:()=>{ ready=true; log(name+" ready"); },
      onStateChange:e=>handleState(name,e.data)
    }
  });
}

// ---------- STATE ----------
function handleState(name,state){

  // 3 buffering
  if(state==3){
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.pauseVideo();
    });
  }

  // 1 playing
  if(state==1){
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.playVideo();
    });
  }

  // RECORD EVENTS
  if(recording && name==="vidA"){
    let t=now();
    if(state==1) events.push({time:t,cmd:"play",args:["vidA"]});
    if(state==2) events.push({time:t,cmd:"pause",args:["vidA"]});
  }
}

// ---------- USER GESTURE START ----------
function initPlayback(){

  stage.innerHTML="";
  players={};

  create("vidA","b9_CS8gTOR0");

  setTimeout(()=>{
    players["vidA"].playVideo();
  },1000);

  startTime=performance.now();
  running=true;
}

// ---------- RECORD ----------
async function startRecording(){

  events=[];
  recording=true;
  recordStart=performance.now();

  let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  cam.srcObject=stream;

  recorder=new MediaRecorder(stream);
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.start();

  stage.innerHTML="";
  create("vidA",vidAInput.value);

  // show vidA full
  setTimeout(()=>{
    let el=players["vidA"].getIframe();
    el.style.display="block";
    el.style.left="0";
    el.style.top="0";
    el.style.width="100%";
    el.style.height="100%";
  },1000);

  log("Recording started");
}

// ---------- COMMENTARY TOGGLE ----------
function toggleCommentary(){

  if(!recording) return;

  let t=(performance.now()-recordStart)/1000;

  if(commentaryVisible){
    events.push({time:t,cmd:"hide",args:["this"]});
    commentaryVisible=false;
    log("Commentary hidden");
  } else {
    events.push({time:t,cmd:"show",args:["this","70%","70%","30%","30%"]});
    events.push({time:t,cmd:"play",args:["this"]});
    commentaryVisible=true;
    log("Commentary shown");
  }
}

// ---------- STOP ----------
function stopRecording(){

  recording=false;

  recorder.stop();
  recorder.onstop=()=>{

    let blob=new Blob(chunks,{type:"video/webm"});
    let url=URL.createObjectURL(blob);

    let a=document.createElement("a");
    a.href=url;
    a.download="commentary.webm";
    a.click();

    // BUILD DESCRIPTION
    let meta="video vidA "+vidAInput.value+"\\n\\n";

    events.forEach(e=>{
      let m=String(Math.floor(e.time/60)).padStart(2,"0");
      let s=String(Math.floor(e.time%60)).padStart(2,"0");
      meta+=`${m}:${s} ${e.cmd} ${e.args.join(" ")}\\n`;
    });

    let desc=
`This video is a commentary control track.

Use it with:
https://maneatsbible.live/mixer

Paste this video ID into the mixer to replay synchronized commentary.

---

${meta}`;

    output.value=desc;
  };
}

// ---------- UPLOAD ----------
function upload(){
  alert("Upload requires API key + OAuth setup. Ready to wire next.");
}
</script>

</body>
</html>
