<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }
#stage { position:relative; width:100%; height:58vh; background:black; }
.video { position:absolute; }
#log { height:220px; overflow:auto; background:#000; color:#0f0; font-size:11px; padding:6px; }
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<input id="commentaryId" class="form-control mb-2" placeholder="Commentary video ID">

<button class="btn btn-success w-100 mb-2" onclick="startPlayback()">Start Playback</button>

<hr>

<button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
<button class="btn btn-danger w-100 mb-2" onclick="stopRecording()">Stop Recording</button>
<button class="btn btn-primary w-100 mb-2" onclick="upload()">Upload</button>

<div id="stage"></div>
<video id="cam" autoplay muted playsinline style="width:100%;max-height:150px;"></video>

<h6 class="mt-3">LOG</h6>
<div id="log"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>

const VERSION="Mixed Reviews v7";

/* ===== CONFIG ===== */
const YT_API_KEY="YOUR_API_KEY";
const CLIENT_ID="YOUR_CLIENT_ID.apps.googleusercontent.com";

/* ===== GLOBAL ===== */
let players={}, timeline=[];
let clock={t:0,last:0,step:0,running:false};

/* ===== LOG ===== */
function log(m){
 logBox.innerHTML+=m+"<br>";
 logBox.scrollTop=logBox.scrollHeight;
}

log("INIT "+VERSION);

/* ===== FETCH DESCRIPTION ===== */
async function fetchDescription(id){
 try{
  let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${YT_API_KEY}`;
  let res=await fetch(url);
  let data=await res.json();

  let desc=data.items?.[0]?.snippet?.description || "";
  log("Fetched description length="+desc.length);
  return desc;

 }catch(e){
  log("Description fetch failed");
  return "";
 }
}

/* ===== PARSE ===== */
function parse(text){

 let out=[];
 text.split("\n").forEach(line=>{
  let m=line.match(/(\d+):(\d+)\s+(.*)/);
  if(!m) return;

  let t=+m[1]*60 + +m[2];
  let parts=m[3].split(" ");

  out.push({t,action:parts[0],target:parts[1],args:parts.slice(2)});
 });

 return out;
}

/* ===== DEFAULT ===== */
function defaultTimeline(){
 return [
  {t:0,action:"play",target:"subject"},
  {t:3,action:"pause",target:"subject"},
  {t:3,action:"play",target:"commentary"},
  {t:6,action:"pause",target:"commentary"},
  {t:6,action:"play",target:"subject"}
 ];
}

/* ===== PLAYBACK ===== */
async function startPlayback(){

 stage.innerHTML="";
 players={};

 let id=commentaryId.value || "dQw4w9WgXcQ";

 let desc=await fetchDescription(id);
 timeline=parse(desc);

 if(!timeline.length){
  log("Using default timeline");
  timeline=defaultTimeline();
 }

 log("TIMELINE "+JSON.stringify(timeline));

 create("subject","b9_CS8gTOR0",0,0,100,100);
 create("commentary",id,65,65,35,35);

 clock={t:0,last:performance.now(),step:0,running:true};
 requestAnimationFrame(tick);
}

/* ===== CREATE ===== */
function create(name,id,x,y,w,h){

 let div=document.createElement("div");
 div.id=name;
 div.className="video";
 stage.appendChild(div);

 players[name]=new YT.Player(div.id,{
  videoId:id,
  playerVars:{playsinline:1},
  events:{
   onReady:()=>{
    let el=players[name].getIframe();
    el.style.left=x+"%";
    el.style.top=y+"%";
    el.style.width=w+"%";
    el.style.height=h+"%";

    players[name].playVideo();
    log("READY "+name);
   }
  }
 });
}

/* ===== CLOCK ===== */
function tick(){

 if(!clock.running) return;

 let now=performance.now();
 clock.t+=(now-clock.last)/1000;
 clock.last=now;

 driftCheck();

 run();

 requestAnimationFrame(tick);
}

/* ===== DRIFT ===== */
function driftCheck(){

 Object.entries(players).forEach(([name,p])=>{
  let actual=p.getCurrentTime?.();
  if(!actual) return;

  let drift=actual-clock.t;

  if(Math.abs(drift)>0.5){
   log("DRIFT "+name+" "+drift.toFixed(2));

   // soft correction
   p.seekTo(clock.t,true);
  }
 });
}

/* ===== ENGINE ===== */
function run(){

 while(clock.step<timeline.length && timeline[clock.step].t<=clock.t){

  let e=timeline[clock.step];
  log("EVENT "+JSON.stringify(e));

  let p=players[e.target];
  if(!p){ clock.step++; continue; }

  if(e.action==="play") p.playVideo();
  if(e.action==="pause") p.pauseVideo();

  clock.step++;
 }
}

/* ===== RECORD ===== */
let recorder, chunks=[], blob;

async function startRecording(){
 let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
 cam.srcObject=stream;

 recorder=new MediaRecorder(stream);
 recorder.ondataavailable=e=>chunks.push(e.data);
 recorder.start();

 log("Recording...");
}

function stopRecording(){
 recorder.stop();
 recorder.onstop=()=>{
  blob=new Blob(chunks,{type:"video/webm"});
  log("Recorded "+blob.size+" bytes");
 };
}

/* ===== UPLOAD ===== */
async function upload(){

 if(!blob){ log("No recording"); return; }

 let token;

 await new Promise(res=>{
  google.accounts.oauth2.initTokenClient({
   client_id:CLIENT_ID,
   scope:"https://www.googleapis.com/auth/youtube.upload",
   callback:r=>{ token=r.access_token; res(); }
  }).requestAccessToken();
 });

 let form=new FormData();
 form.append("metadata",new Blob([JSON.stringify({
  snippet:{title:"Mixed Reviews Upload"},
  status:{privacyStatus:"unlisted"}
 })],{type:"application/json"}));
 form.append("file",blob);

 let res=await fetch("https://www.googleapis.com/upload/youtube/v3/videos?part=snippet,status&uploadType=multipart",{
  method:"POST",
  headers:{Authorization:"Bearer "+token},
  body:form
 });

 log("UPLOAD RESULT "+await res.text());
}

/* ===== INIT ===== */
let logBox=document.getElementById("log");

</script>

</body>
</html>
