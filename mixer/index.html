<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

#stage {
  position:relative;
  width:100%;
  height:56vh;
  background:black;
  overflow:hidden;
}

.video { position:absolute; }

#pipCam {
  position:absolute;
  bottom:5%;
  right:5%;
  width:30%;
  border:2px solid white;
  display:none;
  z-index:10;
}

#log {
  height:220px;
  overflow:auto;
  background:#000;
  color:#0f0;
  font-size:11px;
  padding:6px;
}

.active-tab {
  background:#0d6efd !important;
  color:white !important;
}
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<div class="d-flex gap-2 mb-2">
  <button id="tabPlay" class="btn btn-outline-light flex-fill">Playback</button>
  <button id="tabRec" class="btn btn-outline-light flex-fill">Record</button>
</div>

<div id="playUI">
  <input id="commentaryId" class="form-control mb-2" placeholder="Commentary ID">
  <button class="btn btn-success w-100" onclick="startPlayback()">Start Playback</button>
</div>

<div id="recUI" style="display:none;">
  <input id="recordSubjectId" class="form-control mb-2" placeholder="Subject ID">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-danger w-100 mb-2" onclick="stopRecording()">Stop Recording</button>
  <button class="btn btn-primary w-100 mb-2" onclick="upload()">Upload</button>
</div>

<div id="stage"></div>
<video id="pipCam" autoplay muted playsinline></video>

<h6 class="mt-3">LOG</h6>
<div id="log"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const VERSION="Mixed Reviews v17";

/* =========================
   LOG
========================= */

let logBox=document.getElementById("log");
function log(m){
  let t=(performance.now()/1000).toFixed(2);
  logBox.innerHTML+=`[${t}] ${m}<br>`;
  logBox.scrollTop=logBox.scrollHeight;
}

log("INIT "+VERSION);

/* =========================
   GET PARAM
========================= */

let param=new URLSearchParams(location.search).get("commentary");
if(param){
  commentaryId.value=param;
  log("GET commentary="+param);
}

/* =========================
   STATE
========================= */

let state={mode:"playback",ytReady:false};

let playback={
  players:{},
  ready:0,
  clock:{t:0,last:0,step:0,running:false},
  timeline:[]
};

let record={};

/* =========================
   UI
========================= */

tabPlay.onclick=()=>{state.mode="playback";renderUI();};
tabRec.onclick=()=>{state.mode="record";renderUI();};

function renderUI(){
  playUI.style.display=state.mode==="playback"?"block":"none";
  recUI.style.display=state.mode==="record"?"block":"none";
  tabPlay.classList.toggle("active-tab",state.mode==="playback");
  tabRec.classList.toggle("active-tab",state.mode==="record");
}
renderUI();

/* =========================
   YT READY
========================= */

function onYouTubeIframeAPIReady(){
  state.ytReady=true;
  log("YT READY");
}

/* =========================
   METADATA FETCH (UNCHANGED)
========================= */

const YT_API_KEY="YOUR_API_KEY";

async function fetchDescription(id){

  if(!YT_API_KEY || YT_API_KEY==="YOUR_API_KEY"){
    log("No API key → default script");
    return "";
  }

  try{
    let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${YT_API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();

    let desc=data.items?.[0]?.snippet?.description || "";
    log("Fetched description "+desc.length);
    return desc;

  }catch(e){
    log("Fetch failed");
    return "";
  }
}

/* =========================
   SCRIPT PARSER (NEW ENGINE)
========================= */

function parseScript(text){

  let events=[];

  text.split("\n").forEach(line=>{

    let m=line.match(/^(\d+):(\d+)\s+(.*)$/);
    if(!m) return;

    let t=parseInt(m[1])*60 + parseInt(m[2]);
    let cmd=m[3].trim();

    let parts=cmd.split(/\s+/);

    let action=parts[0];
    let target=parts[1];
    let args=parts.slice(2);

    if(target==="this") target="commentary";

    let evt={t,action,target,args};

    log("SCRIPT "+JSON.stringify(evt));
    events.push(evt);
  });

  return events.sort((a,b)=>a.t-b.t);
}

/* =========================
   DEFAULT SCRIPT
========================= */

function defaultTimeline(){
  log("DEFAULT SCRIPT");

  return parseScript(`
0:00 play subject
0:03 pause subject

0:03 show commentary 65 65 30 30
0:03 play commentary

0:06 pause commentary
0:06 hide commentary

0:06 play subject

0:09 play subject
0:09 play commentary
  `);
}

/* =========================
   START
========================= */

async function startPlayback(){

  if(!state.ytReady){
    log("YT NOT READY");
    return;
  }

  stage.innerHTML="";
  playback.players={};
  playback.ready=0;

  let commentary=commentaryId.value||"dQw4w9WgXcQ";
  let subject="oWkDjPnbrBY";

  recordSubjectId.value=subject;

  log("START subject="+subject+" commentary="+commentary);

  let desc=await fetchDescription(commentary);
  let parsed=parseScript(desc);

  playback.timeline = parsed.length ? parsed : defaultTimeline();

  create("subject",subject,0,0,100,100);
  create("commentary",commentary,65,65,30,30);
}

/* =========================
   PLAYER (UNCHANGED AUDIO FIX)
========================= */

function create(name,id,x,y,w,h){

  let div=document.createElement("div");
  div.id="pb_"+name;
  div.className="video";
  stage.appendChild(div);

  playback.players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1,controls:0,autoplay:1},
    events:{
      onReady:(e)=>{

        let p=playback.players[name];
        let el=p.getIframe();

        el.style.left=x+"%";
        el.style.top=y+"%";
        el.style.width=w+"%";
        el.style.height=h+"%";

        p.mute();
        p.playVideo();
        setTimeout(()=>p.unMute(),300);

        playback.ready++;
        log("READY "+name);

        if(playback.ready===2){
          startClock();
        }
      }
    }
  });
}

/* =========================
   CLOCK
========================= */

function startClock(){
  playback.clock={t:0,last:performance.now(),step:0,running:true};
  log("CLOCK START");
  requestAnimationFrame(tick);
}

function tick(){

  if(!playback.clock.running) return;

  let now=performance.now();
  playback.clock.t+=(now-playback.clock.last)/1000;
  playback.clock.last=now;

  runScript();

  requestAnimationFrame(tick);
}

/* =========================
   SCRIPT EXECUTOR (NEW CORE)
========================= */

function runScript(){

  while(playback.clock.step < playback.timeline.length &&
        playback.timeline[playback.clock.step].t <= playback.clock.t){

    let e=playback.timeline[playback.clock.step];

    log("EVENT "+JSON.stringify(e));

    let p=playback.players[e.target];
    if(!p){ playback.clock.step++; continue; }

    switch(e.action){

      case "play":
        p.playVideo();
        setTimeout(()=>p.unMute(),200);
        break;

      case "pause":
        p.pauseVideo();
        break;

      case "show":
        let el=p.getIframe();
        el.style.display="block";
        el.style.left=e.args[0]+"%";
        el.style.top=e.args[1]+"%";
        el.style.width=e.args[2]+"%";
        el.style.height=e.args[3]+"%";
        break;

      case "hide":
        p.getIframe().style.display="none";
        break;
    }

    playback.clock.step++;
  }
}

</script>

</body>
</html>
