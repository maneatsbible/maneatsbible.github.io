<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

#stage {
  position:relative;
  width:100%;
  height:56vh;
  background:black;
  overflow:hidden;
}

.video { position:absolute; }

#pipCam {
  position:absolute;
  bottom:5%;
  right:5%;
  width:30%;
  border:2px solid white;
  display:none;
  z-index:10;
}

#log {
  height:220px;
  overflow:auto;
  background:#000;
  color:#0f0;
  font-size:11px;
  padding:6px;
}

.active-tab {
  background:#0d6efd !important;
  color:white !important;
}
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<div class="d-flex gap-2 mb-2">
  <button id="tabPlay" class="btn btn-outline-light flex-fill">Playback</button>
  <button id="tabRec" class="btn btn-outline-light flex-fill">Record</button>
</div>

<div id="playUI">
  <input id="commentaryId" class="form-control mb-2" placeholder="Commentary ID">
  <button class="btn btn-success w-100" onclick="startPlayback()">Start Playback</button>
</div>

<div id="recUI" style="display:none;">
  <input id="recordSubjectId" class="form-control mb-2" placeholder="Subject ID">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-danger w-100 mb-2" onclick="stopRecording()">Stop Recording</button>
  <button class="btn btn-primary w-100 mb-2" onclick="upload()">Upload</button>
</div>

<div id="stage"></div>
<video id="pipCam" autoplay muted playsinline></video>

<h6 class="mt-3">LOG</h6>
<div id="log"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const VERSION="Mixed Reviews v15";

/* LOG */
let logBox=document.getElementById("log");
function log(m){
  let t=(performance.now()/1000).toFixed(2);
  logBox.innerHTML+=`[${t}] ${m}<br>`;
  logBox.scrollTop=logBox.scrollHeight;
}

log("INIT "+VERSION);

/* GET PARAM */
let param=new URLSearchParams(location.search).get("commentary");
if(param){
  commentaryId.value=param;
  log("GET commentary="+param);
}

/* STATE */
let state={mode:"playback",ytReady:false};

/* PLAYBACK ENGINE */
let playback={
  players:{},
  ready:0,
  clock:{t:0,last:0,step:0,running:false},
  timeline:[]
};

/* RECORD ENGINE */
let record={};

/* UI */
tabPlay.onclick=()=>{state.mode="playback";renderUI();};
tabRec.onclick=()=>{state.mode="record";renderUI();};

function renderUI(){
  playUI.style.display=state.mode==="playback"?"block":"none";
  recUI.style.display=state.mode==="record"?"block":"none";
  tabPlay.classList.toggle("active-tab",state.mode==="playback");
  tabRec.classList.toggle("active-tab",state.mode==="record");
}
renderUI();

/* YT */
function onYouTubeIframeAPIReady(){
  state.ytReady=true;
  log("YT READY");
}

/* DEFAULT TIMELINE */
function defaultTimeline(){
  return [
    {t:0,action:"play",target:"subject"},
    {t:3,action:"pause",target:"subject"},

    {t:3,action:"show",target:"commentary",args:["65%","65%","30%","30%"]},
    {t:3,action:"play",target:"commentary"},

    {t:6,action:"pause",target:"commentary"},
    {t:6,action:"hide",target:"commentary"},

    {t:6,action:"play",target:"subject"}
  ];
}

/* START */
function startPlayback(){

  if(!state.ytReady){
    log("YT NOT READY");
    return;
  }

  stage.innerHTML="";
  playback.players={};
  playback.ready=0;

  let commentary=commentaryId.value||"dQw4w9WgXcQ";
  let subject="oWkDjPnbrBY";

  recordSubjectId.value=subject;

  log("START subject="+subject+" commentary="+commentary);

  playback.timeline=defaultTimeline();

  create("subject",subject,0,0,100,100);
  create("commentary",commentary,65,65,30,30);
}

/* PLAYER */
function create(name,id,x,y,w,h){

  let div=document.createElement("div");
  div.id="pb_"+name;
  div.className="video";
  stage.appendChild(div);

  playback.players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1,controls:0,mute:1},
    events:{
      onReady:()=>{

        let el=playback.players[name].getIframe();
        el.style.left=x+"%";
        el.style.top=y+"%";
        el.style.width=w+"%";
        el.style.height=h+"%";

        playback.players[name].playVideo();

        playback.ready++;
        log("READY "+name);

        if(playback.ready===2){
          startClock();
        }
      },
      onStateChange:(e)=>{
        log(name+" state="+e.data);

        /* BUFFER HANDLING ONLY */
        if(e.data===3){ // buffering
          log(name+" BUFFERING → pausing other");
          Object.keys(playback.players).forEach(k=>{
            if(k!==name) playback.players[k].pauseVideo();
          });
        }

        if(e.data===1){
          log(name+" playing");
        }
      }
    }
  });
}

/* CLOCK */
function startClock(){
  playback.clock={t:0,last:performance.now(),step:0,running:true};
  log("CLOCK START");
  requestAnimationFrame(tick);
}

function tick(){

  if(!playback.clock.running) return;

  let now=performance.now();
  playback.clock.t+=(now-playback.clock.last)/1000;
  playback.clock.last=now;

  runTimeline();

  requestAnimationFrame(tick);
}

/* DRIFT (LOG ONLY) */
function logDrift(){
  Object.entries(playback.players).forEach(([name,p])=>{
    try{
      let t=p.getCurrentTime();
      let drift=Math.abs(t-playback.clock.t);
      if(drift>1){
        log("DRIFT "+name+" = "+drift.toFixed(2));
      }
    }catch(e){}
  });
}

/* TIMELINE */
function runTimeline(){

  logDrift();

  while(playback.clock.step < playback.timeline.length &&
        playback.timeline[playback.clock.step].t <= playback.clock.t){

    let e=playback.timeline[playback.clock.step];

    log("EVENT "+JSON.stringify(e));

    let p=playback.players[e.target];
    if(!p){ playback.clock.step++; continue; }

    if(e.action==="play") p.playVideo();
    if(e.action==="pause") p.pauseVideo();

    if(e.action==="show"){
      let el=p.getIframe();
      el.style.display="block";
      el.style.left=e.args[0];
      el.style.top=e.args[1];
      el.style.width=e.args[2];
      el.style.height=e.args[3];
    }

    if(e.action==="hide"){
      p.getIframe().style.display="none";
    }

    playback.clock.step++;
  }
}

</script>

</body>
</html>
