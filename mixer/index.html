<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Mixer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }
.video { position:absolute; display:none; border:2px solid red; }
#stage { position:relative; width:100%; height:60vh; background:black; }
#debug { height:150px; overflow:auto; background:black; color:#0f0; font-size:12px; }
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<div class="row mb-2">
  <div class="col-8">
    <input id="controlId" class="form-control" placeholder="Control Video ID">
  </div>
  <div class="col-4">
    <button class="btn btn-success w-100" onclick="start()">Start</button>
  </div>
</div>

<div class="row mb-2">
  <div class="col-6">
    <input id="recordVid" class="form-control" placeholder="Video to comment on">
  </div>
  <div class="col-3">
    <button class="btn btn-warning w-100" onclick="startRecording()">Record</button>
  </div>
  <div class="col-3">
    <button class="btn btn-danger w-100" onclick="stopRecording()">Stop</button>
  </div>
</div>

<div id="stage"></div>

<div class="mt-2">
  <b>Timeline:</b> <span id="time">0</span>
</div>

<div id="debug" class="mt-2"></div>

<textarea id="output" class="form-control mt-2" rows="6" placeholder="Generated metadata"></textarea>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let players={}, events=[], eventIndex=0;

let startTime=0;
let pausedOffset=0;
let isRunning=false;

let recording=false;
let recordEvents=[];

function log(m){
  debug.innerHTML += m+"<br>";
  debug.scrollTop=debug.scrollHeight;
}

function now(){
  return (performance.now()-startTime)/1000 + pausedOffset;
}

// SAMPLE METADATA (PIP)
function sampleMeta(){
return `
video vidA b9_CS8gTOR0

00:00 show vidA 0 0 100% 100%
00:00 play vidA

00:02 show this 70% 70% 30% 30%
00:02 play this
`;
}

// PARSE
function parseTime(t){
  let p=t.split(":").map(Number);
  return p[0]*60+p[1];
}

function parse(text){
  let vids={};
  events=[];

  text.trim().split("\n").forEach(l=>{
    l=l.trim();
    if(!l) return;

    let p=l.split(" ");

    if(p[0]=="video") vids[p[1]]=p[2];
    else if(p[0].includes(":")){
      events.push({time:parseTime(p[0]),cmd:p[1],args:p.slice(2)});
    }
  });

  events.sort((a,b)=>a.time-b.time);
  return vids;
}

// PLAYER
function create(name,id){
  let d=document.createElement("div");
  d.id="p_"+name;
  d.className="video";
  stage.appendChild(d);

  players[name]=new YT.Player(d.id,{
    videoId:id,
    events:{
      onStateChange:e=>handleState(name,e.data)
    }
  });
}

// BUFFER / PAUSE HANDLING
function handleState(name,state){
  // 3 = buffering
  if(state==3){
    log(name+" buffering → pause timeline");
    isRunning=false;
  }

  // 1 = playing
  if(state==1 && !isRunning){
    log(name+" resumed → adjust timeline");
    startTime=performance.now();
    isRunning=true;
    requestAnimationFrame(tick);
  }
}

// EXEC
function exec(e){
  let p=players[e.args[0]];
  if(!p) return;

  if(recording){
    recordEvents.push(e);
  }

  switch(e.cmd){

    case "play": p.playVideo(); break;
    case "pause": p.pauseVideo(); break;
    case "seek": p.seekTo(parseFloat(e.args[1]),true); break;

    case "show":
      let el=p.getIframe();
      el.style.display="block";
      el.style.left=e.args[1];
      el.style.top=e.args[2];
      el.style.width=e.args[3];
      el.style.height=e.args[4];
    break;

    case "hide":
      p.getIframe().style.display="none";
    break;
  }
}

// LOOP
function tick(){
  if(!isRunning) return;

  let t=now();
  time.innerText=t.toFixed(2);

  while(eventIndex<events.length && events[eventIndex].time<=t){
    exec(events[eventIndex]);
    eventIndex++;
  }

  requestAnimationFrame(tick);
}

// START
function start(){
  players={};
  events=[];
  eventIndex=0;

  let id=controlId.value || "CONTROL";

  let text=sampleMeta(); // replace with API fetch later
  let vids=parse(text);

  vids["this"]=id;

  for(let k in vids) create(k,vids[k]);

  startTime=performance.now();
  pausedOffset=0;
  isRunning=true;

  requestAnimationFrame(tick);
}

// RECORD MODE
function startRecording(){
  recording=true;
  recordEvents=[];
  log("Recording started");

  players={};
  let vid=recordVid.value;

  create("vidA",vid);

  startTime=performance.now();
  isRunning=true;
}

function stopRecording(){
  recording=false;

  let txt="video vidA "+recordVid.value+"\n\n";

  recordEvents.forEach(e=>{
    let m=Math.floor(e.time/60).toString().padStart(2,"0");
    let s=Math.floor(e.time%60).toString().padStart(2,"0");

    txt+=`${m}:${s} ${e.cmd} ${e.args.join(" ")}\n`;
  });

  txt+=`\n\n---\nUse with Video Mixer App\nPaste this video ID into the mixer.\n`;

  output.value=txt;
  log("Recording stopped");
}
</script>

</body>
</html>
