<!DOCTYPE html>
<html>
<head>
  <title>Video Mixer w/ Sync + Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; background:black; overflow:hidden; font-family:monospace; }

    .video {
      position:absolute;
      display:none;
      border:2px solid red;
    }

    #controls {
      position:fixed; top:10px; left:10px; z-index:9999;
      background:rgba(0,0,0,0.8); color:white; padding:10px;
    }

    #debug {
      position:fixed; bottom:0; left:0; width:100%; height:30%;
      overflow-y:scroll; background:rgba(0,0,0,0.9);
      color:#00ff00; font-size:11px; padding:5px;
      z-index:9999;
    }

    #timeDisplay {
      position:fixed; top:10px; right:10px;
      color:yellow; background:rgba(0,0,0,0.7);
      padding:5px; z-index:9999;
    }

    #syncMonitor {
      position:fixed;
      right:10px;
      top:50px;
      width:180px;
      background:rgba(0,0,0,0.8);
      color:white;
      padding:5px;
      z-index:9999;
    }

    .bar {
      height:10px;
      background:lime;
      margin:2px 0;
    }
  </style>
</head>
<body>

<div id="controls">
  <input id="controlId" placeholder="Control Video ID">
  <button onclick="start()">Start</button>
  <button onclick="toggleAlerts()">Alerts</button>
</div>

<div id="timeDisplay">t=0</div>
<div id="syncMonitor"></div>
<div id="stage"></div>
<div id="debug"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let players = {};
let events = [];
let eventIndex = 0;

let startTime = 0;
let pausedAt = 0;
let isPlaying = false;

let syncMap = {};
let ENABLE_SYNC = true;

let SYNC_THRESHOLD = 0.4;
let HARD_THRESHOLD = 1.2;

let alertMode = false;

// ---------- DEBUG ----------
function log(msg){
  let d = document.getElementById("debug");
  let line = document.createElement("div");
  line.textContent = msg;
  d.appendChild(line);
  d.scrollTop = d.scrollHeight;
  console.log(msg);
  if(alertMode) alert(msg);
}

function toggleAlerts(){
  alertMode = !alertMode;
}

// ---------- TIME ----------
function now(){
  return (performance.now() - startTime)/1000;
}

// ---------- SAMPLE SCRIPT ----------
function getControlDescription(id){
return `
video vidA b9_CS8gTOR0

00:00 show vidA 0 0 640 360
00:01 play vidA

00:03 show this 650 0 320 180
00:04 play this

00:08 seek this 20

00:12 hide vidA
`;
}

// ---------- PARSE ----------
function parseTime(t){
  let p = t.split(":").map(Number);
  return p[0]*60 + p[1];
}

function parseScript(text){
  let vids = {};
  events = [];

  text.trim().split("\n").forEach(line=>{
    line=line.trim();
    if(!line) return;

    let parts=line.split(" ");

    if(parts[0]==="video"){
      vids[parts[1]] = parts[2];
    }
    else if(parts[0].includes(":")){
      events.push({
        time:parseTime(parts[0]),
        cmd:parts[1],
        args:parts.slice(2)
      });
    }
  });

  events.sort((a,b)=>a.time-b.time);
  return vids;
}

// ---------- PLAYER ----------
function createPlayer(name,id){
  let div=document.createElement("div");
  div.id="p_"+name;
  div.className="video";
  stage.appendChild(div);

  players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{controls:0},
    events:{
      onReady:()=>log("ready "+name),
      onError:e=>log("err "+name+" "+e.data)
    }
  });
}

// ---------- EXEC ----------
function exec(e){
  log(`@${e.time}s ${e.cmd} ${e.args.join(" ")}`);

  let name=e.args[0];
  let p=players[name];
  if(!p) return;

  switch(e.cmd){

    case "play":
      syncMap[name]={
        offset: now() - p.getCurrentTime()
      };
      p.playVideo();
    break;

    case "pause":
      p.pauseVideo();
    break;

    case "seek":
      p.seekTo(parseFloat(e.args[1]),true);
    break;

    case "show":
      let el=p.getIframe();
      el.style.display="block";
      el.style.left=e.args[1]+"px";
      el.style.top=e.args[2]+"px";
      el.style.width=e.args[3]+"px";
      el.style.height=e.args[4]+"px";
    break;

    case "hide":
      p.getIframe().style.display="none";
    break;
  }
}

// ---------- TIMELINE ----------
function tick(){
  if(!isPlaying) return;

  let t=now();
  timeDisplay.textContent="t="+t.toFixed(2);

  while(eventIndex<events.length && events[eventIndex].time<=t){
    exec(events[eventIndex]);
    eventIndex++;
  }

  requestAnimationFrame(tick);
}

// ---------- SYNC LOOP ----------
function syncLoop(){

  if(!ENABLE_SYNC){
    setTimeout(syncLoop,300);
    return;
  }

  let t=now();
  let monitorHTML="";

  for(let name in syncMap){
    let p=players[name];
    if(!p || !p.getCurrentTime) continue;

    try{
      let actual=p.getCurrentTime();
      let expected=t - syncMap[name].offset;
      let drift=actual-expected;

      // --- SMOOTH CORRECTION ---
      if(Math.abs(drift) > SYNC_THRESHOLD && Math.abs(drift) < HARD_THRESHOLD){

        let rate = 1 - drift * 0.5;
        rate = Math.max(0.5, Math.min(1.5, rate));

        p.setPlaybackRate(rate);

      } else {
        p.setPlaybackRate(1);
      }

      // --- HARD SNAP ---
      if(Math.abs(drift) >= HARD_THRESHOLD){
        log("HARD SYNC "+name);
        p.seekTo(expected,true);
      }

      // --- MONITOR BAR ---
      let width = Math.min(100, Math.abs(drift)*50);
      monitorHTML += `
        <div>${name} ${drift.toFixed(2)}</div>
        <div class="bar" style="width:${width}px"></div>
      `;

    }catch(e){
      log("sync err "+e.message);
    }
  }

  syncMonitor.innerHTML = monitorHTML;

  setTimeout(syncLoop,200);
}

// ---------- START ----------
function start(){

  log("START");

  players={};
  syncMap={};
  events=[];
  eventIndex=0;

  let id=controlId.value.trim();
  if(!id) return alert("enter id");

  let text=getControlDescription(id);
  let vids=parseScript(text);

  vids["this"]=id;

  for(let k in vids){
    createPlayer(k,vids[k]);
  }

  startTime=performance.now();
  isPlaying=true;

  requestAnimationFrame(tick);
  syncLoop();
}
</script>

</body>
</html>
