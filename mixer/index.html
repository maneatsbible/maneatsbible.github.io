<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Commentary Mixer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }
.video { position:absolute; display:none; border:2px solid red; }
#stage { position:relative; width:100%; height:60vh; background:black; }
#debug { height:150px; overflow:auto; background:black; color:#0f0; font-size:12px; }
video#camPreview { width:100%; max-height:200px; }
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<div class="row g-2 mb-2">
  <div class="col-12 col-md-8">
    <input id="controlId" class="form-control" placeholder="Control Video ID">
  </div>
  <div class="col-12 col-md-4">
    <button class="btn btn-success w-100" onclick="startPlayback()">Start Playback</button>
  </div>
</div>

<div class="row g-2 mb-2">
  <div class="col-12 col-md-6">
    <input id="recordVid" class="form-control" placeholder="Video ID to comment on (vidA)">
  </div>
  <div class="col-6 col-md-3">
    <button class="btn btn-warning w-100" onclick="startRecording()">Start Recording</button>
  </div>
  <div class="col-6 col-md-3">
    <button class="btn btn-danger w-100" onclick="stopRecording()">Stop Recording</button>
  </div>
</div>

<div id="stage"></div>

<video id="camPreview" autoplay muted playsinline class="mt-2"></video>

<div class="mt-2">
  <strong>Time:</strong> <span id="time">0</span>
</div>

<div id="debug" class="mt-2"></div>

<textarea id="output" class="form-control mt-2" rows="6" placeholder="Generated metadata"></textarea>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let players = {};
let events = [];
let eventIndex = 0;

let startTime = 0;
let isRunning = false;

let readyCount = 0;
let totalPlayers = 0;

// recording
let mediaRecorder;
let recordedChunks = [];
let recordStart = 0;
let recordEvents = [];
let recording = false;

// ---------- DEBUG ----------
function log(msg){
  debug.innerHTML += msg + "<br>";
  debug.scrollTop = debug.scrollHeight;
}

// ---------- TIME ----------
function now(){
  return (performance.now() - startTime) / 1000;
}

// ---------- SAMPLE METADATA ----------
function sampleMeta(){
return `
video vidA b9_CS8gTOR0

00:00 show vidA 0% 0% 100% 100%
00:00 play vidA

00:02 show this 70% 70% 30% 30%
00:02 play this
`;
}

// ---------- PARSE ----------
function parseTime(t){
  let p = t.split(":").map(Number);
  return p[0]*60 + p[1];
}

function parse(text){
  let vids = {};
  events = [];

  text.trim().split("\\n").forEach(l=>{
    l = l.trim();
    if(!l) return;

    let p = l.split(" ");

    if(p[0]=="video") vids[p[1]] = p[2];
    else if(p[0].includes(":")){
      events.push({time:parseTime(p[0]),cmd:p[1],args:p.slice(2)});
    }
  });

  events.sort((a,b)=>a.time-b.time);
  return vids;
}

// ---------- PLAYER ----------
function create(name,id){
  let d=document.createElement("div");
  d.id="p_"+name;
  d.className="video";
  stage.appendChild(d);

  totalPlayers++;

  players[name]=new YT.Player(d.id,{
    videoId:id,
    playerVars:{playsinline:1},
    events:{
      onReady:()=>{
        readyCount++;
        log(name+" ready");
        if(readyCount===totalPlayers){
          log("ALL READY → start timeline");
          startTime = performance.now();
          isRunning = true;
          requestAnimationFrame(tick);
        }
      },
      onStateChange:e=>handleState(name,e.data)
    }
  });
}

// ---------- STATE HANDLING ----------
function handleState(name,state){

  // BUFFERING
  if(state==3){
    log(name+" buffering → pause others");
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.pauseVideo();
    });
  }

  // PLAYING
  if(state==1){
    log(name+" playing → resume others");
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.playVideo();
    });
  }

  // RECORD TRACK
  if(recording){
    recordEvents.push({
      time: (performance.now() - recordStart)/1000,
      cmd: state==1?"play":"pause",
      args:[name]
    });
  }
}

// ---------- EXEC ----------
function exec(e){
  let p = players[e.args[0]];
  if(!p) return;

  switch(e.cmd){
    case "play": p.playVideo(); break;
    case "pause": p.pauseVideo(); break;
    case "seek": p.seekTo(parseFloat(e.args[1]),true); break;

    case "show":
      let el=p.getIframe();
      el.style.display="block";
      el.style.left=e.args[1];
      el.style.top=e.args[2];
      el.style.width=e.args[3];
      el.style.height=e.args[4];
    break;

    case "hide":
      p.getIframe().style.display="none";
    break;
  }
}

// ---------- LOOP ----------
function tick(){
  if(!isRunning) return;

  let t = now();
  time.innerText = t.toFixed(2);

  while(eventIndex<events.length && events[eventIndex].time<=t){
    exec(events[eventIndex]);
    eventIndex++;
  }

  requestAnimationFrame(tick);
}

// ---------- PLAYBACK ----------
function startPlayback(){
  players={}; events=[]; eventIndex=0;
  readyCount=0; totalPlayers=0;

  let id = controlId.value || "CONTROL";
  let text = sampleMeta(); // replace with API fetch later

  let vids = parse(text);
  vids["this"] = id;

  for(let k in vids) create(k,vids[k]);
}

// ---------- RECORD ----------
async function startRecording(){

  recording = true;
  recordEvents = [];
  recordStart = performance.now();

  let stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  camPreview.srcObject = stream;

  mediaRecorder = new MediaRecorder(stream);
  mediaRecorder.ondataavailable = e=>recordedChunks.push(e.data);
  mediaRecorder.start();

  players={}; readyCount=0; totalPlayers=0;

  let vid = recordVid.value;
  create("vidA", vid);

  log("Recording started");
}

function stopRecording(){

  recording=false;

  mediaRecorder.stop();
  mediaRecorder.onstop=()=>{

    let blob = new Blob(recordedChunks,{type:"video/webm"});
    let url = URL.createObjectURL(blob);

    let a=document.createElement("a");
    a.href=url;
    a.download="commentary.webm";
    a.click();

    // metadata
    let txt = "video vidA "+recordVid.value+"\\n\\n";

    recordEvents.forEach(e=>{
      let m = String(Math.floor(e.time/60)).padStart(2,"0");
      let s = String(Math.floor(e.time%60)).padStart(2,"0");

      txt += `${m}:${s} ${e.cmd} ${e.args.join(" ")}\\n`;
    });

    txt += `
---
This video is a control track for the Video Mixer app.
Paste this video ID into the mixer to replay commentary.
`;

    output.value = txt;

    log("Recording saved");
  };
}
</script>

</body>
</html>
