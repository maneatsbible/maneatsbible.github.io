<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

#stage {
  position:relative;
  width:100%;
  height:60vh;
  background:black;
  overflow:hidden;
  border-radius:10px;
}

.video {
  position:absolute;
  transition: all 0.6s ease;
  transform-origin: center;
}

.pip {
  transition: all 0.6s ease;
}

.full {
  transform: scale(1.0);
}

.small {
  transform: scale(0.35);
  border:2px solid white;
  border-radius:8px;
}

#debug {
  height:120px;
  overflow:auto;
  background:black;
  color:#0f0;
  font-size:11px;
  display:none;
}

#cam {
  width:100%;
  max-height:180px;
  border-radius:10px;
}

.tab-active {
  background:#0d6efd !important;
  color:white !important;
}
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<div class="d-flex gap-2 mb-2">
  <button id="tabPlay" class="btn btn-outline-light flex-fill tab-active" onclick="setMode('play')">Playback</button>
  <button id="tabRec" class="btn btn-outline-light flex-fill" onclick="setMode('record')">Record</button>
</div>

<div id="playUI">
  <input id="commentaryId" class="form-control mb-2" placeholder="Commentary Video ID (control)">
  <button class="btn btn-success w-100" onclick="startPlayback()">Start Playback</button>
</div>

<div id="recordUI" style="display:none;">
  <input id="vidA" class="form-control mb-2" placeholder="Subject Video ID">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-secondary w-100 mb-2" onclick="toggleRecordPause()">Pause/Resume Commentary</button>
  <button class="btn btn-danger w-100" onclick="stopRecording()">Stop + Export</button>
</div>

<div id="stage" class="mb-2"></div>

<video id="cam" autoplay muted playsinline></video>

<button class="btn btn-dark w-100 mt-2" onclick="toggleDebug()">Toggle Debug</button>
<div id="debug"></div>

<textarea id="output" class="form-control mt-2" rows="6"></textarea>

<button class="btn btn-primary w-100 mt-2" onclick="uploadOAuth()">Upload to YouTube</button>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
let players={};
let mode="play";

let recording=false;
let recordStart=0;
let events=[];

let subjectPaused=false;
let commentaryVisible=true;

// ---------- DEBUG ----------
function log(m){
  debug.innerHTML+=m+"<br>";
  debug.scrollTop=debug.scrollHeight;
}

// ---------- MODE UI ----------
function setMode(m){
  mode=m;

  tabPlay.classList.remove("tab-active");
  tabRec.classList.remove("tab-active");

  if(m==="play"){
    tabPlay.classList.add("tab-active");
    playUI.style.display="block";
    recordUI.style.display="none";
  } else {
    tabRec.classList.add("tab-active");
    playUI.style.display="none";
    recordUI.style.display="block";
  }
}

// ---------- DEBUG TOGGLE ----------
function toggleDebug(){
  debug.style.display = debug.style.display==="none"?"block":"none";
}

// ---------- START PLAYBACK ----------
function startPlayback(){

  stage.innerHTML="";
  players={};

  let commentary = commentaryId.value;
  let subject = "b9_CS8gTOR0";

  create("subject",subject,0,0,100,100);
  create("commentary",commentary,70,70,30,30);
}

// ---------- CREATE PLAYER ----------
function create(name,id,x,y,w,h){

  let div=document.createElement("div");
  div.id="p_"+name;
  div.className="video";
  stage.appendChild(div);

  players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1,controls:0},
    events:{
      onReady:()=>{
        log(name+" ready");

        let el=players[name].getIframe();
        el.style.left=x+"%";
        el.style.top=y+"%";
        el.style.width=w+"%";
        el.style.height=h+"%";
        el.style.display="block";
      },
      onStateChange:e=>handle(name,e.data)
    }
  });
}

// ---------- STATE ----------
function handle(name,state){

  // BUFFERING → pause others
  if(state===3){
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.pauseVideo();
    });
  }

  // PLAYING → resume others
  if(state===1){
    Object.entries(players).forEach(([n,p])=>{
      if(n!==name) p.playVideo();
    });
  }

  // RECORD
  if(recording && name==="subject"){
    let t=(performance.now()-recordStart)/1000;
    events.push({time:t,cmd:state===1?"play":"pause",args:["subject"]});
  }
}

// ---------- RECORD ----------
async function startRecording(){

  events=[];
  recording=true;
  recordStart=performance.now();

  let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  cam.srcObject=stream;

  stage.innerHTML="";
  players={};

  create("subject",vidA.value,0,0,100,100);
  create("commentary",commentaryId.value,70,70,30,30);

  log("Recording started");
}

// ---------- TOGGLE COMMENTARY ----------
function toggleRecordPause(){

  if(!recording) return;

  let t=(performance.now()-recordStart)/1000;

  commentaryVisible = !commentaryVisible;

  if(commentaryVisible){
    events.push({time:t,cmd:"show",args:["commentary","70","70","30","30"]});
  } else {
    events.push({time:t,cmd:"hide",args:["commentary"]});
  }
}

// ---------- STOP ----------
function stopRecording(){

  recording=false;

  let meta=`video subject ${vidA.value}\n\n`;

  events.forEach(e=>{
    let m=String(Math.floor(e.time/60)).padStart(2,"0");
    let s=String(Math.floor(e.time%60)).padStart(2,"0");
    meta+=`${m}:${s} ${e.cmd} ${e.args.join(" ")}\n`;
  });

  let desc =
`Mixed Reviews Commentary

Use with:
https://maneatsbible.live/mixer

---

${meta}`;

  output.value=desc;
}

// ---------- OAUTH UPLOAD ----------
function uploadOAuth(){
  log("OAuth upload stub ready");

  // FULL FLOW WOULD:
  // 1. Google login (GIS)
  // 2. get access token
  // 3. POST to YouTube Data API videos.insert

  alert("OAuth upload requires client ID + API setup (ready to wire next step).");
}
</script>

</body>
</html>
