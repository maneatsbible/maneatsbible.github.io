<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }

#stage {
  position:relative;
  width:100%;
  height:56vh;
  background:black;
  overflow:hidden;
}

.video { position:absolute; }

#pipCam {
  position:absolute;
  bottom:5%;
  left:5%;
  width:30%;
  border:2px solid white;
  display:none;
  z-index:10;
}

#log {
  height:220px;
  overflow:auto;
  background:#000;
  color:#0f0;
  font-size:11px;
  padding:6px;
}

.active-tab {
  background:#0d6efd !important;
  color:white !important;
}
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<div class="d-flex gap-2 mb-2">
  <button id="tabPlay" class="btn btn-outline-light flex-fill">Playback</button>
  <button id="tabRec" class="btn btn-outline-light flex-fill">Record</button>
</div>

<div id="playUI">
  <input id="commentaryId" class="form-control mb-2" placeholder="Commentary ID">
  <button class="btn btn-success w-100" onclick="startPlayback()">Start Playback</button>
</div>

<div id="recUI" style="display:none;">
  <input id="recordSubjectId" class="form-control mb-2" placeholder="Subject ID">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-danger w-100 mb-2" onclick="stopRecording()">Stop Recording</button>
  <button class="btn btn-primary w-100 mb-2" onclick="upload()">Upload</button>
</div>

<div id="stage"></div>
<video id="pipCam" autoplay muted playsinline></video>

<h6 class="mt-3">LOG</h6>
<div id="log"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>

/* =========================
   CONFIG
========================= */

const VERSION = "Mixed Reviews v12";
const YT_API_KEY = "YOUR_API_KEY";

/* =========================
   LOG
========================= */

let logBox = document.getElementById("log");

function log(m){
  let t=(performance.now()/1000).toFixed(2);
  logBox.innerHTML += `[${t}] ${m}<br>`;
  logBox.scrollTop = logBox.scrollHeight;
}

log("INIT "+VERSION);

/* =========================
   GET PARAM
========================= */

function getParam(){
  let p=new URLSearchParams(location.search);
  return p.get("commentary");
}

let param=getParam();
if(param){
  document.getElementById("commentaryId").value = param;
  log("GET param commentary="+param);
}

/* =========================
   STATE
========================= */

let state = { mode:"playback", ytReady:false };

let playback = {
  players:{},
  readyCount:0,
  clock:{t:0,last:0,step:0,running:false},
  timeline:[]
};

let record = {};

/* =========================
   UI
========================= */

tabPlay.onclick=()=>{ state.mode="playback"; renderUI(); };
tabRec.onclick=()=>{ state.mode="record"; renderUI(); };

function renderUI(){
  playUI.style.display = state.mode==="playback"?"block":"none";
  recUI.style.display = state.mode==="record"?"block":"none";
  tabPlay.classList.toggle("active-tab",state.mode==="playback");
  tabRec.classList.toggle("active-tab",state.mode==="record");
}
renderUI();

/* =========================
   YT READY
========================= */

function onYouTubeIframeAPIReady(){
  state.ytReady=true;
  log("YT READY");
}

/* =========================
   FETCH DESCRIPTION
========================= */

async function fetchDescription(id){

  if(!YT_API_KEY || YT_API_KEY==="YOUR_API_KEY"){
    log("No API key → default metadata");
    return "";
  }

  try{
    let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${YT_API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();

    let desc=data.items?.[0]?.snippet?.description || "";
    log("Description length="+desc.length);

    return desc;

  }catch(e){
    log("Fetch failed");
    return "";
  }
}

/* =========================
   PARSER
========================= */

function parseMetadata(text){

  let events=[];

  text.split("\n").forEach(line=>{

    let m=line.match(/^(\d+):(\d+)\s+(.*)$/);
    if(!m) return;

    let t=parseInt(m[1])*60 + parseInt(m[2]);
    let parts=m[3].trim().split(/\s+/);

    if(parts.length<2) return;

    let evt={
      t,
      action:parts[0],
      target:parts[1],
      args:parts.slice(2)
    };

    log("PARSED "+JSON.stringify(evt));
    events.push(evt);
  });

  return events.sort((a,b)=>a.t-b.t);
}

/* =========================
   DEFAULT
========================= */

function defaultTimeline(){
  log("DEFAULT TIMELINE");

  return [
    {t:0,action:"play",target:"subject"},
    {t:3,action:"pause",target:"subject"},

    {t:3,action:"show",target:"commentary",args:["5%","65%","35%","30%"]},
    {t:3,action:"play",target:"commentary"},

    {t:6,action:"pause",target:"commentary"},
    {t:6,action:"hide",target:"commentary"},

    {t:6,action:"play",target:"subject"}
  ];
}

/* =========================
   START PLAYBACK
========================= */

async function startPlayback(){

  if(!state.ytReady){
    log("YT NOT READY");
    return;
  }

  stage.innerHTML="";
  playback.players={};
  playback.readyCount=0;

  let commentary = commentaryId.value || "dQw4w9WgXcQ";
  let subject = "b9_CS8gTOR0";

  recordSubjectId.value = subject;

  log("START playback subject="+subject+" commentary="+commentary);

  let desc = await fetchDescription(commentary);
  let parsed = parseMetadata(desc);

  playback.timeline = parsed.length ? parsed : defaultTimeline();

  createPB("subject",subject,0,0,100,100);
  createPB("commentary",commentary,5,65,35,30);
}

/* =========================
   PLAYER
========================= */

function createPB(name,id,x,y,w,h){

  let div=document.createElement("div");
  div.id="pb_"+name;
  div.className="video";
  stage.appendChild(div);

  playback.players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1,controls:0,mute:1},
    events:{
      onReady:()=>{

        let el=playback.players[name].getIframe();
        el.style.left=x+"%";
        el.style.top=y+"%";
        el.style.width=w+"%";
        el.style.height=h+"%";

        playback.players[name].playVideo();

        playback.readyCount++;
        log("READY "+name);

        if(playback.readyCount===2){
          startClock();
        }
      }
    }
  });
}

/* =========================
   CLOCK
========================= */

function startClock(){
  playback.clock={t:0,last:performance.now(),step:0,running:true};
  log("CLOCK START");
  requestAnimationFrame(tick);
}

function tick(){

  if(!playback.clock.running) return;

  let now=performance.now();
  playback.clock.t+=(now-playback.clock.last)/1000;
  playback.clock.last=now;

  runTimeline();

  requestAnimationFrame(tick);
}

/* =========================
   ENGINE
========================= */

function runTimeline(){

  while(playback.clock.step < playback.timeline.length &&
        playback.timeline[playback.clock.step].t <= playback.clock.t){

    let e=playback.timeline[playback.clock.step];
    log("EVENT "+JSON.stringify(e));

    let p=playback.players[e.target];
    if(!p){ playback.clock.step++; continue; }

    if(e.action==="play"){
      p.unMute();
      p.playVideo();
    }

    if(e.action==="pause"){
      p.pauseVideo();
    }

    if(e.action==="show"){
      let el=p.getIframe();
      el.style.display="block";
      el.style.left=e.args[0];
      el.style.top=e.args[1];
      el.style.width=e.args[2];
      el.style.height=e.args[3];
    }

    if(e.action==="hide"){
      p.getIframe().style.display="none";
    }

    playback.clock.step++;
  }
}

</script>

</body>
</html>
