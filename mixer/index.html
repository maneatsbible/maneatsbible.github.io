<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mixed Reviews</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#111; color:white; }
#stage { position:relative; width:100%; height:56vh; background:black; }
.video { position:absolute; }
#log { height:200px; overflow:auto; background:#000; color:#0f0; font-size:11px; padding:6px; }
.active-tab { background:#0d6efd !important; color:white !important; }
</style>
</head>

<body class="p-2">

<div class="container-fluid">

<h4 class="text-center">Mixed Reviews</h4>

<div class="d-flex gap-2 mb-2">
  <button id="tabPlayback" class="btn btn-outline-light flex-fill">Playback</button>
  <button id="tabRecord" class="btn btn-outline-light flex-fill">Record</button>
</div>

<div id="playbackUI">
  <input id="commentaryId" class="form-control mb-2" placeholder="Commentary video ID">
  <button class="btn btn-success w-100" onclick="startPlayback()">Start Playback</button>
</div>

<div id="recordUI" style="display:none;">
  <button class="btn btn-warning w-100 mb-2" onclick="startRecording()">Start Recording</button>
  <button class="btn btn-danger w-100 mb-2" onclick="stopRecording()">Stop Recording</button>
  <button class="btn btn-primary w-100 mb-2" onclick="upload()">Upload</button>
</div>

<div id="stage" class="mt-2"></div>

<video id="cam" autoplay muted playsinline style="display:none;width:100%;max-height:150px;"></video>

<h6 class="mt-3">LOG</h6>
<div id="log"></div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>

/* =========================
   CONFIG
========================= */

const VERSION = "Mixed Reviews v9";
const YT_API_KEY = "YOUR_API_KEY";

/* =========================
   STATE
========================= */

let state = { mode:"playback", ytReady:false, playersReady:0 };
let players = {};
let timeline = [];
let clock = {t:0,last:0,step:0,running:false};

/* =========================
   LOG
========================= */

let logBox = document.getElementById("log");

function log(m){
  logBox.innerHTML += m+"<br>";
  logBox.scrollTop = logBox.scrollHeight;
}

log("INIT "+VERSION);

/* =========================
   GET PARAM
========================= */

function getParam(){
  let p=new URLSearchParams(location.search);
  return p.get("commentary");
}

let param=getParam();
if(param){
  commentaryId.value=param;
  log("Loaded commentary param="+param);
}

/* =========================
   UI
========================= */

function renderUI(){
  playbackUI.style.display = state.mode==="playback"?"block":"none";
  recordUI.style.display = state.mode==="record"?"block":"none";
  tabPlayback.classList.toggle("active-tab",state.mode==="playback");
  tabRecord.classList.toggle("active-tab",state.mode==="record");
}

tabPlayback.onclick=()=>{ state.mode="playback"; renderUI(); };
tabRecord.onclick=()=>{ state.mode="record"; renderUI(); };

renderUI();

/* =========================
   YT READY
========================= */

function onYouTubeIframeAPIReady(){
  state.ytReady=true;
  log("YT API ready");
}

/* =========================
   FETCH DESCRIPTION
========================= */

async function fetchDescription(id){

  try{
    let url=`https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${id}&key=${YT_API_KEY}`;
    let res=await fetch(url);
    let data=await res.json();

    let desc = data.items?.[0]?.snippet?.description || "";

    log("Description fetched length="+desc.length);

    return desc;

  }catch(e){
    log("Description fetch failed");
    return "";
  }
}

/* =========================
   PARSER
========================= */

function parseMetadata(text){

  let lines=text.split("\n");
  let events=[];

  lines.forEach(line=>{

    let match=line.match(/^(\d+):(\d+)\s+(.*)$/);
    if(!match) return;

    let t = parseInt(match[1])*60 + parseInt(match[2]);
    let parts = match[3].trim().split(/\s+/);

    let evt={
      t,
      action:parts[0],
      target:parts[1],
      args:parts.slice(2)
    };

    log("PARSED "+JSON.stringify(evt));

    events.push(evt);
  });

  return events.sort((a,b)=>a.t-b.t);
}

/* =========================
   DEFAULT
========================= */

function defaultTimeline(){
  log("Using DEFAULT metadata");
  return [
    {t:0,action:"play",target:"subject"},
    {t:3,action:"pause",target:"subject"},
    {t:3,action:"play",target:"commentary"},
    {t:6,action:"pause",target:"commentary"},
    {t:6,action:"play",target:"subject"}
  ];
}

/* =========================
   PLAYBACK
========================= */

async function startPlayback(){

  if(!state.ytReady){
    log("YT not ready");
    return;
  }

  stage.innerHTML="";
  players={};
  state.playersReady=0;

  let commentary = commentaryId.value || "dQw4w9WgXcQ";

  log("Playback start commentary="+commentary);

  let desc = await fetchDescription(commentary);
  timeline = parseMetadata(desc);

  if(!timeline.length){
    timeline = defaultTimeline();
  }

  log("TIMELINE SIZE="+timeline.length);

  createPlayer("subject","b9_CS8gTOR0",0,0,100,100);
  createPlayer("commentary",commentary,65,65,35,35);
}

/* =========================
   PLAYER
========================= */

function createPlayer(name,id,x,y,w,h){

  let div=document.createElement("div");
  div.id=name;
  div.className="video";
  stage.appendChild(div);

  players[name]=new YT.Player(div.id,{
    videoId:id,
    playerVars:{playsinline:1,controls:0},
    events:{
      onReady:()=>{

        let el=players[name].getIframe();
        el.style.left=x+"%";
        el.style.top=y+"%";
        el.style.width=w+"%";
        el.style.height=h+"%";

        state.playersReady++;
        log("READY "+name);

        if(state.playersReady===2){
          startClock();
        }
      }
    }
  });
}

/* =========================
   CLOCK
========================= */

function startClock(){
  clock={t:0,last:performance.now(),step:0,running:true};
  log("CLOCK START");
  requestAnimationFrame(tick);
}

function tick(){

  if(!clock.running) return;

  let now=performance.now();
  clock.t += (now-clock.last)/1000;
  clock.last=now;

  runTimeline();

  requestAnimationFrame(tick);
}

/* =========================
   ENGINE
========================= */

function runTimeline(){

  while(clock.step < timeline.length &&
        timeline[clock.step].t <= clock.t){

    let e=timeline[clock.step];
    log("EVENT "+JSON.stringify(e));

    let p=players[e.target];
    if(!p){ clock.step++; continue; }

    if(e.action==="play") p.playVideo();
    if(e.action==="pause") p.pauseVideo();

    if(e.action==="show"){
      let el=p.getIframe();
      el.style.left=e.args[0];
      el.style.top=e.args[1];
      el.style.width=e.args[2];
      el.style.height=e.args[3];
    }

    if(e.action==="hide"){
      p.getIframe().style.display="none";
    }

    clock.step++;
  }
}

/* =========================
   RECORD + UPLOAD (unchanged)
========================= */

let recorder,chunks=[],blob;

async function startRecording(){
  let stream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  cam.srcObject=stream;
  cam.style.display="block";

  chunks=[];
  recorder=new MediaRecorder(stream);
  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.start();

  log("Recording started");
}

function stopRecording(){
  recorder.stop();
  recorder.onstop=()=>{
    blob=new Blob(chunks,{type:"video/webm"});
    log("Recorded "+blob.size+" bytes");
  };
}

function upload(){

  google.accounts.oauth2.initTokenClient({
    client_id:"YOUR_CLIENT_ID.apps.googleusercontent.com",
    scope:"https://www.googleapis.com/auth/youtube.upload",
    callback: async (r)=>{

      if(!blob){
        log("No recording");
        return;
      }

      let form=new FormData();
      form.append("metadata",new Blob([JSON.stringify({
        snippet:{title:"Mixed Reviews"},
        status:{privacyStatus:"unlisted"}
      })],{type:"application/json"}));

      form.append("file",blob);

      let res=await fetch("https://www.googleapis.com/upload/youtube/v3/videos?part=snippet,status&uploadType=multipart",{
        method:"POST",
        headers:{Authorization:"Bearer "+r.access_token},
        body:form
      });

      log("UPLOAD RESULT:");
      log(await res.text());
    }
  }).requestAccessToken();
}

</script>

</body>
</html>
